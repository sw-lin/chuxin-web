<script>
// ==========================================
// 1. 全域變數與基礎設定 (保留核心)
// ==========================================
let currentUser = {};

const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec"; 

// ==========================================
// 2. 資料同步核心：確保公告、權限、行事曆一個不漏
// ==========================================
async function syncData() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        globalConfig = data.config || {};
        window.latestCalendarData = data.calendar || []; 
        
        // --- 公告欄邏輯 (保留) ---
        const newsContent = data.news ? data.news.trim() : "";
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        const isDateValid = (data.startDate === "" || todayStr >= data.startDate) && (data.endDate === "" || todayStr <= data.endDate);
        
        const newsContainer = document.getElementById('newsContainer');
        if (newsContent && newsContent !== "NONE" && isDateValid) {
            if (newsContainer) newsContainer.classList.remove('hidden');
            document.getElementById('news').innerText = newsContent;
        } else {
            if (newsContainer) newsContainer.classList.add('hidden');
        }

        // --- 找出登入者並更新 UI ---
        const liveUser = data.users.find(u => {
            const uPhone = String(u.phone || "").replace(/\D/g, "").slice(-9);
            const currPhone = String(currentUser.phone || "").replace(/\D/g, "").slice(-9);
            return uPhone === currPhone;
        });
        
        if (liveUser) {
            currentUser = liveUser;

            // --- 關鍵新增：將活動完整資訊存入 localStorage ---
            if (data.events) {
                // 將資料庫 events 頁面的整表存起來，供報名頁面讀取
                localStorage.setItem('allEvents', JSON.stringify(data.events));
                console.log("活動資料已同步至 localStorage");
            }
            // ------------------------------------------
            
            // 更新幹部權限
            if (liveUser.role && liveUser.role !== "學員") {
                const staffBtn = document.getElementById('staffBtn');
                if (staffBtn) {
                    staffBtn.classList.remove('hidden');
                    staffBtn.onclick = enterStaffMode;
                }
            }
            // 執行更新 UI：傳入完整 data 以便計算
            updateUI(liveUser, data.calendar, data.events);
        }
    } catch (e) { 
        console.error("同步失敗:", e);
        showToast("同步失敗", "error"); 
    } finally { 
        overlay.style.display = 'none'; 
    }
}

// 修正 updateUI 以確保 ID 完全對齊您的 HTML
function updateUI(user, calendar, events) {
    const today = new Date().toISOString().split('T')[0];

    // 1. 計算數據 (維持原邏輯)
    const requiredPastEvents = (calendar || []).filter(ev => ev && ev.dateText && ev.dateText <= today && ev.needQR === true);
    const totalEvents = requiredPastEvents.length;
    const attendCount = (user.attendLog || []).length;
    const attendanceRate = totalEvents > 0 ? Math.round((attendCount / totalEvents) * 100) : 0;

    // 2. 填入 HTML
    const percentElem = document.getElementById('attPercent');
    const countDisplayElem = document.getElementById('attCountDisplay');
    
    if (percentElem) percentElem.innerText = attendanceRate + '%';
    if (countDisplayElem) countDisplayElem.innerText = `${attendCount} / ${totalEvents}`;

    // --- 新增：參與率超過 50% 放煙火 ---
    if (attendanceRate >= 50 && typeof confetti === 'function') {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#064E3B', '#059669', '#10B981'] // 使用翡翠綠系列色調
        });
    }

    // 3. 儲存數據供學習歷程 Modal 使用 (確保這裡邏輯正確)
    window.currentAttendedData = (calendar || []).filter(ev => 
        (user.attendLog || []).some(log => String(log).includes(ev.title))
    );

    renderCalendarActivity(calendar);
    renderEventSection(data.events || [], data.registrations || []);
}
// 點擊卡片觸發的函式
function showLearningHistory() {
    const modal = document.getElementById('historyModal'); // 確保您的 HTML 有這個 Modal ID
    const container = document.getElementById('historyList');
    if (!modal || !container) return;

    const logs = window.currentAttendedData || [];

    if (logs.length === 0) {
        container.innerHTML = `
            <div class="text-center py-10">
                <i class="fas fa-calendar-check text-gray-200 text-5xl mb-3"></i>
                <p class="text-gray-400">目前尚無出席紀錄</p>
            </div>`;
    } else {
        container.innerHTML = logs.map(log => `
            <div class="flex items-center justify-between p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-emerald-900 text-sm">${log.title}</h4>
                        <p class="text-[10px] text-emerald-600/70">${log.dateText || '已簽到'}</p>
                    </div>
                </div>
                <span class="text-[10px] font-bold px-2 py-1 bg-emerald-100 text-emerald-700 rounded-lg">已出席</span>
            </div>
        `).join('');
    }

    modal.classList.remove('hidden');
    modal.style.display = 'flex';
}
    
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const title = params.get('event');
    
    // 1. 抓取剛剛存入的 allEvents
    const allEvents = JSON.parse(localStorage.getItem('allEvents')) || [];
    
    // 2. 尋找匹配標題的活動
    const target = allEvents.find(e => e.title === title);

    if (target) {
        eventConfig = {
            title: title,
            // 注意：這裡的屬性名必須對應你 GAS 回傳的 Json Key
            memberFee: parseInt(target.memberFee) || 0,
            guestFee: parseInt(target.guestFee) || 0,
            needID: (target.needID === "是" || target.needID === "Y"), 
            isTourBus: (target.isTourBus === "是" || target.isTourBus === "Y")
        };
    }
    
    // 更新標頭與 UI...
    initDynamicUI();
    updateTotal();
};   

// 關閉彈窗
function closeHistoryModal() {

        modal.style.display = 'none';

} 
// 掃碼成功處理
// 掃碼成功處理 (2026 修復版)
// 掃碼成功處理 - 格式對齊補登系統版本 (2026-04-07 修復)
async function onScanSuccess(decodedText) {
    let rawText = decodedText.trim();
    let finalEventString = ""; // 準備寫入資料庫的最終字串

    // 1. 解析與重組格式 (將 CHECKIN:YYYY-MM-DD:Title 轉為 EVENT:YYYY-MM-DD|Title)
    if (rawText.startsWith("CHECKIN:")) {
        const parts = rawText.split(':');
        if (parts.length >= 3) {
            const datePart = parts[1]; // 2026-03-13
            // 取得第二個冒號之後的所有內容，避免活動名稱內有冒號被切斷
            const titlePart = rawText.substring(rawText.indexOf(':', 8) + 1).trim(); 
            
            // 組合為您要求的格式：EVENT:日期|名稱
            finalEventString = `EVENT:${datePart}|${titlePart}`;
        } else {
            finalEventString = rawText; // 格式異常時退回原文字
        }
    } else {
        // 如果 QR Code 本身就已經是 EVENT: 開頭，直接使用
        finalEventString = rawText;
    }

    // 2. 檢查前端快取是否已報到 (比對轉換後的完整字串)
    const alreadyAttended = (currentUser.attendLog || []).some(log => String(log) === finalEventString);
    if (alreadyAttended) {
        showToast("此活動已完成報到", "info");
        closeScanner();
        return;
    }

    closeScanner();
    showToast("報到傳送中...", "info");

    try {
        // 3. 發送至 GAS 進行寫入
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'checkin',
                phone: currentUser.phone,
                name: currentUser.name,
                eventTitle: finalEventString // 傳送對齊後的格式：EVENT:2026-03-13|築心演講...
            })
        });
        
        const result = await response.json();
        
        if (result.result === "SUCCESS") {
            showToast("報到成功！", "success");
            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            syncData(); // 刷新畫面與出席紀錄
        } else if (result.result === "ALREADY_DONE") {
            showToast("您已經簽到過囉", "info");
        } else {
            showToast(result.message || "報到失敗", "error");
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        showToast("連線異常，請檢查網路", "error");
    }
}    
function startScanner() {
    const modal = document.getElementById('scanModal');
    if (!modal) {
        alert("找不到掃描視窗結構");
        return;
    }
    
    modal.classList.remove('hidden');
    modal.style.display = 'flex';

    // 啟動 Html5Qrcode
    window.html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };

    window.html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
    ).catch(err => {
        console.error("相機錯誤:", err);
        showToast("無法開啟相機，請檢查權限", "error");
        closeScanner();
    });
}    
function closeScanner() {
    const modal = document.getElementById('scanModal');
    if (modal) {
        modal.classList.add('hidden');
        modal.style.display = 'none';
    }
    if (window.html5QrCode) {
        window.html5QrCode.stop().then(() => {

// ==========================================
// --- 完善：活動報名區塊渲染 (若無活動則全區塊隱藏) ---
function renderEventSection(events, registrations) {
    const wrapper = document.getElementById('registrationWrapper');
    const container = document.getElementById('eventSection');
    if (!container) return;

    if (!events || events.length === 0) {
        if (wrapper) wrapper.classList.add('hidden');
        return;
    }
    if (wrapper) wrapper.classList.remove('hidden');

    // 取得當前使用者手機 (用於比對報名紀錄)
    // 增加防錯處理，確保 currentUser 存在
    const userPhone = (window.currentUser && currentUser.phone) 
        ? String(currentUser.phone).replace(/\D/g, "").slice(-9) 
        : "";

    container.innerHTML = events.map(ev => {
        const isClosed = ev.status === "已截止";
        const isFull = ev.status === "已額滿";
        
        // 核心邏輯：比對 registrations 陣列
        const isRegistered = (registrations || []).some(reg => {
            const regPhone = String(reg.手機號碼 || "").replace(/\D/g, "").slice(-9);
            return String(reg.活動標題).trim() === String(ev.title).trim() && 
                   regPhone === userPhone && 
                   userPhone !== ""; // 確保手機號碼不為空才算匹配
        });

        let btnClass, btnText, clickAction, isDisabled;

        if (isRegistered) {
            btnClass = "bg-gray-100 text-emerald-600 cursor-default border border-emerald-100";
            btnText = `<i class="fas fa-check-circle mr-2"></i>您已完成報名`;
            clickAction = "";
            isDisabled = "disabled";
        } else if (isClosed || isFull) {
            btnClass = "bg-gray-100 text-gray-400 cursor-not-allowed";
            btnText = isClosed ? "報名已截止" : "活動已額滿";
            clickAction = "";
            isDisabled = "disabled";
        } else {
            btnClass = "emerald-gradient text-white hover:opacity-90 shadow-md active:scale-95";
            btnText = "立即預約報名";
            clickAction = `location.href='event_registration.html?event=${encodeURIComponent(ev.title)}'`;
            isDisabled = "";
        }

        const actionBtn = `
            <button onclick="${clickAction}" ${isDisabled}
                    class="w-full py-4 rounded-2xl text-sm font-black transition-all ${btnClass}">
                ${btnText}
            </button>`;

        // 判斷是否使用海報模式
        const posterUrl = (ev.poster && ev.poster.includes('http')) ? getDirectImageUrl(ev.poster) : null;

        if (posterUrl) {
            return `
                <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-emerald-50 mb-6">
                    <img src="${posterUrl}" class="w-full h-auto block" onerror="this.style.display='none'">
                    <div class="p-6">
                        <h4 class="font-black text-emerald-900 text-lg mb-3">${ev.title}</h4>
                        ${actionBtn}
                    </div>
                </div>`;
        } else {
            return `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 mb-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-black rounded-full">活動公告</span>
                        <span class="text-[10px] text-red-500 font-bold">截止：${ev.deadline || '額滿為止'}</span>
                    </div>
                    <h4 class="font-black text-emerald-900 text-xl mb-3">${ev.title}</h4>
                    <div class="space-y-3 mb-5 text-gray-600">
                        <div class="flex items-center gap-3 text-xs">
                            <i class="far fa-calendar-alt text-emerald-600"></i>
                            <span class="font-bold">日期：</span>${ev.eventDate || '另行通知'}
                        </div>
                        <div class="flex items-center gap-3 text-xs">
                            <i class="fas fa-tag text-emerald-600"></i>
                            <span class="font-bold">費用：</span>會員 $${ev.memberFee || 0} / 非會員 $${ev.guestFee || 0}
                        </div>
                    </div>
                    ${actionBtn}
                </div>`;
        }
    }).join('');
}

// 保留原本的圖片網址處理工具
function getDirectImageUrl(url) {
    if (!url || url === "NONE" || url === "" || typeof url !== 'string') return null;
    
    // 如果是普通圖片連結，直接回傳
    if (url.startsWith('http') && !url.includes('drive.google.com')) return url;

    // 1. 嘗試從各種 Google Drive 連結格式中提取 ID
    // 支援 /file/d/ID/view, id=ID, 以及您提供的 drive_link 格式
    let fileId = "";
    const segments = url.split('/');
    const dIndex = segments.indexOf('d');
    if (dIndex !== -1 && segments[dIndex + 1]) {
        fileId = segments[dIndex + 1].split('?')[0].split('&')[0];
    } else {
        const match = url.match(/id=([^&]+)/);
        if (match) fileId = match[1];
    }

    // 2. 如果上述方法失敗，使用最後的保險：正則比對長度 25-45 的 ID 字串
    if (!fileId) {
        const fallbackMatch = url.match(/[-\w]{25,45}/);
        if (fallbackMatch) fileId = fallbackMatch[0];
    }

    if (fileId) {
        // 使用最穩定且支援度最高的縮圖 API
        // sz=w1000 確保 Demo 用的大圖也能清晰顯示
        return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
    }    
    return url; // 若都失敗則回傳原始網址嘗試直接載入
}    
// 保留進入工作人員模式功能
async function enterStaffMode() {   
    const staffKey = prompt("請輸入幹部管理金鑰：");
    if (!staffKey) {
        alert("使用者取消輸入或未填寫");
        return;
    }

    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'verify_staff_key',
                staffKey: staffKey.trim()
            })
        });

        const result = await response.json();

        if (result.result === "SUCCESS") {
            // 存入金鑰，名稱必須與 staff_menu.html 一致
            sessionStorage.setItem('staff_key', staffKey.trim()); 
            window.location.href = 'staff_menu.html'; 
        } else {
            alert("失敗：金鑰不正確 (ERROR)");
        }
    } // <--- 之前您漏掉了這個結束 try 的右大括號
    catch (e) {
        console.error(e);
        alert("發生嚴重錯誤！錯誤訊息：" + e.message);
    }
}

function renderCalendarActivity(calendar) {
    const container = document.getElementById('calendarActivitySection');
    if (!container) return;
    
    const today = new Date().toISOString().split('T')[0];
    const nextEvent = (calendar || []).find(ev => ev.dateText >= today);

    if (!nextEvent) {
        container.innerHTML = '<p class="text-center text-gray-400 py-10 text-xs font-bold">目前暫無近期活動預告</p>';
        return;
    }

    // 取得轉換後的網址
    const posterUrl = getDirectImageUrl(nextEvent.poster);
    console.log("海報解析網址:", posterUrl); // 您可以在控制台確認網址是否正確

    if (posterUrl) {
        container.innerHTML = `
            <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-emerald-50 mb-6">
                <div class="w-full bg-gray-50 flex items-center justify-center min-h-[200px]">
                    <img src="${posterUrl}" 
                         class="w-full h-auto block" 
                         alt="${nextEvent.title}"
                         onerror="this.parentElement.innerHTML='<div class=\'p-10 text-gray-400 text-xs text-center font-bold\'>海報載入失敗<br>請確認雲端共用權限</div>'">
                </div>
                <div class="p-6">
                    <div class="flex items-center gap-2">
                        <span class="bg-emerald-700 text-white text-[10px] px-2 py-0.5 rounded-md font-bold">${nextEvent.dateText}</span>
                        <h4 class="font-black text-emerald-900">${nextEvent.title}</h4>

    } else {
        // 沒有網址則顯示文字模式

}

function showToast(msg, type) {
    const container = document.getElementById('toastContainer');
    if(!container) return;
    const toast = document.createElement('div');
    const bgColor = type === 'success' ? 'bg-emerald-600' : (type === 'error' ? 'bg-red-500' : 'bg-amber-500');
    toast.className = `${bgColor} text-white px-6 py-3 rounded-2xl shadow-xl mb-3 animate-bounce font-bold text-sm`;
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 3000);
}

// 送出修改
// 請在 member_zone.html 中找到並更新此函式
async function submitProfileUpdate() {
    // 1. 現場抓取輸入框的值 (請確認 ID 與您 HTML 中的一致)
    const oldPasswordInput = document.getElementById('oldPassword'); // 假設 ID 是這個
    const newPasswordInput = document.getElementById('newPassword');
    const newEmailInput = document.getElementById('editEmail');

    const oldPassword = oldPasswordInput ? oldPasswordInput.value.trim() : "";
    const newPassword = newPasswordInput ? newPasswordInput.value.trim() : "";
    const newEmail = newEmailInput ? newEmailInput.value.trim() : "";

    // 2. 基本檢查
    if (!oldPassword) {
        alert("請輸入舊密碼以進行驗證");
        return;
    }

    // 3. 從 Session 拿手機號碼
    const infoStr = sessionStorage.getItem('userInfo');
    const userInfo = infoStr ? JSON.parse(infoStr) : null;
    const phone = userInfo ? userInfo.phone : null;

    if (!phone) {
        alert("登入逾時，請重新登入");
        return;
    }
    // --- 【開始處理轉圈圈】 ---
    const loading = document.getElementById('loadingOverlay');
    if (loading) loading.style.display = 'flex'; // 強制顯示為 flex 居中 顯示轉圈圈
    
    const payload = {
        type: 'updateProfile',
        phone: phone,
        oldPassword: oldPassword, // 這次絕對不會是空的了
        newPassword: newPassword,
        email: newEmail
    };

    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if (result.result === "SUCCESS") {
            alert("修改成功！");
            location.reload();
        } else {
            alert(result.message);
        }
    } catch (e) {
        alert("系統繁忙，請稍後再試");
    } finally {
        // --- 【關閉轉圈圈】 ---
        // 無論成功或失敗，最後一定要隱藏轉圈圈，否則頁面會被鎖死
        if (loading) loading.style.display = 'none'; // 隱藏
    }
}
