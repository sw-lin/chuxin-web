        <section id="sec-signup" class="tab-content"><div class="text-center p-20 text-gray-400 text-2xl">活動報名功能載入中...</div></section>

        <section id="sec-system" class="tab-content">

                    <h3 class="text-xl font-bold text-emerald-800">網址設定</h3>

                <button id="systemSaveBtn" onclick="saveSystemConfig()" disabled class="w-full bg-gray-300 text-white py-6 rounded-2xl font-bold text-2xl cursor-not-allowed">更新連結</button>

<div id="loadingOverlay" class="fixed inset-0 bg-black/30 z-[200] hidden flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-emerald-800 mb-4"></div>
        <p class="text-2xl font-bold text-emerald-900">同步資料中...</p>
        <p class="text-gray-500 mt-2">請稍候，請勿重複點擊</p>
    </div>
</div> 
    
    <div id="qrModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-2xl font-bold text-emerald-900 mb-6">活動報到</h3>
            
    <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="closeQR()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-xl">關閉</button>
        </div>
    </div>
    

    <script>
        // ... (GAS_URL, adminKey, fetchData 同前版) ...
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let adminKey = "";
        let cachedData = null;

        window.onload = async () => {
            adminKey = sessionStorage.getItem('adminKey') || prompt("請輸入金鑰：");
            if (adminKey) { sessionStorage.setItem('adminKey', adminKey); fetchData(); }
            else { location.href = 'member_zone.html'; }
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function sendAttendanceToLine() {
    const select = document.getElementById('event-select');
    const eventTitle = select.options[select.selectedIndex].text;
    const selectedDate = select.value;

    const attendees = cachedData.attendance
        .filter(a => a.eventId.includes(selectedDate) || a.timestamp.toString().includes(selectedDate))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        .map(a => a.name);

    if (attendees.length === 0) return alert("目前尚無簽到人員");

    if (!confirm(`確定要將「${eventTitle}」名單發送至 LINE 嗎？`)) return;

    const message = `📢 【${eventTitle}】出席確認\n` +
                    `━━━━━━━━━━━━\n` +
                    attendees.join('、') + `\n` +
                    `━━━━━━━━━━━━\n` +
                    `總計：${attendees.length} 位`;

    const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
            type: 'send_line',
            key: sessionStorage.getItem('adminKey'),
            message: message
        })
    });
    
    const result = await res.json();
    if(result.result === "SUCCESS") alert("✅ 名單已傳送到 LINE！");
    else alert("❌ 發送失敗");
}
// --- 3. 修改 switchTab：增加「換頁就歸位」邏輯 ---
function switchTab(tab, title) {
    // 1. 關閉所有分頁的編輯狀態
    document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.remove('active', 'edit-mode-active');
    });

    // 2. 恢復所有「編輯開關」按鈕到初始狀態
    document.querySelectorAll('[id^="sec-"] button').forEach(btn => {
        if (btn.innerText.includes('編輯')) {
            btn.innerHTML = '<i class="fas fa-lock"></i> 編輯開關';
            btn.className = "text-orange-600 font-bold border border-orange-200 px-4 py-2 rounded-lg bg-orange-50";
        }
    });

    // 3. 強制讓系統設定回到鎖定狀態
    isSystemEditing = true; 
    toggleSystemEdit(); // 透過呼叫切換函式來重置為 false (鎖定)

    // 4. 切換顯示分頁
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    document.getElementById('sec-' + tab).classList.add('active');
    document.getElementById('current-title').innerText = title;
    
    // 5. 關閉選單
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if (sidebar) sidebar.classList.add('-translate-x-full');
    if (overlay) overlay.classList.add('hidden');

    // 6. 重新渲染畫面 (確保垃圾桶按鈕會根據新狀態消失)
    renderAll();
}

        // --- 針對特定分頁的編輯開關 ---
        function toggleSectionEdit(sectionId) {
            const sec = document.getElementById(sectionId);
            sec.classList.toggle('edit-mode-active');
            const btn = sec.querySelector('button');
            if (sec.classList.contains('edit-mode-active')) {
                btn.innerHTML = '<i class="fas fa-unlock"></i> 編輯開啟中';
                btn.classList.replace('bg-orange-50', 'bg-orange-500');
                btn.classList.replace('text-orange-600', 'text-white');
            } else {
                btn.innerHTML = '<i class="fas fa-lock"></i> 編輯開關';
                btn.classList.replace('bg-orange-500', 'bg-orange-50');
                btn.classList.replace('text-white', 'text-orange-600');
            }
            renderAll(); // 重新渲染以顯示/隱藏垃圾桶
        }

        // --- 系統設定專用解鎖 ---
        function unlockSystem() {
            document.getElementById('conf-reading').disabled = false;
            document.getElementById('conf-photo').disabled = false;
            document.getElementById('systemSaveBtn').disabled = false;
            document.getElementById('conf-reading').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('conf-photo').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('systemSaveBtn').classList.replace('bg-gray-300', 'bg-emerald-800');
            document.getElementById('systemSaveBtn').classList.remove('cursor-not-allowed');
            document.getElementById('systemLockBtn').innerText = "⚠️ 編輯中";
        }

        // ... (renderMembers, renderEvents 逻辑需要加入是否顯示垃圾桶的判斷) ...
        function renderMembers(users) {
            const list = document.getElementById('memberList');
            const isEdit = document.getElementById('sec-members').classList.contains('edit-mode-active');
            list.innerHTML = users.map(u => {
                let p = String(u.phone).length === 9 ? '0'+u.phone : u.phone;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex items-center text-huge w-full">
                        <div class="font-bold text-emerald-900" style="min-width:100px">${u.name}</div>
                        <div class="text-gray-500 font-mono" style="min-width:160px">${p}</div>
                        <div class="text-lg text-blue-500 truncate">${u.email || ''}</div>
                    </div>
                    ${isEdit ? `<button onclick="deleteMember('${u.phone}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>`;
            }).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            const isEdit = document.getElementById('sec-calendar').classList.contains('edit-mode-active');
            const today = new Date(); today.setHours(0,0,0,0);
            const sorted = [...events].sort((a,b) => new Date(a.dateText) - new Date(b.dateText));
            
            list.innerHTML = sorted.map(ev => {
                const canQR = new Date(ev.dateText) <= today;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-emerald-600 font-mono">${ev.dateText}</div>
                        <div class="text-huge font-bold text-emerald-900">${ev.title}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        ${canQR ? `<button onclick="showQR('${ev.dateText}','${ev.title}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">QR</button>` : ''}
                        ${isEdit ? `<button onclick="deleteEvent('${ev.dateText}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

async function apiPost(data) {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    
    data.key = adminKey;
    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
        const result = await res.json();
        
        if (result.result === "SUCCESS") {
            setTimeout(async () => {
                overlay.classList.add('hidden');
                await fetchData(); // 等待重新抓取並渲染完成
                
                // 如果是新增會員，自動捲動到底部
                if (data.type === "add_member") {
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 500);
        } else {
            overlay.classList.add('hidden');
            alert("❌ 失敗：" + result.message);
        }
    } catch (e) {
        setTimeout(() => {
            overlay.classList.add('hidden');
            fetchData(); 
        }, 1000);
    }
}
        async function fetchData() {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            cachedData = await res.json();
            renderAll();
        }
        function renderAll() {
            if(!cachedData) return;
            document.getElementById('input-news').value = cachedData.news || "";
            document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
            document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";
            renderMembers(cachedData.users || []);
            renderEvents(cachedData.calendar || []);
            renderAttendanceOptions(); // 新增：渲染下拉選單
        }
        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveLineMsg() { apiPost({ type: "send_line", message: document.getElementById('line-msg').value }); }
        
        async function addMember() {
    const name = document.getElementById('newName').value.trim();
    const phone = document.getElementById('newPhone').value.trim();
    const email = document.getElementById('newEmail').value.trim(); // 確保抓到 Email 欄位
    
    if (!name || !phone) {
        alert("請輸入姓名與電話");
        return;
    }

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'add_member',
                key: sessionStorage.getItem('adminKey'),
                name: name,
                phone: phone,
                email: email, // 傳送 Email 給 GAS
                password: phone.slice(-4), 
                role: '學員'
            })
        });

        const result = await res.json();

        if (result.result === "SUCCESS") {
            alert("✅ 新增成功！");
            // --- 成功後清空欄位 ---
            document.getElementById('newName').value = "";
            document.getElementById('newPhone').value = "";
            document.getElementById('newEmail').value = "";
            syncData(); // 重新整理列表
        } else {
            alert("新增失敗：" + (result.message || ""));
        }
    } catch (e) {
        alert("連線失敗，請檢查網路");
    }
}        
        
        
        function deleteMember(p) { if(confirm("刪除？")) apiPost({ type: "delete_member", currentPhone: p }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(d) { if(confirm("刪除？")) apiPost({ type: "delete_event", date: d }); }
        function saveSystemConfig() { apiPost({ type: "update_config", reading_folder_url: document.getElementById('conf-reading').value, photo_gallery_url: document.getElementById('conf-photo').value }); }

        function showQR(date, title) {
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModal').classList.add('flex');
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: "CHECKIN:" + date, width: 200, height: 200 });
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
        
let isSystemEditing = false;
function toggleSystemEdit() {
    isSystemEditing = !isSystemEditing; 
    const readingInput = document.getElementById('conf-reading');
    const photoInput = document.getElementById('conf-photo');
    const saveBtn = document.getElementById('systemSaveBtn'); // 確保您的 HTML ID 正確
    const lockBtn = document.getElementById('systemLockBtn');

    if (isSystemEditing) {
        // 解鎖：允許編輯
        readingInput.disabled = false;
        photoInput.disabled = false;
        if(saveBtn) saveBtn.disabled = false;
        readingInput.classList.remove('bg-gray-100', 'opacity-50');
        photoInput.classList.remove('bg-gray-100', 'opacity-50');
        lockBtn.innerHTML = '<i class="fas fa-check-circle"></i> 結束並鎖定';
        lockBtn.className = "text-sm bg-orange-500 text-white px-4 py-2 rounded-lg shadow-sm";
    } else {
        // 鎖定：禁止編輯
        readingInput.disabled = true;
        photoInput.disabled = true;
        if(saveBtn) saveBtn.disabled = true;
        readingInput.classList.add('bg-gray-100', 'opacity-50');
        photoInput.classList.add('bg-gray-100', 'opacity-50');
        lockBtn.innerHTML = '<i class="fas fa-lock"></i> 解除鎖定';
        lockBtn.className = "text-sm bg-gray-100 text-gray-600 px-4 py-2 rounded-lg border";
    }
} 
function renderAttendanceOptions() {
    const select = document.getElementById('event-select');
    if (!select) return;
    
    // 只取出行事曆中有舉辦過的活動 (按時間由新到舊排)
    const events = [...cachedData.calendar].sort((a,b) => new Date(b.dateText) - new Date(a.dateText));
    
    // 保留第一個預設選項，其餘清空
    select.innerHTML = '<option value="">-- 請選擇一場活動 --</option>';
    events.forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev.dateText; // 這裡暫時用日期當辨識，若有 ID 更好
        opt.innerText = `${ev.dateText} ${ev.title}`;
        select.appendChild(opt);
    });
}

function renderAttendanceDetail() {
    const selectedDate = document.getElementById('event-select').value;
    const listContainer = document.getElementById('attendance-detail-list');
    const summary = document.getElementById('attendance-summary');
    
    if (!selectedDate) {
        listContainer.innerHTML = "";
        summary.classList.add('hidden');
        return;
    }

    // 篩選並進行「時間發生順序」排序 (由舊到新)
    const filtered = cachedData.attendance
        .filter(a => a.eventId.includes(selectedDate) || a.timestamp.toString().includes(selectedDate))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); // 排序關鍵

    summary.classList.remove('hidden');
    document.getElementById('attend-count').innerText = filtered.length;
    document.getElementById('attend-date').innerText = selectedDate;
    
    // 顯示一鍵發送按鈕 (如果還沒顯示的話)
    if(document.getElementById('attendance-actions')) {
        document.getElementById('attendance-actions').classList.remove('hidden');
    }

    if (filtered.length === 0) {
        listContainer.innerHTML = '<div class="text-center p-10 text-gray-400 text-xl">目前尚無人簽到</div>';
    } else {
        listContainer.innerHTML = filtered.map(a => `
            <div class="list-card flex justify-between items-center bg-white p-6 rounded-2xl border">
                <div class="text-huge flex items-center">
                    <span class="font-bold text-emerald-900 w-32">${a.name}</span>
                    <span class="text-gray-400 font-mono text-lg">${new Date(a.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} 簽到</span>
                </div>
            </div>
        `).join('');
    }
}       
    </script>
