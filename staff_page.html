<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-loading { opacity: 0.6; pointer-events: none; }
        .unauthorized { opacity: 0; pointer-events: none; }
        .future-event { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body id="adminBody" class="pb-12 unauthorized transition-opacity duration-500">

    <header class="admin-gradient text-white py-6 px-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center">
                    <i class="fas fa-shield-alt mr-3"></i> 築心管理系統
                </h1>
                <p class="text-emerald-100 text-sm opacity-80 mt-1">幹部管理模式</p>
            </div>
            <a href="member_zone.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm transition">
                <i class="fas fa-home mr-1"></i> 會員專區
            </a>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-0 z-40 mb-6">
        <div class="max-w-6xl mx-auto flex overflow-x-auto whitespace-nowrap px-4">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 px-6 font-medium tab-active">公告與 LINE</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">行事曆</button>
            <button onclick="switchTab('payment')" id="tab-payment" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">繳費狀況</button>
            <button onclick="switchTab('attendance')" id="tab-attendance" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">出席紀錄</button>
            <button onclick="switchTab('system')" id="tab-system" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">系統設定</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <section id="sec-news" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="text-lg font-bold text-emerald-900 mb-4 flex items-center"><i class="fas fa-bullhorn mr-2"></i> 首頁公告更新</h3>
                <textarea id="newsContent" rows="4" class="w-full p-4 bg-gray-50 border rounded-xl" placeholder="輸入公告內容..."></textarea>
                <button id="btn-publishNews" onclick="publishNews()" class="mt-4 bg-emerald-700 text-white px-8 py-3 rounded-xl hover:bg-emerald-800 transition">發布公告</button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="text-lg font-bold text-emerald-900 mb-4 flex items-center"><i class="fab fa-line mr-2 text-green-500"></i> LINE 訊息發送</h3>
                <input type="text" id="pushMsg" class="w-full p-4 bg-gray-50 border rounded-xl mb-4" placeholder="輸入訊息...">
                <button id="btn-sendPush" onclick="sendLinePush()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl hover:bg-emerald-700 transition">發送訊息</button>
            </div>
        </section>

        <section id="sec-members" class="hidden space-y-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-emerald-50 text-emerald-900">
                <h3 class="font-bold mb-4 flex items-center"><i class="fas fa-user-plus mr-2"></i> 快速新增人員</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="mName" placeholder="姓名" class="p-2 border rounded-lg">
                    <input type="text" id="mPhone" placeholder="電話" class="p-2 border rounded-lg">
                    <input type="text" id="mEmail" placeholder="Email" class="p-2 border rounded-lg">
                    <button id="btn-addMember" onclick="addMember()" class="bg-emerald-700 text-white py-2 rounded-lg font-bold">確認新增</button>
                </div>
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-emerald-50">
                <table class="w-full text-left">
                    <thead class="bg-emerald-50 text-emerald-900">
                        <tr><th class="p-4">姓名/職稱</th><th class="p-4">電話</th><th class="p-4">Email</th><th class="p-4 text-right">操作</th></tr>
                    </thead>
                    <tbody id="memberList"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm border">
                <h3 class="font-bold mb-4 text-emerald-900"><i class="fas fa-calendar-plus mr-2"></i> 新增活動</h3>
                <div class="flex flex-wrap gap-4">
                    <input type="date" id="newDate" class="p-2 border rounded-lg">
                    <input type="text" id="newTitle" placeholder="活動主題" class="p-2 border rounded-lg flex-1">
                    <label class="flex items-center"><input type="checkbox" id="newNeedCheckin" class="mr-2"> 需簽到</label>
                    <button id="btn-addEvent" onclick="addEvent()" class="bg-emerald-700 text-white px-6 py-2 rounded-lg font-bold">建立</button>
                </div>
            </div>
            <div id="calendarList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-payment" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="font-bold mb-4 text-emerald-900"><i class="fas fa-money-check-alt mr-2 text-orange-500"></i> 會員繳費統計</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-orange-50 text-orange-900">
                            <tr><th class="p-4">姓名</th><th class="p-4">繳費項目</th><th class="p-4 text-center">狀態</th></tr>
                        </thead>
                        <tbody id="paymentList"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-attendance" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="font-bold mb-4 text-emerald-900"><i class="fas fa-chart-line mr-2 text-emerald-600"></i> 成員出席次數統計</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-emerald-50 text-emerald-900">
                            <tr><th class="p-4">排名</th><th class="p-4">姓名</th><th class="p-4">繳費狀態</th><th class="p-4 text-center">總計次數</th></tr>
                        </thead>
                        <tbody id="attendanceList"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-system" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="font-bold mb-4 text-emerald-900">連結設定</h3>
                <div class="space-y-4">
                    <div><label class="text-sm font-bold block mb-1">閱讀清單 URL</label><input type="text" id="link-reading" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="text-sm font-bold block mb-1">相簿 URL</label><input type="text" id="link-photo" class="w-full p-2 border rounded-lg"></div>
                    <button id="btn-saveConfig" onclick="saveConfig()" class="bg-emerald-800 text-white px-8 py-2 rounded-lg font-bold">儲存</button>
                </div>
            </div>
        </section>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center relative">
            <button onclick="closeModal('qrModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            <h3 id="qrTitle" class="text-xl font-bold text-emerald-900"></h3>
            <p id="qrDate" class="text-gray-500 mb-6 font-mono text-sm"></p>
            <div id="qrcode" class="flex justify-center mb-4 p-4 bg-white border rounded-2xl"></div>
            <p class="text-xs text-gray-400 italic">僅提供當日及過往活動簽到</p>
        </div>
    </div>

    <script>
        let ADMIN_KEY = "";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; 
        const CHECKIN_URL = "https://your-domain.com/checkin.html"; // 替換為您的簽到網頁
        let allData = null;

        async function init() {
            const key = prompt("管理權限驗證，請輸入金鑰：");
            if (!key) { location.replace('member_zone.html'); return; }
            ADMIN_KEY = key;
            await fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ type: "get_all_data", adminKey: ADMIN_KEY }) });
                const result = await res.text();
                if (result === "WRONG_KEY") { alert("金鑰錯誤"); location.reload(); return; }
                allData = JSON.parse(result);
                renderAll();
                document.getElementById('adminBody').classList.remove('unauthorized');
                document.getElementById('adminBody').style.opacity = "1";
            } catch (e) { alert("讀取失敗"); }
        }

        function renderAll() {
            if (allData.news) document.getElementById('newsContent').value = allData.news;
            if (allData.config) {
                document.getElementById('link-reading').value = allData.config.reading_folder_url || "";
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || "";
            }
            renderMembers();
            renderCalendar();
            renderPayment();
            renderAttendance();
        }

        // 1. 會員名單 (純聯絡資訊)
        function renderMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = allData.users.map(u => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4"><div class="font-bold">${u.name}</div><div class="text-xs text-emerald-600">${u.title || '學員'}</div></td>
                    <td class="p-4 font-mono text-sm">${u.phone}</td>
                    <td class="p-4 text-sm text-gray-500">${u.email || '尚未設定'}</td>
                    <td class="p-4 text-right"><button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
                </tr>
            `).join('');
        }

        // 2. 行事曆 (QR 限制邏輯)
        function renderCalendar() {
            const container = document.getElementById('calendarList');
            const today = new Date();
            today.setHours(0,0,0,0);

            container.innerHTML = allData.calendar.map(ev => {
                const evDate = new Date(ev.dateText);
                const isFuture = evDate > today;
                
                return `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm ${isFuture ? 'future-event' : ''}">
                    <div>
                        <div class="text-xs font-bold ${isFuture ? 'text-gray-400' : 'text-emerald-600'}">${ev.dateText} ${isFuture ? '(預定活動)' : ''}</div>
                        <div class="font-bold text-gray-800">${ev.title}</div>
                    </div>
                    <div class="flex gap-1">
                        ${(!isFuture && ev.description === "需報到") ? 
                          `<button onclick="showQR('${ev.dateText}','${ev.title}')" class="p-2 text-emerald-600 hover:bg-emerald-50 rounded-lg"><i class="fas fa-qrcode"></i></button>` : 
                          `<i class="fas fa-clock p-2 text-gray-200"></i>`}
                        <button onclick="deleteEvent('${ev.dateText}')" class="p-2 text-gray-300 hover:text-red-500 rounded-lg"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        // 3. 繳費狀況頁面
        function renderPayment() {
            const list = document.getElementById('paymentList');
            list.innerHTML = allData.users.map(u => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-bold text-gray-800">${u.name}</td>
                    <td class="p-4 text-sm text-gray-500">2026 年度讀書會費</td>
                    <td class="p-4 text-center">
                        <button onclick="togglePaid('${u.phone}', '${u.paid}')" 
                                class="px-4 py-1 rounded-full text-xs font-bold ${u.paid==='是'?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-600'}">
                            ${u.paid==='是'?'已完成':'未繳納'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 4. 出席紀錄頁面 (參與次數排列)
        function renderAttendance() {
            const list = document.getElementById('attendanceList');
            // 排序：次數多到少
            const sorted = [...allData.users].sort((a,b) => b.attCount - a.attCount);
            
            list.innerHTML = sorted.map((u, i) => `
                <tr class="border-b hover:bg-emerald-50 transition">
                    <td class="p-4"><span class="w-8 h-8 rounded-full flex items-center justify-center ${i<3?'bg-orange-100 text-orange-600 font-bold':'text-gray-400'}">${i+1}</span></td>
                    <td class="p-4 font-bold text-gray-800">${u.name}</td>
                    <td class="p-4"><span class="text-xs px-2 py-1 rounded ${u.paid==='是'?'bg-emerald-50 text-emerald-600':'bg-gray-100 text-gray-400'}">${u.paid==='是'?'已付費員':'非付費員'}</span></td>
                    <td class="p-4 text-center font-mono font-bold text-emerald-800 text-lg">${u.attCount}</td>
                </tr>
            `).join('');
        }

        async function apiPost(data, btnId) {
            const btn = btnId ? document.getElementById(btnId) : null;
            if (btn) { btn.disabled = true; btn.classList.add('btn-loading'); }
            try {
                data.adminKey = ADMIN_KEY;
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                const result = await res.text();
                if (result === "WRONG_KEY") { alert("金鑰失效"); location.reload(); return; }
                if (result === "SUCCESS" || result === "OK") { alert("✅ 執行成功"); await fetchData(); }
                else { alert("結果：" + result); }
            } catch (e) { alert("連線錯誤"); }
            finally { if (btn) { btn.disabled = false; btn.classList.remove('btn-loading'); } }
        }

        // 功能對接
        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }, "btn-publishNews"); }
        function sendLinePush() { apiPost({ type: "send_line_push", content: document.getElementById('pushMsg').value }, "btn-sendPush"); }
        function saveConfig() { apiPost({ type: "update_config", reading: document.getElementById('link-reading').value, photo: document.getElementById('link-photo').value }, "btn-saveConfig"); }
        function addMember() { apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value }, "btn-addMember"); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('newDate').value, title: document.getElementById('newTitle').value, needCheckin: document.getElementById('newNeedCheckin').checked }, "btn-addEvent"); }
        function deleteEvent(date) { if(confirm("確定移除活動？")) apiPost({ type: "delete_event", date: date }); }
        function deleteMember(phone) { if(confirm("確定移除會員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function togglePaid(phone, current) { apiPost({ type: "update_paid_status", phone: phone, newStatus: current==='是'?'否':'是' }); }

        function showQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180, colorDark : "#064E3B" });
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function switchTab(tab) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        window.onload = init;
    </script>
</body>
</html>
