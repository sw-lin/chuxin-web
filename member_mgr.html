<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員名冊管理 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-emerald { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        /* 等待動畫旋轉 */
        .loader { border-top-color: #064E3B; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div class="sticky top-0 z-50 p-4 flex items-center justify-between glass-card shadow-sm">
        <button onclick="location.href='staff_menu.html'" class="text-emerald-800"><i class="fas fa-chevron-left"></i></button>
        <h1 class="font-bold text-emerald-900 text-lg">會員名冊管理</h1>
        <button id="editModeBtn" onclick="toggleEditMode()" class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-200 shadow-sm active:scale-95 transition-all">
            編輯模式
        </button>
    </div>

    <div id="memberList" class="p-4 space-y-3">
        <div class="text-center py-10 text-gray-400">讀取中...</div>
    </div>

    <div id="bottomAddArea" class="fixed bottom-6 left-0 w-full px-6 hidden">
        <button onclick="openAddModal()" class="w-full py-4 btn-emerald text-white rounded-2xl font-bold shadow-xl flex items-center justify-center">
            <i class="fas fa-user-plus mr-2"></i> 新增新會員
        </button>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden z-[200] items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4"></div>
            <p class="text-emerald-900 font-bold">處理中，請稍候...</p>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-4 text-center">新增新會員</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 ml-1">姓名</label>
                    <input id="newName" type="text" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">手機號碼 (登入帳號)</label>
                    <input id="newPhone" type="tel" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">預設密碼</label>
                    <input id="newPass" type="text" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none" placeholder="預設 123">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">身分角色</label>
                    <select id="newRole" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                        <option value="學員">學員</option>
                        <option value="工程">工程</option>
                        <option value="管理員">管理員</option>
                    </select>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="closeAddModal()" class="flex-1 py-3 text-gray-400">取消</button>
                <button onclick="submitAddMember()" class="flex-1 py-3 btn-emerald text-white rounded-xl font-bold">確認增加</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        const STAFF_KEY = sessionStorage.getItem('staff_key');
        let isEditMode = false;

        window.onload = () => {
            if (!STAFF_KEY) { location.href = "index.html"; return; }
            loadMembers();
        };

        // 切換編輯模式
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const addArea = document.getElementById('bottomAddArea');
            
            if (isEditMode) {
                btn.innerText = "退出編輯";
                btn.className = "bg-red-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-sm active:scale-95 transition-all";
                addArea.classList.remove('hidden');
            } else {
                btn.innerText = "編輯模式";
                btn.className = "bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-200 shadow-sm active:scale-95 transition-all";
                addArea.classList.add('hidden');
            }
            loadMembers(false); // 重新渲染列表以切換刪除按鈕
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }

        async function loadMembers(scrollToBottom = false) {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                const container = document.getElementById('memberList');
                
                container.innerHTML = data.users.map(u => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-emerald-50 flex justify-between items-center transition-all">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-baseline gap-2">
                                <span class="text-lg font-bold text-emerald-900 truncate max-w-[80px]">${u.name}</span>
                                <span class="text-md font-mono text-gray-600">${u.phone}</span>
                                <span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 rounded-full border border-emerald-100 shrink-0">${u.role}</span>
                            </div>
                            <div class="text-[11px] text-gray-400 mt-0.5 truncate pr-4">
                                <i class="far fa-envelope mr-1"></i> ${u.email || '未設定 Email'}
                            </div>
                        </div>
                        ${isEditMode ? `
                            <button onclick="deleteMember('${u.phone}', '${u.name}')" class="text-red-400 p-2 active:scale-90 transition-transform">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        ` : ''}
                    </div>
                `).join('');

                if (scrollToBottom) {
                    setTimeout(() => {
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 300);
                }
            } catch (e) { console.error(e); }
        }

        function openAddModal() { document.getElementById('addModal').style.display='flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display='none'; }

        async function submitAddMember() {
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const password = document.getElementById('newPass').value;
            const role = document.getElementById('newRole').value;

            if (!name || !phone) return alert("姓名與電話為必填");

            closeAddModal();
            showLoading(true);

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'add_member',
                        key: STAFF_KEY,
                        name, phone, password, role
                    })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    await loadMembers(true); // 重新讀取並捲動到底部
                }
            } catch (e) { alert("發生錯誤"); }
            showLoading(false);
        }

        async function deleteMember(phone, name) {
            if (!confirm(`確定要刪除會員「${name}」嗎？`)) return;

            showLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'delete_member',
                        key: STAFF_KEY,
                        phone: phone // 與 GAS 參數對齊
                    })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    await loadMembers(false);
                } else {
                    alert("刪除失敗：" + result.message);
                }
            } catch (e) { alert("網路連線錯誤"); }
            showLoading(false);
        }
    </script>
</body>
</html>
