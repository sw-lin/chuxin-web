<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: rgba(6, 78, 59, 0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white sticky top-0 z-40 px-6 py-4 shadow-xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold tracking-widest">築心會館</span>
            <div class="flex items-center space-x-4">
                <span id="userNameDisplay" class="text-sm opacity-90">載入中...</span>
                <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-8">
        
        <section class="bg-white rounded-[2rem] p-6 border border-emerald-100 shadow-sm mb-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-emerald-900 flex items-center">
                    <i class="fas fa-bullhorn mr-2 text-orange-500"></i> 最新公告
                </h2>
                <span class="text-xs text-gray-400">NEWS</span>
            </div>
            <div id="dynamicNews" class="text-gray-600 text-sm leading-relaxed italic">載入中...</div>
        </section>

        <header class="mb-10">
            <h1 class="text-2xl font-bold text-emerald-900">您好，<span id="welcomeName">會員</span></h1>
            <p id="userTitleTag" class="text-emerald-700 text-sm font-bold"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-3xl border border-emerald-50 shadow-sm hover:shadow-md transition">
                <i class="fas fa-book text-emerald-800 text-xl mb-3"></i>
                <h3 class="font-bold">本月共讀</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-emerald-50 shadow-sm hover:shadow-md transition">
                <i class="fas fa-calendar-check text-orange-600 text-xl mb-3"></i>
                <h3 class="font-bold">活動預約</h3>
            </div>
            <div onclick="openEditModal()" class="bg-emerald-800 p-6 rounded-3xl shadow-lg text-white hover:bg-emerald-700 transition cursor-pointer">
                <i class="fas fa-cog text-white/80 text-xl mb-3"></i>
                <h3 class="font-bold">帳號設定</h3>
            </div>
        </div>

        <section id="adminPanel" class="hidden mt-12 bg-orange-50 p-8 rounded-[2.5rem] border border-orange-100">
            <h2 class="text-xl font-bold text-orange-900 mb-4 italic"><i class="fas fa-user-shield mr-2"></i> 幹部公告管理</h2>
            <p class="text-sm mb-4">修改 news.txt 內容 (目前請透過 GitHub 編輯，此處為預覽)：</p>
            <textarea id="newsInput" class="w-full h-32 p-4 rounded-2xl border-none mb-4" readonly></textarea>
            <p class="text-xs text-orange-700 italic">* 幹部功能持續擴充中...</p>
        </section>
    </main>

    <div id="editProfileModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-6 text-center">帳號安全設定</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-emerald-800">驗證舊密碼 *</label>
                    <input id="oldPassword" type="password" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">電子郵件</label>
                    <input id="editEmail" type="email" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">新密碼 (不改請留空)</label>
                    <input id="editPassword" type="password" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                </div>
                <button id="updateBtn" onclick="submitUpdate()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold">儲存修改</button>
                <button onclick="closeEditModal()" class="w-full text-gray-400 text-sm">取消</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyAjaGI9ETAMfEUgn3rKz48DpjqZtMhAOdXKjzFSs1L8BAHMWc5c3HopQFnYESX2tplrw/exec";

        window.onload = async () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { location.href = 'index.html'; return; }

            // 顯示基本資訊
            document.getElementById('userNameDisplay').innerText = `你好，${user.name}`;
            document.getElementById('welcomeName').innerText = user.name;

            // 修正 3：幹部權限判定 (只要有 Title 且不為空字串)
            const title = String(user.title || '').trim();
            if (title !== "" && title !== "undefined") {
                document.getElementById('userTitleTag').innerText = `職稱：${title}`;
                document.getElementById('adminPanel').classList.remove('hidden');
            }

            loadNews();
        };

        async function loadNews() {
            try {
                const res = await fetch('news.txt?t=' + Date.now());
                const text = await res.text();
                document.getElementById('dynamicNews').innerText = text;
                document.getElementById('newsInput').value = text;
            } catch (e) { document.getElementById('dynamicNews').innerText = "暫無公告"; }
        }

        // 修正 1：預填 Email
        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || ''; // 預填舊 Email
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldPass = document.getElementById('oldPassword').value;
            const newEmail = document.getElementById('editEmail').value;
            const newPass = document.getElementById('editPassword').value;
            const btn = document.getElementById('updateBtn');

            // 密碼比對 (sessionStorage 存的是 GAS 解碼後的明文)
            if (String(oldPass).trim() !== String(user.password).trim()) {
                alert("舊密碼驗證錯誤！"); return;
            }

            btn.disabled = true; btn.innerText = "更新中...";

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        currentPhone: user.phone,
                        newData: { 
                            email: newEmail, 
                            ...(newPass.trim() !== "" && { password: newPass }) 
                        }
                    })
                });
                alert("修改成功！請重新登入。");
                sessionStorage.clear();
                location.href = 'index.html';
            } catch (e) { alert("更新失敗"); btn.disabled = false; }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
