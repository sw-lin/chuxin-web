<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-6 py-4 flex justify-between items-center border-b border-emerald-50">
        <div class="text-2xl font-bold text-emerald-900 tracking-tighter italic">築心讀書會</div>
        <div class="hidden md:flex space-x-8 font-bold text-gray-600">
            <a href="about.html" class="hover:text-emerald-800 transition">關於我們</a>
            <a href="about.html#join" class="hover:text-emerald-800 transition">入會報名</a>
            <button onclick="toggleModal('loginModal', true)" class="hover:text-emerald-800 transition">會員登入</button>
        </div>
        <button onclick="toggleModal('loginModal', true)" class="md:hidden bg-emerald-800 text-white px-4 py-2 rounded-full text-xs">登入</button>
    </nav>

    <div class="relative w-full h-[500px] overflow-hidden bg-emerald-900">
        <img class="slide" src="1.jpg">
        <img class="slide" src="2.jpg">
        <img class="slide" src="3.jpg">
        <img class="slide" src="4.jpg">
        <img class="slide" src="5.jpg">
        <div class="absolute inset-0 hero-gradient flex flex-col items-center justify-center text-white text-center px-6">
            <h1 class="text-5xl md:text-7xl font-bold tracking-[0.2em] mb-4">在共讀中築心</h1>
            <p class="text-emerald-100 text-lg md:text-2xl font-light italic tracking-widest">Coming Soon...</p>
        </div>
    </div>

    <section class="max-w-5xl mx-auto py-20 px-6">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-bold text-emerald-900 mb-2 italic">Coming Soon.</h2>
                <p class="text-gray-400 text-sm tracking-widest uppercase">Upcoming Events</p>
            </div>
            <button onclick="toggleModal('calendarModal', true)" class="text-emerald-700 font-bold hover:underline">查看完整行事曆 →</button>
        </div>
        
        <div id="comingSoonList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="animate-pulse bg-gray-100 h-32 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-100 h-32 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-100 h-32 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-100 h-32 rounded-3xl"></div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 right-8 text-gray-400 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 text-center mb-8">會員專區登入</h3>
            <div class="space-y-4">
                <input id="u" type="tel" placeholder="手機號碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <input id="p" type="password" placeholder="登入密碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition">進入會館</button>
            </div>
            <p id="loginStatus" class="text-xs mt-4 text-center text-gray-400 min-h-[1rem]"></p>
        </div>
    </div>

    <div id="calendarModal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl relative max-h-[80vh] flex flex-col">
            <button onclick="toggleModal('calendarModal', false)" class="absolute top-6 right-8 text-gray-400 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-8 italic">Full Calendar</h3>
            <div id="fullCalendarList" class="overflow-y-auto pr-4 space-y-4 no-scrollbar">
                </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";

        // 1. 輪播功能
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 5000);
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        // 2. 載入雲端資料 (行事曆)
        async function initPage() {
            const comingSoonContainer = document.getElementById('comingSoonList');
            const fullCalendarContainer = document.getElementById('fullCalendarList');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

                const data = await response.json();
                const allEvents = data.calendar || [];

                // 解析並排序日期

                    e.parsedDate = new Date
