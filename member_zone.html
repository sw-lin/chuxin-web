<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 flex justify-between items-center shadow-xl">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-300"></i>
            <span class="font-bold">築心會館</span>
        </div>
        <button onclick="logout()" class="text-xs bg-white/10 px-3 py-1 rounded-full">登出</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl">
            <h2 id="userName" class="text-3xl font-bold mb-4 text-white">讀取中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">學習參與率</div>
                    <div id="attPercent" class="text-2xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">報到次數</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-transform">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-800 mb-1 text-sm">最新公告</h3>
            <p id="news" class="text-gray-500 text-xs">同步中...</p>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center py-10 text-gray-400 italic">正在載入紀錄...</p>
            </div>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/95 hidden z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden">
            <div id="reader"></div>
            <div class="p-4"><button onclick="stopScanner()" class="w-full py-3 bg-gray-100 rounded-xl">關閉</button></div>
        </div>
    </div>

    <script>
        // 請確保此網址與您的 Google Apps Script 部署網址一致
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        
        function formatToISO(input) {
            if (!input) return "";
            const d = new Date(input);
            if (isNaN(d.getTime())) return String(input).split(' ')[0].replace(/\//g, '-');
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function getMatchPhone(str) {
            return String(str || "").replace(/\D/g, "").slice(-9);
        }

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userName').innerText = user.name;
            syncData(user);
        };

async function syncData() {
    try {
        // 1. 從 sessionStorage 取得使用者資訊
        const userStr = sessionStorage.getItem('userInfo');
        if (!userStr) {
            alert("偵測不到登入資訊，請重新登入");
            logout();
            return;
        }
        
        const cachedUser = JSON.parse(userStr);
        // 關鍵修正：確保不管是 .phone 還是 .currentPhone 都能抓到
        const rawPhone = cachedUser.phone || cachedUser.currentPhone || "";
        const myMatch = String(rawPhone).replace(/\D/g, "").slice(-9);
        
        console.log("登入手機號碼:", rawPhone, "處理後末9碼:", myMatch);

        if (!myMatch) {
            alert("登入資料異常（無電話），請重新登入");
            logout();
            return;
        }

        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        
        // 2. 比對資料庫
        const liveUser = (data.users || []).find(u => {
            const dbMatch = String(u.phone || "").replace(/\D/g, "").slice(-9);
            return dbMatch === myMatch;
        });
        
        if (!liveUser) {
            const dbList = (data.users || []).slice(0, 3).map(u => u.phone).join(', ');
            alert(`驗證失敗。\n您的末9碼：${myMatch}\n資料庫電話：${dbList}`);
            logout();
            return;
        }

        // --- 以下為顯示邏輯 (保持不變) ---
        document.getElementById('news').innerText = data.news || "歡迎參加讀書會";
        const todayStr = new Date().toISOString().split('T')[0];
        
        // 參與率計算：過濾「需報到」且「日期已過」
        const validEvents = (data.calendar || []).filter(ev => {
            const isPast = ev.dateText && ev.dateText <= todayStr;
            const isRequired = (ev.title + (ev.description || "")).includes("需報到");
            return isPast && isRequired;
        });

        const standardLogs = (liveUser.attendLog || []).map(log => log.split('T')[0]);
        let count = 0;
        // ...其餘渲染 UI 的代碼...
        
        // 成功抓到資料後，更新畫面
        renderHistory(validEvents, standardLogs); 

    } catch (err) {
        console.error("Sync Error:", err);
        document.getElementById('historyList').innerHTML = "資料同步失敗，請檢查網路。";
    }
}

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                stopScanner(); window.location.href = text;
            }).catch(() => stopScanner());
        }

        function stopScanner() {
            if (html5QrCode) html5QrCode.stop().finally(() => {
                document.getElementById('scannerModal').classList.add('hidden');
                html5QrCode = null;
            });
            else document.getElementById('scannerModal').classList.add('hidden');
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
