<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .edit-active { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-20">
    <!-- 導覽列 -->
    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="text-sm font-bold flex items-center z-10">
            <i class="fas fa-chevron-left mr-1"></i> 返回
        </button>
        <h1 class="text-lg font-black tracking-widest absolute inset-x-0 text-center pointer-events-none">活動報名管理</h1>
        <div class="flex gap-2 z-10">
            <button onclick="openAddModal()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-lg text-xs font-bold transition-all">
                <i class="fas fa-plus mr-1"></i> 新增
            </button>
            <button id="editBtn" onclick="toggleEditMode()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-lg text-xs font-bold transition-all">
                <i class="fas fa-trash-alt mr-1"></i> 刪除模式
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-2xl mx-auto space-y-6">
        <!-- 1. 下拉選擇區 -->
        <div class="relative">
            <label class="text-[10px] font-bold text-gray-400 mb-2 block ml-2">請選擇要查看的活動項目</label>
            <div class="flex gap-2">
                <select id="eventSelector" onchange="filterRegistrations()" class="flex-1 bg-white border-2 border-emerald-600/30 rounded-[1.5rem] px-6 py-4 text-emerald-900 font-bold focus:ring-2 focus:ring-emerald-500 transition-all shadow-sm outline-none appearance-none">
                    <option value="">載入中...</option>
                </select>
                <!-- 刪除整個活動的按鈕 (僅在編輯模式出現) -->
                <button id="deleteEventBtn" onclick="deleteCurrentEvent()" class="hidden bg-red-50 text-red-600 border border-red-200 rounded-[1.5rem] px-4 items-center justify-center">
                    <i class="fas fa-calendar-times"></i>
                </button>
            </div>
        </div>

        <!-- 2. 統計區塊 -->
        <div id="statsBox" class="hidden grid grid-cols-2 gap-4 animate-fadeIn">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">目前報名人數</p>
                <p id="statCount" class="text-3xl font-black text-emerald-900">0</p>
            </div>
            <div onclick="sendToLine()" class="emerald-gradient p-5 rounded-[2rem] shadow-lg text-center cursor-pointer active:scale-95 transition-all flex flex-col items-center justify-center group">
                <i class="fab fa-line text-white text-xl mb-1 group-hover:scale-110 transition-transform"></i>
                <p class="text-white text-[10px] font-bold">送出名單至 LINE</p>
            </div>
        </div>

        <!-- 3. 名單列表 -->
        <div class="space-y-3">
            <h3 class="text-sm font-black text-emerald-900 ml-2"><i class="fas fa-file-signature mr-2"></i>報名者名單</h3>
            <div id="regList" class="space-y-3">
                <div class="text-center py-20 text-gray-300 italic text-sm">請先選擇活動</div>
            </div>
        </div>
    </main>

    <!-- 新增活動彈窗 -->
    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-black text-emerald-900 mb-2">發布新活動</h3>
            <div>
                <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">活動標題</label>
                <input type="text" id="ev_title" placeholder="例如：春季健康講座" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">發布日期</label>
                    <input type="date" id="ev_start" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-4 text-xs">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">下架日期</label>
                    <input type="date" id="ev_until" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-4 text-xs">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">活動舉辦日期</label>
                <input type="date" id="ev_date" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-xs">
            </div>
            <div class="flex items-center justify-between bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">
                <div>
                    <span class="text-xs font-black text-emerald-900 block">開啟報名功能</span>
                    <span class="text-[10px] text-gray-400">關閉則僅展示海報</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="ev_reg_enable" checked class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600"></div>
                </label>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeAddModal()" class="flex-1 py-4 text-gray-400 font-black">取消</button>
                <button onclick="submitNewEvent()" class="flex-[2] emerald-gradient text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all">確認上架</button>
            </div>
        </div>
    </div>

    <!-- UI 組件 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-[100] hidden flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full opacity-0 transition-opacity pointer-events-none z-50 text-sm"></div>    
    
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let allData = {};
        let isEditMode = false;

        window.onload = loadAllData;

        async function loadAllData() {
            showLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                renderSelector();
                if (document.getElementById('eventSelector').value) filterRegistrations();
            } catch (e) { showToast("資料讀取失敗"); }
            showLoading(false);
        }

        function renderSelector() {
            const selector = document.getElementById('eventSelector');
            if (allData.events && allData.events.length > 0) {
                const options = allData.events.map(ev => `<option value="${ev.title}">${ev.date} | ${ev.title}</option>`).join('');
                selector.innerHTML = '<option value="">請選擇要查看的活動項目...</option>' + options;
            } else {
                selector.innerHTML = '<option value="">目前尚無活動</option>';
            }
        }

        function filterRegistrations() {
            const selectedTitle = document.getElementById('eventSelector').value;
            const listContainer = document.getElementById('regList');
            const statsBox = document.getElementById('statsBox');
            
            if (!selectedTitle) {
                listContainer.innerHTML = '<div class="text-center py-20 text-gray-300 italic text-sm">請先選擇活動</div>';
                statsBox.classList.add('hidden');
                document.getElementById('deleteEventBtn').classList.add('hidden');
                return;
            }

            if (isEditMode) document.getElementById('deleteEventBtn').classList.remove('flex', 'hidden');

            const filtered = (allData.registrations || []).filter(r => r.活動標題 === selectedTitle);
            document.getElementById('statCount').innerText = filtered.length;
            statsBox.classList.remove('hidden');

            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-20 text-gray-300 italic text-sm">此活動尚無人報名</div>';
            } else {
                listContainer.innerHTML = filtered.map(r => `
                    <div class="bg-white p-5 rounded-3xl border border-emerald-50 shadow-sm flex justify-between items-center animate-fadeIn ${isEditMode ? 'edit-active' : ''}">
                        <div>
                            <div class="font-black text-emerald-900">${r.會員姓名}</div>
                            <div class="text-[10px] text-gray-400 tracking-widest mt-1">${r.手機號碼}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="bg-emerald-50 text-emerald-700 text-[10px] px-3 py-1 rounded-full font-bold border border-emerald-100">${r.狀態 || '已報名'}</div>
                            ${isEditMode ? `<button onclick="deleteReg('${r.活動標題}', '${r.手機號碼}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
        }

        // 切換編輯模式
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editBtn');
            const delEvBtn = document.getElementById('deleteEventBtn');
            
            if (isEditMode) {
                btn.innerHTML = '<i class="fas fa-check mr-1"></i> 完成';
                btn.classList.replace('bg-white/10', 'bg-red-500');
                if (document.getElementById('eventSelector').value) delEvBtn.classList.remove('hidden');
            } else {
                btn.innerHTML = '<i class="fas fa-trash-alt mr-1"></i> 刪除模式';
                btn.classList.replace('bg-red-500', 'bg-white/10');
                delEvBtn.classList.add('hidden');
            }
            filterRegistrations();
        }

        // 刪除報名人員
        async function deleteReg(title, phone) {
            if (!confirm(`確定要刪除 ${title} 的報名者嗎？`)) return;
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'delete_registration',
                        key: sessionStorage.getItem('staff_key'),
                        eventTitle: title,
                        phone: phone
                    })
                });
                const json = await res.json();
                if (json.result === 'SUCCESS') {
                    showToast('人員已刪除');
                    await loadAllData();
                } else {
                    showToast('刪除失敗：' + json.message);
                }
            } catch (e) { showToast('網路錯誤'); }
            showLoading(false);
        }

        // 刪除整個活動
        async function deleteCurrentEvent() {
            const title = document.getElementById('eventSelector').value;
            if (!title) return;
            if (!confirm(`警告！這將刪除「${title}」活動及其海報，確定嗎？`)) return;
            
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'delete_event_poster',
                        key: sessionStorage.getItem('staff_key'),
                        eventTitle: title
                    })
                });
                const json = await res.json();
                if (json.result === 'SUCCESS') {
                    showToast('活動已移除');
                    location.reload();
                } else {
                    showToast('移除失敗');
                }
            } catch (e) { showToast('網路錯誤'); }
            showLoading(false);
        }

        // 送出名單到 LINE
        async function sendToLine() {
            const selectedTitle = document.getElementById('eventSelector').value;
            const filtered = (allData.registrations || []).filter(r => r.活動標題 === selectedTitle);
            
            if (filtered.length === 0) return showToast("沒有名單可以傳送");

            let message = `📊 【築心會館】活動報名清單\n━━━━━━━━━━━━\n活動：${selectedTitle}\n總計：${filtered.length} 人\n\n`;
            filtered.forEach((r, i) => {
                message += `${i+1}. ${r.會員姓名} (${r.手機號碼.slice(-4)})\n`;
            });
            message += `\n━━━━━━━━━━━━\n更新時間：${new Date().toLocaleString('zh-TW')}`;

            showLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'send_line',
                        key: sessionStorage.getItem('staff_key'),
                        message: message
                    })
                });
                const json = await res.json();
                if (json.result === 'SUCCESS') showToast('名單已傳送至群組');
            } catch (e) { showToast('傳送失敗'); }
            showLoading(false);
        }

        // 其他基礎 Function
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => { t.style.opacity = '0'; }, 3000);
        }

        async function submitNewEvent() {
            const regCheckbox = document.getElementById('ev_reg_enable');
            const isRegEnabled = regCheckbox ? regCheckbox.checked : true;
            const payload = {
                type: 'add_new_event',
                key: sessionStorage.getItem('staff_key'),
                title: document.getElementById('ev_title').value,
                start_date: document.getElementById('ev_start').value,
                display_until: document.getElementById('ev_until').value,
                date: document.getElementById('ev_date').value,
                reg_url: isRegEnabled ? "INTERNAL" : "NONE"
            };
            if(!payload.title || !payload.date) return alert("請填寫必填欄位");
            showLoading(true);
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.result === "SUCCESS") { alert("已上架！"); location.reload(); }
            showLoading(false);
        }
    </script>
</body>
</html>
