    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="date" id="calDate" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
        <input type="text" id="calTitle" placeholder="行程名稱 (例：三月導讀會)" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
        <input type="text" id="calDesc" placeholder="備註 (例：地點 築心會館)" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
    </div>
    <button onclick="addEvent()" class="mt-4 bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-700">新增行程</button>
</section>

<script>
async function addEvent() {
    const date = document.getElementById('calDate').value;
    const title = document.getElementById('calTitle').value;
    const desc = document.getElementById('calDesc').value;
    if(!date || !title) return alert("請填寫日期與標題");

    await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            type: "updateCalendar",
            date: date,
            title: title,
            desc: desc
        })
    });
    alert("行程已新增至雲端！");
    location.reload();
}
