<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 flex justify-between items-center shadow-xl sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-300"></i>
            <span class="font-bold text-sm">築心會館</span>
        </div>
        <div class="flex space-x-2">
            <button onclick="openStaffModal()" class="text-[10px] bg-amber-500/20 text-amber-200 border border-amber-500/30 px-3 py-1 rounded-full hover:bg-amber-500/40 transition">幹部專區</button>
            <button onclick="openEditModal()" class="text-[10px] bg-white/10 px-3 py-1 rounded-full hover:bg-white/20 transition">修改資料</button>
            <button id="logoutBtn" class="text-[10px] bg-red-900/30 px-3 py-1 rounded-full hover:bg-red-800 transition">登出</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <h2 id="userName" class="text-3xl font-bold mb-4">讀取中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">學習參與率</div>
                    <div id="attPercent" class="text-2xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">已完成場次</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="window.startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-transform">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-800 mb-1 text-sm">最新公告</h3>
            <p id="news" class="text-gray-500 text-xs italic">載入中...</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="handleFolderLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-book-open text-emerald-700 text-xl"></i>
                <span class="font-bold text-emerald-900 text-sm">課程資料庫</span>
            </button>
            <button onclick="handleFolderLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-images text-emerald-700 text-xl"></i>
                <span class="font-bold text-emerald-900 text-sm">活動剪影</span>
            </button>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center py-10 text-gray-400 italic text-sm">正在整理您的學習紀錄...</p>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let configLinks = {}; // 存放從 Config 分頁抓到的連結
        let html5QrCode = null;
        let currentUserData = null;

        // 初始化
        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { window.location.replace('index.html'); return; }
            currentUserData = JSON.parse(userStr);
            document.getElementById('userName').innerText = currentUserData.name || "成員";
            (currentUserData);
        };

        async function syncData(user) {
            try {
                // 手機碼匹配 (處理全形與末9碼)
                const myMatch = String(user.phone || "").replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\D/g, "").slice(-9);

                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                // --- 核心偵錯：看看這行在 F12 控制台顯示什麼 ---
        console.log("GAS 回傳的原始資料:", data);
                
                // 儲存連結資料 (對應您的 Config A欄 Key)
                configLinks = data.config || {}; 

console.log("解析後的連結資料:", configLinks);
                
                const liveUser = (data.users || []).find(u => String(u.phone || "").replace(/\D/g, "").slice(-9) === myMatch);
                if (!liveUser) { window.location.replace('index.html'); return; }

                document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";

                // 計算邏輯
                const todayStr = new Date().toISOString().split('T')[0];
                const validEvents = (data.calendar || []).filter(ev => ev.dateText && ev.dateText <= todayStr);
                const attendLogs = (liveUser.attendLog || []).map(log => log.split('T')[0]);
                
                let count = 0;
                validEvents.forEach(ev => { if (attendLogs.includes(ev.dateText)) count++; });

                const percent = validEvents.length > 0 ? Math.round((count / validEvents.length) * 100) : 0;
                document.getElementById('attPercent').innerText = percent + "%";
                document.getElementById('attCountDisplay').innerText = `${count} / ${validEvents.length}`;

                // 參與率 50% 以上噴彩帶
                if (percent >= 50) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#064E3B', '#F97316', '#FDE68A'] });
                }

                renderHistory(validEvents, attendLogs);
            } catch (err) {
                console.error("同步出錯:", err);
                document.getElementById('historyList').innerHTML = '<p class="text-center py-10 text-red-400">連線失敗</p>';
            }
        }

        // 處理課程資料與活動剪影跳轉
        function handleFolderLink(key) {
            const url = configLinks[key];
            if (url && url.startsWith('http')) {
                window.open(url, '_blank');
            } else {
                alert("目前尚未設定連結，請洽詢幹部。");
            }
        }

        function renderHistory(events, logs) {
            const list = document.getElementById('historyList');
            if (events.length === 0) { list.innerHTML = '<p class="text-center py-10 text-gray-400">目前尚無活動紀錄</p>'; return; }
            list.innerHTML = [...events].reverse().map(ev => {
                const isAttended = logs.includes(ev.dateText);
                return `
                    <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50">
                        <div>
                            <div class="text-xs text-emerald-600 font-bold mb-1">${ev.dateText}</div>
                            <div class="text-emerald-900 font-bold">${ev.title}</div>
                        </div>
                        <div class="${isAttended ? 'text-emerald-600' : 'text-gray-300'} flex flex-col items-center">
                            <i class="fas ${isAttended ? 'fa-check-circle' : 'fa-times-circle'} text-2xl"></i>
                            <span class="text-[10px] mt-1 font-bold">${isAttended ? '已出席' : '未報到'}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        // ... 其餘的 Modal 控制 (openEditModal, verifyStaff 等) 保持不變 ...
    </script>
</body>
</html>
