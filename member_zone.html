<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 flex justify-between items-center shadow-xl">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-300"></i>
            <span class="font-bold">築心會館</span>
        </div>
        <button onclick="logout()" class="text-xs bg-white/10 px-3 py-1 rounded-full">登出</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl">
            <h2 id="userName" class="text-3xl font-bold mb-4">載入中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">學習參與率</div>
                    <div id="attPercent" class="text-2xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">出席次數</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-800 mb-1">最新公告</h3>
            <p id="news" class="text-gray-500 text-sm">正在同步資訊...</p>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center py-10 text-gray-400 italic">正在載入...</p>
            </div>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/95 hidden z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden">
            <div id="reader"></div>
            <div class="p-4"><button onclick="stopScanner()" class="w-full py-3 bg-gray-100 rounded-xl">關閉</button></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        
        // 核心：將任何日期文字格式化為 2026-03-06
        function formatToISO(str) {
            if (!str) return "";
            const d = new Date(str);
            if (isNaN(d.getTime())) return String(str).split(' ')[0].replace(/\//g, '-');
            return d.getFullYear() + '-' + 
                   String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(d.getDate()).padStart(2, '0');
        }

        // 清理電話號碼（只留數字）
        function cleanPhone(str) { return String(str || "").replace(/\D/g, ""); }

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userName').innerText = user.name;
            syncData(user);
        };

        async function syncData(cachedUser) {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                // 比對用戶
                const myPhone = cleanPhone(cachedUser.phone);
                const liveUser = (data.users || []).find(u => cleanPhone(u.phone) === myPhone);
                
                if (!liveUser) {
                    alert("驗證失敗，請重新登入");
                    logout();
                    return;
                }

                // 更新公告
                document.getElementById('news').innerText = data.news || "歡迎參加讀書會";

                // 計算分母：以日曆中「小於等於今天」的活動為準
                const today = formatToISO(new Date());
                const pastEvents = (data.calendar || [])
                    .filter(ev => ev.dateText && formatToISO(ev.dateText) <= today)
                    .sort((a,b) => b.dateText.localeCompare(a.dateText));

                // 標準化用戶報到紀錄
                let myLogs = Array.isArray(liveUser.attendLog) ? liveUser.attendLog : [];
                const standardLogs = myLogs.map(log => formatToISO(log));

                // 渲染與計算
                let count = 0;
                const html = pastEvents.map(ev => {
                    const eventDate = formatToISO(ev.dateText);
                    const isOk = standardLogs.includes(eventDate);
                    if (isOk) count++;
                    return `
                        <div class="flex items-center justify-between p-4 bg-white rounded-2xl border ${isOk ? 'border-emerald-100 bg-emerald-50/40' : 'border-gray-100'} shadow-sm">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-gray-400 font-mono">${eventDate}</span>
                                <span class="font-bold text-emerald-900">${ev.title}</span>
                            </div>
                            <span>${isOk ? '<b class="text-emerald-600 text-xs">已報到</b>' : '<i class="text-gray-300 text-xs">未報到</i>'}</span>
                        </div>`;
                }).join('');

                document.getElementById('historyList').innerHTML = html || '<p class="text-center py-10 text-gray-400">尚無活動紀錄</p>';
                
                const total = pastEvents.length;
                document.getElementById('attPercent').innerText = (total > 0 ? Math.round((count/total)*100) : 0) + "%";
                document.getElementById('attCountDisplay').innerText = `${count} / ${total}`;

            } catch (err) {
                console.error("Sync Error:", err);
                document.getElementById('historyList').innerHTML = "連線異常";
            }
        }

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                stopScanner(); window.location.href = text;
            }).catch(() => stopScanner());
        }

        function stopScanner() {
            if (html5QrCode) html5QrCode.stop().finally(() => {
                document.getElementById('scannerModal').classList.add('hidden');
                html5QrCode = null;
            });
            else document.getElementById('scannerModal').classList.add('hidden');
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
