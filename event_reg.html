// --- 修正後的 loadData ---
async function loadData() {
    showLoading(true);
    console.log("開始嘗試載入活動清單...");
    try {
        const res = await fetch(`${GAS_URL}?type=get_events_page&t=${Date.now()}`);
        const json = await res.json();
        
        console.log("從 GAS 接收到的原始資料:", json);

        // 容錯處理：如果 GAS 直接回傳陣列，或回傳包含 events 的物件
        if (Array.isArray(json)) {
            allData.events = json;
        } else if (json.events && Array.isArray(json.events)) {
            allData.events = json.events;
        } else {
            allData.events = [];
            console.error("資料格式不正確，預期為陣列但得到:", json);
        }

        if (allData.events.length === 0) {
            showToast("清單目前是空的，請先發布活動");
        } else {
            console.table(allData.events); // 在控制台顯示漂亮的表格
        }

        renderSelector();
    } catch (e) { 
        console.error("載入失敗，錯誤原因:", e);
        showToast("伺服器連線失敗，請檢查網路或 GAS 權限"); 
    }
    showLoading(false);
}
// 補上缺失的 API 呼叫工具
async function fetchAPI(type, params = {}) {
    const url = new URL(GAS_URL);
    url.searchParams.append('type', type);
    // 確保 staff_key 有帶入
    url.searchParams.append('key', sessionStorage.getItem('staffKey') || '');
    
    // 🌟 修正：確保每個參數都被正確編碼
    Object.keys(params).forEach(key => {
        if (params[key] !== undefined && params[key] !== null) {
            url.searchParams.set(key, params[key]); 
        }
    });

    console.log("發送請求至:", url.toString()); // 除錯用
    const res = await fetch(url);
    return await res.json();
}        
// --- 修正後的 renderSelector (增加屬性保護) ---
function renderSelector() {
    const selector = document.getElementById('eventSelector');
    const currentValue = selector.value;
    
    // 確保這裡抓取的屬性名稱 ev.title 與您 GAS 回傳的一致
    let optionsHtml = '<option value="">-- 請選擇活動項目 --</option>';
    optionsHtml += allData.events.map(ev => {
        const title = ev.title || ev["標題"] || "未命名活動";
        return `<option value="${title}">${title}</option>`;
    }).join('');
    
    selector.innerHTML = optionsHtml;
    if (currentValue) selector.value = currentValue;
}
        
// --- 核心函式：載入選中活動的詳細名單 ---
async function loadEventDetails() {
    const selector = document.getElementById('eventSelector');
    const title = selector.value;
    
    if (!title) {
        // 如果沒選活動，清空統計與列表

        document.getElementById('regList').innerHTML = "";
        return;
    }

    console.log("正在載入活動詳情:", title);

    // 1. 從先前 loadData 存好的資料中找出該活動的詳細規格
    // 這裡相容「標題」與「title」兩種 Key
    currentEventTitle = title;
    currentEventConfig = allData.events.find(e => (e["標題"] || e.title) === title);

    if (!currentEventConfig) {
        console.error("找不到該活動的配置資料");
        showToast("活動配置讀取失敗");
        return;
    }

    showLoading(true);
    try {
        // 2. 向 GAS 請求該活動的報名名單
        // 建議這裡也改用你寫好的 fetchAPI 或是維持目前的 fetch
        const res = await fetch(`${GAS_URL}?type=get_registrations_by_event&eventTitle=${encodeURIComponent(title)}&t=${Date.now()}`);
        const json = await res.json();
        
        if (Array.isArray(json)) {
            allData.registrations = json; // 存入全域變數
            renderRegList(json);          // 渲染畫面
        
            
            // 如果在編輯模式下，顯示管理按鈕
            if(isEditMode) {

    }

    const title = document.getElementById('eventSelector').value;
    const ev = allData.events.find(e => (e.title || e["標題"]) === title);
    const needId = (ev?.["(需要身分證)"] === '是' || ev?.[" needId"] === '是');

    // 切換身分證區塊顯示
    const insuranceZone = document.getElementById('reg_insurance_zone');
    if (insuranceZone) insuranceZone.style.display = needId ? 'grid' : 'none';

    // 3. 資料比對與填入
    if (phone && name) {
        const r = allData.registrations.find(reg => 
            String(reg["電話"] || "").trim().replace(/'/g, "") === String(phone).trim() && 
            String(reg["姓名"] || "").trim() === String(name).trim()
        );

        if (r) {
            console.log("✅ 找到報名資料:", r);

            // 填入基本欄位
            document.getElementById('reg_name').value = r["姓名"] || "";
            document.getElementById('reg_phone').value = String(r["電話"] || "").replace(/'/g, "");
            document.getElementById('reg_old_phone').value = String(phone).replace(/'/g, "");
            document.getElementById('reg_id').value = r["身分證"] || r["身分證字號"] || "";
            document.getElementById('reg_diet').value = r["餐食"] || "葷食";
            document.getElementById('reg_note').value = r["備註"] || "";

            // 🌟 生日填充 (暴力切字串防呆版)
            const bdayField = document.getElementById('reg_birthday');
            if (bdayField) {
                let rawBday = r["生日"] || r["出生日期"] || r["出生年月日"] || "";
                let finalDate = "";

                if (rawBday) {
                    let strBday = String(rawBday).trim();
                    
                    // 1. 如果開頭就是 YYYY-MM-DD 的格式 (包含帶有 T 的 ISO 格式)
                    if (/^\d{4}-\d{2}-\d{2}/.test(strBday)) {
                        finalDate = strBday.substring(0, 10);
                    } 
                    // 2. 如果是其他古怪格式，再試圖讓 JS Date 解析
                    else {
                        const d = new Date(rawBday);
                        if (!isNaN(d.getTime())) {
                            const y = d.getFullYear();
                            const m = String(d.getMonth() + 1).padStart(2, '0');
                            const day = String(d.getDate()).padStart(2, '0');
                            finalDate = `${y}-${m}-${day}`;
                        }
                    }
                }
                
                bdayField.value = finalDate;
                console.log("📅 生日最終填入值:", finalDate);
            }

            // 交通方式
            const transVal = (r["交通"] || "").trim();
            document.getElementsByName('trans').forEach(rd => {
                if (rd.value === transVal) rd.checked = true;
            });
        }
    }

    // 4. 顯示彈窗
    modal.classList.remove('hidden');
    modal.classList.add('flex');
}

// 將全形數字/字母轉換為半形
function toHalfWidth(str) {
    if (!str) return "";
    return str.replace(/[\uff01-\uff5e]/g, function(ch) {
        return String.fromCharCode(ch.charCodeAt(0) - 0xfee0);
    }).replace(/\u3000/g, " "); // 處理全形空格
}        
        // 輔助工具
function formatDateForInput(dVal) {
    if (!dVal) return "";
    try {
        let d = new Date(dVal);
        if (isNaN(d.getTime())) {
            // 如果是字串格式 YYYY/MM/DD 或 YYYY-MM-DD... 直接截取前10碼
            if (typeof dVal === 'string') return dVal.substring(0, 10).replace(/\//g, '-');
            return "";
        }
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    } catch (e) {
        return "";
    }
}

function generateLineStats() {
    // 🌟 修正：使用正確的全域資料變數
    const regs = allData.registrations || []; 
    if (regs.length === 0) {
        showToast("目前尚無報名資料");
        return;
    }

    let stats = {
        paid: 0, meat: 0, veg: 0, 
        bus: 0, selfDrive: 0, seatsAvailable: 0
    };

    regs.forEach(r => {
        // 🌟 修正：對接您在 renderRegList 用的中文 Key
        const rawStatus = (r["狀態"] || r["繳費狀態"] || "未繳").trim();
        if (rawStatus.includes("已繳")) stats.paid++;

        const meal = r["餐食"] || "";
        meal === '素食' ? stats.veg++ : stats.meat++;
        
        // 🌟 修正：對接交通方式與可載人數的正確 Key
        const trans = (r["交通"] || r["交通(僅本人)"] || "").trim();
        const cap = parseInt(r["可載人(僅本人)"] || r["可載人數"] || 0);

        if (trans === '搭乘遊覽車' || trans === '共乘') {
            stats.bus++;
        } else if (trans === '自駕' || trans === '開車' || trans === '自行開車') {
            stats.selfDrive++;
            stats.seatsAvailable += cap;
        }
    });

    const eventTitle = document.getElementById('eventSelector').value;
    const msg = `
【${eventTitle} 統計】
--------------------
總人數：${regs.length} 位 (${stats.paid} 已繳費)
🍱 餐食：葷 ${stats.meat} / 素 ${stats.veg}
🚌 交通：共乘/遊覽車 ${stats.bus} 人
🚗 自駕：${stats.selfDrive} 台 (可載 ${stats.seatsAvailable} 人)
--------------------
產出日期：${new Date().toLocaleString()}
    `.trim();

    navigator.clipboard.writeText(msg).then(() => {
        showToast("✅ 統計文字已複製");
    });
}
        
function exportInsuranceCSV() {
    const regs = allData.registrations || [];
    if (regs.length === 0) {
        showToast("❌ 沒有報名資料可匯出");
        return;
    }

    // 包含 UTF-8 BOM 以防 Excel 亂碼
    let csv = "\uFEFF姓名,身分證字號,生日,電話\n";
    
    regs.forEach(r => {
        // 抓取欄位並清理資料
        const name = (r["姓名"] || "").replace(/[\r\n,]/g, " ");
        const id = (r["身分證"] || r["身分證字號"] || "").replace(/[\r\n,]/g, " ");
        const bday = (r["生日"] || "").replace(/[\r\n,]/g, " ");
        const phone = (r["電話"] || "").replace(/[\r\n,]/g, " ");

        // 組合成一行
        csv += `${name},${id},${bday},${phone}\n`;
    });

    // 建立下載連結
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    
    // 檔名加上活動標題
    const eventName = document.getElementById('eventSelector')?.value || "活動";
    link.download = `保險名冊_${eventName}_${new Date().toLocaleDateString()}.csv`;
    
    document.body.appendChild(link); // 建議加入這一行以增加瀏覽器相容性
    link.click();
    document.body.removeChild(link); // 下載完移除
    
    showToast("📂 CSV 匯出完成");
}        
// --- 🌟 新增：行政看板數據計算函式 ---
function updateAdminStats(list) {
    if (!list) return;

    // --- 第一階段：建立「誰代理誰」的交通對照表 ---
    const transportMap = {};
    // 🌟 新增：準備存放過濾後的名單
    allData.currentDrivers = [];   // 存放司機
    allData.currentPassengers = []; // 存放乘客
    
    list.forEach(r => {
        const name = (r["姓名"] || "").trim();
        const agent = (r["報名代理人"] || "").trim();
        const trans = (r["交通"] || r["交通(僅本人)"] || "").trim();

        // 如果是本人報名，就把他的交通方式存起來
        if (agent === "本人" || agent === "") {
            transportMap[name] = trans;
        }
    });

    // --- 第二階段：正式統計人數 ---
    let carCount = 0;      // 總車輛數
    let totalSeats = 0;    // 總空位數
    let carpoolCount = 0;  // 總共乘需求 (含攜伴)
    const vegList = [];    // 素食名單

    list.forEach(r => {
        const name = (r["姓名"] || "").trim();
        const agent = (r["報名代理人"] || "").trim();
        let trans = (r["交通"] || r["交通(僅本人)"] || "").trim();

        // 🌟 關鍵邏輯：如果是攜伴者且交通空白，強制繼承代理人的交通
        if (agent !== "本人" && agent !== "" && trans === "") {
            trans = transportMap[agent] || ""; 
        }

        // 開始計數
        if (trans === "自駕" || trans === "開車") {
            // 只有代理人本人算「一台車」
            if (agent === "本人" || agent === "") {
                carCount++;
                totalSeats += parseInt(r["可載人(僅本人)"] || r["可載人數"] || 0);
                allData.currentDrivers.push(r); // 存入司機名單
            }
        } else if (trans === "共乘" || trans === "搭車") {
            carpoolCount++;
            allData.currentPassengers.push(r); // 存入乘客名單
        }

        // 素食統計
        if ((r["餐食"] || "").includes("素")) {
            vegList.push(name);
        }
    });

    // --- 第三階段：更新 UI 畫面 ---
    const setUI = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.innerText = val;
    };

    setUI('totalCount', list.length); 
    setUI('totalReg', list.length);   
    setUI('paidCount', list.filter(r => (r["狀態"] || r["繳費狀態"] || "").includes("已繳")).length);
    setUI('carCount', carCount);
    setUI('seatCount', totalSeats);
    setUI('carpoolCount', carpoolCount);
    setUI('vegCount', vegList.length);

    const vegNamesElem = document.getElementById('vegNames');
    if (vegNamesElem) {
        vegNamesElem.innerText = vegList.length > 0 ? "名單：" + vegList.join("、") : "無素食";
    }

    // --- 第四階段：控制按鈕顯示/隱藏 ---
    // --- UI 自動切換邏輯 ---
    const isBus = (currentEventConfig?.["是遊覽車行"] === "是");
    const needID = (currentEventConfig?.["是否需要身分證"] === "是");

    // 1. 處理保險圖示
    const insBtn = document.getElementById('exportInsuranceBtn');
    if (insBtn) {
        insBtn.style.display = needID ? 'inline-block' : 'none';
    }

    // 2. 處理車輛分配按鈕
    const carBtn = document.getElementById('carpoolBtn');
    if (carBtn) {
        carBtn.style.display = isBus ? 'none' : 'inline-block';
    }

    // 3. 處理交通統計區塊
    const tStats = document.getElementById('trafficStats');
    if (tStats) {
        tStats.style.display = isBus ? 'none' : 'block';
    }    
}        
function copyPaidListToLine() {
    // 1. 取得已繳費名單
    const regs = allData.registrations || [];
    const paidList = regs.filter(r => (r["狀態"] || r["繳費狀態"] || "").includes("已繳"));

    if (paidList.length === 0) {
        showToast("⚠️ 目前沒有已繳費的人員");
        return;
    }

    const eventName = document.getElementById('eventSelector')?.value || "活動";
    let message = `【${eventName}】已繳費名單：\n`;
    message += `---------------\n`;
    paidList.forEach((r, index) => {
        message += `${index + 1}. ${r["姓名"]}\n`;
    });
    message += `---------------\n`;
    message += `✅ 總計：${paidList.length} 位\n`;

    const isConfirmed = confirm(`確定發送至 LINE 嗎？\n\n${message}`);
    
    if (isConfirmed) {
        // --- 🔒 安全檢查：從 Session 獲取金鑰 ---
        // 參考您幹部登錄的儲存方式，通常 key 是存成 'staffKey'
        const sessionKey = sessionStorage.getItem('staffKey');
        const finalURL = (typeof scriptURL !== 'undefined' ? scriptURL : (typeof GAS_URL !== 'undefined' ? GAS_URL : ""));

        if (!sessionKey) {
            alert("❌ 權限驗證失效：請重新從「幹部登入」頁面登入後再執行發送。");
            return;
        }

        if (typeof showLoading === "function") showLoading(true, "LINE 名單發送中...");

        const payload = {
            type: 'send_line', 
            key: sessionKey, // 動態使用 Session 中的金鑰
            message: message
        };

        fetch(finalURL, { 
            method: 'POST', 
            body: JSON.stringify(payload) 
        })
        .then(res => res.json())
        .then(result => {
            if (result.result === "SUCCESS") {
                showToast("🚀 已繳費名單已成功送出");
            } else {
                alert("發送失敗：" + (result.message || "金鑰驗證錯誤"));
            }
        })
        .catch(err => {
            console.error("發送出錯:", err);
            alert("通訊失敗，請檢查網路連線。");
        })
        .finally(() => {
            if (typeof showLoading === "function") showLoading(false); // 確保圈圈消失
        });
    }
}

// 🌟 新增：計算並更新所有選單顯示的人數
// 🌟 升級版：計算人數、隱藏客滿司機、控制 LINE 按鈕
function refreshCarpoolSeats() {
    const selects = Array.from(document.querySelectorAll('.carpool-select'));
    const usedSeats = {};
    let isAllAssigned = true; // 追蹤是否全部分配完畢

    // 1. 統計每個司機目前被選了幾次，並檢查是否有人沒分配
    selects.forEach(s => {
        if (s.value) {
            usedSeats[s.value] = (usedSeats[s.value] || 0) + 1;
        } else {
            isAllAssigned = false; // 只要有一個人是「未分配」，就設為 false
        }
    });

    // 2. 更新選單文字與隱藏狀態
    selects.forEach(s => {
        Array.from(s.options).forEach(opt => {
            if (!opt.value) return; // 略過「-- 未分配 --」的選項
            
            const limit = parseInt(opt.dataset.limit) || 0;
            const currentUsed = usedSeats[opt.value] || 0;
            const remain = limit - currentUsed;
            const isSelected = opt.selected; // 這個選項在目前的下拉選單中是否正被選取？
            
            // 🌟 核心邏輯：如果沒位子了，且目前不是被選中的狀態，就隱藏並停用
            if (remain <= 0 && !isSelected) {
                opt.disabled = true; // 停用
                opt.hidden = true;   // 隱藏 (瀏覽器支援時就不會出現在選單中)
                opt.text = `👤 司機：${opt.value} (已滿)`;
            } else {
                opt.disabled = false;
                opt.hidden = false;
                opt.text = `👤 司機：${opt.value} (餘 ${remain})`;
                
                if (remain < 0) {
                    opt.style.color = "red";
                    opt.text += " ⚠️ 超額";
                } else {
                    opt.style.color = "black";
                }
            }
        });
    });

    // 3. 控制 LINE 按鈕的顯示與隱藏
    const lineBtn = document.getElementById('sendLineCarpoolBtn');
    if (lineBtn) {
        // 如果有乘客名單 (length > 0) 且全部分配完畢 (isAllAssigned)
        if (selects.length > 0 && isAllAssigned) {
            lineBtn.classList.remove('hidden');
            lineBtn.classList.add('flex-1');
        } else {
            lineBtn.classList.add('hidden');
            lineBtn.classList.remove('flex-1');
        }
    }
} 
// 🌟 新增：打包車主與乘客名單，並傳送到 LINE
function sendCarpoolToLine() {
    const selects = document.querySelectorAll('.carpool-select');
    const driverMap = {}; // 用來整理 { "車主A": ["乘客1", "乘客2"] }

    // 1. 整理名單
    selects.forEach(sel => {
        const pName = sel.getAttribute('data-passenger');
        const dName = sel.value;
        if (!dName) return; // 安全機制：未分配不列入
        
        if (!driverMap[dName]) driverMap[dName] = [];
        driverMap[dName].push(pName);
    });

    // 2. 組合 LINE 訊息文字
    const eventName = document.getElementById('eventSelector').value;
    let msg = `🚗 【${eventName}】共乘分配表 🚗\n`;
    msg += `----------------------\n`;
    
    for (const [driver, passengers] of Object.entries(driverMap)) {
        msg += `👤 車主：${driver}\n`;
        msg += `👥 乘客：${passengers.join("、")}\n\n`;
    }
    msg += `✅ 已全數分配完畢`;

    // 3. 確認與傳送
    if (confirm(`確定發送以下分配結果至群組嗎？\n\n${msg}`)) {
        const sessionKey = sessionStorage.getItem('staffKey') || sessionStorage.getItem('staff_key');
        if (!sessionKey) return alert("❌ 權限驗證失效：請重新登入。");

        showLoading(true, "LINE 傳送中...");
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'send_line', // 呼叫您既有的 GAS 廣播功能
                key: sessionKey,
                message: msg
            })
        })
        .then(r => r.json())
        .then(res => {
            if (res.result === "SUCCESS") {
                showToast("🚀 LINE 傳送成功");
            } else {
                alert("發送失敗: " + (res.message || "未知錯誤"));
            }
        })
        .catch(err => {
            alert("網路連線錯誤，無法傳送。");
        })
        .finally(() => {
            showLoading(false);
        });
    }
}
