<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/oversea/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        window.addEventListener('load', () => {
            const SDK = window.CozeWebSDK;

            if (!SDK) {
                document.body.innerHTML = "<h2 style='padding:20px;'>核心組件載入失敗，請檢查網路連線。</h2>";
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            
            new SDK.WebChatClient({
                config: { 
                    bot_id: '7620394792719499317' 
                },
                componentProps: {
                    title: '築心智慧管家',
                    // 根據官方文件，此處設定為 pc 版型
                    layout: 'pc',
                    initial_variables: {
                        user_name: urlParams.get('user_name') || '訪客',
                        user_phone: urlParams.get('user_phone') || ''
                    }
                },
                el: document.getElementById('chat-container'),
            });
        });
    </script>
</body>
</html>
