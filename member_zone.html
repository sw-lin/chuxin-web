<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員專區 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-md mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-emerald-50">
        <h2 class="text-2xl font-bold text-emerald-900 mb-6 text-center">會員個人資料</h2>
        <div id="userInfo" class="space-y-4 mb-8">
            </div>
        <button onclick="openEditModal()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition">
            <i class="fas fa-user-edit mr-2"></i> 修改個人資料
        </button>
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-emerald-800 font-bold">登出並回首頁</a>
        </div>
    </div>

    <div id="editProfileModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative">
            <h3 class="text-xl font-bold text-emerald-900 mb-6 text-center">修改個人資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-emerald-800 mb-1 ml-1">驗證舊密碼 <span class="text-red-500">*</span></label>
                    <input id="oldPassword" type="password" placeholder="請輸入當前密碼" class="w-full p-3 bg-gray-50 border border-emerald-100 rounded-xl outline-none focus:border-emerald-500 transition">
                </div>
                <hr class="border-emerald-50">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">新電子郵件</label>
                    <input id="editEmail" type="email" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">設定新密碼</label>
                    <input id="editPassword" type="password" placeholder="若不修改請留空" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-emerald-500 transition">
                </div>
                <button id="updateBtn" onclick="submitUpdate()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition shadow-lg">確認更新</button>
                <button onclick="closeEditModal()" class="w-full text-gray-400 text-sm py-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 核心配置
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyHvW4h7QrbsNH-aYkjz65F6Og4NoEVcy71vYyls2pjxUpt-LLNSO0RuYQb4C7gQuq3hw/exec";

        // 載入時顯示資訊
        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { window.location.href = 'index.html'; return; }
            
            document.getElementById('userInfo').innerHTML = `
                <div class="p-4 bg-emerald-50 rounded-xl">
                    <p class="text-xs text-gray-500">手機號碼</p>
                    <p class="font-bold text-emerald-900">${user.phone}</p>
                </div>
                <div class="p-4 bg-emerald-50 rounded-xl">
                    <p class="text-xs text-gray-500">電子郵件</p>
                    <p class="font-bold text-emerald-900">${user.email}</p>
                </div>
            `;
        };

        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldPass = document.getElementById('oldPassword').value;
            const newEmail = document.getElementById('editEmail').value;
            const newPass = document.getElementById('editPassword').value;
            const btn = document.getElementById('updateBtn');

            // 1. 舊密碼驗證
            if (!oldPass || String(oldPass).trim() !== String(user.password).trim()) {
                alert("舊密碼錯誤，請重新輸入");
                return;
            }

            btn.disabled = true;
            btn.innerText = "更新中...";

            // 2. 發送更新請求
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 如果遇到跨域問題，這行很重要
                    body: JSON.stringify({
                        currentPhone: user.phone,
                        newData: {
                            email: newEmail,
                            ...(newPass && { password: newPass })
                        }
                    })
                });
                
                // 注意：因為 GAS 的 no-cors 模式會導致無法讀取 response body，我們假設成功
                alert("資料更新成功！請重新登入以確認變更。");
                user.email = newEmail;
                if(newPass) user.password = newPass;
                sessionStorage.setItem('userInfo', JSON.stringify(user));
                location.reload();

            } catch (err) {
                alert("網路連線錯誤，請稍後再試");
                btn.disabled = false;
                btn.innerText = "確認更新";
            }
        }
    </script>
</body>
</html>
