<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .progress-animation { transition: width 1.5s cubic-bezier(0.1, 0.5, 0.1, 1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="hover:text-emerald-200 transition-all text-xl"><i class="fas fa-home"></i></a>
                <span class="text-xl font-bold tracking-widest border-l border-white/20 pl-4">築心會館</span>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="userNameDisplay">載入中...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-8">
        <section class="bg-white rounded-[2rem] p-8 border border-emerald-100 shadow-sm mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
            <h2 class="text-xl font-bold text-emerald-900 flex items-center mb-4">
                <i class="fas fa-bullhorn mr-3 text-orange-500"></i> 最新消息
            </h2>
            <div id="dynamicNews" class="text-gray-600 italic">同步雲端公告中...</div>
        </section>

        <div id="adminEntry" class="hidden mb-8">
            <a href="staff_page.html" class="w-full inline-flex items-center justify-center bg-orange-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-orange-700 transition shadow-lg text-lg">
                <i class="fas fa-user-shield mr-3"></i> 進入幹部專區
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-10">
            
            <div class="emerald-gradient p-8 rounded-[2rem] shadow-xl text-white relative overflow-hidden">
                <h3 class="font-bold text-lg mb-2"><i class="fas fa-chart-line mr-2"></i> 學習參與率</h3>
                <div class="flex items-end space-x-2">
                    <span id="attPercent" class="text-5xl font-extrabold text-orange-300">0%</span>
                    <span id="attCountDisplay" class="text-emerald-100/80 text-sm mb-1">(0 / 0)</span>
                </div>
                <div class="w-full bg-white/20 h-2.5 rounded-full mt-5 overflow-hidden">
                    <div id="attBar" class="bg-orange-400 h-full progress-animation" style="width: 0%"></div>
                </div>
                <p class="text-emerald-100/60 text-[10px] mt-4 italic">統計至今日已完成活動</p>
            </div>

            <div onclick="startScanner()" class="bg-orange-500 p-8 rounded-[2rem] shadow-xl text-white hover:bg-orange-600 transition cursor-pointer flex flex-col items-center justify-center text-center group">
                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform"><i class="fas fa-qrcode"></i></div>
                <h3 class="font-bold text-xl">點擊報到</h3>
                <p class="text-orange-100 text-sm mt-2">掃描活動現場 QR Code</p>
            </div>

            <div onclick="openRemoteLink('reading_folder_url')" class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm hover:border-emerald-200 transition cursor-pointer flex flex-col justify-between group">
                <div>
                    <div class="text-emerald-800 text-3xl mb-4 group-hover:scale-110 transition-transform"><i class="fas fa-book-reader"></i></div>
                    <h3 class="font-bold text-lg text-emerald-900">導讀資料庫</h3>
                    <p class="text-gray-400 text-sm mt-2">歷年手冊、簡報與書單</p>
                </div>
                <div class="text-emerald-700 text-xs font-bold mt-4">點擊進入 <i class="fas fa-external-link-alt ml-1"></i></div>
            </div>

            <div onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm hover:border-emerald-200 transition cursor-pointer flex flex-col justify-between group">
                <div>
                    <div class="text-orange-600 text-3xl mb-4 group-hover:scale-110 transition-transform"><i class="fas fa-camera-retro"></i></div>
                    <h3 class="font-bold text-lg text-emerald-900">活動剪影</h3>
                    <p class="text-gray-400 text-sm mt-2">紀錄聚會的美好瞬間</p>
                </div>
                <div class="text-orange-600 text-xs font-bold mt-4">瀏覽相簿 <i class="fas fa-external-link-alt ml-1"></i></div>
            </div>

            <div onclick="openEditModal()" class="bg-stone-800 p-8 rounded-[2rem] shadow-xl text-white hover:brightness-110 transition cursor-pointer flex flex-col justify-between group">
                <div>
                    <div class="text-stone-400 text-3xl mb-4 group-hover:scale-110 transition-transform"><i class="fas fa-user-cog"></i></div>
                    <h3 class="font-bold text-lg text-stone-100">個人資料修改</h3>
                    <p class="text-stone-500 text-sm mt-2">修改電子郵件與密碼</p>
                </div>
                <div class="text-stone-400 text-xs font-bold mt-4">變更設定 <i class="fas fa-chevron-right ml-1"></i></div>
            </div>

        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl relative">
            <button onclick="stopScanner()" class="absolute top-4 right-4 text-3xl text-gray-400 z-10">&times;</button>
            <div id="reader" class="w-full"></div>
            <div class="p-6 text-center text-gray-500 text-sm font-bold border-t">請將相機對準 QR Code</div>
        </div>
    </div>

    <div id="editProfileModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
            <button onclick="closeEditModal()" class="absolute top-6 right-8 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-6 text-center">修改資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">驗證舊密碼</label>
                    <input id="oldPassword" type="password" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">新電子郵件</label>
                    <input id="editEmail" type="email" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">新密碼 (不改則留空)</label>
                    <input id="editPassword" type="password" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <button id="updateBtn" onclick="submitUpdate()" class="w-full emerald-gradient text-white py-4 rounded-2xl font-bold">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {}; 
        let html5QrCode;

        window.onload = async () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userNameDisplay').innerText = `你好，${user.name}`;

            // 幹部按鈕顯示邏輯
            const titleStr = String(user.title || '').trim();
            if (titleStr !== "" && titleStr !== "undefined") {
                document.getElementById('adminEntry').classList.remove('hidden');
            }

            syncCloudData();
        };

        async function syncCloudData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                const user = JSON.parse(sessionStorage.getItem('userInfo'));

                document.getElementById('dynamicNews').innerText = data.news || "歡迎參加讀書會。";
                
                const now = new Date().getTime();
                const passedEvents = (data.calendar || []).filter(c => c.dateObj <= now).length;
                const currentUser = (data.users || []).find(u => String(u.phone) === String(user.phone));
                const myCount = currentUser ? (currentUser.attCount || 0) : 0;
                const denominator = passedEvents || 0;
                const percent = denominator > 0 ? Math.min(100, Math.round((myCount / denominator) * 100)) : 0;

                document.getElementById('attPercent').innerText = percent + "%";
                document.getElementById('attCountDisplay').innerText = `(${myCount} / ${denominator})`;
                setTimeout(() => { 
                    const bar = document.getElementById('attBar');
                    if(bar) bar.style.width = percent + "%"; 
                }, 300);

                remoteConfig = data.config || {};
            } catch (e) { console.error(e); }
        }

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                stopScanner();
                location.href = decodedText;
            }).catch(err => {
                alert("相機啟動失敗");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').classList.add('hidden');
                });
            } else {
                document.getElementById('scannerModal').classList.add('hidden');
            }
        }

        function openRemoteLink(key) {
            const url = remoteConfig[key];
            if (url && url.startsWith('http')) window.open(url, '_blank');
            else alert("尚未設定連結");
        }

        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldPassInput = document.getElementById('oldPassword').value.trim();
            if (btoa(oldPassInput) !== String(user.password).trim()) {
                alert("❌ 驗證失敗：舊密碼錯誤");
                return;
            }
            document.getElementById('updateBtn').innerText = "處理中...";
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ currentPhone: user.phone, newData: { email: document.getElementById('editEmail').value.trim() } })
                });
                alert("修改成功");
                logout();
            } catch (e) { logout(); }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
