<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/oversea/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        // 1. 定義領票函式：從您的 Cloudflare Worker 獲取 PAT
        async function fetchToken() {
            try {
                const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
                const data = await response.json();
                return data.token;
            } catch (error) {
                console.error("領取 Token 失敗:", error);
            }
        }

        window.addEventListener('load', () => {
            // 擷取網址參數
            const urlParams = new URLSearchParams(window.location.search);
            
            // 2. 統一使用 CozeWebChat 進行初始化
            if (window.CozeWebChat) {
                new CozeWebChat.Client({
                    config: { 
                        bot_id: '7620394792719499317' // 您的築心管家 ID
                    },
                    componentProps: {
                        title: '築心智慧管家',
                        layout: 'pc',
                        initial_variables: {
                            user_name: urlParams.get('user_name') || '訪客',
                            user_phone: urlParams.get('user_phone') || ''
                        }
                    },
                    auth: {
                        type: "token",
                        getAccessToken: fetchToken // 自動與 Worker 對接領票
                    },
                    el: document.getElementById('chat-container'),
                });
            } else {
                document.body.innerHTML = "<h2 style='padding:20px;'>核心組件載入失敗，請檢查網路。</h2>";
            }
        });
    </script>
</body>
</html>
