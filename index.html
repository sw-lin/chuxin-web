<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold text-emerald-900 tracking-tighter">築心讀書會</div>
        <div class="space-x-4 flex items-center">
            <button onclick="toggleModal('fullCalendarModal', true)" class="text-sm text-gray-600 hover:text-emerald-800 font-bold border-r pr-4 border-gray-200">
                <i class="far fa-calendar-alt mr-1"></i> 完整行事曆
            </button>
            <a href="about.html" class="text-sm text-gray-600 hover:text-emerald-800 font-bold">關於我們</a>
            <button onclick="toggleModal('loginModal', true)" class="bg-emerald-800 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md hover:bg-emerald-700 transition">會員登入</button>
        </div>
    </nav>

    <div class="relative w-full h-[500px] overflow-hidden bg-emerald-900">
        <img class="slide" src="./1.jpg" onerror="this.src='https://images.unsplash.com/photo-1512820790803-83ca734da794?w=1200'">
        <img class="slide" src="./2.jpg" onerror="this.src='https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200'">
        <img class="slide" src="./3.jpg" onerror="this.src='https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200'">
        <img class="slide" src="./4.jpg" onerror="this.src='https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1200'">
        <img class="slide" src="./5.jpg" onerror="this.src='https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1200'">
        <div class="absolute inset-0 hero-gradient flex flex-col items-center justify-center text-white text-center px-6">
            <h1 class="text-4xl md:text-6xl font-bold tracking-[0.3em] mb-4">在共讀中築心</h1>
            <p class="text-emerald-100 text-lg md:text-xl tracking-widest font-light italic">Building the heart through shared reading.</p>
        </div>
    </div>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <div class="flex items-center space-x-4 mb-10">
            <div class="h-8 w-2 bg-emerald-800"></div>
            <h2 class="text-3xl font-bold text-emerald-900 italic tracking-tight">Coming soon.</h2>
        </div>
        <div id="comingSoonList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </main>

    <div id="fullCalendarModal" class="fixed inset-0 bg-black/70 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-3xl max-h-[85vh] rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-8 bg-emerald-900 text-white flex justify-between items-center">
                <h3 class="text-2xl font-bold tracking-widest">本學期完整行事曆</h3>
                <button onclick="toggleModal('fullCalendarModal', false)" class="text-white/50 hover:text-white text-4xl">&times;</button>
            </div>
            <div id="fullCalendarList" class="flex-1 overflow-y-auto p-8 space-y-3 no-scrollbar">
                </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 right-8 text-gray-300 hover:text-gray-500 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-6 text-center">會員專區登入</h3>
            <div class="space-y-4">
                <input id="u" type="text" placeholder="手機號碼 / 帳號" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <input id="p" type="password" placeholder="登入密碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition">進入專區</button>
            </div>
            <p id="loginStatus" class="text-xs text-center mt-4 text-gray-400"></p>
        </div>
    </div>

    <script>
        // --- 1. 配置與初始化 ---
        // 修正了漏掉的引號
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxezoV6EWpubQlZCtdeHPWrNowTz7gZhErkKUwzuiOOlTsI-G5a63gYXR7YADNKyyfAfw/exec";
        
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            if (slides.length === 0) return;
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 5000);
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        // --- 2. 行事曆邏輯 (calendar.csv) ---
        async function loadCalendar() {
            const comingSoonContainer = document.getElementById('comingSoonList');
            const fullCalendarContainer = document.getElementById('fullCalendarList');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            try {
                const response = await fetch('./calendar.csv?v=' + Date.now());
                const data = await response.text();
                const rows = data.split('\n').map(r => r.trim()).filter(r => r !== "" && !r.toLowerCase().startsWith('date'));
                
                let allEvents = rows.map(row => {
                    const [dateStr, title, desc] = row.split(',');
                    return { date: new Date(dateStr), dateText: dateStr, title, desc: desc || '' };
                }).filter(e => !isNaN(e.date.getTime()));

                allEvents.sort((a, b) => a.date - b.date);

                const futureEvents = allEvents.filter(e => e.date >= today).slice(0, 4);
                comingSoonContainer.innerHTML = futureEvents.map(e => `
                    <div class="bg-white p-6 rounded-3xl border border-emerald-50 shadow-sm hover:shadow-md transition">
                        <div class="text-emerald-700 font-bold text-sm mb-1">${e.dateText}</div>
                        <h4 class="font-bold text-gray-800">${e.title}</h4>
                    </div>
                `).join('') || '<p class="text-gray-400">目前暫無未來活動</p>';

                fullCalendarContainer.innerHTML = allEvents.map(e => {
                    const isPast = e.date < today;
                    return `
                        <div class="flex items-center space-x-6 p-4 rounded-2xl ${isPast ? 'opacity-30' : 'bg-emerald-50/50'}">
                            <div class="min-w-[100px] font-mono text-sm ${isPast ? 'line-through' : 'font-bold text-emerald-800'}">${e.dateText}</div>
                            <div class="flex-1">
                                <div class="font-bold ${isPast ? 'text-gray-400' : 'text-gray-800'}">${e.title}</div>
                                <div class="text-xs text-gray-400">${e.desc}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error('Calendar error:', e); }
        }

        // --- 3. 雲端登入邏輯 ---
        async function handleLogin() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('loginStatus');

            if(!u || !p) { alert("請輸入帳號與密碼"); return; }

            btn.disabled = true;
            btn.innerText = "驗證中...";
            status.innerText = "正在連線至雲端資料庫...";

            try {
                const response = await fetch(GAS_URL);
                const users = await response.json();
                
                const foundUser = users.find(user => 
                    String(user.phone).trim() === String(u).trim() && 
                    String(user.password).trim() === String(p).trim()
                );

                if (foundUser) {
                    sessionStorage.setItem('userInfo', JSON.stringify(foundUser));
                    window.location.href = 'member_zone.html';
                } else {
                    alert('帳號或密碼錯誤');
                    btn.disabled = false;
                    btn.innerText = "進入專區";
                    status.innerText = "";
                }
            } catch (err) {
                console.error(err);
                alert('雲端資料庫連線失敗');
                btn.disabled = false;
                btn.innerText = "進入專區";
            }
        }

        window.onload = function() {
            showSlides();
            loadCalendar();
        };
    </script>
</body>
</html>
