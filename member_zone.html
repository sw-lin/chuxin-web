<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .hidden { display: none; }
        .modal { position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-[#064E3B] text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="font-bold tracking-wider">築心會館</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="enterStaffMode()" class="text-[10px] bg-amber-500/20 text-amber-200 border border-amber-500/30 px-3 py-1 rounded-full">幹部專區</button>
                <button onclick="openEditModal()" class="text-[10px] bg-white/10 px-3 py-1 rounded-full">修改資料</button>
                <button onclick="logout()" class="text-[10px] bg-red-900/30 px-3 py-1 rounded-full">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <h2 id="userName" class="text-3xl font-bold mb-4 italic">...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center border border-white/5">
                    <div class="text-[10px] opacity-60 mb-1 uppercase tracking-widest">參與率</div>
                    <div id="attPercent" class="text-3xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center border border-white/5">
                    <div class="text-[10px] opacity-60 mb-1 uppercase tracking-widest">出席數</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-all">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold tracking-widest">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50 flex items-center space-x-4">
            <div class="bg-emerald-100 text-emerald-700 w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
                <i class="fas fa-bullhorn text-sm"></i>
            </div>
            <p id="news" class="text-gray-500 text-[11px] truncate">同步中...</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2">
                <i class="fas fa-book-open text-emerald-700"></i>
                <span class="font-bold text-emerald-900 text-sm">課程資料庫</span>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2">
                <i class="fas fa-images text-emerald-700"></i>
                <span class="font-bold text-emerald-900 text-sm">活動剪影</span>
            </button>
        </div>

        <div class="px-2">
            <h3 class="font-bold text-emerald-900 text-lg mb-4">學習歷程</h3>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <div id="scannerModal" class="modal hidden">
        <div class="bg-white w-[90%] max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
            <div id="reader" class="w-full"></div>
            <div class="p-6">
                <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500">取消返回</button>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="modal hidden">
        <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-6 text-center">修改資料</h3>
            <div class="space-y-4">
                <input type="email" id="editEmail" placeholder="電子郵件" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm">
                <input type="password" id="oldPass" placeholder="驗證舊密碼 (必填)" class="w-full px-5 py-4 bg-gray-100 rounded-2xl outline-none text-sm border border-red-100">
                <input type="password" id="newPass" placeholder="設定新密碼 (不改留空)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm">
                <div class="flex pt-4 space-x-3">
                    <button onclick="closeEditModal()" class="flex-1 text-gray-400 font-bold">取消</button>
                    <button onclick="handleUpdateProfile()" id="updateBtn" class="flex-[2] bg-emerald-800 text-white py-4 rounded-2xl font-bold">確認更新</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let html5QrCode = null;
        let remoteConfig = {};
        let currentUser = null;

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').innerText = currentUser.name;
            syncData(currentUser);
        };

        function enterStaffMode() {
           const key = prompt("請輸入幹部授權碼：");
       if (key) {
          // 統一使用 adminKey 作為存放名稱
          sessionStorage.setItem('adminKey', key);
          location.href = 'staff_page.html';
    }
}

        // --- 恢復與昨日版本一致的掃描呼叫方式 ---
        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            document.getElementById('scannerModal').style.display = 'flex';
            // 使用穩定的大寫 Q 小寫 d 版本
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 }, 
                (text) => { stopScanner(); window.location.href = text; }
            ).catch(() => stopScanner());
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().finally(() => {
                    document.getElementById('scannerModal').classList.add('hidden');
                    document.getElementById('scannerModal').style.display = 'none';
                    html5QrCode = null;
                });
            } else {
                document.getElementById('scannerModal').classList.add('hidden');
                document.getElementById('scannerModal').style.display = 'none';
            }
        }

        // --- 精準對接 GAS: 使用 'password' 而非 'oldPassword' ---
async function handleUpdateProfile() {
            // 抓取彈窗中的輸入值
            const oldP = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            const email = document.getElementById('editEmail').value;

            if (!oldP) return alert("請輸入舊密碼驗證身份");
            
            const btn = document.getElementById('updateBtn');
            const originalText = btn.innerText;
            btn.disabled = true; 
            btn.innerText = "更新中...";
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    // 這裡的 body 結構必須完全符合您當初 GAS 運行的邏輯
                    body: JSON.stringify({
                        type: 'updateProfile',
                        phone: currentUser.phone,
                        email: email,
                        oldPassword: oldP, // 關鍵修正：必須使用 oldPassword
                        newPassword: newP
                    })
                });
                
                const result = await res.json();
                
                if (result.result === "SUCCESS") {
                    alert("資料更新成功！");
                    // 更新瀏覽器暫存的資訊
                    currentUser.email = email;
                    sessionStorage.setItem('userInfo', JSON.stringify(currentUser));
                    location.reload();
                } else {
                    // 如果後端回傳錯誤，顯示後端的錯誤訊息
                    alert("更新失敗：" + (result.message || "舊密碼驗證失敗"));
                }
            } catch (e) {
                console.error(e);
                alert("網路連線失敗，請稍後再試");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function syncData(user) {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                remoteConfig = data.config || {};
                document.getElementById('news').innerText = data.news || "歡迎。";
                const myMatch = String(user.phone).replace(/\D/g, "").slice(-9);
                const liveUser = data.users.find(u => String(u.phone).slice(-9) === myMatch);
                if (liveUser) {
                    const today = new Date().toISOString().split('T')[0];
                    const events = data.calendar.filter(ev => ev.dateText <= today);
                    const logs = liveUser.attendLog.map(l => l.split('T')[0]);
                    let count = events.filter(ev => logs.includes(ev.dateText)).length;
                    document.getElementById('attPercent').innerText = (events.length ? Math.round(count/events.length*100) : 0) + "%";
                    document.getElementById('attCountDisplay').innerText = `${count} / ${events.length}`;
                    document.getElementById('historyList').innerHTML = [...events].reverse().map(ev => `
                        <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50 mb-3">
                            <div><div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div><div class="text-emerald-900 font-bold text-sm">${ev.title}</div></div>
                            <i class="fas ${logs.includes(ev.dateText) ? 'fa-check-circle text-emerald-600' : 'fa-times-circle text-gray-200'} text-2xl"></i>
                        </div>`).join('');
                }
            } catch (e) {}
        }

        // 修正後的 fetchData (加入自動重試機制)
async function fetchData() {
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        if (!res.ok) throw new Error("連線異常");
        const data = await res.json();
        allData = data;
        
        // 從 data.users 中重新更新目前登入者的資料
        const updatedUser = data.users.find(u => u.phone === currentUser.phone);
        if (updatedUser) {
            currentUser = updatedUser;
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        }
        
        renderUI();
    } catch (e) {
        console.warn("連線失敗，1秒後自動重試...");
        setTimeout(async () => {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                allData = data;
                renderUI();
            } catch (err) {
                // 若重試也失敗，僅在主畫面顯示小提示，不打斷使用者
                console.error("無法同步最新資料");
            }
        }, 1000);
    }
}
// 修正後的 UI 渲染 (讀取新的出席記錄格式)
function renderUI() {
    if (!allData || !currentUser) return;

    // 1. 公告更新
    if (document.getElementById('newsContent')) {
        document.getElementById('newsContent').innerText = allData.news || "歡迎參加築心讀書會";
    }

    // 2. 出席紀錄統計 (使用 currentUser.attendLog)
    const logs = currentUser.attendLog || [];
    const events = allData.calendar || [];
    const count = logs.length;
    
    const attendDisplay = document.getElementById('attendDisplay');
    if (attendDisplay) {
        attendDisplay.innerText = `${count} / ${events.length}`;
    }

    // 3. 渲染歷史紀錄清單
    const historyList = document.getElementById('historyList');
    if (historyList) {
        // 由新到舊排列
        historyList.innerHTML = [...events].reverse().map(ev => {
            // 檢查該活動日期是否在會員的簽到記錄中
            const isAttended = logs.includes(ev.dateText);
            return `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50 mb-3">
                    <div>
                        <div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div>
                        <div class="text-emerald-900 font-bold text-sm">${ev.title}</div>
                    </div>
                    <i class="fas ${isAttended ? 'fa-check-circle text-emerald-600' : 'fa-times-circle text-gray-200'} text-2xl"></i>
                </div>
            `;
        }).join('');
    }
    
    // 4. 更新遠端連結 (Config)
    remoteConfig = allData.config || {};
}
        function openRemoteLink(key) {
            if (remoteConfig[key]) window.open(remoteConfig[key], '_blank');
            else alert("尚未設定連結");
        }

        function openEditModal() {
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
            document.getElementById('editProfileModal').style.display = 'flex';
        }
        function closeEditModal() {
            document.getElementById('editProfileModal').classList.add('hidden');
            document.getElementById('editProfileModal').style.display = 'none';
        }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
