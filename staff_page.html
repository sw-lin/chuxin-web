<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="pb-12">

    <header class="admin-gradient text-white pt-8 pb-12 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">築心管理系統</h1>
                <p class="text-emerald-200 mt-2"><i class="fas fa-user-shield mr-2"></i>幹部管理模式</p>
            </div>
            <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto flex space-x-8 px-6 overflow-x-auto">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 font-bold tab-active text-emerald-900 whitespace-nowrap">公告與 LINE</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 font-bold text-gray-400 whitespace-nowrap">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 font-bold text-gray-400 whitespace-nowrap">行事曆管理</button>
            <button onclick="switchTab('rank')" id="tab-rank" class="py-4 font-bold text-gray-400 whitespace-nowrap">出席榜單</button>
            <button onclick="switchTab('system')" id="tab-system" class="py-4 font-bold text-gray-400 whitespace-nowrap">系統管理</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-8 px-6">
        
        <section id="section-news" class="space-y-8">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 首頁公佈欄更新</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500 mb-4" placeholder="在此輸入顯示在學員首頁的公告..."></textarea>
                <button id="btn-publishNews" onclick="publishNews()" class="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-900 transition">更新網頁公告</button>
            </div>

            <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-emerald-100">
                <h3 class="text-xl font-bold text-emerald-900 mb-6"><i class="fab fa-line mr-2 text-green-500"></i> LINE 訊息即時投放</h3>
                <textarea id="lineMsgContent" rows="4" class="w-full p-4 bg-green-50/30 rounded-2xl border border-green-100 outline-none focus:border-green-500 mb-4" placeholder="輸入訊息內容..."></textarea>
                <div class="flex gap-4">
                    <button id="btn-sendLine" onclick="sendLineMessage()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 transition">立即發送</button>
                    <button onclick="loadTemplate()" class="bg-white text-green-600 border border-green-600 px-6 py-3 rounded-xl font-bold hover:bg-green-50 transition">載入提醒範本</button>
                </div>
            </div>
        </section>

        <section id="section-system" class="hidden">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold text-emerald-900 mb-6"><i class="fas fa-cog mr-2 text-gray-500"></i> 外部資源連結</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-2">導讀資料庫 URL</label>
                        <input type="text" id="link-reading" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-2">活動剪影 URL</label>
                        <input type="text" id="link-photo" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500">
                    </div>
                </div>
                <button id="btn-saveConfig" onclick="saveConfig()" class="mt-8 bg-emerald-800 text-white px-10 py-3 rounded-xl font-bold hover:bg-emerald-900 transition">儲存系統設定</button>
            </div>
        </section>

        <section id="section-members" class="hidden">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <div class="flex justify-between mb-8">
                    <h3 class="text-xl font-bold text-emerald-900">會員資料庫</h3>
                    <button onclick="openModal('memberModal')" class="bg-emerald-100 text-emerald-800 px-6 py-2 rounded-xl font-bold">+ 新增</button>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left" id="memberTable"></table></div>
            </div>
        </section>

        <section id="section-calendar" class="hidden">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border mb-8">
                <h3 class="text-xl font-bold text-emerald-900 mb-6">發布新活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="date" id="newDate" class="p-4 bg-gray-50 rounded-2xl border">
                    <input type="text" id="newTitle" placeholder="標題" class="p-4 bg-gray-50 rounded-2xl border">
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="newNeedCheckin" class="w-5 h-5 accent-emerald-600"> <span>需報到</span></label>
                        <button onclick="addEvent()" id="btn-addEvent" class="flex-1 bg-emerald-800 text-white py-4 rounded-2xl font-bold">發布</button>
                    </div>
                </div>
            </div>
            <div id="calendarList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="section-rank" class="hidden">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold text-emerald-900 mb-8">出席榮譽榜</h3>
                <div id="rankList" class="space-y-4"></div>
            </div>
        </section>

    </main>

    <div id="memberModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-2xl font-bold text-emerald-900 mb-6">會員資料</h3>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="姓名" class="w-full p-4 bg-gray-50 rounded-2xl border">
                <input type="tel" id="mPhone" placeholder="手機" class="w-full p-4 bg-gray-50 rounded-2xl border">
                <input type="password" id="mPass" placeholder="密碼" class="w-full p-4 bg-gray-50 rounded-2xl border">
                <div class="flex space-x-4 mt-8">
                    <button onclick="closeModal('memberModal')" class="flex-1 py-4 font-bold text-gray-400">取消</button>
                    <button id="btn-addMember" onclick="addMember()" class="flex-1 bg-emerald-800 text-white py-4 rounded-2xl font-bold">確認</button>
                </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden p-6">
        <div class="bg-white rounded-[3rem] p-10 text-center max-w-sm w-full">
            <h3 id="qrTitle" class="text-xl font-bold text-emerald-900 mb-1"></h3>
            <p id="qrDate" class="text-orange-500 font-bold mb-6"></p>
            <div id="qrcode" class="flex justify-center mb-8"></div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 rounded-2xl font-bold">關閉</button>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; 
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html";
        
        let allData = { users: [], calendar: [], config: {}, news: "" };

        async function init() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                renderAll();
                document.getElementById('link-reading').value = allData.config.reading_folder_url || "";
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || "";
                document.getElementById('newsContent').value = allData.news || "";
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            renderMembers();
            renderCalendar();
            renderRank();
        }

        function switchTab(tab) {
            ['news', 'members', 'calendar', 'rank', 'system'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.replace('text-emerald-900', 'text-gray-400');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.replace('text-gray-400', 'text-emerald-900');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        // --- 核心 API 通訊 ---
        async function apiPost(data, btnId, callback) {
            const btn = btnId ? document.getElementById(btnId) : null;
            if(btn) btn.classList.add('btn-loading');
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                const result = await res.text();
                if(result === "OK" || result === "SUCCESS") {
                    if(callback) callback(); else location.reload();
                } else { alert("失敗: " + result); }
            } catch (e) { alert("連線錯誤"); }
            if(btn) btn.classList.remove('btn-loading');
        }

        // --- 功能模組 ---
        function loadTemplate() {
            document.getElementById('lineMsgContent').value = "【築心讀書會提醒】\n各位讀友大家好，明天就是我們的讀書會時間囉！\n期待與大家見面交流。";
        }

        function sendLineMessage() {
            const content = document.getElementById('lineMsgContent').value.trim();
            if(!content) return alert("請輸入內容");
            apiPost({ type: "send_line_push", content: content }, "btn-sendLine", () => {
                alert("LINE 訊息已成功推送！");
                document.getElementById('lineMsgContent').value = "";
            });
        }

        function publishNews() {
            const content = document.getElementById('newsContent').value;
            apiPost({ type: "publish_news", content: content }, "btn-publishNews");
        }

        function saveConfig() {
            const reading = document.getElementById('link-reading').value;
            const photo = document.getElementById('link-photo').value;
            apiPost({ type: "update_config", reading: reading, photo: photo }, "btn-saveConfig");
        }

        function renderMembers() {
            const table = document.getElementById('memberTable');
            table.innerHTML = `<tr class="text-gray-400 text-sm"><th>會員</th><th>身份</th><th>繳費</th><th class="text-right">操作</th></tr>`;
            allData.users.forEach(u => {
                const row = document.createElement('tr');
                row.className = "border-t border-gray-50";
                row.innerHTML = `
                    <td class="py-5"><b>${u.name}</b><br><span class="text-xs text-gray-400">${u.phone}</span></td>
                    <td class="py-5"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${u.title}</span></td>
                    <td class="py-5 text-sm">${u.paid}</td>
                    <td class="py-5 text-right"><button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
                `;
                table.appendChild(row);
            });
        }

        function renderCalendar() {
            const list = document.getElementById('calendarList');
            list.innerHTML = "";
            allData.calendar.forEach(c => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2rem] border";
                card.innerHTML = `
                    <div class="text-orange-500 font-bold">${c.dateText}</div>
                    <h4 class="text-lg font-bold text-emerald-900 mb-4">${c.title}</h4>
                    <button onclick="generateQR('${c.dateText}','${c.title}')" class="w-full bg-emerald-50 text-emerald-700 py-2 rounded-xl font-bold">產生報到 QR</button>
                `;
                list.appendChild(card);
            });
        }

        function renderRank() {
            const list = document.getElementById('rankList');
            const sorted = [...allData.users].sort((a,b) => b.attCount - a.attCount).slice(0,5);
            list.innerHTML = sorted.map((u, i) => `
                <div class="flex items-center p-4 bg-gray-50 rounded-2xl">
                    <span class="w-8 font-bold text-emerald-600">${i+1}</span>
                    <div class="flex-1 font-bold">${u.name}</div>
                    <div class="bg-emerald-800 text-white px-3 py-1 rounded-full text-xs">${u.attCount} 次</div>
                </div>
            `).join('');
        }

        function addMember() {
            const n = document.getElementById('mName').value;
            const p = document.getElementById('mPhone').value;
            const pw = document.getElementById('mPass').value;
            apiPost({ type: "add_member", name: n, phone: p, password: pw }, "btn-addMember");
        }

        function addEvent() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newTitle').value;
            const c = document.getElementById('newNeedCheckin').checked;
            apiPost({ type: "add_event", date: d, title: t, needCheckin: c }, "btn-addEvent");
        }

        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180 });
            openModal('qrModal');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
