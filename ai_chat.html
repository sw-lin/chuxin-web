<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>築心智慧管家</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f5f5f5; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <iframe id="dify-frame"></iframe>

    <script>
        (function() {
            // 1. 取得網址參數
            const params = new URLSearchParams(window.location.search);
            const phone = params.get('phone') || "";
            const name = params.get('name') || "訪客";

            // 2. 封裝成 Dify 認得的 inputs JSON 格式
            // 務必確認 Dify START 節點內的變數 Key 是 user_phone
            const inputs = {
                "user_phone": phone,
                "user_name": name
            };

            // 3. 進行 Base64 或 URL 編碼以確保參數安全傳遞
            const encodedInputs = encodeURIComponent(JSON.stringify(inputs));

            // 4. 組合 URL：使用 /chatbot 路徑並帶上 inputs 參數
            const baseUrl = "https://udify.app/chatbot/ERNQLHGG3QKClfr7";
            const finalUrl = `${baseUrl}?inputs=${encodedInputs}`;

            // 5. 注入 iframe
            document.getElementById('dify-frame').src = finalUrl;
        })();
    </script>
</body>
</html>
