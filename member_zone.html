<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 flex justify-between items-center shadow-xl sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-300"></i>
            <span class="font-bold text-sm">築心會館</span>
        </div>
        <div class="flex space-x-2">
            <button onclick="openStaffModal()" class="text-[10px] bg-amber-500/20 text-amber-200 border border-amber-500/30 px-3 py-1 rounded-full hover:bg-amber-500/40 transition">幹部專區</button>
            <button onclick="openEditModal()" class="text-[10px] bg-white/10 px-3 py-1 rounded-full hover:bg-white/20 transition">修改資料</button>
            <button onclick="logout()" class="text-[10px] bg-red-900/30 px-3 py-1 rounded-full hover:bg-red-800 transition">登出</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <h2 id="userName" class="text-3xl font-bold mb-4">讀取中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">學習參與率</div>
                    <div id="attPercent" class="text-2xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">已完成場次</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-transform">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-800 mb-1 text-sm">最新公告</h3>
            <p id="news" class="text-gray-500 text-xs italic">載入中...</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="handleFolderLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-book-open text-emerald-700 text-xl"></i>
                <span class="font-bold text-emerald-900 text-sm">課程資料庫</span>
            </button>
            <button onclick="handleFolderLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-images text-emerald-700 text-xl"></i>
                <span class="font-bold text-emerald-900 text-sm">活動剪影</span>
            </button>
        </div>

        <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
        <div id="historyList" class="space-y-3">
            <p class="text-center py-10 text-gray-400 italic">正在整理紀錄...</p>
        </div>
    </main>

    <div id="editModal" class="modal">
        <div class="bg-white p-8 rounded-[2.5rem] w-80 relative shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-emerald-900 text-center">修改個人資料</h3>
            <div class="space-y-4">
                <input type="email" id="editEmail" placeholder="新的電子郵件" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="oldPwd" placeholder="請輸入舊密碼驗證" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="newPwd" placeholder="新密碼 (不改則留空)" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <button onclick="handleUpdateProfile()" class="w-full bg-emerald-800 text-white p-4 rounded-xl font-bold shadow-lg">確認修改</button>
                <button onclick="closeModal('editModal')" class="w-full text-gray-400 text-sm">取消返回</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let configLinks = {};
        let currentUser = null;

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').innerText = currentUser.name || "讀書會成員";
            syncData(currentUser);
        };

        async function syncData(user) {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                configLinks = data.config || {};
                document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";

                const myMatch = String(user.phone || "").replace(/\D/g, "").slice(-9);
                const liveUser = (data.users || []).find(u => String(u.phone || "").slice(-9) === myMatch);
                
                if (liveUser) {
                    const todayStr = new Date().toISOString().split('T')[0];
                    const validEvents = (data.calendar || []).filter(ev => ev.dateText && ev.dateText <= todayStr);
                    const attendLogs = (liveUser.attendLog || []).map(log => log.split('T')[0]);
                    
                    let count = 0;
                    validEvents.forEach(ev => { if (attendLogs.includes(ev.dateText)) count++; });

                    const percent = validEvents.length > 0 ? Math.round((count / validEvents.length) * 100) : 0;
                    document.getElementById('attPercent').innerText = percent + "%";
                    document.getElementById('attCountDisplay').innerText = `${count} / ${validEvents.length}`;
                    
                    if (percent >= 50) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    renderHistory(validEvents, attendLogs);
                }
            } catch (err) { console.error(err); }
        }

        function handleFolderLink(key) {
            const url = configLinks[key];
            if (url && url.startsWith('http')) { window.open(url, '_blank'); } 
            else { alert("目前尚未設定連結，或資料讀取失敗。"); }
        }

        function renderHistory(events, logs) {
            const list = document.getElementById('historyList');
            list.innerHTML = [...events].reverse().map(ev => {
                const isAttended = logs.includes(ev.dateText);
                return `
                    <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50">
                        <div>
                            <div class="text-xs text-emerald-600 font-bold mb-1">${ev.dateText}</div>
                            <div class="text-emerald-900 font-bold">${ev.title}</div>
                        </div>
                        <i class="fas ${isAttended ? 'fa-check-circle text-emerald-600' : 'fa-times-circle text-gray-200'} text-2xl"></i>
                    </div>`;
            }).join('');
        }

        function openEditModal() { document.getElementById('editModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }

        async function handleUpdateProfile() {
            const email = document.getElementById('editEmail').value;
            const oldPassword = document.getElementById('oldPwd').value;
            const newPassword = document.getElementById('newPwd').value;

            if (!oldPassword) return alert("請輸入舊密碼以驗證身分");

            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    type: 'updateProfile',
                    phone: currentUser.phone,
                    email: email,
                    oldPassword: oldPassword,
                    newPassword: newPassword
                })
            });
            const result = await res.json();
            if (result.result === "SUCCESS") {
                alert("修改成功！");
                closeModal('editModal');
            } else {
                alert("修改失敗：" + result.message);
            }
        }
        
        // 模擬幹部驗證
        function openStaffModal() {
            const key = prompt("請輸入幹部授權碼：");
            if (key === "CH99forever") alert("驗證成功，幹部功能開發中...");
            else if (key) alert("授權碼錯誤");
        }
    </script>
</body>
</html>
