<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入築心 | 報名表單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-emerald-50">
        <div id="formContainer" class="p-10">
            <h2 class="text-3xl font-bold text-emerald-900 mb-2 text-center">加入築心</h2>
            <p class="text-gray-500 text-center mb-8 text-sm">請填寫下方資訊，開啟您的共讀之旅</p>
            
            <form id="enrollForm" action="https://formspree.io/f/xpqjvblg" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2">真實姓名</label>
                    <input type="text" name="name" required placeholder="您的姓名" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2">聯絡電話</label>
                    <input type="tel" name="phone" required placeholder="手機號碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2">電子郵件</label>
                    <input type="email" name="email" required placeholder="email@example.com" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition">
                </div>
                <button type="submit" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition shadow-lg shadow-emerald-900/20">
                    送出報名資料
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-gray-400 hover:text-emerald-800 font-bold">暫不報名，回主頁</a>
            </div>
        </div>

        <div id="successMessage" class="hidden p-10 text-center animate-fade-in">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-emerald-900 mb-4">報名資料已送出！</h3>
            <p class="text-gray-600 mb-8 leading-relaxed">我們已收到您的申請，<br><span class="font-bold text-emerald-700">我們會儘速與您聯絡。</span></p>
            <a href="index.html" class="inline-block bg-emerald-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-emerald-800 transition">
                回主頁
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById('enrollForm');
        const formContainer = document.getElementById('formContainer');
        const successMessage = document.getElementById('successMessage');

        form.onsubmit = async (e) => {
            e.preventDefault(); // 防止頁面跳轉到 Formspree 的醜網頁
            const formData = new FormData(form);
            
            // 改變按鈕狀態
            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    formContainer.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                } else {
                    alert('抱歉，送出失敗，請稍後再試。');
                    btn.disabled = false;
                    btn.innerText = "送出報名資料";
                }
            } catch (error) {
                alert('網路連線異常，請檢查網路。');
                btn.disabled = false;
                btn.innerText = "送出報名資料";
            }
        };
    </script>
</body>
</html>
