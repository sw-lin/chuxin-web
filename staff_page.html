<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-tools text-orange-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-widest">築心管理系統</span>
            </div>
            <a href="member_zone.html" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/20 text-sm transition">回首頁</a>
        </div>
    </nav>

    <div class="bg-white border-b sticky top-[68px] z-40">
        <div class="max-w-6xl mx-auto flex space-x-8 px-6">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 font-bold tab-active">公告與連結</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 font-bold text-gray-400">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 font-bold text-gray-400">行事曆管理</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <div id="section-news" class="space-y-8">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 公佈欄發布</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500 mb-4"></textarea>
                <button onclick="publishNews()" class="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold">更新公告</button>
            </div>
            
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-link mr-2"></i> 外部連結設定 (導讀/剪影)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">導讀資料庫 URL</label>
                        <input id="link-reading" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">活動剪影 URL</label>
                        <input id="link-photo" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                </div>
                <button onclick="saveLinks()" class="mt-6 bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold">儲存連結設定</button>
            </div>
        </div>

        <div id="section-members" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-sm">
                        <tr>
                            <th class="p-4">姓名/職稱</th>
                            <th class="p-4">手機/Email</th>
                            <th class="p-4">繳費狀態</th>
                            <th class="p-4">操作</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="section-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border mb-6">
                <h3 class="text-xl font-bold mb-6 text-emerald-900">新增活動項目</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="newDate" type="date" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="newTitle" type="text" placeholder="活動標題" class="p-3 bg-gray-50 rounded-xl border">
                    <button onclick="addEvent()" class="bg-orange-600 text-white rounded-xl font-bold">新增活動</button>
                </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold mb-4">簽到碼</h3>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="closeQR()" class="w-full bg-gray-100 py-3 rounded-xl">關閉</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html";
        let allData = {};

        window.onload = () => fetchData();

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                
                // 預填公告與連結
                document.getElementById('newsContent').value = allData.news || '';
                document.getElementById('link-reading').value = allData.config.reading_folder_url || '';
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || '';
                
                renderMembers();
                renderCalendar();
            } catch (e) { alert("讀取失敗"); }
        }

        function switchTab(tab) {
            ['news', 'members', 'calendar'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active', 'text-emerald-900');
                document.getElementById(`tab-${t}`).classList.add('text-gray-400');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'text-emerald-900');
        }

        // --- 會員功能 ---
        function renderMembers() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allData.users.map(u => `
                <tr class="border-t hover:bg-stone-50 transition">
                    <td class="p-4">
                        <div class="font-bold text-emerald-900">${u.name}</div>
                        <div class="text-xs text-gray-400">${u.title || '一般會員'}</div>
                    </td>
                    <td class="p-4 text-sm">
                        <div class="font-mono">${u.phone}</div>
                        <input type="text" value="${u.email}" onchange="updateMember('${u.phone}', 'email', this.value)" class="bg-transparent border-b border-transparent focus:border-emerald-300 outline-none w-full">
                    </td>
                    <td class="p-4">
                        <select onchange="updateMember('${u.phone}', 'paid', this.value)" class="text-sm border rounded p-1 ${u.paid==='是'?'text-emerald-600':'text-orange-600'}">
                            <option value="是" ${u.paid==='是'?'selected':''}>已繳費</option>
                            <option value="否" ${u.paid==='否'?'selected':''}>未繳費</option>
                        </select>
                    </td>
                    <td class="p-4">
                        <button onclick="deleteMember('${u.phone}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // --- 行事曆功能 ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date().setHours(0,0,0,0);
            
            grid.innerHTML = allData.calendar.map(c => {
                const isAvailable = c.dateObj <= (today + 86400000); // 允許當天與過去產生 QR
                return `
                    <div class="bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div>
                            <div class="text-xs font-bold text-orange-500">${c.dateText}</div>
                            <div class="font-bold text-emerald-900">${c.title}</div>
                        </div>
                        <div class="flex space-x-2">
                            ${isAvailable ? 
                                `<button onclick="generateQR('${c.dateText}','${c.title}')" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-xs font-bold">QR</button>` :
                                `<span class="text-gray-300 text-xs italic">尚未開始</span>`
                            }
                            <button onclick="deleteEvent('${c.dateText}')" class="text-gray-300 hover:text-red-500 px-2"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 通用 API 調用 ---
        async function apiPost(payload) {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("操作成功！");
                location.reload();
            } catch (e) { alert("更新失敗"); }
        }

        function publishNews() {
            apiPost({ type: "publish_news", content: document.getElementById('newsContent').value });
        }

        function saveLinks() {
            apiPost({ 
                type: "update_config", 
                reading: document.getElementById('link-reading').value,
                photo: document.getElementById('link-photo').value
            });
        }

        function updateMember(phone, field, value) {
            const newData = {}; newData[field] = value;
            apiPost({ currentPhone: phone, newData: newData });
        }

        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180 });
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    </script>
</body>
</html>
