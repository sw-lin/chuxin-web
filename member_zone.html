<script>
    // 請確保此網址與 index.html 一致
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    let remoteConfig = {};
    let html5QrCode = null;

    // --- 頁面啟動進入點 ---
    window.onload = () => {
        const userStr = sessionStorage.getItem('userInfo');
        if (!userStr) { location.href = 'index.html'; return; }
        const user = JSON.parse(userStr);
        
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userTitle').innerText = user.role || '學員'; // 修正：GAS 欄位為 role

        // 幹部入口顯示邏輯
        const t = String(user.role || "").trim();
        if (t !== "" && t !== "學員") {
            document.getElementById('adminEntry').classList.remove('hidden');
        }
        syncData(); // 執行同步資料
    };

    // --- 核心功能：跨平台建立日曆連結 (預設 09:30 - 12:00) ---
    function createCalendarLink(ev) {
        if (!ev || !ev.date) return;
        const title = "築心讀書會：" + ev.title;
        const desc = "歡迎準時參加導讀分享";
        const cleanDate = ev.date.replace(/-/g, ''); // 轉為 YYYYMMDD
        const startStr = cleanDate + "T093000";
        const endStr = cleanDate + "T120000";

        // 判斷是否為 iOS 裝置
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
            // iPhone 使用 ICS 檔案下載
            const ics = [
                "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT",
                "DTSTART:" + startStr, "DTEND:" + endStr, "SUMMARY:" + title,
                "DESCRIPTION:" + desc, "LOCATION:築心會館", "END:VEVENT", "END:VCALENDAR"
            ].join("\r\n");
            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'event.ics');
            link.click();
        } else {
            // Android / 電腦 使用 Google Calendar 連結
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent(desc)}&sf=true&output=xml`;
            window.open(url, '_blank');
        }
    }

    // --- 同步資料與更新 UI ---
    async function syncData() {
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            const cachedUser = JSON.parse(sessionStorage.getItem('userInfo'));
            
            // 1. 公告更新 (對齊 GAS news 欄位)
            document.getElementById('news').innerText = data.news || "歡迎參加讀書會";

            const today = new Date();
            today.setHours(0,0,0,0);

            // 2. 處理近期活動 (顯示 2 則，含加入日曆功能)
            const allEvents = data.events || [];
            const upcoming = allEvents
                .filter(ev => new Date(ev.date) >= today)
                .sort((a,b) => new Date(a.date) - new Date(b.date))
                .slice(0, 2); // 依要求顯示兩則

            const nextCard = document.getElementById('nextEventCard');
            if (upcoming.length > 0) {
                const next = upcoming[0];
                const d = new Date(next.date);
                nextCard.classList.remove('hidden');
                document.getElementById('nextMonth').innerText = d.toLocaleString('en', {month:'short'});
                document.getElementById('nextDay').innerText = d.getDate();
                document.getElementById('nextTitle').innerText = next.title;
                document.getElementById('calBtn').onclick = () => createCalendarLink(next);
            }

            // 3. 處理學習歷程與出席率
            const pastEvents = allEvents.filter(ev => new Date(ev.date) < today);
            const myCount = cachedUser.attCount || 0;
            const percent = pastEvents.length > 0 ? Math.round((myCount / pastEvents.length) * 100) : 0;

            document.getElementById('attPercent').innerText = percent + "%";
            document.getElementById('attCountDisplay').innerHTML = `${myCount} <span class="text-lg opacity-40">/ ${pastEvents.length}</span>`;
            document.getElementById('progressBar').style.width = percent + "%";
            
            // 4. 渲染歷史列表
            renderHistory(pastEvents, cachedUser.attendLog || []);

            remoteConfig = data.config || {};
        } catch (e) { 
            console.error("同步失敗", e); 
            document.getElementById('news').innerText = "連線失敗，請檢查網路或重新登入";
        }
    }

    function renderHistory(pastEvents, myLogs) {
        const list = document.getElementById('historyList');
        const cleanLogs = (myLogs || []).map(log => String(log).trim());
        list.innerHTML = pastEvents.slice().reverse().map(ev => {
            const isAttended = cleanLogs.includes(ev.date);
            return `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border ${isAttended ? 'border-emerald-100 bg-emerald-50/50' : 'border-transparent'}">
                    <div class="flex items-center space-x-4">
                        <div class="text-xs font-bold ${isAttended ? 'text-emerald-500' : 'text-gray-400'}">${ev.date}</div>
                        <div class="font-bold text-emerald-900">${ev.title}</div>
                    </div>
                    <div>
                        ${isAttended ? '<span class="text-emerald-600 text-xs font-bold bg-emerald-100 px-3 py-1 rounded-full">已出席</span>' : '<span class="text-gray-300 text-xs italic">未出席</span>'}
                    </div>
                </div>`;
        }).join('');
    }

    // --- 修改資料、掃描與登出邏輯 ---
    function openRemoteLink(key) {
        const url = remoteConfig[key];
        if (url && url.startsWith('http')) window.open(url, '_blank');
        else alert("連結尚未設定");
    }

    async function submitUpdate() {
        const user = JSON.parse(sessionStorage.getItem('userInfo'));
        const oldP = document.getElementById('oldPassword').value.trim();
        const newP = document.getElementById('newPassword').value.trim();
        const email = document.getElementById('editEmail').value.trim();
        if (btoa(oldP) !== String(user.password).trim()) { alert("❌ 原密碼驗證錯誤"); return; }
        const btn = document.getElementById('updateBtn');
        btn.disabled = true; btn.innerText = "處理中...";
        let payload = { email: email };
        if (newP !== "") payload.password = btoa(newP);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'updateProfile', currentPhone: user.phone, newData: payload }) });
            alert("修改成功，請重新登入");
            logout();
        } catch (e) { alert("連線失敗"); btn.disabled = false; btn.innerText = "更新"; }
    }

    function startScanner() {
        document.getElementById('scannerModal').classList.remove('hidden');
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            stopScanner(); window.location.href = text;
        }).catch(() => stopScanner());
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().finally(() => {
                document.getElementById('scannerModal').classList.add('hidden');
                html5QrCode = null;
            });
        } else { document.getElementById('scannerModal').classList.add('hidden'); }
    }

    function openEditModal() {
        const user = JSON.parse(sessionStorage.getItem('userInfo'));
        document.getElementById('editEmail').value = user.email || '';
        document.getElementById('editProfileModal').classList.remove('hidden');
    }

    function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }
    function logout() { sessionStorage.clear(); location.href = 'index.html'; }
</script>
