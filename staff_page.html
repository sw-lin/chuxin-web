<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; opacity: 0; transition: opacity 0.5s; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none !important; }
        .edit-mode-active { border-color: #F97316 !important; color: #F97316 !important; background-color: #FFF7ED; }
    </style>
</head>
<body id="adminBody" class="pb-12">

    <header class="admin-gradient text-white py-6 px-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center"><i class="fas fa-shield-alt mr-3"></i> 築心管理系統</h1>
            <button id="editToggleBtn" onclick="toggleEditMode()" class="flex items-center gap-2 px-4 py-1.5 bg-white/20 rounded-full font-bold text-sm hover:bg-white/30 transition">
                <i class="fas fa-edit"></i> <span>編輯模式：關</span>
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-0 z-40 mb-6 border-b overflow-x-auto">
        <div class="max-w-6xl mx-auto flex px-4">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 px-6 font-medium tab-active whitespace-nowrap">公告與 LINE</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 px-6 text-gray-500 font-medium whitespace-nowrap">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 px-6 text-gray-500 font-medium whitespace-nowrap">行事曆</button>
            <button onclick="switchTab('payment')" id="tab-payment" class="py-4 px-6 text-gray-500 font-medium whitespace-nowrap">繳費狀況</button>
            <button onclick="switchTab('attendance')" id="tab-attendance" class="py-4 px-6 text-gray-500 font-medium whitespace-nowrap">出席紀錄</button>
            <button onclick="switchTab('system')" id="tab-system" class="py-4 px-6 text-gray-500 font-medium whitespace-nowrap">系統設定</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <section id="sec-news" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border">
                <h3 class="text-lg font-bold mb-4 text-emerald-900">首頁公告</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 border rounded-xl outline-none"></textarea>
                <button onclick="apiPost({type:'publish_news', content:document.getElementById('newsContent').value})" class="mt-4 bg-emerald-700 text-white px-8 py-2 rounded-xl">發布</button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border">
                <h3 class="text-lg font-bold mb-4 text-emerald-900">LINE 群組推播</h3>
                <textarea id="pushMsg" rows="3" class="w-full p-4 bg-gray-50 border rounded-xl mb-4 outline-none" placeholder="輸入訊息..."></textarea>
                <button onclick="apiPost({type:'send_line_push', content:document.getElementById('pushMsg').value})" class="bg-emerald-600 text-white px-8 py-2 rounded-xl">發送至 LINE</button>
            </div>
        </section>

        <section id="sec-members" class="hidden space-y-6">
            <div id="quickAddZone" class="hidden bg-orange-50 rounded-2xl p-6 border-2 border-orange-200">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="mName" placeholder="姓名" class="p-2 border rounded-lg">
                    <input type="text" id="mPhone" placeholder="電話" class="p-2 border rounded-lg">
                    <input type="text" id="mEmail" placeholder="Email" class="p-2 border rounded-lg">
                    <button onclick="addMember()" class="bg-orange-600 text-white py-2 rounded-lg font-bold">確認新增</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border">
                <table class="w-full text-left"><thead class="bg-emerald-50"><tr><th class="p-4">姓名</th><th class="p-4">電話</th><th class="p-4">Email</th><th class="p-4 text-right edit-col hidden">操作</th></tr></thead><tbody id="memberList"></tbody></table>
            </div>
        </section>

        <section id="sec-calendar" class="hidden space-y-6">
            <div id="calAddZone" class="hidden bg-orange-50 rounded-2xl p-6 border-2 border-orange-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="date" id="calDate" class="p-2 border rounded-lg">
                    <input type="text" id="calTitle" placeholder="活動主題" class="p-2 border rounded-lg">
                    <button onclick="addEvent()" class="bg-orange-600 text-white py-2 rounded-lg font-bold">建立活動</button>
                </div>
            </div>
            <div id="calendarContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-payment" class="hidden space-y-6">
            <div id="paymentAddZone" class="hidden bg-orange-50 rounded-2xl p-6 border-2 border-orange-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="payTitle" placeholder="收費項目名稱" class="p-2 border rounded-lg">
                    <input type="date" id="payDeadline" class="p-2 border rounded-lg">
                    <button onclick="apiPost({type:'add_payment_item', title:document.getElementById('payTitle').value, deadline:document.getElementById('payDeadline').value})" class="bg-orange-600 text-white py-2 rounded-lg font-bold">建立收費單</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border">
                <div class="flex flex-col md:flex-row justify-between mb-6 gap-4 border-b pb-4">
                    <h3 class="font-bold text-lg">項目：<select id="currentPayItem" onchange="renderPayment()" class="ml-2 bg-emerald-50 border px-3 py-1 rounded-lg outline-none"></select></h3>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="copyPaymentToLine()" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-sm font-bold"><i class="fab fa-line mr-1"></i>產生繳費名單至 LINE</button>
                        <div id="batchZone" class="hidden flex gap-2">
                            <button onclick="batchUpdatePayment('已完成')" class="bg-emerald-600 text-white px-4 py-2 rounded-full text-sm font-bold">全部清為已繳</button>
                            <button onclick="batchUpdatePayment('未繳納')" class="bg-red-600 text-white px-4 py-2 rounded-full text-sm font-bold">全部清為未繳</button>
                        </div>
                    </div>
                </div>
                <div id="paymentList" class="space-y-2"></div>
            </div>
        </section>

        <section id="sec-attendance" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm p-6 border">
                <table class="w-full text-left text-sm"><thead class="bg-gray-50"><tr><th class="p-4">日期</th><th class="p-4">姓名</th><th class="p-4">簽到時間</th></tr></thead><tbody id="attendanceList"></tbody></table>
            </div>
        </section>

        <section id="sec-system" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border">
                <div class="space-y-4">
                    <div><label class="block text-sm font-bold mb-1">導讀資料夾網址</label><input type="text" id="cfg-reading" class="w-full p-2 bg-gray-50 border rounded-lg"></div>
                    <div><label class="block text-sm font-bold mb-1">相簿網址</label><input type="text" id="cfg-photo" class="w-full p-2 bg-gray-50 border rounded-lg"></div>
                    <button onclick="apiPost({type:'update_config', reading:document.getElementById('cfg-reading').value, photo:document.getElementById('cfg-photo').value})" class="bg-emerald-800 text-white px-8 py-2 rounded-xl font-bold">儲存</button>
                </div>
            </div>
        </section>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50" onclick="this.classList.add('hidden')">
        <div class="bg-white p-8 rounded-3xl text-center" onclick="event.stopPropagation()">
            <div id="qrcode" class="mb-4"></div>
            <p id="qrText" class="font-bold text-lg"></p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; // <--- 💡 務必替換成部署後的網址
        let ADMIN_KEY = "";
        let allData = null;
        let isEditMode = false;

        async function init() {
            const key = prompt("管理驗證金鑰：");
            if (!key) { window.location.reload(); return; }
            ADMIN_KEY = key;
            await fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "get_all_data", adminKey: ADMIN_KEY })
                });
                const result = await response.text();
                
                if (result === "WRONG_KEY") { alert("金鑰錯誤！"); window.location.reload(); return; }
                allData = JSON.parse(result);
                renderAll();
                document.body.style.opacity = "1";
            } catch (e) {
                alert("連線失敗，請檢查 GAS 網址或網路狀態");
                console.error(e);
            }
        }

        function switchTab(tab) {
            if(isEditMode) toggleEditMode(); // 切換分頁自動關閉編輯模式
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('editToggleBtn').querySelector('span').innerText = isEditMode ? "編輯模式：開" : "編輯模式：關";
            document.getElementById('editToggleBtn').classList.toggle('edit-mode-active', isEditMode);
            
            document.getElementById('quickAddZone').classList.toggle('hidden', !isEditMode);
            document.getElementById('calAddZone').classList.toggle('hidden', !isEditMode);
            document.getElementById('paymentAddZone').classList.toggle('hidden', !isEditMode);
            document.getElementById('batchZone').classList.toggle('hidden', !isEditMode);
            
            document.querySelectorAll('.edit-col').forEach(el => el.classList.toggle('hidden', !isEditMode));
            renderAll();
        }

        function renderAll() {
            if (!allData) return;
            document.getElementById('newsContent').value = allData.news || "";
            
            // 會員渲染
            document.getElementById('memberList').innerHTML = allData.users.map(u => `
                <tr class="border-b">
                    <td class="p-4 font-bold">${u.name}<br><span class="text-xs text-emerald-600">${u.title||'學員'}</span></td>
                    <td class="p-4 text-sm">${u.phone}</td>
                    <td class="p-4 text-xs text-gray-400">${u.email||''}</td>
                    <td class="p-4 text-right edit-col ${isEditMode?'':'hidden'}">
                        <button onclick="deleteMember('${u.phone}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');

            // 行事曆渲染 (修正版)
            const today = new Date().setHours(0,0,0,0);
            document.getElementById('calendarContainer').innerHTML = allData.calendar.map(ev => {
                const evDate = new Date(ev.dateText).getTime();
                const canCheckin = evDate <= today; // 判斷是否為「非未來」事件
                return `
                <div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center">
                    <div>
                        <div class="text-emerald-600 font-mono text-sm">${ev.dateText}</div>
                        <div class="font-bold text-lg">${ev.title}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        ${canCheckin ? `<button onclick="showQR('${ev.dateText}')" class="text-emerald-600 text-xl"><i class="fas fa-qrcode"></i></button>` : `<span class="text-gray-300 text-xs italic">尚未開始</span>`}
                        <button onclick="deleteEvent('${ev.dateText}')" class="text-red-300 hover:text-red-500 ${isEditMode?'':'hidden'}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            }).join('');

            // 繳費項目下拉選單
            const paySelect = document.getElementById('currentPayItem');
            const currentVal = paySelect.value;
            paySelect.innerHTML = allData.paymentItems.map(it => `<option value="${it.title}" ${it.title===currentVal?'selected':''}>${it.title}</option>`).join('');
            renderPayment();

            // 出席紀錄
            document.getElementById('attendanceList').innerHTML = (allData.attendanceRaw || []).map(row => `
                <tr class="border-b"><td class="p-4">${row[0]}</td><td class="p-4 font-bold">${row[2]}</td><td class="p-4 text-gray-400 text-xs">${row[3]?new Date(row[3]).toLocaleTimeString():''}</td></tr>`).join('');
        }

        function renderPayment() {
            const activeItem = document.getElementById('currentPayItem').value;
            const container = document.getElementById('paymentList');
            if(!activeItem) { container.innerHTML = "尚未建立收費項目"; return; }

            container.innerHTML = allData.users.map(u => {
                const record = allData.paymentRecords.find(r => r.title === activeItem && r.phone === u.phone);
                const status = record ? record.status : "未繳納";
                return `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl">
                    <span class="font-bold">${u.name}</span>
                    <button onclick="updatePayment('${u.phone}', '${activeItem}', '${status}')" 
                        class="px-6 py-1 rounded-full text-xs font-bold transition ${status==='已完成'?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-500'}">
                        ${status}
                    </button>
                </div>`;
            }).join('');
        }

        async function batchUpdatePayment(newStatus) {
            const item = document.getElementById('currentPayItem').value;
            if(!item || !confirm(`確定將「${item}」全部設為 ${newStatus} 嗎？`)) return;
            
            // 由於 GAS 配額與連線限制，這裡建議分批發送，或告知使用者需等待
            alert("正在批次處理，請勿關閉視窗...");
            for(let u of allData.users) {
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify({
                    type: "update_payment_record", adminKey: ADMIN_KEY, phone: u.phone, title: item, status: newStatus
                })});
            }
            alert("批次處理完成！");
            fetchData();
        }

        function copyPaymentToLine() {
            const item = document.getElementById('currentPayItem').value;
            let text = `【築心讀書會 - ${item} 繳納統計】\n`;
            let paid = [], unpaid = [];
            allData.users.forEach(u => {
                const rec = allData.paymentRecords.find(r => r.title === item && r.phone === u.phone);
                (rec && rec.status === '已完成') ? paid.push(u.name) : unpaid.push(u.name);
            });
            text += `✅ 已繳名單：\n${paid.join('、') || '暫無'}\n\n❌ 待繳人員：\n${unpaid.join('、') || '暫無'}`;
            navigator.clipboard.writeText(text).then(() => alert("統計名單已複製到剪貼簿，請至 LINE 貼上"));
        }

        function showQR(date) {
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: date, width: 200, height: 200 });
            document.getElementById('qrText').innerText = date + " 簽到專用碼";
            document.getElementById('qrModal').classList.remove('hidden');
        }

        async function apiPost(data) {
            data.adminKey = ADMIN_KEY;
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            if ((await res.text()) === "SUCCESS") fetchData();
        }

        // 會員與事件的具體 API 呼叫 (補充範例)
        function addMember() {
            apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value, password: "123" });
        }
        function deleteMember(phone) { if(confirm("確定刪除？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(date) { if(confirm("確定刪除活動？")) apiPost({ type: "delete_event", date: date }); }
        function updatePayment(phone, title, current) {
            const next = current === '已完成' ? '未繳納' : '已完成';
            apiPost({ type: "update_payment_record", phone: phone, title: title, status: next });
        }

        window.onload = init;
    </script>
</body>
</html>
