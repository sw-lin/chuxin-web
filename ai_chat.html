<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://lf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.1.0-beta.0/libs/oversea/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        async function fetchToken() {
            try {
                // 這是您剛才在 Cloudflare 部署成功的網址
                const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
                const data = await response.json();
                return data.token;
            } catch (error) {
                console.error("領取 Token 失敗:", error);
            }
        }

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 嘗試抓取 SDK 物件（相容不同版本的命名）
            const CozeSDK = window.CozeWebChat || window.CozeWebSDK;

            if (CozeSDK) {
                new CozeSDK.Client({
                    config: { 
                        bot_id: '7620394792719499317' 
                    },
                    componentProps: {
                        title: '築心智慧管家',
                        layout: 'pc',
                        initial_variables: {
                            user_name: urlParams.get('user_name') || '訪客',
                            user_phone: urlParams.get('user_phone') || ''
                        }
                    },
                    auth: {
                        type: "token",
                        getAccessToken: fetchToken 
                    },
                    el: document.getElementById('chat-container'),
                });
            } else {
                // 這是您在截圖 13 看到的訊息來源
                document.body.innerHTML = "<h2 style='padding:20px;'>組件連線逾時，正在嘗試重新載入，請稍候...</h2>";
                // 3 秒後自動重整頁面嘗試修復
                setTimeout(() => { location.reload(); }, 3000);
            }
        });
    </script>
</body>
</html>
