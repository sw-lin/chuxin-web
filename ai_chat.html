<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; }
        /* 讓 iframe 鋪滿整個頁面或指定區域 */
        #chat-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

<iframe
    id="chat-container"
    src="https://udify.app/chatbot/ERNQLHGG3QKClfr7?phone="
    allow="microphone">
</iframe>

<script>
    // 這段腳本如果被擋，iframe 仍會顯示，只是電話號碼無法自動帶入
    (function() {
        var phone = new URLSearchParams(window.location.search).get('phone') || "";
        var iframe = document.getElementById('chat-container');
        if (phone) {
            iframe.src = "https://udify.app/chatbot/ERNQLHGG3QKClfr7?user_phone=" + encodeURIComponent(phone);
        }
    })();
</script>

</body>
</html>
