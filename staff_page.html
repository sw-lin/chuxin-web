<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-disabled { background-color: #F3F4F6 !important; color: #D1D5DB !important; cursor: not-allowed; border: 1px solid #E5E7EB; }
        /* 載入動畫樣式 */
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #065F46; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-tools text-orange-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-widest">築心管理系統</span>
            </div>
            <a href="member_zone.html" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/20 text-sm transition">回個人專區</a>
        </div>
    </nav>

    <div class="bg-white border-b sticky top-[68px] z-40">
        <div class="max-w-6xl mx-auto flex space-x-8 px-6 overflow-x-auto">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 font-bold tab-active text-emerald-900 whitespace-nowrap">公告與連結</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 font-bold text-gray-400 whitespace-nowrap">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 font-bold text-gray-400 whitespace-nowrap">行事曆管理</button>
            <button onclick="switchTab('rank')" id="tab-rank" class="py-4 font-bold text-gray-400 whitespace-nowrap">數據排行榜</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <div id="section-news" class="space-y-8">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 公佈欄發布</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500 mb-4" placeholder="輸入最新公告內容..."></textarea>
                <button id="btn-publishNews" onclick="publishNews()" class="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-900 transition shadow-md">更新公告</button>
            </div>
            
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-link mr-2"></i> 外部連結設定</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">導讀資料庫 URL</label>
                        <input id="link-reading" type="text" class="w-full p-3 bg-gray-50 rounded-xl border focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">活動剪影 URL</label>
                        <input id="link-photo" type="text" class="w-full p-3 bg-gray-50 rounded-xl border focus:border-emerald-500 outline-none">
                    </div>
                </div>
                <button id="btn-saveLinks" onclick="saveLinks()" class="mt-6 bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-700 transition shadow-md">儲存連結設定</button>
            </div>
        </div>

        <div id="section-members" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-user-plus mr-2"></i> 加入新成員</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="add-name" type="text" placeholder="姓名" class="p-3 bg-gray-50 rounded-xl border outline-none">
                    <input id="add-phone" type="text" placeholder="手機 (例: 0912...)" class="p-3 bg-gray-50 rounded-xl border outline-none">
                    <input id="add-pass" type="text" placeholder="初始密碼" class="p-3 bg-gray-50 rounded-xl border outline-none">
                    <button id="btn-addMember" onclick="addMember()" class="bg-emerald-700 text-white rounded-xl font-bold hover:bg-emerald-800 transition">確認新增</button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-600 text-sm">
                            <tr>
                                <th class="p-4">姓名 / 職稱</th>
                                <th class="p-4">手機與電子郵件</th>
                                <th class="p-4">繳費</th>
                                <th class="p-4 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="section-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-calendar-plus mr-2"></i> 新增讀書會活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">活動日期</label>
                        <input id="newDate" type="date" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">活動名稱</label>
                        <input id="newTitle" type="text" placeholder="例：期末結業式" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                    </div>
                    <div class="flex items-center space-x-2 pb-3 px-2">
                        <input id="newNeedCheckin" type="checkbox" class="w-5 h-5 accent-emerald-600 cursor-pointer">
                        <label for="newNeedCheckin" class="text-sm font-bold text-gray-600 cursor-pointer">產生報到 QR</label>
                    </div>
                    <button id="btn-addEvent" onclick="addEvent()" class="bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition shadow-md">加入行事曆</button>
                </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="section-rank" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold text-emerald-900"><i class="fas fa-award mr-2"></i> 出勤參與度排行榜</h3>
                    <button onclick="resetAttendance()" class="text-xs text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg border border-red-100 transition">
                        <i class="fas fa-redo-alt mr-1"></i> 期末清除報到紀錄
                    </button>
                </div>
                <div id="rankList" class="space-y-4"></div>
            </div>
        </div>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
            <h3 id="qrTitle" class="text-xl font-bold mb-1 text-emerald-900">活動簽到</h3>
            <p id="qrDate" class="text-sm text-gray-400 mb-6"></p>
            <div id="qrcode" class="flex justify-center mb-8 border-4 border-emerald-50 p-2 rounded-3xl bg-white"></div>
            <button onclick="closeQR()" class="w-full bg-gray-100 py-4 rounded-2xl font-bold text-gray-600 hover:bg-gray-200 transition">關閉窗口</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html";
        let allData = { users: [], calendar: [], config: {}, news: "" };

        window.onload = fetchData;

        // 全型轉半型輔助函式
        function toHalfWidth(str) {
            return str.replace(/[\uFF01-\uFF5E]/g, function(ch) {
                return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
            }).replace(/\u3000/g, " "); // 處理全型空格
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                document.getElementById('newsContent').value = allData.news || '';
                document.getElementById('link-reading').value = allData.config.reading_folder_url || '';
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || '';
                renderAll();
            } catch (e) { alert("連線失敗"); }
        }

        function renderAll() {
            renderMembers();
            renderCalendar();
            renderRank();
        }

        function switchTab(tab) {
            ['news', 'members', 'calendar', 'rank'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.replace('text-emerald-900', 'text-gray-400');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.replace('text-gray-400', 'text-emerald-900');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            renderAll(); // 切換時確保同步渲染
        }

        function renderMembers() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allData.users.map(u => `
                <tr class="border-t hover:bg-emerald-50/30 transition">
                    <td class="p-4">
                        <div class="font-bold text-emerald-900 mb-1">${u.name}</div>
                        <input type="text" value="${u.title || ''}" onchange="updateMember('${u.phone}', 'title', this.value)" 
                            class="text-xs text-gray-400 bg-transparent border-b border-dashed border-gray-200 outline-none w-full">
                    </td>
                    <td class="p-4 text-sm font-mono text-gray-600">${u.phone}</td>
                    <td class="p-4">
                        <select onchange="updateMember('${u.phone}', 'paid', this.value)" class="text-xs border rounded p-1 font-bold">
                            <option value="是" ${u.paid==='是'?'selected':''}>已繳費</option>
                            <option value="否" ${u.paid==='否'?'selected':''}>未繳費</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            today.setHours(0,0,0,0);
            grid.innerHTML = allData.calendar.map(c => {
                const needsQR = (c.description === "需報到");
                const eventDate = new Date(c.dateText);
                eventDate.setHours(0,0,0,0);
                const isFuture = eventDate > today;
                return `
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-center hover:shadow-md transition">
                    <div>
                        <div class="text-xs font-bold text-orange-500 mb-1">${c.dateText}</div>
                        <div class="font-bold text-emerald-900">${c.title}</div>
                        ${needsQR ? '<span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-md mt-1 inline-block font-bold">需報到</span>' : ''}
                    </div>
                    <div class="flex items-center space-x-3">
                        ${needsQR ? 
                            `<button onclick="${isFuture ? "alert('活動日期未到，無法提早產生簽到碼')" : `generateQR('${c.dateText}','${c.title}')`}" 
                                class="px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition ${isFuture ? 'btn-disabled' : 'bg-emerald-600 text-white hover:bg-emerald-700'}">
                                <i class="fas fa-qrcode mr-1"></i>${isFuture ? '未開啟' : '簽到碼'}
                            </button>` : `<span class="text-gray-300 text-[10px] italic pr-2">純記錄</span>`
                        }
                        <button onclick="deleteEvent('${c.dateText}')" class="text-gray-300 hover:text-red-500 px-2 transition"><i class="fas fa-times text-lg"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderRank() {
            const list = document.getElementById('rankList');
            const sorted = [...allData.users].sort((a, b) => b.attCount - a.attCount);
            list.innerHTML = sorted.map((u, index) => `
                <div class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl border border-transparent">
                    <div class="flex items-center space-x-4">
                        <span class="font-bold w-6 text-center text-gray-400">${index + 1}</span>
                        <div><div class="font-bold text-emerald-900 text-sm">${u.name}</div></div>
                    </div>
                    <div class="text-lg font-bold text-emerald-600">${u.attCount} <span class="text-[10px] text-gray-400">次</span></div>
                </div>`).join('');
        }

        // 核心 API 通訊函式 (加入按鈕鎖定功能)
        async function apiPost(payload, btnId, successCallback) {
            const btn = document.getElementById(btnId);
            const originalText = btn ? btn.innerHTML : "";
            if (btn) {
                btn.disabled = true;
                btn.classList.add('btn-disabled');
                btn.innerHTML = `<span class="loading-spinner"></span>處理中...`;
            }

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const txt = await res.text();
                if(txt.includes("OK") || txt.includes("SUCCESS") || txt.includes("DELETED")) {
                    alert("操作成功！");
                    if (successCallback) successCallback();
                    else location.reload();
                } else { alert("錯誤回應: " + txt); }
            } catch (e) { 
                alert("連線失敗，請檢查網路狀態"); 
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.classList.remove('btn-disabled');
                    btn.innerHTML = originalText;
                }
            }
        }

        function addMember() {
            let n = document.getElementById('add-name').value.trim();
            let p = document.getElementById('add-phone').value.trim();
            let s = document.getElementById('add-pass').value.trim();

            // 1. 自動轉換全型到半型
            p = toHalfWidth(p);
            s = toHalfWidth(s);

            // 2. 基本校驗
            if(!n || !p || !s) return alert("請完整填寫姓名、手機與密碼");
            if(p.length < 10) return alert("手機號碼格式不正確，請檢查是否有漏字");

            // 3. 送出資料
            apiPost({ type: "add_member", name: n, phone: `'${p}`, password: btoa(s) }, "btn-addMember");
        }

        function deleteMember(phone) {
            if(confirm("確定刪除此成員？")) {
                apiPost({ type: "delete_member", currentPhone: phone }, null, () => {
                    // 靜默刪除：直接過濾本地陣列，重新渲染
                    allData.users = allData.users.filter(u => u.phone !== phone);
                    renderAll();
                });
            }
        }

        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }, "btn-publishNews"); }
        function saveLinks() { apiPost({ type: "update_config", reading: document.getElementById('link-reading').value, photo: document.getElementById('link-photo').value }, "btn-saveLinks"); }
        function updateMember(phone, field, value) { const newData = {}; newData[field] = value; apiPost({ type: "update_member", currentPhone: phone, newData: newData }); }
        
        function addEvent() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newTitle').value;
            const c = document.getElementById('newNeedCheckin').checked;
            if(!d || !t) return alert("請填寫日期與標題");
            apiPost({ type: "add_event", date: d, title: t, needCheckin: c }, "btn-addEvent");
        }

        function deleteEvent(date) { 
            if(confirm(`確定刪除 ${date} 的活動？`)) {
                apiPost({ type: "delete_event", date: date }, null, () => {
                    allData.calendar = allData.calendar.filter(c => c.dateText !== date);
                    renderAll();
                });
            }
        }

        function resetAttendance() { if(confirm("確定清空所有報到紀錄？")) apiPost({ type: "reset_attendance" }); }

        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 200, height: 200, colorDark : "#064E3B", colorLight : "#ffffff" });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    </script>
</body>
</html>
