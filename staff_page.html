<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F4F7F5; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .menu-item.active { background-color: #064E3B; color: white; border-radius: 12px; }
        .text-huge { font-size: 1.3rem; line-height: 1.6; }
        .list-card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e5e7eb; }
        /* 隱藏需要編輯模式才能看到的元素 */
        .edit-only { display: none !important; }
        .edit-mode-active .edit-only { display: block !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl z-[60] sidebar -translate-x-full">
        <div class="p-8">
            <h2 class="text-3xl font-bold text-emerald-900 mb-8">功能選單</h2>
            <nav class="space-y-2">
                <button onclick="switchTab('news', '公告欄管理')" class="menu-item active w-full text-left p-4 flex items-center text-xl"><i class="fas fa-bullhorn mr-4 w-8"></i>公告欄</button>
                <button onclick="switchTab('line', 'Line 訊息發送')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fab fa-line mr-4 w-8"></i>Line 訊息</button>
                <button onclick="switchTab('members', '會員名冊管理')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-users mr-4 w-8"></i>會員名冊</button>
                <button onclick="switchTab('calendar', '行事曆管理')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-calendar-alt mr-4 w-8"></i>行事曆</button>
                <hr class="my-2">
                <button onclick="switchTab('attendance', '出席紀錄查詢')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-clipboard-check mr-4 w-8"></i>出席紀錄</button>
                <button onclick="switchTab('payments', '繳費紀錄管理')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-hand-holding-usd mr-4 w-8"></i>繳費紀錄</button>
                <button onclick="switchTab('signup', '活動報名清單')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-edit mr-4 w-8"></i>活動報名</button>
                <hr class="my-2">
                <button onclick="switchTab('system', '系統設定管理')" class="menu-item w-full text-left p-4 flex items-center text-xl"><i class="fas fa-cog mr-4 w-8"></i>系統設定</button>
            </nav>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-[50] hidden"></div>

    <header class="bg-white border-b sticky top-0 z-40 px-6 h-24 flex items-center justify-between">
        <div class="flex items-center">
            <button onclick="toggleMenu()" class="text-emerald-900 text-4xl mr-5 p-2"><i class="fas fa-bars"></i></button>
            <span id="current-title" class="font-bold text-2xl text-emerald-900">公告欄管理</span>
        </div>
        <a href="member_zone.html" class="bg-emerald-50 text-emerald-700 px-6 py-3 rounded-full font-bold text-lg border border-emerald-200">
            <i class="fas fa-external-link-alt mr-1"></i> 查看前台
        </a>
    </header>

    <main class="max-w-5xl mx-auto p-6 md:p-10">
        
        <section id="sec-news" class="tab-content active">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <textarea id="input-news" rows="5" class="w-full bg-gray-50 p-6 rounded-3xl text-2xl outline-none border-2 border-transparent focus:border-emerald-200"></textarea>
                <button onclick="updateNews()" class="w-full mt-6 bg-emerald-800 text-white py-6 rounded-2xl font-bold text-2xl">更新公告</button>
            </div>
        </section>

        <section id="sec-line" class="tab-content">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <textarea id="line-msg" rows="10" class="w-full bg-blue-50/50 p-6 rounded-3xl text-2xl outline-none border-2 border-transparent focus:border-blue-400" placeholder="輸入要發送的 Line 內容..."></textarea>
                <button onclick="saveLineMsg()" class="w-full mt-6 bg-[#06C755] text-white py-6 rounded-2xl font-bold text-2xl shadow-lg">發送 Line 群組</button>
            </div>
        </section>

        <section id="sec-members" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-400">名冊清單</h3>
                <button onclick="toggleSectionEdit('sec-members')" class="text-orange-600 font-bold border border-orange-200 px-4 py-2 rounded-lg bg-orange-50">
                    <i class="fas fa-lock"></i> 編輯開關
                </button>
            </div>
            <div class="edit-only bg-orange-100 p-6 rounded-[2rem] mb-6 border-2 border-orange-200">
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="mName" placeholder="姓名" class="p-4 rounded-xl text-xl">
                    <input type="tel" id="mPhone" placeholder="手機" class="p-4 rounded-xl text-xl">
                    <input type="email" id="mEmail" placeholder="Email" class="p-4 rounded-xl text-xl">
                    <button onclick="addMember()" class="bg-orange-600 text-white py-4 rounded-xl font-bold text-xl">新增至名冊</button>
                </div>
            </div>
            <div id="memberList" class="space-y-3"></div>
        </section>

        <section id="sec-calendar" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-400">活動時程</h3>
                <button onclick="toggleSectionEdit('sec-calendar')" class="text-orange-600 font-bold border border-orange-200 px-4 py-2 rounded-lg bg-orange-50">
                    <i class="fas fa-lock"></i> 編輯開關
                </button>
            </div>
            <div class="edit-only bg-emerald-100 p-6 rounded-[2rem] mb-6 border-2 border-emerald-200">
                <input type="date" id="calDate" class="w-full p-4 rounded-xl text-xl mb-3">
                <input type="text" id="calTitle" placeholder="活動標題" class="w-full p-4 rounded-xl text-xl mb-3">
                <button onclick="addEvent()" class="w-full bg-emerald-800 text-white py-4 rounded-xl font-bold text-xl">新增活動</button>
            </div>
            <div id="eventList" class="space-y-3"></div>
        </section>

        <section id="sec-attendance" class="tab-content"><div class="text-center p-20 text-gray-400 text-2xl">出席紀錄功能載入中...</div></section>
        <section id="sec-payments" class="tab-content"><div class="text-center p-20 text-gray-400 text-2xl">繳費紀錄功能載入中...</div></section>
        <section id="sec-signup" class="tab-content"><div class="text-center p-20 text-gray-400 text-2xl">活動報名功能載入中...</div></section>

        <section id="sec-system" class="tab-content">
            <div class="bg-white p-8 rounded-[2.5rem] border space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold text-emerald-800">網址設定</h3>
                    <button id="systemLockBtn" onclick="unlockSystem()" class="text-sm bg-gray-100 px-4 py-2 rounded-lg">點此解除鎖定</button>
                </div>
                <input type="text" id="conf-reading" disabled class="w-full p-5 rounded-2xl text-xl border bg-gray-100 opacity-50">
                <input type="text" id="conf-photo" disabled class="w-full p-5 rounded-2xl text-xl border bg-gray-100 opacity-50">
                <button id="systemSaveBtn" onclick="saveSystemConfig()" disabled class="w-full bg-gray-300 text-white py-6 rounded-2xl font-bold text-2xl cursor-not-allowed">更新連結</button>
            </div>
        </section>

    </main>
<div id="loadingOverlay" class="fixed inset-0 bg-black/30 z-[200] hidden flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-emerald-800 mb-4"></div>
        <p class="text-2xl font-bold text-emerald-900">同步資料中...</p>
        <p class="text-gray-500 mt-2">請稍候，請勿重複點擊</p>
    </div>
</div> 
    
    <div id="qrModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-2xl font-bold text-emerald-900 mb-6">活動報到</h3>
            
    <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="closeQR()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-xl">關閉</button>
        </div>
    </div>
    

    <script>
        // ... (GAS_URL, adminKey, fetchData 同前版) ...
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let adminKey = "";
        let cachedData = null;

        window.onload = async () => {
            adminKey = sessionStorage.getItem('adminKey') || prompt("請輸入金鑰：");
            if (adminKey) { sessionStorage.setItem('adminKey', adminKey); fetchData(); }
            else { location.href = 'member_zone.html'; }
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

       // --- 2. 修改 switchTab：增加強制重置邏輯 ---
function switchTab(tab, title) {
    // 隱藏所有分頁
    document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.remove('active');
        // 強制移除所有分頁的編輯狀態
        c.classList.remove('edit-mode-active');
    });

    // 重置所有編輯按鈕的樣式與文字
    document.querySelectorAll('[id^="sec-"] .text-orange-600, [id^="sec-"] .text-white').forEach(btn => {
        if (btn.tagName === "BUTTON" && btn.innerHTML.includes('編輯')) {
            btn.innerHTML = '<i class="fas fa-lock"></i> 編輯開關';
            btn.className = "text-orange-600 font-bold border border-orange-200 px-4 py-2 rounded-lg bg-orange-50";
        }
    });

    // 重置系統設定的狀態
    isSystemEditing = false;
    if (document.getElementById('sec-system')) {
        const readingInput = document.getElementById('conf-reading');
        const photoInput = document.getElementById('conf-photo');
        const saveBtn = document.getElementById('systemSaveBtn');
        const lockBtn = document.getElementById('systemLockBtn');
        
        if(readingInput) {
            readingInput.disabled = true;
            photoInput.disabled = true;
            saveBtn.disabled = true;
            readingInput.classList.add('bg-gray-100', 'opacity-50');
            photoInput.classList.add('bg-gray-100', 'opacity-50');
            saveBtn.classList.replace('bg-emerald-800', 'bg-gray-300');
            saveBtn.classList.add('cursor-not-allowed');
            lockBtn.innerHTML = '<i class="fas fa-lock"></i> 解除鎖定';
            lockBtn.className = "text-sm bg-gray-100 px-4 py-2 rounded-lg";
        }
    }

    // 切換目標分頁
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    document.getElementById('sec-' + tab).classList.add('active');
    document.getElementById('current-title').innerText = title;
    
    // 側邊欄收合
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if (sidebar) sidebar.classList.add('-translate-x-full');
    if (overlay) overlay.classList.add('hidden');
    
    // 重新渲染，確保垃圾桶圖示狀態正確
    renderAll();
}

        // --- 針對特定分頁的編輯開關 ---
        function toggleSectionEdit(sectionId) {
            const sec = document.getElementById(sectionId);
            sec.classList.toggle('edit-mode-active');
            const btn = sec.querySelector('button');
            if (sec.classList.contains('edit-mode-active')) {
                btn.innerHTML = '<i class="fas fa-unlock"></i> 編輯開啟中';
                btn.classList.replace('bg-orange-50', 'bg-orange-500');
                btn.classList.replace('text-orange-600', 'text-white');
            } else {
                btn.innerHTML = '<i class="fas fa-lock"></i> 編輯開關';
                btn.classList.replace('bg-orange-500', 'bg-orange-50');
                btn.classList.replace('text-white', 'text-orange-600');
            }
            renderAll(); // 重新渲染以顯示/隱藏垃圾桶
        }

        // --- 系統設定專用解鎖 ---
        function unlockSystem() {
            document.getElementById('conf-reading').disabled = false;
            document.getElementById('conf-photo').disabled = false;
            document.getElementById('systemSaveBtn').disabled = false;
            document.getElementById('conf-reading').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('conf-photo').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('systemSaveBtn').classList.replace('bg-gray-300', 'bg-emerald-800');
            document.getElementById('systemSaveBtn').classList.remove('cursor-not-allowed');
            document.getElementById('systemLockBtn').innerText = "⚠️ 編輯中";
        }

        // ... (renderMembers, renderEvents 逻辑需要加入是否顯示垃圾桶的判斷) ...
        function renderMembers(users) {
            const list = document.getElementById('memberList');
            const isEdit = document.getElementById('sec-members').classList.contains('edit-mode-active');
            list.innerHTML = users.map(u => {
                let p = String(u.phone).length === 9 ? '0'+u.phone : u.phone;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex items-center text-huge w-full">
                        <div class="font-bold text-emerald-900" style="min-width:100px">${u.name}</div>
                        <div class="text-gray-500 font-mono" style="min-width:160px">${p}</div>
                        <div class="text-lg text-blue-500 truncate">${u.email || ''}</div>
                    </div>
                    ${isEdit ? `<button onclick="deleteMember('${u.phone}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>`;
            }).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            const isEdit = document.getElementById('sec-calendar').classList.contains('edit-mode-active');
            const today = new Date(); today.setHours(0,0,0,0);
            const sorted = [...events].sort((a,b) => new Date(a.dateText) - new Date(b.dateText));
            
            list.innerHTML = sorted.map(ev => {
                const canQR = new Date(ev.dateText) <= today;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-emerald-600 font-mono">${ev.dateText}</div>
                        <div class="text-huge font-bold text-emerald-900">${ev.title}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        ${canQR ? `<button onclick="showQR('${ev.dateText}','${ev.title}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">QR</button>` : ''}
                        ${isEdit ? `<button onclick="deleteEvent('${ev.dateText}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

// --- 1. 修改 apiPost：確保無論如何都會刷新畫面 ---
async function apiPost(data) {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    
    data.key = adminKey;
    try {
        const res = await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify(data),
            // 設定較短的 timeout，若雲端太慢就改由 fetchData 補位
        });
        const result = await res.json();
        
        if (result.result === "SUCCESS") {
            // 成功：關閉動畫並重新讀取資料
            setTimeout(() => {
                overlay.classList.add('hidden');
                fetchData(); 
            }, 300);
        } else {
            alert("❌ 失敗：" + result.message);
            overlay.classList.add('hidden');
        }
    } catch (e) {
        // 重要：即使發生連線超時錯誤，也要強制執行 fetchData
        // 因為 GAS 有時候會跑完但沒回傳，強制重整能確保看到最新狀態
        console.log("觸發補償機制，強制刷新資料庫狀態");
        setTimeout(() => {
            overlay.classList.add('hidden');
            fetchData(); 
        }, 1000);
    }
}
        async function fetchData() {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            cachedData = await res.json();
            renderAll();
        }
        function renderAll() {
            if(!cachedData) return;
            document.getElementById('input-news').value = cachedData.news || "";
            document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
            document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";
            renderMembers(cachedData.users || []);
            renderEvents(cachedData.calendar || []);
        }
        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveLineMsg() { apiPost({ type: "send_line", message: document.getElementById('line-msg').value }); }
        function addMember() { apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value, password: "1234" }); }
        function deleteMember(p) { if(confirm("刪除？")) apiPost({ type: "delete_member", currentPhone: p }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(d) { if(confirm("刪除？")) apiPost({ type: "delete_event", date: d }); }
        function saveSystemConfig() { apiPost({ type: "update_config", reading_folder_url: document.getElementById('conf-reading').value, photo_gallery_url: document.getElementById('conf-photo').value }); }

        function showQR(date, title) {
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModal').classList.add('flex');
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: "CHECKIN:" + date, width: 200, height: 200 });
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
        
// --- 3. 系統設定解鎖/鎖定循環 ---
let isSystemEditing = false;
function toggleSystemEdit() {
    isSystemEditing = !isSystemEditing;
    const readingInput = document.getElementById('conf-reading');
    const photoInput = document.getElementById('conf-photo');
    const saveBtn = document.getElementById('systemSaveBtn');
    const lockBtn = document.getElementById('systemLockBtn');

    if (isSystemEditing) {
        readingInput.disabled = false;
        photoInput.disabled = false;
        saveBtn.disabled = false;
        readingInput.classList.remove('bg-gray-100', 'opacity-50');
        photoInput.classList.remove('bg-gray-100', 'opacity-50');
        saveBtn.classList.replace('bg-gray-300', 'bg-emerald-800');
        saveBtn.classList.remove('cursor-not-allowed');
        lockBtn.innerHTML = '<i class="fas fa-check-circle"></i> 結束編輯';
        lockBtn.classList.add('bg-orange-500', 'text-white');
    } else {
        readingInput.disabled = true;
        photoInput.disabled = true;
        saveBtn.disabled = true;
        readingInput.classList.add('bg-gray-100', 'opacity-50');
        photoInput.classList.add('bg-gray-100', 'opacity-50');
        saveBtn.classList.replace('bg-emerald-800', 'bg-gray-300');
        saveBtn.classList.add('cursor-not-allowed');
        lockBtn.innerHTML = '<i class="fas fa-lock"></i> 解除鎖定';
        lockBtn.className = "text-sm bg-gray-100 px-4 py-2 rounded-lg";
    }
}       
    </script>
</body>
</html>
