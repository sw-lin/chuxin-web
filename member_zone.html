<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .hidden { display: none; }
        .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">
<!-- 加載動畫層 -->
<div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-sm flex items-center justify-center">
    <div class="flex flex-col items-center">
        <div class="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-emerald-900 font-bold animate-pulse">資料同步中...</p>
    </div>
</div>

<!-- Toast 通知容器 -->
<div id="toastContainer" class="fixed top-20 left-1/2 -translate-x-1/2 z-[200] space-y-2"></div><!-- 導覽列 -->

    
<nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between">
    <div class="flex items-center gap-2">
        <i class="fas fa-leaf text-emerald-400 text-xl"></i>
        <h1 class="text-xl font-black tracking-widest text-white">築心會館</h1>
    </div>
    <div class="flex items-center gap-2">
        <button id="staffBtn" class="hidden px-3 py-1.5 bg-emerald-700/50 hover:bg-emerald-600 rounded-lg border border-emerald-500/30 text-[12px] font-bold transition-all">幹部區</button>
        <button onclick="openEditModal()" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-[12px] font-bold transition-all">修改</button>
        <button onclick="logout()" class="px-3 py-1.5 bg-red-900/40 hover:bg-red-800/60 rounded-lg text-[12px] font-bold transition-all text-red-100">登出</button>
    </div>
</nav> 

<main class="max-w-xl mx-auto p-6 space-y-6">
    
    <!-- 會員狀態卡片 (點擊觸發歷程彈窗) -->
    <div onclick="openHistoryModal()" class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden cursor-pointer active:scale-95 transition-all">
        <div class="absolute top-[-20px] right-[-20px] w-32 h-32 bg-white/5 rounded-full"></div>
        <div class="relative z-10 text-center">
            <span class="text-emerald-200 text-xs font-bold tracking-[0.3em] uppercase">Member Profile</span>
            <h2 id="userName" class="text-3xl font-black mt-2 mb-6 tracking-widest">載入中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/20 rounded-3xl py-4 border border-white/10">
                    <p class="text-emerald-200 text-[10px] font-bold mb-1">出席次數</p>
                    <p id="attCountDisplay" class="text-2xl font-black">0 / 0</p>
                </div>
                <div class="bg-black/20 rounded-3xl py-4 border border-white/10">
                    <p class="text-emerald-200 text-[10px] font-bold mb-1">參與勝率</p>
                    <p id="attPercent" class="text-2xl font-black">0%</p>
                </div>
            </div>
            <p class="mt-4 text-[10px] opacity-60">點擊卡片查看詳細學習歷程</p>
        </div>
    </div>

    <!-- 動態活動宣傳區 (由 JS 自動渲染) -->
    <div id="eventSection" class="space-y-4"></div>

    <!-- 掃碼報到按鈕 -->
    <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-[2rem] shadow-xl text-white flex items-center justify-center space-x-3 active:scale-95 transition-all">
        <i class="fas fa-qrcode text-2xl"></i>
        <span class="text-xl font-black tracking-widest">掃碼報到</span>
    </button>

    <!-- 公告欄 -->
    <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-emerald-50 flex items-center space-x-4">
        <div class="bg-emerald-100 text-emerald-700 w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
            <i class="fas fa-bullhorn text-sm"></i>
        </div>
        <p id="news" class="text-gray-500 text-xs font-bold truncate">同步最新公告中...</p>
    </div>

<!-- 快速連結修正 -->
<div class="grid grid-cols-2 gap-4">
    <!-- 參數改為對應試算表的 reading_folder_url -->
    <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 active:bg-gray-50 transition-all">
        <i class="fas fa-book-open text-emerald-700 text-xl"></i>
        <span class="font-black text-emerald-900 text-sm">課程資料庫</span>
    </button>
    <!-- 參數改為對應試算表的 photo_gallery_url -->
    <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 active:bg-gray-50 transition-all">
        <i class="fas fa-images text-emerald-700 text-xl"></i>
        <span class="font-black text-emerald-900 text-sm">活動剪影</span>
    </button>
</div>
    
</main>

<!-- 歷程彈窗 (Modal) -->
<div id="historyModal" class="modal-overlay">
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative">
        <button onclick="closeHistoryModal()" class="absolute top-4 right-6 text-gray-400 text-2xl">&times;</button>
        <h3 class="text-xl font-black text-emerald-900 mb-4 text-center">學習歷程清單</h3>
        <div id="historyList" class="space-y-3 max-height-[400px] overflow-y-auto pr-2">
            <!-- 歷程項目 -->
        </div>
    </div>
</div>

<!-- 掃描與修改資料彈窗 (維持原樣) -->
<div id="scannerModal" class="modal-overlay">
    <div class="bg-white w-[90%] max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
        <div id="reader" class="w-full"></div>
        <div class="p-6 text-center">
            <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-black text-gray-500">取消返回</button>
        </div>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <!-- 原本的修改資料結構 -->
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
        <h3 class="text-xl font-black text-emerald-900 mb-6 text-center">修改個人資料</h3>
        <div class="space-y-4">
            <input type="email" id="editEmail" placeholder="電子郵件" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
            <input type="password" id="oldPass" placeholder="驗證舊密碼 (必填)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-red-200 transition-all">
            <input type="password" id="newPass" placeholder="設定新密碼 (不改留空)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
            <div class="flex pt-4 space-x-3">
                <button onclick="closeEditModal()" class="flex-1 text-gray-400 font-bold py-4">取消</button>
                <button onclick="handleUpdateProfile()" id="updateBtn" class="flex-[2] bg-emerald-800 text-white py-4 rounded-2xl font-black">更新</button>
            </div>
        </div>
    </div>
</div>
<script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    var html5QrCode = null;
    var remoteConfig = {};
    var currentUser = null;
    var lastSyncData = null;

    window.onload = function() {
        var userStr = sessionStorage.getItem('userInfo');
        if (!userStr) { location.href = 'index.html'; return; }
        currentUser = JSON.parse(userStr);
        document.getElementById('userName').innerText = currentUser.name;
        syncData();
    };

// --- 核心功能：同步資料 (保留幹部判斷) ---
function syncData() {
    const loader = document.getElementById('loadingOverlay');
    if (loader) loader.style.display = 'flex';

    fetch(GAS_URL + "?t=" + Date.now())
        .then(res => res.json())
        .then(data => {
            lastSyncData = data;
            remoteConfig = data.config || {};
            document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";
            
            var myMatch = String(currentUser.phone).replace(/\D/g, "").slice(-9);
            var liveUser = data.users.find(u => String(u.phone).replace(/\D/g, "").slice(-9) === myMatch);
            
            if (liveUser) {
                currentUser = liveUser;
                // 檢查幹部身份
                if (liveUser.role && liveUser.role !== "學員") {
                    const staffBtn = document.getElementById('staffBtn');
                    if (staffBtn) {
                        staffBtn.classList.remove('hidden');
                        staffBtn.onclick = enterStaffMode;
                    }
                }
                // 更新 UI 數據 (包含彩花邏輯)
                updateUI(liveUser, data.calendar, data.events);
            }
        })
        .catch(err => {
            console.error(err);
            showToast("數據同步失敗", "error");
        })
        .finally(() => {
            if (loader) loader.style.display = 'none';
        });
}
    // --- 核心功能：更新界面與出席比對 (修正消失的部分) ---
    function updateUI(user, calendar, events) {
        const logs = user.attendLog || [];
        const today = new Date().toISOString().split('T')[0];
        
        // 找出今天以前的所有活動 (分母)
        const pastEvents = calendar.filter(ev => ev.dateText <= today);
        
        // 比對出席紀錄 (分子)
        const attended = pastEvents.filter(ev => {
            const standardKey = `EVENT:${ev.dateText}|${ev.title}`;
            return logs.some(log => {
                const sLog = String(log).trim();
                return sLog === standardKey || sLog.includes(ev.title);
            });
        });

        const rate = pastEvents.length ? Math.round((attended.length / pastEvents.length) * 100) : 0;
        
        // 更新顯示
        document.getElementById('attPercent').innerText = rate + "%";
        document.getElementById('attCountDisplay').innerText = attended.length + " / " + pastEvents.length;

        // 🎉 達標彩花 (超過 50%)
        if (rate >= 50 && pastEvents.length > 0) {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#064E3B', '#10B981', '#F59E0B']
            });
        }

        renderEventSection(events);
        window.currentAttendedData = attended; 
    }

    // --- 掃碼報到處理 ---
async function processCheckin(scanData) {
    if (!scanData.startsWith("CHECKIN:")) {
        showToast("無效的條碼格式", "error");
        return;
    }
    
    // 顯示全螢幕加載，防止重複點擊
    document.getElementById('loadingOverlay').style.display = 'flex';

    try {
        const parts = scanData.split(':');
        // 這裡還原了您原本驗證成功的拼接方式：EVENT:日期|名稱
        const eventID = "EVENT:" + parts[1] + "|" + parts.slice(2).join(':');
        
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                type: 'checkin', 
                phone: currentUser.phone, 
                name: currentUser.name, 
                eventTitle: eventID 
            })
        });
        const result = await res.json();
        
        if (result.result === "SUCCESS") {
            showToast("報到成功！歡迎參與");
            confetti({ particleCount: 150, spread: 60 });
            // 報到成功後立即同步，更新畫面的出席次數與彩花
            syncData(); 
        } else {
            showToast(result.message || "報到失敗", "error");
        }
    } catch (e) {
        showToast("網路連線失敗", "error");
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}
    // --- 其他 UI 控制函數 ---
    function renderEventSection(events) {
        var container = document.getElementById('eventSection');
        var today = new Date().toISOString().split('T')[0];
        var activeEvents = (events || []).filter(ev => today >= ev.start_date && today <= ev.display_until);
        if (activeEvents.length === 0) { container.innerHTML = ""; return; }
        container.innerHTML = activeEvents.map(ev => {
            if (ev.poster_url && ev.poster_url.includes('http')) {
                return `<div class="bg-white rounded-[2rem] overflow-hidden shadow-lg border border-emerald-50 mb-4">
                        <img src="${ev.poster_url}" class="w-full object-cover">
                        ${ev.reg_url ? `<button onclick="handleReg('${ev.title}')" class="w-full py-4 bg-emerald-800 text-white font-black tracking-widest active:bg-emerald-900">立即報名</button>` : ''}
                    </div>`;
            } else {
                return `<div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-l-8 border-emerald-800 space-y-2">
                        <h4 class="font-black text-emerald-900">${ev.title}</h4>
                        <p class="text-xs text-gray-500"><i class="far fa-calendar-alt"></i> 活動日期：${ev.dateText}</p>
                        ${ev.reg_url ? `<button onclick="handleReg('${ev.title}')" class="w-full mt-3 py-3 bg-emerald-100 text-emerald-800 rounded-xl font-bold text-sm">點我報名</button>` : ''}
                    </div>`;
            }
        }).join('');
    }

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        const bgColor = type === 'success' ? 'bg-emerald-800' : 'bg-red-800';
        toast.className = `${bgColor} text-white px-6 py-3 rounded-2xl shadow-xl text-sm font-bold transition-all duration-500 opacity-0 translate-y-2`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 100);
        setTimeout(() => {
            toast.classList.add('opacity-0', '-translate-y-2');
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function openHistoryModal() {
        var list = document.getElementById('historyList');
        var data = window.currentAttendedData || [];
        if (data.length === 0) {
            list.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm italic">尚無出席紀錄</div>';
        } else {
            list.innerHTML = data.slice().reverse().map(ev => `
                <div class="bg-emerald-50 p-4 rounded-2xl flex justify-between items-center border border-emerald-100 mb-2">
                    <div>
                        <div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div>
                        <div class="text-emerald-900 font-bold text-sm">${ev.title}</div>
                    </div>
                    <i class="fas fa-check-circle text-emerald-600"></i>
                </div>
            `).join('');
        }
        document.getElementById('historyModal').style.display = 'flex';
    }

    function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
    function openEditModal() { document.getElementById('editProfileModal').style.display = 'flex'; }
    function closeEditModal() { document.getElementById('editProfileModal').style.display = 'none'; }
    function openRemoteLink(key) { if (remoteConfig[key]) window.open(remoteConfig[key], '_blank'); else showToast("連結尚未設定", "error"); }
    function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    
    // --- 掃描控制 ---
    function startScanner() {
        document.getElementById('scannerModal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (text) => { stopScanner(); processCheckin(text); }, 
            () => {}
        ).catch(err => { showToast("無法開啟相機", "error"); stopScanner(); });
    }
    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                html5QrCode = null;
                document.getElementById('scannerModal').style.display = 'none';
            });
        } else {
            document.getElementById('scannerModal').style.display = 'none';
        }
    }

    async function handleReg(eventTitle) {
        if(!confirm("確認要報名「" + eventTitle + "」嗎？")) return;
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'register_event', phone: currentUser.phone, name: currentUser.name, eventTitle: eventTitle })
            });
            const result = await res.json();
            if (result.result === "SUCCESS" || result.result === "ALREADY_DONE") {
                showToast(result.message || "報名成功！");
                syncData();
            } else { showToast(result.message, "error"); }
        } catch (e) { showToast("連連異常", "error"); }
    }

    async function enterStaffMode() {
        var key = prompt("請輸入幹部管理金鑰：");
        if (!key) return;
        try {
            var res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'verify_staff_key', key: key }) });
            var result = await res.json();
            if (result.result === "SUCCESS") { sessionStorage.setItem('staff_key', key); location.href = "staff_menu.html"; } 
            else { showToast("金鑰錯誤！", "error"); }
        } catch (e) { showToast("連線失敗", "error"); }
    }
</script>
</body>
</html>
