<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="hover:text-emerald-200 transition-all text-xl"><i class="fas fa-home"></i></a>
                <span class="text-xl font-bold tracking-widest border-l border-white/20 pl-4">築心會館</span>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="userNameDisplay">載入中...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-8">
        <section class="bg-white rounded-[2rem] p-8 border border-emerald-100 shadow-sm mb-10 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
            <h2 class="text-xl font-bold text-emerald-900 flex items-center mb-4">
                <i class="fas fa-bullhorn mr-3 text-orange-500"></i> 最新消息
            </h2>
            <div id="dynamicNews" class="text-gray-600 italic leading-relaxed">正在同步最新公告...</div>
        </section>

        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-900">您好，<span id="welcomeName">會員</span></h1>
                <p id="userTitleTag" class="text-emerald-700 font-bold mt-2"></p>
            </div>
            <div id="adminEntry" class="hidden">
                <a href="staff_page.html" class="inline-flex items-center bg-orange-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-orange-700 transition shadow-lg">
                    <i class="fas fa-user-shield mr-2"></i> 進入幹部專區
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="openRemoteLink('reading_folder_url')" class="group bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm hover:border-emerald-200 transition cursor-pointer">
                <div class="text-emerald-800 text-3xl mb-4 group-hover:scale-110 transition"><i class="fas fa-book-reader"></i></div>
                <h3 class="font-bold text-lg text-emerald-900">導讀資料庫</h3>
                <p class="text-gray-400 text-sm mt-2">歷年手冊、簡報與書單</p>
                <div class="mt-4 text-emerald-700 text-xs font-bold">點擊進入 <i class="fas fa-external-link-alt ml-1"></i></div>
            </div>

            <div onclick="openRemoteLink('photo_gallery_url')" class="group bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm hover:border-emerald-200 transition cursor-pointer">
                <div class="text-orange-600 text-3xl mb-4 group-hover:scale-110 transition"><i class="fas fa-camera-retro"></i></div>
                <h3 class="font-bold text-lg text-emerald-900">活動剪影</h3>
                <p class="text-gray-400 text-sm mt-2">紀錄聚會的美好瞬間</p>
                <div class="mt-4 text-orange-600 text-xs font-bold">瀏覽相簿 <i class="fas fa-external-link-alt ml-1"></i></div>
            </div>

            <div onclick="openEditModal()" class="emerald-gradient p-8 rounded-[2rem] shadow-xl text-white hover:brightness-110 transition cursor-pointer">
                <div class="text-emerald-200 text-3xl mb-4"><i class="fas fa-user-cog"></i></div>
                <h3 class="font-bold text-lg">帳號安全性</h3>
                <p class="text-emerald-100/60 text-sm mt-2">修改密碼與聯絡信箱</p>
                <div class="mt-4 text-white/80 text-xs font-bold">變更設定 <i class="fas fa-chevron-right ml-1"></i></div>
            </div>
        </div>
    </main>

    <div id="editProfileModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
            <button onclick="closeEditModal()" class="absolute top-6 right-8 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-6 text-center">修改基本資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">驗證舊密碼 <span class="text-red-500">*</span></label>
                    <input id="oldPassword" type="password" placeholder="請輸入目前的密碼" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">電子郵件</label>
                    <input id="editEmail" type="email" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">新密碼 (不填則不修改)</label>
                    <input id="editPassword" type="password" placeholder="若要修改請輸入新密碼" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-emerald-500">
                </div>
                <button id="updateBtn" onclick="submitUpdate()" class="w-full emerald-gradient text-white py-4 rounded-2xl font-bold text-lg mt-2 shadow-lg">儲存變更</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {}; 

        window.onload = async () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);

            document.getElementById('userNameDisplay').innerText = `你好，${user.name}`;
            document.getElementById('welcomeName').innerText = user.name;

            // 顯示職稱與幹部入口
            const titleStr = String(user.title || '').trim();
            if (titleStr !== "" && titleStr !== "undefined") {
                document.getElementById('userTitleTag').innerText = `職稱：${titleStr}`;
                document.getElementById('adminEntry').classList.remove('hidden');
            }
            syncCloudData();
        };

        // 修正公告與連結同步邏輯
        async function syncCloudData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                // 對應 System 工作表中的 latest_news 鍵值
                if (data.system && data.system.latest_news) {
                    document.getElementById('dynamicNews').innerText = data.system.latest_news;
                } else {
                    document.getElementById('dynamicNews').innerText = data.news || "歡迎參加讀書會";
                }
                
                remoteConfig = data.config || {};
            } catch (e) { 
                document.getElementById('dynamicNews').innerText = "歡迎參加築心讀書會。"; 
            }
        }

        function openRemoteLink(key) {
            const url = remoteConfig[key];
            if (url && url.startsWith('http')) {
                window.open(url, '_blank');
            } else {
                alert("幹部尚未設定此連結。");
            }
        }

        function openEditModal() {
            const userStr = sessionStorage.getItem('userInfo');
            if(!userStr) return;
            const user = JSON.parse(userStr);
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }

        async function submitUpdate() {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { alert("會話過期，請重新登入"); logout(); return; }
            
            const user = JSON.parse(userStr);
            const oldPassInput = document.getElementById('oldPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPassInput = document.getElementById('editPassword').value.trim();
            const btn = document.getElementById('updateBtn');

            // 【修正 1】：將輸入的舊密碼轉為 Base64 後，比對 Session 裡的加密碼
            if (btoa(oldPassInput) !== String(user.password).trim()) {
                alert("❌ 驗證失敗：舊密碼輸入錯誤");
                return;
            }

            btn.disabled = true;
            btn.innerText = "同步更新中...";

            const updateFields = { email: newEmail };
            
            // 【修正 2】：新密碼也必須加密後再送回後端
            if (newPassInput !== "") {
                updateFields.password = btoa(newPassInput);
            }

            try {
                // 使用 POST 提交更新
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        currentPhone: user.phone,
                        newData: updateFields
                    })
                });
                
                alert("✅ 資料修改成功！請重新登入以啟動新設定。");
                logout();
            } catch (e) {
                // 通常 GAS 會因跨域報錯，但後端其實已經更新成功，故同樣執行登出
                alert("修改指令已送出，請嘗試重新登入。");
                logout();
            }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
