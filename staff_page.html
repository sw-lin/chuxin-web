<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幹部工作區 | 築心讀書會雲端管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #022c22; color: #ffffff; min-height: 100vh; }
        .admin-panel { background: rgba(6, 78, 59, 0.4); border: 1px solid rgba(16, 185, 129, 0.2); backdrop-filter: blur(10px); }
        .tab-active { color: #f59e0b; border-bottom: 3px solid #f59e0b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-4">
                <button onclick="location.href='member_zone.html'" class="text-emerald-500 hover:text-white transition">
                    <i class="fas fa-chevron-left"></i> 返回會員區
                </button>
                <h1 class="text-xl font-bold border-l pl-4 border-emerald-800 tracking-widest">幹部工作區</h1>
            </div>
            <div id="staffInfo" class="text-sm text-emerald-400 font-bold bg-emerald-900/50 px-4 py-2 rounded-full">
                驗證中...
            </div>
        </header>

        <div class="flex space-x-8 mb-8 border-b border-emerald-900">
            <button onclick="switchTab(1)" id="btnTab1" class="py-4 font-bold transition tab-active">1. 會員通訊錄</button>
            <button onclick="switchTab(2)" id="btnTab2" class="py-4 font-bold text-emerald-700 hover:text-emerald-500 transition">2. 活動統計</button>
            <button onclick="switchTab(3)" id="btnTab3" class="py-4 font-bold text-emerald-700 hover:text-emerald-500 transition">3. 繳費管理</button>
        </div>

        <div class="admin-panel rounded-[2.5rem] p-6 md:p-10 shadow-2xl">
            
            <div id="content1">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h3 class="text-2xl font-bold text-white">正式會員名單</h3>
                        <p class="text-emerald-500 text-xs mt-1">數據已與 Google Sheets 雲端同步</p>
                    </div>
                    <button onclick="loadMemberData()" class="text-emerald-400 hover:text-white text-sm">
                        <i class="fas fa-sync-alt mr-1"></i> 重新整理
                    </button>
                </div>

                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left">
                        <thead class="text-emerald-500 text-xs uppercase tracking-widest border-b border-emerald-900">
                            <tr>
                                <th class="py-4 px-2">姓名</th>
                                <th class="py-4 px-2">職稱</th>
                                <th class="py-4 px-2">電話 (帳號)</th>
                                <th class="py-4 px-2">Email</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="divide-y divide-emerald-900/30">
                            <tr>
                                <td colspan="4" class="text-center py-20 text-emerald-700">正在連接雲端大腦...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="content2" class="hidden py-20 text-center">
                <i class="fas fa-chart-pie text-5xl text-emerald-800 mb-6"></i>
                <p class="text-emerald-600 font-bold">出席率統計模組開發中...</p>
            </div>

            <div id="content3" class="hidden py-20 text-center">
                <i class="fas fa-coins text-5xl text-emerald-800 mb-6"></i>
                <p class="text-emerald-600 font-bold">財務核銷功能開發中...</p>
            </div>

        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxezoV6EWpubQlZCtdeHPWrNowTz7gZhErkKUwzuiOOlTsI-G5a63gYXR7YADNKyyfAfw/exec";

        // 1. 權限守門員：檢查是否為幹部
        window.onload = function() {
            const userDataStr = sessionStorage.getItem('userInfo');
            if (!userDataStr) { window.location.href = 'index.html'; return; }

            const user = JSON.parse(userDataStr);
            // 判斷 title 是否有值且不是一般會員
            const t = user.title ? user.title.trim() : "";
            if (!t || t === "一般會員" || t === "會員") {
                alert('抱歉，此區域僅限讀書會幹部進入。');
                window.location.href = 'member_zone.html';
                return;
            }

            document.getElementById('staffInfo').innerHTML = `<i class="fas fa-user-tie mr-2"></i>${user.name} (${t})`;
            loadMemberData();
        };

        // 2. 分頁切換邏輯
        function switchTab(num) {
            for (let i = 1; i <= 3; i++) {
                document.getElementById('content' + i).classList.add('hidden');
                document.getElementById('btnTab' + i).classList.remove('tab-active');
                document.getElementById('btnTab' + i).classList.add('text-emerald-700');
            }
            document.getElementById('content' + num).classList.remove('hidden');
            document.getElementById('btnTab' + num).classList.add('tab-active');
            document.getElementById('btnTab' + num).classList.remove('text-emerald-700');
        }

        // 3. 雲端數據讀取 (AJAX)
        async function loadMemberData() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-20 text-emerald-700 animate-pulse">正在同步 Google Sheets 數據...</td></tr>';

            try {
                // 加上時間戳記防止快取
                const response = await fetch(GAS_URL + "?v=" + Date.now());
                const users = await response.json();

                let html = "";
                users.forEach(user => {
                    // 對應 Google Sheets 的欄位名稱
                    const name = user.name || '未提供';
                    const title = user.title || '一般會員';
                    const phone = user.phone || '-';
                    const email = user.email || '未提供';

                    html += `
                        <tr class="hover:bg-emerald-800/20 transition">
                            <td class="py-5 px-2 font-bold text-white">${name}</td>
                            <td class="py-5 px-2 text-xs text-amber-500">${title}</td>
                            <td class="py-5 px-2 text-emerald-400 font-mono text-sm">${phone}</td>
                            <td class="py-5 px-2 text-gray-400 text-xs break-all max-w-[120px] md:max-w-none">${email}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html || '<tr><td colspan="4" class="text-center py-10">資料庫內尚無資料</td></tr>';
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-500">雲端讀取失敗，請確認 API 部署設定。</td></tr>';
            }
        }
    </script>
</body>
</html>
