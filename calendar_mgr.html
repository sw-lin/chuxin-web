<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        
        /* 加載動畫優化 */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #059669; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 99px; z-index: 10000; transition: opacity 0.5s; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-emerald-100">
        <div class="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
            <button onclick="location.href='admin_panel.html'" class="text-emerald-800"><i class="fas fa-chevron-left text-xl"></i></button>
            <h1 class="text-xl font-black text-emerald-900 tracking-tighter">行事曆管理</h1>
            <button onclick="openAddModal()" class="w-10 h-10 bg-emerald-600 text-white rounded-full shadow-lg shadow-emerald-200 flex items-center justify-center">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-6 py-8">
        <div id="calendarList" class="space-y-4">
            </div>
    </main>

    <div id="eventModal" class="fixed inset-0 bg-black/60 z-[60] hidden flex-col justify-end">
        <div class="bg-white rounded-t-[3rem] p-8 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-black text-emerald-900">排定新活動</h2>
                <button onclick="closeModal('eventModal')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-emerald-700 mb-1">活動日期</label>
                    <input type="date" id="eventDate" class="w-full p-4 bg-emerald-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-emerald-700 mb-1">活動標題</label>
                    <input type="text" id="eventTitle" placeholder="例如：春季讀書會" class="w-full p-4 bg-emerald-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-emerald-700 mb-1">海報連結 (可選)</label>
                    <input type="text" id="eventPoster" placeholder="https://..." class="w-full p-4 bg-emerald-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500">
                </div>
                <div id="addActions" class="pt-4">
                    <button onclick="submitAddEvent()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-200">確認發佈</button>
                </div>
                <div id="editActions" class="pt-4 hidden">
                    <button onclick="submitEditEvent()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200">儲存更新</button>
                </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/90 z-[70] hidden items-center justify-center p-10" onclick="closeModal('qrModal')">
        <div class="bg-white p-8 rounded-[3rem] text-center max-w-sm w-full" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black text-emerald-900 mb-6">活動簽到 QR</h3>
            <div class="bg-emerald-50 p-4 rounded-3xl mb-6">
                <img id="qrImg" src="" class="w-full aspect-square rounded-2xl shadow-inner">
            </div>
            <p class="text-sm text-gray-500 mb-8 font-bold">讓會員使用手機掃描即可完成簽到</p>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-black">關閉視窗</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner mb-4"></div>
            <p class="text-emerald-900 font-black">處理中，請稍候...</p>
        </div>
    </div>

    <script>
        var u1 = 'https://script.google.com';
        var u2 = '/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        var GAS_URL = u1 + u2;
        var STAFF_KEY = sessionStorage.getItem('staff_key');
        var allEvents = [];
        var currentEditData = null;

        window.onload = function() {
            if (!STAFF_KEY) { 
                alert("請重新從管理區登入");
                window.location.href = "index.html"; 
                return; 
            }
            loadCalendar();
        };

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

        function loadCalendar() {
            toggleLoading(true);
            fetch(GAS_URL + "?t=" + Date.now())
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('calendarList');
                    allEvents = data.calendar || [];
                    let html = '';
                    allEvents.forEach((ev, i) => {
                        html += `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 mb-4">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <div class="text-emerald-600 font-black text-sm mb-1">${ev.dateText}</div>
                                    <h3 class="text-xl font-black text-emerald-900">${ev.title}</h3>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="doQR(${i})" class="w-10 h-10 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-full"><i class="fas fa-qrcode"></i></button>
                                    <button onclick="doEdit(${i})" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full"><i class="fas fa-edit"></i></button>
                                    <button onclick="doDelete(${i})" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </div>
                            ${ev.poster_url ? `<img src="${ev.poster_url}" class="w-full h-48 object-cover rounded-2xl">` : ''}
                        </div>`;
                    });
                    list.innerHTML = html || '<div class="text-center py-20 text-gray-400 font-bold">目前尚無排定活動</div>';
                })
                .catch(() => showToast("❌ 讀取失敗"))
                .finally(() => toggleLoading(false));
        }

        function doQR(i) {
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("CHECKIN:"+allEvents[i].dateText+":"+allEvents[i].title)}`;
            document.getElementById('qrModal').style.display = 'flex';
        }

        function doEdit(i) {
            currentEditData = allEvents[i];
            document.getElementById('modalTitle').innerText = "編輯活動項目";
            document.getElementById('eventDate').value = currentEditData.dateText;
            document.getElementById('eventTitle').value = currentEditData.title;
            document.getElementById('eventPoster').value = currentEditData.poster_url || "";
            document.getElementById('addActions').classList.add('hidden');
            document.getElementById('editActions').classList.remove('hidden');
            document.getElementById('eventModal').style.display = 'flex';
        }

        function openAddModal() {
            currentEditData = null;
            document.getElementById('modalTitle').innerText = "排定新活動";
            document.getElementById('eventDate').value = ""; document.getElementById('eventTitle').value = ""; document.getElementById('eventPoster').value = "";
            document.getElementById('addActions').classList.remove('hidden'); document.getElementById('editActions').classList.add('hidden');
            document.getElementById('eventModal').style.display = 'flex';
        }

        function submitAddEvent() {
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value.trim();
            const poster = document.getElementById('eventPoster').value.trim();
            if (!date || !title) return alert("必填未填");
            closeModal('eventModal'); toggleLoading(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'add_event', key: STAFF_KEY, dateText: date, title: title, poster_url: poster, needQR: true }) })
            .then(() => { showToast("✅ 已發佈"); loadCalendar(); }).finally(() => toggleLoading(false));
        }

        function submitEditEvent() {
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value.trim();
            const poster = document.getElementById('eventPoster').value.trim();
            closeModal('eventModal'); toggleLoading(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'update_calendar_event', key: STAFF_KEY, oldTitle: currentEditData.title, date: date, title: title, poster_url: poster }) })
            .then(() => { showToast("✅ 已更新"); loadCalendar(); }).finally(() => toggleLoading(false));
        }

        function doDelete(i) {
            if (!confirm("確定刪除？")) return;
            toggleLoading(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_event_poster', key: STAFF_KEY, eventTitle: allEvents[i].title }) })
            .then(() => { showToast("🗑️ 已移除"); loadCalendar(); }).finally(() => toggleLoading(false));
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showToast(m) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.body.appendChild(t); setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500);
        }
    </script>
</body>
