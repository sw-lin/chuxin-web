<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統參數設定 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .input-disabled { background-color: #f9fafb; color: #9ca3af; cursor: not-allowed; border: 1px solid #e5e7eb !important; }
        .input-enabled { background-color: #ffffff; color: #064E3B; border: 2px solid #059669 !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); display: none; z-index: 100; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="pb-20">

    <nav class="emerald-gradient text-white px-6 py-4 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="location.href='member_zone.html'">
            <i class="fas fa-chevron-left text-emerald-200"></i>
            <span class="text-xl font-bold tracking-tight">返回個人專區</span>
        </div>
        <h1 class="text-lg font-black tracking-widest opacity-80">SYSTEM CONFIG</h1>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 px-6">
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-emerald-50">
            <div class="p-8 md:p-12">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h2 class="text-3xl font-black text-emerald-900 mb-2">參數設定</h2>
                        <p class="text-gray-400 text-sm">管理會館首頁連結與系統配置</p>
                    </div>
                    <button id="editBtn" onclick="toggleEditMode()" class="bg-amber-400 text-amber-900 px-8 py-3 rounded-2xl font-bold hover:bg-amber-300 transition shadow-lg active:scale-95">
                        <i class="fas fa-edit mr-2"></i>編輯模式
                    </button>
                </div>

                <div class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-xs font-black text-emerald-800 uppercase tracking-widest ml-1">閱讀心得資料夾</label>
                            <input type="text" id="reading_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-emerald-800 uppercase tracking-widest ml-1">活動照片相簿</label>
                            <input type="text" id="photo_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-black text-emerald-800 uppercase tracking-widest ml-1">關於我們頁面連結</label>
                        <input type="text" id="about_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                    </div>

                    <div class="pt-6 border-t border-gray-100">
                        <h3 class="text-sm font-black text-emerald-900 mb-6 flex items-center">
                            <i class="fas fa-images mr-2 text-amber-500"></i> 首頁輪播照片設定 (1-5)
                        </h3>
                        <div class="grid gap-4">
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-bold text-gray-400 w-8">#1</span>
                                <input type="text" id="slide_img1" class="config-input flex-1 p-3 rounded-xl outline-none transition input-disabled" readonly placeholder="貼上 Google Drive 分享連結">
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-bold text-gray-400 w-8">#2</span>
                                <input type="text" id="slide_img2" class="config-input flex-1 p-3 rounded-xl outline-none transition input-disabled" readonly>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-bold text-gray-400 w-8">#3</span>
                                <input type="text" id="slide_img3" class="config-input flex-1 p-3 rounded-xl outline-none transition input-disabled" readonly>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-bold text-gray-400 w-8">#4</span>
                                <input type="text" id="slide_img4" class="config-input flex-1 p-3 rounded-xl outline-none transition input-disabled" readonly>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-bold text-gray-400 w-8">#5</span>
                                <input type="text" id="slide_img5" class="config-input flex-1 p-3 rounded-xl outline-none transition input-disabled" readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="saveActions" class="hidden mt-12 pt-8 border-t border-gray-100 flex space-x-4">
                    <button onclick="saveConfigs()" class="flex-1 bg-emerald-800 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-emerald-700 transition active:scale-95">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>儲存變更
                    </button>
                    <button onclick="toggleEditMode()" class="px-8 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold hover:bg-gray-200 transition">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-emerald-200 border-t-emerald-800 rounded-full animate-spin mb-4"></div>
        <p class="text-emerald-900 font-bold">同步雲端資料中...</p>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100] font-bold"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let isEditMode = false;

        // 載入當前設定
        async function loadCurrentConfigs() {
            showLoading(true);
            try {
                const res = await fetch(GAS_URL + "?t=" + Date.now());
                const data = await res.json();
                const config = data.config || {};
                
                document.getElementById('reading_url').value = config.reading_folder_url || '';
                document.getElementById('photo_url').value = config.photo_gallery_url || '';
                document.getElementById('about_url').value = config.about_us_url || '';
                
                // 載入 5 張圖片網址
                document.getElementById('slide_img1').value = config.slide_img1 || '';
                document.getElementById('slide_img2').value = config.slide_img2 || '';
                document.getElementById('slide_img3').value = config.slide_img3 || '';
                document.getElementById('slide_img4').value = config.slide_img4 || '';
                document.getElementById('slide_img5').value = config.slide_img5 || '';
                
            } catch (e) {
                showToast("無法載入雲端設定");
            }
            showLoading(false);
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const inputs = document.querySelectorAll('.config-input');
            const editBtn = document.getElementById('editBtn');
            const saveActions = document.getElementById('saveActions');

            inputs.forEach(input => {
                if(isEditMode) {
                    input.readOnly = false;
                    input.classList.remove('input-disabled');
                    input.classList.add('input-enabled');
                } else {
                    input.readOnly = true;
                    input.classList.remove('input-enabled');
                    input.classList.add('input-disabled');
                }
            });

            editBtn.classList.toggle('hidden', isEditMode);
            saveActions.classList.toggle('hidden', !isEditMode);
        }

        async function saveConfigs() {
            const payload = {
                type: 'update_config',
                key: sessionStorage.getItem('staff_key'),
                configs: {
                    reading_folder_url: document.getElementById('reading_url').value,
                    photo_gallery_url: document.getElementById('photo_url').value,
                    about_us_url: document.getElementById('about_url').value,
                    // 新增 5 張圖同步至後端
                    slide_img1: document.getElementById('slide_img1').value,
                    slide_img2: document.getElementById('slide_img2').value,
                    slide_img3: document.getElementById('slide_img3').value,
                    slide_img4: document.getElementById('slide_img4').value,
                    slide_img5: document.getElementById('slide_img5').value
                }
            };
            
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.result === "SUCCESS") {
                    showToast("設定已成功同步至雲端");
                    isEditMode = true; // 暫時維持 true 以便 toggleEditMode 關閉
                    toggleEditMode();
                } else {
                    showToast("儲存失敗：" + result.message);
                }
            } catch (e) {
                showToast("連線異常，請稍後再試");
            }
            showLoading(false);
        }

        function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function showToast(m) { 
            const t = document.getElementById('toast'); 
            t.innerText = m; t.style.opacity = '1'; 
            setTimeout(() => t.style.opacity = '0', 3000); 
        }

        window.onload = loadCurrentConfigs;
    </script>
</body>
</html>
