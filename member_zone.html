<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="text-xl font-bold tracking-wider">築心會館</span>
            </div>
            <button onclick="logout()" class="text-emerald-200 hover:text-white transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6 pb-24">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 id="userName" class="text-3xl font-bold mb-2">載入中...</h2>
                        <span id="userTitle" class="bg-white/20 px-4 py-1 rounded-full text-sm backdrop-blur-md">學員</span>
                    </div>
                    <button onclick="openEditModal()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/10 p-4 rounded-3xl backdrop-blur-sm">
                        <div class="text-white/60 text-xs mb-1">出席率</div>
                        <div id="attPercent" class="text-2xl font-bold">0%</div>
                    </div>
                    <div class="bg-white/10 p-4 rounded-3xl backdrop-blur-sm">
                        <div class="text-white/60 text-xs mb-1">總出席次數</div>
                        <div id="attCountDisplay" class="text-2xl font-bold">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <div class="flex items-center space-x-2 mb-4 text-emerald-800">
                <i class="fas fa-bullhorn"></i>
                <h3 class="font-bold">最新公告</h3>
            </div>
            <p id="news" class="text-gray-600 leading-relaxed">正在獲取最新訊息...</p>
        </div>

        <div id="nextEventCard" class="hidden bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-emerald-900">近期活動</h3>
                <button id="calBtn" class="text-emerald-600 text-sm font-bold flex items-center">
                    <i class="far fa-calendar-plus mr-1"></i> 加進手機日曆
                </button>
            </div>
            <div class="flex items-center space-x-4">
                <div class="bg-emerald-50 text-emerald-700 p-3 rounded-2xl text-center min-w-[60px]">
                    <div id="nextMonth" class="text-xs uppercase font-bold">MON</div>
                    <div id="nextDay" class="text-2xl font-bold">01</div>
                </div>
                <div>
                    <div id="nextTitle" class="font-bold text-emerald-900 text-lg">載入活動中...</div>
                    <div class="text-gray-400 text-sm">09:30 - 12:00 @ 築心會館</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openRemoteLink('reading')" class="p-6 bg-white rounded-[2rem] shadow-sm border border-emerald-50 text-center group active:scale-95 transition">
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-3 text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition">
                    <i class="fas fa-book-reader text-xl"></i>
                </div>
                <span class="font-bold text-emerald-900">雲端書箱</span>
            </button>
            <button onclick="openRemoteLink('photo')" class="p-6 bg-white rounded-[2rem] shadow-sm border border-emerald-50 text-center group active:scale-95 transition">
                <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-3 text-amber-600 group-hover:bg-amber-600 group-hover:text-white transition">
                    <i class="fas fa-images text-xl"></i>
                </div>
                <span class="font-bold text-emerald-900">精彩相簿</span>
            </button>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center text-gray-400 py-10 italic">載入歷程中...</p>
            </div>
        </div>

        <div id="adminEntry" class="hidden pt-6 border-t border-gray-100">
            <button onclick="location.href='staff_page.html'" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center justify-center space-x-2">
                <i class="fas fa-user-shield"></i>
                <span>進入幹部管理後台</span>
            </button>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let remoteConfig = {};

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userTitle').innerText = user.role || '學員';

            if (user.role && user.role !== "學員") {
                document.getElementById('adminEntry').classList.remove('hidden');
            }
            syncData();
        };

        function createCalendarLink(ev) {
            const title = "築心讀書會：" + ev.title;
            const dateStr = ev.date.replace(/-/g, '');
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS) {
                const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${dateStr}T093000\nDTEND:${dateStr}T120000\nSUMMARY:${title}\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([ics], {type:'text/calendar'});
                const url = URL.createObjectURL(blob);
                window.location.href = url;
            } else {
                const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dateStr}T093000/${dateStr}T120000`;
                window.open(url, '_blank');
            }
        }

        async function syncData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                const user = JSON.parse(sessionStorage.getItem('userInfo'));

                document.getElementById('news').innerText = data.news || "歡迎參加";
                
                const today = new Date().toISOString().split('T')[0];
                const upcoming = data.events.filter(e => e.date >= today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,2);
                
                if (upcoming.length > 0) {
                    const next = upcoming[0];
                    const d = new Date(next.date);
                    document.getElementById('nextEventCard').classList.remove('hidden');
                    document.getElementById('nextMonth').innerText = d.toLocaleString('en', {month:'short'});
                    document.getElementById('nextDay').innerText = d.getDate();
                    document.getElementById('nextTitle').innerText = next.title;
                    document.getElementById('calBtn').onclick = () => createCalendarLink(next);
                }

                // 出席計算與列表渲染略... (與之前邏輯相同)
                renderHistory(data.events.filter(e => e.date < today), user.attendLog || []);
                remoteConfig = data.config || {};
            } catch (e) { console.error(e); }
        }

        function renderHistory(past, logs) {
            const list = document.getElementById('historyList');
            list.innerHTML = past.reverse().map(e => `
                <div class="flex justify-between p-4 bg-gray-50 rounded-2xl">
                    <span class="font-bold text-emerald-900">${e.title}</span>
                    <span class="text-xs text-gray-400">${e.date}</span>
                </div>
            `).join('');
        }

        function openRemoteLink(key) { if(remoteConfig[key]) window.open(remoteConfig[key], '_blank'); }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
