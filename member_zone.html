<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .progress-animation { transition: width 1.5s cubic-bezier(0.1, 0.5, 0.1, 1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="font-bold tracking-tight">築心會員館</span>
            </div>
            <button onclick="logout()" class="text-sm bg-white/10 px-4 py-1.5 rounded-full hover:bg-white/20 transition">退出登入</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 space-y-8">
        <div class="bg-emerald-50/50 border border-emerald-100 rounded-3xl p-4 flex items-center space-x-4 shadow-sm">
            <div class="bg-white w-10 h-10 rounded-2xl flex items-center justify-center text-emerald-600 shadow-sm shrink-0">
                <i class="fas fa-bullhorn"></i>
            </div>
            <div class="flex-1 overflow-hidden">
                <p id="news" class="text-emerald-900 font-medium truncate">正在同步最新公告...</p>
            </div>
        </div>

        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-110 transition duration-700">
                <i class="fas fa-quote-right text-9xl"></i>
            </div>
            <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="space-y-2">
                    <div class="flex items-center space-x-3">
                        <span id="userTitle" class="bg-emerald-300/20 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase">載入中</span>
                        <span id="userName" class="text-3xl font-bold tracking-wider">會員名稱</span>
                    </div>
                    <p id="userEmail" class="opacity-80 font-light italic">email address</p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button onclick="openEditModal()" class="bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl hover:bg-white/20 transition flex items-center shadow-lg border border-white/10">
                        <i class="fas fa-user-cog mr-2"></i> 修改資料
                    </button>
                    <button onclick="startScanner()" class="bg-white text-emerald-900 px-6 py-3 rounded-2xl font-bold hover:bg-emerald-50 transition flex items-center shadow-xl">
                        <i class="fas fa-qrcode mr-2"></i> 掃碼簽到
                    </button>
                </div>
            </div>
        </div>

        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-50">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h3 class="text-xl font-bold text-emerald-900">學習狀況</h3>
                    <p class="text-gray-400 text-sm">本學期有效共學歷程</p>
                </div>
                <div class="text-right">
                    <span id="attCount" class="text-4xl font-black text-emerald-800">0</span>
                    <span id="totalEvents" class="text-gray-300 font-bold ml-1">/ 0</span>
                </div>
            </div>
            <div class="h-4 bg-gray-50 rounded-full overflow-hidden shadow-inner border border-gray-100">
                <div id="progressBar" class="progress-animation h-full emerald-gradient shadow-lg" style="width: 0%"></div>
            </div>
            <p id="progressTips" class="mt-4 text-center text-gray-400 text-sm font-medium italic">正在計算學習進度...</p>
        </section>

        <div id="adminSection" class="hidden space-y-4">
            <h3 class="text-lg font-bold text-emerald-900 px-2 flex items-center">
                <i class="fas fa-shield-alt mr-2 text-amber-500"></i> 幹部管理中心
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="location.href='admin_news.html'" class="bg-white p-6 rounded-[2rem] shadow-md hover:scale-[1.02] transition border border-amber-100">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-bullhorn text-xl"></i>
                    </div>
                    <div class="text-sm font-bold text-gray-700">公告管理</div>
                </button>
                <button onclick="location.href='admin_events.html'" class="bg-white p-6 rounded-[2rem] shadow-md hover:scale-[1.02] transition border border-amber-100">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-calendar-check text-xl"></i>
                    </div>
                    <div class="text-sm font-bold text-gray-700">活動管理</div>
                </button>
                <button onclick="location.href='admin_members.html'" class="bg-white p-6 rounded-[2rem] shadow-md hover:scale-[1.02] transition border border-amber-100">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-users-cog text-xl"></i>
                    </div>
                    <div class="text-sm font-bold text-gray-700">會員審核</div>
                </button>
                <button onclick="location.href='admin_config.html'" class="bg-white p-6 rounded-[2rem] shadow-md hover:scale-[1.02] transition border border-amber-100">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-tools text-xl"></i>
                    </div>
                    <div class="text-sm font-bold text-gray-700">系統設定</div>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-12">
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-md transition text-center border border-emerald-50 group">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:rotate-12 transition">
                    <i class="fas fa-book-open text-xl"></i>
                </div>
                <div class="text-sm font-bold text-gray-700">共讀資料庫</div>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-md transition text-center border border-emerald-50 group">
                <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:rotate-12 transition">
                    <i class="fas fa-images text-xl"></i>
                </div>
                <div class="text-sm font-bold text-gray-700">活動剪影</div>
            </button>
        </div>
    </main>

    <div id="editProfileModal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl relative">
            <h4 class="text-2xl font-bold text-emerald-900 mb-6">修改基本資料</h4>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 pl-1">電子郵件</label>
                    <input id="editEmail" type="email" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-transparent focus:border-emerald-500 outline-none">
                </div>
                <div class="pt-2 border-t border-dashed border-gray-100">
                    <label class="block text-sm font-bold text-emerald-800 mb-1 pl-1">設定新密碼</label>
                    <input id="newPassword" type="password" placeholder="不修改請留空" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-transparent focus:border-emerald-500 outline-none">
                </div>
                <div class="pt-4">
                    <label class="block text-sm font-bold text-red-600 mb-1 pl-1 italic">驗證：輸入原密碼</label>
                    <input id="oldPassword" type="password" placeholder="請輸入原密碼" class="w-full px-4 py-3 bg-red-50 rounded-xl border border-red-100 outline-none">
                </div>
                <div class="flex space-x-3 pt-4">
                    <button onclick="closeEditModal()" class="flex-1 py-3 text-gray-400 font-bold">取消</button>
                    <button id="updateBtn" onclick="submitUpdate()" class="flex-[2] bg-emerald-800 text-white py-3 rounded-xl font-bold shadow-lg">確認修改</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scannerModal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div id="reader" class="w-full"></div>
            <div class="p-8 text-center">
                <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500">取消</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {};
        let html5QrCode = null;

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { location.href = 'index.html'; return; }
            
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userEmail').innerText = user.email || '尚未設定 Email';
            document.getElementById('userTitle').innerText = user.title || '學員';
            document.getElementById('attCount').innerText = user.attCount || 0;

            // --- 強行判斷幹部權限 ---
            const t = String(user.title || "").trim();
            // 只要不是空的，且不是單純的「學員」二字，就打開管理區
            if (t !== "" && t !== "學員") {
                document.getElementById('adminSection').classList.remove('hidden');
            }

            loadData();
        };

        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                remoteConfig = data.config;
                document.getElementById('news').innerText = data.news || '歡迎回到讀書會';
                
                // 學習進度：今天以前且需報到
                const user = JSON.parse(sessionStorage.getItem('userInfo'));
                const today = new Date().toISOString().split('T')[0];
                const validEvents = data.calendar.filter(ev => {
                    const isCheckin = (ev.title + ev.description).includes('需報到');
                    return ev.dateText <= today && isCheckin;
                });

                const total = validEvents.length;
                const count = user.attCount || 0;
                const percent = total > 0 ? Math.min(Math.round((count / total) * 100), 100) : 0;
                
                document.getElementById('totalEvents').innerText = `/ ${total}`;
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressTips').innerText = total === 0 ? "尚未開始計算。" : (percent >= 80 ? "卓越！" : "加油！");
            } catch (e) { console.error("同步失敗"); }
        }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldP = document.getElementById('oldPassword').value.trim();
            const newP = document.getElementById('newPassword').value.trim();
            const email = document.getElementById('editEmail').value.trim();

            if (btoa(oldP) !== String(user.password).trim()) {
                alert("❌ 原密碼驗證錯誤"); return;
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true; btn.innerText = "更新中...";

            let payload = { email: email };
            if (newP !== "") payload.password = btoa(newP);

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ currentPhone: user.phone, newData: payload })
                });
                alert("✅ 修改成功，請重新登入。");
                logout();
            } catch (e) {
                alert("網路異常"); btn.disabled = false; btn.innerText = "確認修改";
            }
        }

        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
        function openRemoteLink(key) {
            const url = remoteConfig[key];
            if (url && url.startsWith('http')) window.open(url, '_blank');
            else alert("尚未設定");
        }
        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                stopScanner(); window.location.href = text;
            }).catch(() => stopScanner());
        }
        function stopScanner() {
            if (html5QrCode) html5QrCode.stop().then(() => document.getElementById('scannerModal').classList.add('hidden'));
            else document.getElementById('scannerModal').classList.add('hidden');
        }
    </script>
</body>
</html>
