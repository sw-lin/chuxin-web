<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪客與入會資訊 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; margin: 0; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.4), rgba(6,78,59,0.1)); }
        
        /* 修正後的樣式 */
.slide { 
    display: none; 
    width: 100%; 
    height: 100%; 
    /* 🌟 核心修正：改為 contain 確保完整顯示 */
    object-fit: contain; 
    /* 增加背景色：當圖片比例不符時，兩側或上下會顯示深色底，視覺較和諧 */
    background-color: #064E3B; 
    animation: fade 1.5s; 
}
        
        @keyframes fade { from {opacity: 0.8} to {opacity: 1} }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .info-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #edf2f7; height: 100%; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 nav-glass px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-800 text-2xl"></i>
            <span class="text-2xl md:text-3xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
        </div>
        <button onclick="window.location.href='index.html'" class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-gray-200 transition active:scale-95">
            返回首頁
        </button>
    </nav>

    <header class="relative w-full h-[500px] md:h-[600px] overflow-hidden bg-[#052e23]">
        <div id="slideContainer" class="w-full h-full">
            <div class="slide flex items-center justify-center text-white h-full">載入圖片中...</div>
        </div>
        <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center z-10 pointer-events-none">
            <h1 class="text-4xl md:text-6xl text-white font-bold tracking-widest drop-shadow-lg">歡迎加入築心</h1>
        </div>
    </header>

    <section class="py-20 px-6 bg-[#FDFBF7]">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <div class="info-card">
                    <div class="flex items-center mb-6 border-b-2 border-emerald-100 pb-4">
                        <i class="fas fa-user-plus text-3xl text-amber-500 mr-4"></i>
                        <h2 class="text-2xl font-bold text-emerald-900">如何入會</h2>
                    </div>
                    <div id="content1" class="text-gray-600 leading-relaxed text-lg whitespace-pre-line">載入中...</div>
                </div>

                <div class="info-card">
                    <div class="flex items-center mb-6 border-b-2 border-emerald-100 pb-4">
                        <i class="fas fa-map-marked-alt text-3xl text-amber-500 mr-4"></i>
                        <h2 class="text-2xl font-bold text-emerald-900">課程/活動教室</h2>
                    </div>
                    <div id="content2" class="text-gray-600 leading-relaxed text-lg whitespace-pre-line">載入中...</div>
                </div>

                <div class="info-card">
                    <div class="flex items-center mb-6 border-b-2 border-emerald-100 pb-4">
                        <i class="fas fa-gem text-3xl text-amber-500 mr-4"></i>
                        <h2 class="text-2xl font-bold text-emerald-900">會員權益</h2>
                    </div>
                    <div id="content3" class="text-gray-600 leading-relaxed text-lg whitespace-pre-line">載入中...</div>
                </div>

            </div>
        </div>
    </section>

    <section id="register" class="py-24 px-6 bg-[#F9F6F0]">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-emerald-900 mb-2">加入我們</h2>
                <p class="text-gray-500">期待與您在書香中相遇</p>
            </div>
            <form action="https://formspree.io/f/xpqjvblg" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-emerald-100 space-y-6">
                <input type="text" name="姓名" required placeholder="您的姓名" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <input type="email" name="Email" required placeholder="您的電子郵件 (Email)" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <input type="tel" name="電話" required pattern="09\d{8}" title="請輸入正確的台灣手機格式（例如：0912345678）" placeholder="手機號碼（例：0912345678）" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <textarea name="如何知道築心與建議" rows="3" placeholder="如何知道築心？提出建議或問題...." class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold resize-none"></textarea>
                <button type="submit" class="w-full bg-emerald-800 text-white font-bold py-5 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">提交表單</button>
            </form>            
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-xs tracking-widest uppercase">© 2026 Chuxin Book Club</footer>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";
let slideIndex = 0;
let slideTimeout;

function transformDriveUrl(url) {
    if (!url) return "";
    if (!url.includes('drive.google.com')) return url;
    let id = "";
    if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
    else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
    return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

async function initData() {
    try {
        const res = await fetch(GAS_URL + "?t=" + Date.now());
        const data = await res.json();
        const config = data.config || {};

        // --- 1. 載入文字內容 ---
        const getVal = (key) => {
            const item = config[key];
            return (typeof item === 'object') ? (item.normal || item.promo || item.value) : item;
        };

        // 使用 replace 將 Google Sheet 的換行符號轉成 HTML 換行
        document.getElementById('content1').innerHTML = formatContent((getVal('guest_content1') || "建置中...").replace(/\n/g, '<br>'));
        document.getElementById('content2').innerHTML = formatContent((getVal('guest_content2') || "建置中...").replace(/\n/g, '<br>'));
        document.getElementById('content3').innerHTML = formatContent((getVal('guest_content3') || "建置中...").replace(/\n/g, '<br>'));

        // --- 2. 載入圖片 (最多3張) ---
        let slidesUrls = [];
        for (let i = 1; i <= 3; i++) {
            const imgUrl = getVal(`guest_slide${i}`);
            if (imgUrl && imgUrl.trim() !== "" && !imgUrl.includes("images/")) {
                slidesUrls.push(transformDriveUrl(imgUrl));
            }
        }

        const container = document.getElementById('slideContainer');
        if (slidesUrls.length > 0) {
            container.innerHTML = slidesUrls.map(url => `<img class="slide" src="${url}">`).join('');
            
            // 判斷：一張就固定顯示，多張才輪播
            if (slidesUrls.length > 1) {
                startSlides();
            } else {
                document.querySelector('.slide').style.display = "block";
            }
        } else {
            // 如果都沒設定圖片，顯示預設純色底
            container.innerHTML = `<div class="slide flex items-center justify-center bg-emerald-800 text-white h-full w-full"></div>`;
            document.querySelector('.slide').style.display = "block";
        }

    } catch (e) {
        console.error("載入失敗:", e);
        document.getElementById('content1').innerText = "連線異常";
    }
}

function startSlides() {
    let slides = document.getElementsByClassName("slide");
    if (slides.length <= 1) return; // 安全機制
    
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    slideTimeout = setTimeout(startSlides, 5000);
}

// --- 修改後的內容處理邏輯 ---
const formatContent = (text) => {
    if (!text) return "建置中...";
    
    // 1. 處理換行
    let html = text.replace(/\n/g, '<br>');

    // 2. 🌟 關鍵修正：支援 [標題|網址] 轉換為漂亮的按鈕或連結
    // 正則表達式會抓取 [文字|網址] 的格式
    html = html.replace(/\[([^|\]]+)\|([^\]]+)\]/g, (match, title, url) => {
        return `<a href="${url}" target="_blank" class="inline-flex items-center px-3 py-1 bg-emerald-50 text-emerald-700 rounded-lg border border-emerald-200 hover:bg-emerald-100 transition-all font-bold mx-1">
                    <i class="fas fa-map-marker-alt mr-1"></i>${title}
                </a>`;
    });

    return html;
};
    
window.onload = initData;
</script>
</body>
</html>
