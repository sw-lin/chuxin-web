<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F4F7F5; }
        .tab-btn { padding: 12px 20px; font-size: 16px; font-weight: 600; color: #64748b; border-bottom: 3px solid transparent; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: #064E3B; border-bottom-color: #064E3B; background: rgba(6, 78, 59, 0.05); }
        .hidden { display: none !important; }
        .edit-mode .show-on-edit { display: block !important; }
        /* 讓清單字體變大 */
        .list-text { font-size: 18px; font-weight: 500; }
        .sub-text { font-size: 14px; color: #64748b; font-family: monospace; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm overflow-x-auto">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-20">
            <div class="flex items-center space-x-2 shrink-0">
                <i class="fas fa-toolbox text-emerald-700 text-2xl"></i>
                <span class="font-bold text-emerald-900 text-xl">管理中樞</span>
            </div>
            <div class="flex space-x-1 overflow-x-auto no-scrollbar mx-4">
                <button onclick="switchTab('news')" id="btn-news" class="tab-btn active">公告欄</button>
                <button onclick="switchTab('line')" id="btn-line" class="tab-btn">Line 訊息</button>
                <button onclick="switchTab('members')" id="btn-members" class="tab-btn">會員名冊</button>
                <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn">行事曆</button>
                <button onclick="switchTab('system')" id="btn-system" class="tab-btn">系統設定</button>
            </div>
            <div class="flex items-center space-x-3 shrink-0">
                <button id="editMasterBtn" onclick="toggleEditMode()" class="bg-gray-100 text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm">
                    <i class="fas fa-edit"></i> 進入編輯
                </button>
                <button onclick="location.href='member_zone.html'" class="text-gray-400"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8" id="main-content">
        
        <section id="sec-news" class="tab-content space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <h3 class="font-bold text-emerald-900 mb-4 text-xl">首頁跑馬燈公告</h3>
                <textarea id="input-news" rows="4" class="w-full bg-gray-50 p-5 rounded-3xl outline-none text-lg border-2 border-transparent focus:border-emerald-200" placeholder="在此輸入公告內容..."></textarea>
                <button onclick="updateNews()" class="w-full mt-4 bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">發布公告</button>
            </div>
        </section>

        <section id="sec-line" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <h3 class="font-bold text-emerald-900 mb-4 text-xl">Line 通知發送</h3>
                <textarea id="line-msg" rows="12" class="w-full bg-blue-50/30 p-6 rounded-3xl outline-none text-lg border-2 border-transparent focus:border-blue-200" placeholder="輸入要發送到 Line 群組的訊息...&#10;(支援換行編輯)"></textarea>
                <button onclick="saveLineMsg()" class="w-full mt-4 bg-[#06C755] text-white py-4 rounded-2xl font-bold text-lg shadow-lg">即時傳送訊息</button>
            </div>
        </section>

        <section id="sec-members" class="tab-content hidden space-y-6">
            <div id="add-member-bar" class="bg-orange-50 p-6 rounded-[2rem] border border-orange-200 hidden show-on-edit">
                <h4 class="font-bold text-orange-800 mb-4">新增會員 (預設密碼為 1234)</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="mName" placeholder="姓名" class="p-4 rounded-xl text-lg outline-none border border-orange-200">
                    <input type="tel" id="mPhone" placeholder="手機號碼" class="p-4 rounded-xl text-lg outline-none border border-orange-200">
                    <input type="email" id="mEmail" placeholder="電子郵件" class="p-4 rounded-xl text-lg outline-none border border-orange-200">
                </div>
                <button onclick="addMember()" class="w-full mt-4 bg-orange-600 text-white py-4 rounded-xl font-bold">確認加入名冊</button>
            </div>
            <div id="memberList" class="space-y-3">
                </div>
        </section>

        <section id="sec-calendar" class="tab-content hidden space-y-6">
            <div id="add-event-bar" class="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-200 hidden show-on-edit">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="date" id="calDate" class="p-4 rounded-xl text-lg outline-none border border-emerald-200">
                    <input type="text" id="calTitle" placeholder="活動名稱" class="p-4 rounded-xl text-lg outline-none border border-emerald-200">
                </div>
                <button onclick="addEvent()" class="w-full mt-4 bg-emerald-800 text-white py-4 rounded-xl font-bold">建立新活動</button>
            </div>
            <div id="eventList" class="space-y-3"></div>
        </section>

        <section id="sec-system" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <h3 class="font-bold text-emerald-900 mb-6 text-xl">外部資料設定</h3>
                <div class="space-y-5">
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">課程資料夾 (Google Drive)</label>
                        <input type="text" id="conf-reading" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm border">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">活動剪影 (Google Photo / Drive)</label>
                        <input type="text" id="conf-photo" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm border">
                    </div>
                    <button onclick="saveSystemConfig()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold shadow-lg">儲存設定</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let adminKey = "";
        let isEditMode = false;
        let cachedData = null;

        window.onload = async () => {
            adminKey = sessionStorage.getItem('adminKey');
            if (!adminKey) {
                adminKey = prompt("請輸入管理授權碼：");
                if (!adminKey) { location.href = 'member_zone.html'; return; }
                sessionStorage.setItem('adminKey', adminKey);
            }
            fetchData();
        };

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editMasterBtn');
            const main = document.getElementById('main-content');
            if (isEditMode) {
                btn.innerHTML = '<i class="fas fa-check"></i> 完成編輯';
                btn.className = "bg-orange-500 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md";
                main.classList.add('edit-mode');
            } else {
                btn.innerHTML = '<i class="fas fa-edit"></i> 進入編輯';
                btn.className = "bg-gray-100 text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm";
                main.classList.remove('edit-mode');
            }
            renderAll();
        }

        async function apiPost(data) {
            data.key = adminKey;
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.result === "SUCCESS") { 
                    alert("操作成功！"); 
                    fetchData(); 
                } else { alert("失敗: " + result.message); }
            } catch (e) { alert("連線成功送出 (請確認後端更新)"); fetchData(); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                cachedData = await res.json();
                renderAll();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            if (!cachedData) return;
            document.getElementById('input-news').value = cachedData.news || "";
            document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
            document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";
            
            renderMembers(cachedData.users || []);
            renderEvents(cachedData.calendar || []);
        }

        // --- 名冊排版：一行一人，字體大 ---
        function renderMembers(users) {
            const list = document.getElementById('memberList');
            list.innerHTML = users.map(u => `
                <div class="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div class="flex-1">
                        <span class="list-text text-emerald-900">${u.name}</span>
                        <span class="mx-3 text-gray-300">|</span>
                        <span class="list-text text-gray-600">${u.phone}</span>
                        <div class="sub-text mt-1 text-gray-400">${u.email || '未設定 Email'}</div>
                    </div>
                    <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 hidden show-on-edit p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            list.innerHTML = [...events].reverse().map(ev => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center border">
                    <div><div class="text-xs text-emerald-600 font-bold font-mono">${ev.dateText}</div><div class="list-text text-emerald-900">${ev.title}</div></div>
                    <button onclick="deleteEvent('${ev.dateText}')" class="text-gray-300 hover:text-red-500 hidden show-on-edit p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveLineMsg() { apiPost({ type: "send_line", message: document.getElementById('line-msg').value }); }
        function saveSystemConfig() { 
            apiPost({ type: "update_config", reading_folder_url: document.getElementById('conf-reading').value, photo_gallery_url: document.getElementById('conf-photo').value }); 
        }
        function addMember() { 
            const name = document.getElementById('mName').value;
            const phone = document.getElementById('mPhone').value;
            if(!name || !phone) return alert("姓名與電話為必填");
            // 使用預設密碼 1234
            apiPost({ type: "add_member", name, phone, email: document.getElementById('mEmail').value, password: "1234" }); 
        }
        function deleteMember(phone) { if(confirm("確定刪除此會員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(date) { if(confirm("確定刪除活動？")) apiPost({ type: "delete_event", date: date }); }
    </script>
</body>
</html>
