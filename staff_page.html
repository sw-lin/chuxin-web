<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-user-shield"></i></div>
                <h1 class="text-xl font-bold tracking-wider">幹部管理後台</h1>
            </div>
            <button onclick="location.href='index.html'" class="text-sm bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">返回首頁</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <div class="flex space-x-8 border-b mb-8 overflow-x-auto">
            <button onclick="showTab('news')" id="tab-news" class="tab-btn py-4 font-bold transition tab-active">公告管理</button>
            <button onclick="showTab('members')" id="tab-members" class="tab-btn py-4 font-bold text-gray-400 transition">成員管理</button>
            <button onclick="showTab('calendar')" id="tab-calendar" class="tab-btn py-4 font-bold text-gray-400 transition">行事曆與報到</button>
            <button onclick="showTab('rank')" id="tab-rank" class="tab-btn py-4 font-bold text-gray-400 transition">數據排行榜</button>
        </div>

        <div id="section-news" class="tab-content">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-4 text-emerald-900">最新公告維護</h3>
                <textarea id="newsContent" rows="4" class="w-full p-4 bg-gray-50 rounded-2xl border mb-4 text-sm" placeholder="請輸入欲顯示在會員專區的公告內容..."></textarea>
                <button onclick="publishNews()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">立即發佈</button>
            </div>
        </div>

        <div id="section-members" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-2xl border shadow-sm h-fit">
                    <h3 class="font-bold mb-4">新增成員</h3>
                    <div class="space-y-4">
                        <input id="add-name" type="text" placeholder="姓名" class="w-full p-3 bg-gray-50 rounded-xl border text-sm">
                        <input id="add-phone" type="text" placeholder="手機號碼" class="w-full p-3 bg-gray-50 rounded-xl border text-sm">
                        <input id="add-pass" type="password" placeholder="登入密碼" class="w-full p-3 bg-gray-50 rounded-xl border text-sm">
                        <button onclick="addMember()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">確認新增</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border shadow-sm">
                    <div id="memberList" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>

        <div id="section-calendar" class="tab-content hidden">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border mb-8">
                <h3 class="text-xl font-bold mb-6 text-emerald-900">新增讀書會活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">活動日期</label>
                        <input id="newDate" type="date" class="w-full p-3 bg-gray-50 rounded-xl border text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">活動名稱</label>
                        <input id="newTitle" type="text" placeholder="例：期中導讀" class="w-full p-3 bg-gray-50 rounded-xl border text-sm">
                    </div>
                    <div class="flex items-center space-x-2 pb-3 px-2">
                        <input id="newNeedCheckin" type="checkbox" class="w-5 h-5 accent-emerald-600 cursor-pointer">
                        <label for="newNeedCheckin" class="text-sm font-bold text-gray-600 cursor-pointer">產生報到 QR</label>
                    </div>
                    <button onclick="addEvent()" class="bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition">加入行事曆</button>
                </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div id="section-rank" class="tab-content hidden">
            <div class="bg-white rounded-3xl p-8 border shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-emerald-900">學習參與度排行榜</h3>
                    <button onclick="resetAttendance()" class="text-xs text-red-500 hover:underline"><i class="fas fa-redo mr-1"></i>期末重置數據</button>
                </div>
                <div id="rankList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] text-center max-w-sm w-full mx-4 shadow-2xl">
            <h2 id="qrTitle" class="text-xl font-bold text-emerald-900 mb-2">活動報到</h2>
            <p class="text-gray-400 text-sm mb-6">請會員使用手機掃描下方條碼</p>
            <div id="qrcode" class="flex justify-center mb-8 p-4 bg-white border-4 border-emerald-50 rounded-3xl"></div>
            <button onclick="closeQR()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition">關閉窗口</button>
        </div>
    </div>

    <script>
        const GAS_URL = "您的_GAS_網頁應用程式_URL";
        const CHECKIN_URL = "您的_checkin_page_網頁_URL"; // 指向會員掃碼後的報到頁面
        let allData = {};

        window.onload = async () => {
            const res = await fetch(GAS_URL);
            allData = await res.json();
            document.getElementById('newsContent').value = allData.news;
            renderMembers();
            renderCalendar();
            renderRank();
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-emerald-900'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        // --- 成員渲染 ---
        function renderMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = allData.users.map(u => `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-4 bg-gray-50 rounded-2xl border-b gap-4">
                    <div>
                        <div class="font-bold text-emerald-900">${u.name}</div>
                        <div class="text-xs text-gray-400">${u.phone}</div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <select onchange="updateMember('${u.phone}', 'title', this.value)" class="text-xs border rounded p-1 bg-white">
                            <option value="" ${u.title === '' ? 'selected' : ''}>一般會員</option>
                            <option value="會長" ${u.title === '會長' ? 'selected' : ''}>會長</option>
                            <option value="幹部" ${u.title === '幹部' ? 'selected' : ''}>幹部</option>
                        </select>
                        <select onchange="updateMember('${u.phone}', 'paid', this.value)" class="text-xs border rounded p-1 ${u.paid==='是'?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'}">
                            <option value="否" ${u.paid === '否' ? 'selected' : ''}>未繳費</option>
                            <option value="是" ${u.paid === '是' ? 'selected' : ''}>已繳費</option>
                        </select>
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 px-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // --- 行事曆渲染 ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = allData.calendar.map(c => {
                const needsQR = (c.description === "需報到");
                return `
                    <div class="bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-center transition hover:shadow-md">
                        <div>
                            <div class="text-xs font-bold text-orange-500">${c.dateText}</div>
                            <div class="font-bold text-emerald-900">${c.title}</div>
                            ${needsQR ? '<span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-md mt-1 inline-block font-bold">需報到</span>' : ''}
                        </div>
                        <div class="flex items-center space-x-2">
                            ${needsQR ? 
                                `<button onclick="generateQR('${c.dateText}','${c.title}')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm hover:bg-emerald-700"><i class="fas fa-qrcode mr-1"></i>QR</button>` : 
                                `<span class="text-gray-300 text-[10px] italic pr-2">純記錄</span>`
                            }
                            <button onclick="deleteEvent('${c.dateText}')" class="text-gray-300 hover:text-red-500 px-2"><i class="fas fa-times text-lg"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 排行榜渲染 ---
        function renderRank() {
            const list = document.getElementById('rankList');
            const sorted = [...allData.users].sort((a, b) => b.attCount - a.attCount);
            list.innerHTML = sorted.map((u, index) => `
                <div class="flex items-center justify-between p-4 ${index < 3 ? 'bg-orange-50' : 'bg-gray-50'} rounded-2xl">
                    <div class="flex items-center space-x-4">
                        <span class="font-bold w-6 text-center ${index < 3 ? 'text-orange-500' : 'text-gray-400'}">${index + 1}</span>
                        <div>
                            <div class="font-bold text-emerald-900 text-sm">${u.name}</div>
                            <div class="text-[10px] text-gray-400">${u.title || '一般會員'}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-bold text-emerald-600">${u.attCount} <span class="text-[10px] text-gray-400">次</span></div>
                        <div class="text-[10px] text-gray-400">出席率 ${Math.round((u.attCount/allData.totalEvents)*100) || 0}%</div>
                    </div>
                </div>
            `).join('');
        }

        // --- API 交互 ---
        async function apiPost(payload) {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("更新成功！");
                location.reload();
            } catch (e) { alert("連線失敗"); }
        }

        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }); }
        
        function addMember() {
            const n = document.getElementById('add-name').value;
            const p = document.getElementById('add-phone').value;
            const s = document.getElementById('add-pass').value;
            if(!n || !p || !s) return alert("請填寫完整");
            apiPost({ type: "add_member", name: n, phone: p, password: s });
        }

        function updateMember(phone, field, value) {
            const newData = {}; newData[field] = value;
            apiPost({ currentPhone: phone, newData: newData });
        }

        function deleteMember(p) { if(confirm("確定刪除此成員？所有紀錄將消失。")) apiPost({ type: "delete_member", currentPhone: p }); }

        function addEvent() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newTitle').value;
            const c = document.getElementById('newNeedCheckin').checked;
            if(!d || !t) return alert("請填寫活動日期與標題");
            apiPost({ type: "add_event", date: d, title: t, needCheckin: c });
        }

        function deleteEvent(d) { if(confirm("確定刪除此活動？")) apiPost({ type: "delete_event", date: d }); }

        function resetAttendance() { if(confirm("【警告】這將清空本學期所有簽到數據，適合新學期開始時使用。確定清空？")) apiPost({ type: "reset_attendance" }); }

        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 200, height: 200 });
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    </script>
</body>
</html>
