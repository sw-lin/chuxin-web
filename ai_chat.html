<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>築心智慧管家 - 注入測試版</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/oversea/index.js"></script>
    <style>
        #chat-container { width: 100vw; height: 100vh; }
        /* 💡 可選：隱藏第一條系統發出的訊息（如果 SDK 支援 DOM 操作） */
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        async function fetchToken() {
            const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
            const data = await response.json();
            return data.token;
        }

window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('user_name') || '訪客';
    const phone = urlParams.get('user_phone') || '未提供';

    // 🎯 核心改動 1：將身分編碼進 User ID，徹底解決「林士偉」記憶殘留問題
    // 這樣每換一個姓名/電話，對 Bot 來說都是一個全新的乾淨空間
    const uniqueUserId = btoa(encodeURIComponent(`${name}_${phone}`)).substring(0, 15);

    const ChatClient = window.CozeWebChat?.Client || window.CozeWebSDK?.WebChatClient;

    if (ChatClient) {
        const client = new ChatClient({
            config: { bot_id: '7620394792719499317' },
            user: uniqueUserId, 
            auth: { type: "token", onRefreshToken: fetchToken },
            el: document.getElementById('chat-container'),
        });

        // 🎯 核心改動 2：SDK 就緒後，自動替使用者發出第一聲招呼
        client.on('ready', () => {
            // 直接發送文字訊息，完全繞過 variables 欄位限制
            client.send(`[系統自動初始化] 我是${name}，電話是${phone}。請以此身分開始服務。`);
        });
    }
});
    </script>
</body>
</html>
