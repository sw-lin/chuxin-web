<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        
        /* 加大 LINE 對話框縱深 */
        #pushMsg { 
            min-height: 250px; 
            line-height: 1.6;
            font-size: 1rem;
            resize: vertical;
        }
        
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none !important; }
        .btn-loading { opacity: 0.6; pointer-events: none; }
        .unauthorized { opacity: 0; pointer-events: none; }
        .edit-mode-active { border-color: #F97316 !important; color: #F97316 !important; background-color: #FFF7ED; }
    </style>
</head>
<body id="adminBody" class="pb-12 unauthorized transition-opacity duration-500">

    <header class="admin-gradient text-white py-6 px-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center">
                    <i class="fas fa-shield-alt mr-3"></i> 築心管理系統
                </h1>
                <p class="text-emerald-100 text-sm opacity-80 mt-1">幹部管理模式</p>
            </div>
            <a href="member_zone.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm transition">
                <i class="fas fa-home mr-1"></i> 會員專區
            </a>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-0 z-40 mb-6 border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
            <div class="flex overflow-x-auto whitespace-nowrap">
                <button onclick="switchTab('news')" id="tab-news" class="py-4 px-6 font-medium tab-active">公告與 LINE</button>
                <button onclick="switchTab('members')" id="tab-members" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">會員名單</button>
                <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">行事曆</button>
                <button onclick="switchTab('payment')" id="tab-payment" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">繳費狀況</button>
                <button onclick="switchTab('attendance')" id="tab-attendance" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">出席紀錄</button>
                <button onclick="switchTab('system')" id="tab-system" class="py-4 px-6 text-gray-500 font-medium hover:text-emerald-700 transition">系統設定</button>
            </div>
            <button id="editToggleBtn" onclick="toggleEditMode()" class="ml-4 flex items-center gap-2 px-4 py-1.5 border-2 border-gray-200 rounded-full text-gray-400 font-bold text-sm transition-all hover:border-orange-400 hover:text-orange-500">
                <i class="fas fa-edit"></i> <span>編輯模式：關</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <section id="sec-news" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="text-lg font-bold mb-4 flex items-center text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 首頁公告更新</h3>
                <textarea id="newsContent" rows="4" class="w-full p-4 bg-gray-50 border rounded-xl focus:ring-2 ring-emerald-100 outline-none" placeholder="輸入公告內容..."></textarea>
                <button id="btn-publishNews" onclick="publishNews()" class="mt-4 bg-emerald-700 text-white px-8 py-3 rounded-xl hover:bg-emerald-800 transition">發布公告</button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <h3 class="text-lg font-bold mb-4 flex items-center text-emerald-900"><i class="fab fa-line mr-2 text-green-500"></i> LINE 訊息發送</h3>
                <textarea id="pushMsg" class="w-full p-4 bg-gray-50 border rounded-xl mb-4 focus:ring-2 ring-emerald-100 outline-none" placeholder="請在此輸入或產生訊息內容..."></textarea>
                <button id="btn-sendPush" onclick="sendLinePush()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl hover:bg-emerald-700 transition font-bold">確認並發送至群組</button>
            </div>
        </section>

        <section id="sec-members" class="hidden space-y-6">
            <div id="quickAddZone" class="hidden bg-orange-50 rounded-2xl p-6 shadow-sm border-2 border-orange-200">
                <h3 class="font-bold mb-4 text-orange-700 flex items-center"><i class="fas fa-user-plus mr-2"></i> 快速新增人員 (編輯模式)</h3>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                    <input type="text" id="mName" placeholder="姓名" class="p-2 border rounded-lg focus:ring-2 ring-orange-200 outline-none">
                    <input type="text" id="mPhone" placeholder="電話 (帳號)" class="p-2 border rounded-lg focus:ring-2 ring-orange-200 outline-none">
                    <input type="password" id="mPass" placeholder="預設密碼" class="p-2 border rounded-lg focus:ring-2 ring-orange-200 outline-none">
                    <input type="text" id="mEmail" placeholder="Email" class="p-2 border rounded-lg focus:ring-2 ring-orange-200 outline-none">
                    <button id="btn-addMember" onclick="addMember()" class="bg-orange-600 text-white py-2 rounded-lg font-bold">確認新增</button>
                </div>
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-emerald-50">
                <table class="w-full text-left">
                    <thead class="bg-emerald-50 text-emerald-900">
                        <tr>
                            <th class="p-4">姓名/職稱</th>
                            <th class="p-4">電話(帳號)</th>
                            <th class="p-4">Email</th>
                            <th class="p-4 text-right edit-col hidden">操作</th>
                        </tr>
                    </thead>
                    <tbody id="memberList"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-calendar" class="hidden space-y-6">
            <div id="calendarAddZone" class="hidden bg-orange-50 rounded-2xl p-6 shadow-sm border-2 border-orange-200">
                <h3 class="font-bold mb-4 text-orange-700 flex items-center"><i class="fas fa-calendar-plus mr-2"></i> 新增活動 (編輯模式)</h3>
                <div class="flex flex-wrap gap-4">
                    <input type="date" id="newDate" class="p-2 border rounded-lg focus:ring-2 ring-orange-200 outline-none">
                    <input type="text" id="newTitle" placeholder="活動主題" class="p-2 border rounded-lg flex-1 focus:ring-2 ring-orange-200 outline-none">
                    <label class="flex items-center text-sm font-bold text-gray-600 cursor-pointer"><input type="checkbox" id="newNeedCheckin" class="mr-2 w-4 h-4"> 需簽到</label>
                    <button id="btn-addEvent" onclick="addEvent()" class="bg-orange-600 text-white px-8 py-2 rounded-lg font-bold">建立活動</button>
                </div>
            </div>
            <div id="calendarList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-payment" class="hidden space-y-6">
            <div id="paymentAddZone" class="hidden bg-orange-50 rounded-2xl p-6 shadow-sm border-2 border-orange-200">
                <h3 class="font-bold mb-4 text-orange-700 flex items-center"><i class="fas fa-plus-circle mr-2"></i> 開立新收費項目 (編輯模式)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="payTitle" placeholder="項目名稱 (如：4月停車費)" class="p-2 border rounded-lg outline-none">
                    <input type="date" id="payDeadline" class="p-2 border rounded-lg outline-none">
                    <button id="btn-addPayItem" onclick="addPaymentItem()" class="bg-orange-600 text-white py-2 rounded-lg font-bold">建立收費單</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-50">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h3 class="font-bold text-emerald-900 text-lg flex items-center">
                        <i class="fas fa-money-check-alt mr-2 text-orange-500"></i> 收費項目：
                        <select id="currentPayItem" onchange="renderPayment()" class="ml-2 bg-emerald-50 border-none rounded-lg px-3 py-1 outline-none">
                            <option value="2026會費">2026會費</option>
                        </select>
                    </h3>
                    <button onclick="preparePaymentListMsg()" class="text-sm bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full font-bold hover:bg-emerald-200 transition">
                        <i class="fas fa-copy mr-1"></i> 產生本項繳費名單至 LINE
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-emerald-50 text-emerald-900">
                            <tr><th class="p-4">姓名</th><th class="p-4">項目</th><th class="p-4 text-center">狀態</th></tr>
                        </thead>
                        <tbody id="paymentList"></tbody>
                    </table>
                </div>
            </div>
        </section>

        </main>

    <div id="qrModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center relative">
            <button onclick="closeModal('qrModal')" class="absolute top-4 right-4 text-gray-400"><i class="fas fa-times text-xl"></i></button>
            <h3 id="qrTitle" class="text-xl font-bold text-emerald-900"></h3>
            <p id="qrDate" class="text-gray-500 mb-6 font-mono text-sm"></p>
            <div id="qrcode" class="flex justify-center mb-6 p-4 border rounded-2xl"></div>
        </div>
    </div>

    <script>
        let ADMIN_KEY = "";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; 
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html"; 
        let allData = null;
        let isEditMode = false;

        async function init() {
            const key = prompt("管理驗證，請輸入金鑰：");
            if (!key) { location.replace('member_zone.html'); return; }
            ADMIN_KEY = key;
            await fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ type: "get_all_data", adminKey: ADMIN_KEY }) });
                const result = await res.text();
                if (result === "WRONG_KEY") { alert("❌ 金鑰失效！"); location.replace('member_zone.html'); return; }
                allData = JSON.parse(result);
                renderAll();
                document.getElementById('adminBody').classList.remove('unauthorized');
                document.getElementById('adminBody').style.opacity = "1";
            } catch (e) { alert("連線錯誤"); }
        }

        function toggleEditMode(forceValue) {
            isEditMode = (forceValue !== undefined) ? forceValue : !isEditMode;
            const btn = document.getElementById('editToggleBtn');
            if (isEditMode) {
                btn.classList.add('edit-mode-active');
                btn.querySelector('span').innerText = "編輯模式：開";
            } else {
                btn.classList.remove('edit-mode-active');
                btn.querySelector('span').innerText = "編輯模式：關";
            }
            renderMembers();
            renderCalendar();
            renderPayment();
        }

        function switchTab(tab) {
            toggleEditMode(false); 
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        // --- 業務功能 ---

        function renderPayment() {
            const list = document.getElementById('paymentList');
            const selectedItem = document.getElementById('currentPayItem').value;
            const addZone = document.getElementById('paymentAddZone');
            isEditMode ? addZone.classList.remove('hidden') : addZone.classList.add('hidden');

            list.innerHTML = allData.users.map(u => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-gray-800">${u.name}</td>
                    <td class="p-4 text-xs text-gray-500">${selectedItem}</td>
                    <td class="p-4 text-center">
                        <button onclick="togglePaid('${u.phone}', '${u.paid}')" 
                            class="px-4 py-1 rounded-full text-xs font-bold transition-all ${u.paid==='是'?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-600'}">
                            ${u.paid==='是'?'已完成':'未繳納'}
                        </button>
                    </td>
                </tr>`).join('');
        }

        function preparePaymentListMsg() {
            const selectedItem = document.getElementById('currentPayItem').value;
            const paidMembers = allData.users.filter(u => u.paid === '是').map(u => u.name);
            const msg = `【${selectedItem}】目前已繳費名單如下：\n------------------\n${paidMembers.length > 0 ? paidMembers.join('\n') : '(尚無人繳費)'}\n------------------\n共計：${paidMembers.length} 人\n感謝各位參與！`;
            
            document.getElementById('pushMsg').value = msg;
            switchTab('news');
            document.getElementById('pushMsg').scrollIntoView({ behavior: 'smooth' });
        }

        function sendLinePush() {
            const msg = document.getElementById('pushMsg').value;
            if (!msg.trim()) return alert("請輸入內容");
            if (confirm(`【最後確認】即將發送訊息至 LINE 群組，確定內容無誤？\n\n${msg}`)) {
                apiPost({ type: "send_line_push", content: msg }, "btn-sendPush", () => {
                    document.getElementById('pushMsg').value = "";
                });
            }
        }

        function addPaymentItem() {
            const title = document.getElementById('payTitle').value;
            const deadline = document.getElementById('payDeadline').value;
            if(!title) return alert("請輸入項目名稱");
            apiPost({ type: "add_payment_item", title: title, deadline: deadline }, "btn-addPayItem", () => {
                document.getElementById('payTitle').value = "";
                document.getElementById('payDeadline').value = "";
            });
        }

        // --- 核心共用功能 (維持原樣) ---
        async function apiPost(data, btnId, successCallback) {
            const btn = btnId ? document.getElementById(btnId) : null;
            if (btn) { btn.disabled = true; btn.classList.add('btn-loading'); }
            try {
                data.adminKey = ADMIN_KEY;
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                const result = await res.text();
                if (result === "SUCCESS" || result === "OK") { 
                    alert("✅ 執行成功"); 
                    if (successCallback) successCallback(); 
                    await fetchData(); 
                } else { alert("錯誤：" + result); }
            } catch (e) { alert("連線超時"); }
            finally { if (btn) { btn.disabled = false; btn.classList.remove('btn-loading'); } }
        }

        function renderAll() {
            if (allData.news) document.getElementById('newsContent').value = allData.news;
            renderMembers(); renderCalendar(); renderPayment();
        }

        function renderMembers() {
            const list = document.getElementById('memberList');
            const quickAddZone = document.getElementById('quickAddZone');
            const editCols = document.querySelectorAll('.edit-col');
            isEditMode ? quickAddZone.classList.remove('hidden') : quickAddZone.classList.add('hidden');
            editCols.forEach(el => isEditMode ? el.classList.remove('hidden') : el.classList.add('hidden'));

            list.innerHTML = allData.users.map(u => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4"><div class="font-bold text-gray-800">${u.name}</div><div class="text-xs text-emerald-600">${u.title || '學員'}</div></td>
                    <td class="p-4 font-mono text-sm">${u.phone}</td>
                    <td class="p-4 text-sm text-gray-500">${u.email || ''}</td>
                    <td class="p-4 text-right ${isEditMode ? '' : 'hidden'}">
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`).join('');
        }

        function renderCalendar() {
            const container = document.getElementById('calendarList');
            const addZone = document.getElementById('calendarAddZone');
            isEditMode ? addZone.classList.remove('hidden') : addZone.classList.add('hidden');
            container.innerHTML = allData.calendar.map(ev => `
                <div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div>
                        <div class="text-xs font-bold text-emerald-600">${ev.dateText}</div>
                        <div class="font-bold text-gray-800 text-lg">${ev.title}</div>
                    </div>
                    <div class="flex gap-2">
                        ${ev.description === "需報到" ? `<button onclick="showQR('${ev.dateText}','${ev.title}')" class="w-10 h-10 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-full"><i class="fas fa-qrcode"></i></button>` : ''}
                        ${isEditMode ? `<button onclick="deleteEvent('${ev.dateText}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>`).join('');
        }

        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }, "btn-publishNews"); }
        function addMember() { 
            const rawPassword = document.getElementById('mPass').value;
            apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value, password: btoa(rawPassword) }, "btn-addMember"); 
        }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('newDate').value, title: document.getElementById('newTitle').value, needCheckin: document.getElementById('newNeedCheckin').checked }, "btn-addEvent"); }
        function deleteEvent(date) { if(confirm("確定刪除活動？")) apiPost({ type: "delete_event", date: date }); }
        function deleteMember(phone) { if(confirm("確定刪除會員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function togglePaid(phone, current) { apiPost({ type: "update_paid_status", phone: phone, newStatus: current==='是'?'否':'是' }); }
        function showQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180, colorDark : "#064E3B" });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
