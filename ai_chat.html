<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>築心智慧夥伴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        /* 隱藏卷軸 */
        ::-webkit-scrollbar { display: none; }
        .chat-container { height: calc(100vh - 4rem - 5rem); }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="emerald-gradient text-white px-4 h-16 shadow-md flex items-center justify-between shrink-0 z-10">
        <button id="backBtn" onclick="goBack(event)" class="w-10 h-10 flex items-center justify-center active:bg-white/20 rounded-full transition-colors">
          <i class="fas fa-chevron-left text-lg"></i>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                <i class="fas fa-leaf text-sm text-emerald-200"></i>
            </div>
            <h1 class="text-lg font-black tracking-widest">築心智慧夥伴</h1>
        </div>
        <div class="w-10"></div>
    </nav>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 pb-28">
    </main>

    <div class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 p-3 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20">
        <div class="max-w-xl mx-auto flex items-end gap-2">
            <button id="micBtn" onclick="toggleSpeech()" class="w-12 h-12 bg-emerald-50 text-emerald-700 rounded-full flex items-center justify-center shrink-0 active:scale-95 transition-all shadow-sm">
                <i class="fas fa-microphone text-lg"></i>
            </button>

            <div class="flex-1 bg-gray-50 rounded-2xl border border-emerald-100 px-4 py-2.5 flex items-center">
                <textarea id="userInput" rows="1" placeholder="請輸入或語音提問..." class="w-full bg-transparent outline-none resize-none text-base text-emerald-900 py-1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
            </div>

            <button onclick="sendMessage()" id="sendBtn" class="w-12 h-12 emerald-gradient text-white rounded-full flex items-center justify-center shrink-0 active:scale-95 transition-transform shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://hello-world-broad-cake-8477.swearlin.workers.dev/";
    const MAX_HISTORY = 10; 

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const micBtn = document.getElementById('micBtn');
    
    let userName = "夥伴";
    let userPhone = "";
    let chatHistory = []; 
    let isListening = false;
    let recognition;

    // --- 🎯 【新增】跳轉狀態監控 ---
    let isNavigatingAway = false;

    function goBack(event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        isNavigatingAway = true; // 鎖定狀態，停止所有 AI 行為
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }

        console.log("執行跳轉至 member_zone.html");
        window.location.replace('member_zone.html');
        
        setTimeout(() => {
            window.location.href = 'member_zone.html';
        }, 100);
    }

    // --- 🎯 1. 初始化與開場 ---
    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        userName = params.get('user_name') || "夥伴";
        userPhone = params.get('user_phone') || "guest";

        // 載入本地記憶
        const savedHistory = localStorage.getItem(`chat_${userPhone}`);
        if (savedHistory) {
            chatHistory = JSON.parse(savedHistory);
            chatHistory.forEach(msg => {
                if (msg.role !== 'system') appendMessage(msg.role === 'user' ? 'user' : 'system', msg.content);
            });
        }

        const weatherResult = await getWeather();
        const initMsg = weatherResult === "一般" ? "嘿！我上線了" : `系統通知：現在是${weatherResult}，請以此為背景跟我打招呼並給建議。`;
        
        // 使用統一的通訊函數
        sendToWorker(initMsg, true);
        initSpeech();
    };

    // 🌤️ 天氣偵測
    async function getWeather() {
        return new Promise((resolve) => {
            const timeout = setTimeout(() => resolve("一般"), 3000);
            if (!navigator.geolocation) resolve("一般");
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    clearTimeout(timeout);
                    try {
                        const { latitude, longitude } = pos.coords;
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const data = await res.json();
                        const code = data.current_weather.weathercode;
                        if (code === 0) resolve("晴天");
                        else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) resolve("雨天");
                        else resolve("一般");
                    } catch { resolve("一般"); }
                },
                () => { clearTimeout(timeout); resolve("一般"); }
            );
        });
    }

    // --- 🎯 2. 核心通訊函數 (已整合跳轉攔截) ---
    async function sendToWorker(text, isSystemTrigger = false) {
        // 🚀 如果正在跳轉頁面，直接中斷執行
        if (isNavigatingAway) return;

        if (!isSystemTrigger) {
            appendMessage("user", text);
            chatHistory.push({ role: "user", content: text });
        }

        const typingId = showTyping();

        try {
            const response = await fetch(`${WORKER_URL}?user_name=${encodeURIComponent(userName)}&user_phone=${encodeURIComponent(userPhone)}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: text,
                    history: chatHistory 
                })
            });

            // 🚀 再次檢查，防止在 fetch 期間用戶按了返回
            if (isNavigatingAway) return;

            const data = await response.json();
            if (document.getElementById(typingId)) document.getElementById(typingId).remove();

            if (data.candidates) {
                const aiReply = data.candidates[0].content.parts[0].text;
                appendMessage("system", aiReply.replace(/\n/g, '<br>'));
                
                chatHistory.push({ role: "model", content: aiReply });
                if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);
                localStorage.setItem(`chat_${userPhone}`, JSON.stringify(chatHistory));
            }
        } catch (e) {
            if (document.getElementById(typingId)) document.getElementById(typingId).remove();
            if (!isSystemTrigger && !isNavigatingAway) appendMessage("system", "網路好像累了，稍等一下喔！");
        }
    }

    // --- 3. UI 輔助功能 ---
    function sendMessage() {
        const val = userInput.value.trim();
        if (val) {
            sendToWorker(val); // 呼叫統一後的函數
            userInput.value = "";
            autoResize(userInput);
        }
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = "flex w-full " + (sender === "user" ? "justify-end" : "justify-start");
        msgDiv.innerHTML = sender === "user" 
            ? `<div class="max-w-[80%] bg-emerald-700 text-white px-5 py-3 rounded-2xl rounded-tr-none text-sm shadow-md">${text}</div>`
            : `<div class="max-w-[85%] bg-white border border-emerald-50 text-emerald-950 px-5 py-3 rounded-2xl rounded-tl-none text-sm shadow-sm relative">
                 <div class="text-[10px] text-emerald-600 mb-1 font-bold opacity-50 uppercase">築心夥伴</div>${text}</div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        const id = "typing-" + Date.now();
        const msgDiv = document.createElement('div');
        msgDiv.id = id;
        msgDiv.className = "flex w-full justify-start";
        msgDiv.innerHTML = `<div class="bg-white border border-emerald-50 px-4 py-4 rounded-2xl shadow-sm flex gap-1">
            <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay:0.2s"></div>
            <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay:0.4s"></div>
        </div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    function autoResize(t) { t.style.height = 'auto'; t.style.height = (t.scrollHeight > 120 ? 120 : t.scrollHeight) + 'px'; }
    function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    function initSpeech() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; autoResize(userInput); stopListening(); };
            recognition.onend = () => stopListening();
        } else { micBtn.style.display = 'none'; }
    }
    function toggleSpeech() { if(isListening) recognition.stop(); else { isListening=true; recognition.start(); micBtn.classList.add('mic-active'); micBtn.innerHTML='<i class="fas fa-stop"></i>'; } }
    function stopListening() { isListening=false; micBtn.classList.remove('mic-active'); micBtn.innerHTML='<i class="fas fa-microphone"></i>'; }
</script>
</body>
</html>
