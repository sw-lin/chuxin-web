<!DOCTYPE html>
<html lang="zh-TW">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; margin: 0; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.5), rgba(6,78,59,0.2)); }
        .slide { display: none; width: 100%; height: 100%; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: 0.8} to {opacity: 1} }
        .modal { display: none; position: fixed; z-index: 100; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        #aboutContent {
      line-height: 2;         /* 增加行高，閱讀更舒服 */
      letter-spacing: 0.05em; /* 稍微拉開字距 */
      text-align: justify;    /* 左右對齊 */
     }
    </style>
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=1" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=1" />
<link rel="shortcut icon" href="favicon.ico?v=1" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1" />
<meta name="apple-mobile-web-app-title" content="築心讀書會" />
<link rel="manifest" href="site.webmanifest?v=1" />
</head>
<body>

    <nav class="fixed w-full z-50 nav-glass px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-800 text-2xl"></i>
            <span class="text-2xl md:text-3xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
        </div>
        <button onclick="openLogin()" class="bg-emerald-800 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-emerald-700 transition active:scale-95">
            會員進入
        </button>
    </nav>

    <header class="relative w-full h-[600px] md:h-[800px] overflow-hidden bg-emerald-900">
        <div id="slideContainer" class="w-full h-full">
            <div class="slide flex items-center justify-center text-white h-full">載入中...</div>
        </div>
        <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center z-10">
            <h1 class="text-4xl md:text-7xl text-white font-bold tracking-widest drop-shadow-lg">在共讀中築心</h1>
        </div>
    </header>

    <section id="about" class="py-24 px-6 bg-white">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-emerald-900 mb-4 italic flex items-center justify-center">
                <i class="fas fa-leaf mr-3 text-emerald-600"></i>關於築心
            </h2>
            <div class="h-1 w-20 bg-amber-400 mx-auto rounded-full"></div>
        </div>
        <div id="aboutContent" class="text-gray-600 leading-relaxed text-lg text-justify whitespace-pre-line">
            載入中...
        </div>
    </div>
    </section>

    <section id="register" class="py-24 px-6 bg-[#F9F6F0]">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-emerald-900 mb-2">加入我們</h2>
                <p class="text-gray-500">期待與您在書香中相遇</p>
            </div>
              <form action="https://formspree.io/f/xpqjvblg" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-emerald-100 space-y-6">
                <input type="text" name="姓名" required placeholder="您的姓名" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
    
                <input type="email" name="Email" required placeholder="您的電子郵件 (Email)" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
    
                <input type="tel" 
                  name="電話" 
                  required 
                  pattern="09\d{8}" 
                  title="請輸入正確的台灣手機格式（例如：0912345678）" 
                  placeholder="手機號碼（例：0912345678）" 
                  class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
    
                <textarea name="建議" rows="3" placeholder="如何知道築心？想試聽？如何繳交會費？有任何問題或建議，歡迎提問。" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold resize-none"></textarea>
    
                <button type="submit" class="w-full bg-emerald-800 text-white font-bold py-5 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">
        提交
               </button>
               </form>            
           </div>
      </section>

    <footer class="py-10 text-center text-gray-400 text-xs tracking-widest uppercase">© 2026 Chuxin Book Club</footer>
<div id="loginModal" class="modal">
    <div class="bg-white max-w-sm w-full rounded-[3rem] p-10 shadow-2xl relative">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-300 hover:text-emerald-700 transition">
            <i class="fas fa-times-circle text-2xl"></i>
        </button>
        
        <div class="text-center mb-8">
            <h3 class="text-2xl font-bold text-emerald-900">會員登入</h3>
            <div class="mt-4 p-3 bg-amber-50 rounded-2xl border border-amber-100">
                <p class="text-amber-800 text-xs font-bold italic">歡迎訪客！輸入 <b>guest</b> 即可免密碼進入。</p>
            </div>
        </div>

        <form onsubmit="handleLogin(); return false;" class="space-y-6">
    <input type="text" 
           id="userPhone" 
           name="username" 
           autocomplete="username" 
           placeholder="手機號碼 或 guest" 
           class="w-full px-6 py-4 bg-blue-50/50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-600 transition-all text-center">
    
    <input type="password" 
           id="userPass" 
           name="password" 
           autocomplete="current-password" 
           placeholder="登入密碼" 
           class="w-full px-6 py-4 bg-blue-50/50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-600 transition-all text-center">
    
    <button type="submit" 
            id="loginBtn" 
            class="w-full py-4 bg-emerald-800 text-white rounded-2xl font-black text-lg shadow-lg hover:bg-emerald-900 active:scale-95 transition-all">
        確認進入
    </button>
</form>
    </div>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";
let slideIndex = 0;

// 強化後的網址轉換邏輯
function transformDriveUrl(url) {
    if (!url) return "";
    if (!url.includes('drive.google.com')) return url;
    let id = "";
    if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
    else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
    return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

function toHalfWidth(str) {
    if (!str) return "";
    return str.replace(/[０-９Ａ-Ｚａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s/g, "");
}

async function initData() {
    const contentDiv = document.getElementById('aboutContent');
    const container = document.getElementById('slideContainer');

    try {
        const res = await fetch(GAS_URL + "?t=" + Date.now());
        const data = await res.json();
        const config = data.config || {};
        console.log("接收到的 Config:", config);      

        // --- 1. 處理「關於築心」文字 ---
        // --- 🌟 修正後的「關於築心」文字處理 ---
        // 由於資料可能是物件 {promo: '...', normal: '...'} 或純字串
        const rawAbout = config.about_us_text || config.about_content || "";
        let aboutText = "";

        if (typeof rawAbout === 'object') {
            // 如果是物件，根據邏輯選取內容（這裡優先取 normal，因為介紹通常不分活動期）
            // 或者您可以根據 isPromoTime 來決定取哪一個
            aboutText = rawAbout.normal || rawAbout.promo || "";
        } else {
            aboutText = rawAbout;
        }
        
       if (aboutText) {
    // 🌟 強化版替換：同時處理 \n 與 \r，並將連續換行正確轉為 <br>
    const formattedText = aboutText
        .replace(/\r\n/g, '<br>') // 處理 Windows 換行
        .replace(/\n/g, '<br>')   // 處理 Linux/Mac 換行
        .replace(/\r/g, '<br>');  // 處理舊式 Mac 換行
    
    contentDiv.innerHTML = formattedText; 
    } else {
    contentDiv.innerHTML = "歡迎來到築心讀書會。";
    }
        // --- 2. 判斷是否為宣傳期 ---
        const now = new Date();
        let isPromoTime = false;
        
        // 取得日期 (相容物件格式與純字串格式)
        const getVal = (obj) => (obj && typeof obj === 'object') ? obj.promo : (obj || "");
        const startDateStr = getVal(config.promo_start);
        const endDateStr = getVal(config.promo_end);

        if (startDateStr && endDateStr) {
            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            end.setHours(23, 59, 59, 999);
            if (now >= start && now <= end) isPromoTime = true;
        }
        console.log("目前是否為宣傳期:", isPromoTime);

        // --- 3. 處理輪播圖邏輯 (宣傳優先) ---
        let slidesUrls = [];

        if (isPromoTime) {
            // 嘗試抓取 B 欄宣傳圖
            for (let i = 1; i <= 5; i++) {
                const imgUrl = config[`slide_img${i}`]?.promo;
                if (imgUrl && imgUrl.trim() !== "" && !imgUrl.includes("images/")) {
                    slidesUrls.push(transformDriveUrl(imgUrl));
                }
            }
        }

        // 如果不是宣傳期，或者宣傳期 B 欄完全沒圖，才抓常態圖
        if (slidesUrls.length === 0) {
            for (let i = 1; i <= 5; i++) {
                const item = config[`slide_img${i}`];
                const imgUrl = (typeof item === 'object') ? item.normal : item;
                if (imgUrl && imgUrl.trim() !== "" && !imgUrl.includes("images/")) {
                    slidesUrls.push(transformDriveUrl(imgUrl));
                }
            }
        }

        // --- 4. 渲染圖片 ---
        if (slidesUrls.length > 0) {
            container.innerHTML = slidesUrls.map((url, idx) => 
                `<img class="slide" src="${url}" onerror="this.src='${idx + 1}.jpg'">`
            ).join('');
        } else {
            container.innerHTML = `<img class="slide" src="1.jpg" style="display:block">`;
        }        
        
        startSlides();

    } catch (e) {
        console.error("initData 失敗:", e);
        contentDiv.innerHTML = "連線失敗，請檢查網路。";
    }
}

function startSlides() {
    let slides = document.getElementsByClassName("slide");
    if (slides.length === 0) return;
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(startSlides, 5000);
}

async function handleLogin() {
    const rawU = document.getElementById('userPhone').value.trim();
    
    // 🌟 修正重點：加上 .replace(/[^0-9]/g, "") 徹底移除單引號、橫槓、空格
    const u = toHalfWidth(rawU).replace(/[^0-9]/g, "").toLowerCase();
    const p = toHalfWidth(document.getElementById('userPass').value.trim());

    // 1. 訪客模式：直接跳轉，不再彈窗
    if (u === 'guest') {
        sessionStorage.setItem('userInfo', JSON.stringify({ 
            result: "SUCCESS", name: "訪客", phone: "guest", role: "Guest", isPaid: false 
        }));
        window.location.href = 'guest_zone.html'; 
        return;
    }

    if(!u || !p) return alert("請輸入帳號密碼"); // 這個保留，提醒使用者沒輸入
    
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; 
    btn.innerText = "驗證中...";
    
    try {
        const res = await fetch(GAS_URL, { 
            method: 'POST',
            body: JSON.stringify({ type: 'login', phone: u, password: p }) 
        });
        
        const result = await res.json();
        
        if (result.result === "SUCCESS") {
            // --- 應急修改：暫時忽略繳費狀態判斷 ---
            const isPaidStatus = String(result.isPaid).toLowerCase() === "true";
            // 現在：強制設定為 true，讓判斷邏輯暫時失效
          //   const isPaidStatus = true;

            // 🛑 除錯點 A：確認 GAS 到底有沒有給資料
            console.log("GAS 回傳原始資料:", result);
            if (!result.attendedLogs || result.attendedLogs.length === 0) {
                alert("警告：登入成功但後端回傳的出席紀錄是空的！");
            }
            const userStore = {
                result: "SUCCESS",
                name: result.name,
                role: result.role,
                title: result.title,
                phone: u,
                
                // 🌟 關鍵修正：補上這兩行，將 GAS 的資料存入 Session
                email: result.email || "",               // 解密後的 Email
                encryptedPhone: result.encryptedPhone || "", // 加密後的手機 (後端修改 Key)
                
                staffKey: result.staffKey || "",
                isPaid: isPaidStatus,
                attendedLogs: result.attendedLogs || [],
                debug: `Login時紀錄數: ${result.attendedLogs ? result.attendedLogs.length : 0}`                
            };
            sessionStorage.setItem('userInfo', JSON.stringify(userStore));

            // 判斷跳轉目標
            let targetPage = (result.role === "Admin" || isPaidStatus === true) ? 'member_zone.html' : 'guest_zone.html';
            // 加上這一行，彈出視窗會卡住畫面
            //    alert("請檢查 Console 資料後再按確定跳轉");
            
            // 🌟 移除 setTimeout 的延遲，實現秒跳轉
            window.location.href = targetPage;

        } else {
            alert("登入失敗：" + (result.message || "帳號或密碼錯誤"));
            btn.disabled = false;
            btn.innerText = "確認進入";
        }
    } catch (e) { 
        console.error("發生錯誤:", e);
        alert("連線異常"); 
        btn.disabled = false;
        btn.innerText = "確認進入";
    }
}
function openLogin() { 
    document.getElementById('loginModal').style.display = 'flex'; 
}    
function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
window.onload = initData;        
</script>
</body>
</html>
