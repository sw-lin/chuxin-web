<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 flex justify-between items-center shadow-xl">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-300"></i>
            <span class="font-bold">築心會館</span>
        </div>
        <button onclick="logout()" class="text-xs bg-white/10 px-3 py-1 rounded-full hover:bg-white/20 transition">登出</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl">
            <h2 id="userName" class="text-3xl font-bold mb-4 text-white">讀取中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">學習參與率</div>
                    <div id="attPercent" class="text-2xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center">
                    <div class="text-[10px] opacity-60 mb-1">報到次數</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-transform">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-800 mb-1 text-sm">最新公告</h3>
            <p id="news" class="text-gray-500 text-xs">載入公告中...</p>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center py-10 text-gray-400 italic">正在載入紀錄...</p>
            </div>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/95 hidden z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden">
            <div id="reader"></div>
            <div class="p-4"><button onclick="stopScanner()" class="w-full py-3 bg-gray-100 rounded-xl font-bold">關閉掃描</button></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let html5QrCode = null;

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userName').innerText = user.name || "讀書會成員";
            syncData(user);
        };

        async function syncData(user) {
            try {
                // 確保手機號碼處理正確（取末 9 碼）
                const rawPhone = user.phone || user.currentPhone || "";
                const myMatch = String(rawPhone).replace(/\D/g, "").slice(-9);

                if (!myMatch) {
                    alert("手機號碼格式異常，請重新登入。");
                    logout();
                    return;
                }

                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                // 比對資料庫中的使用者
                const liveUser = (data.users || []).find(u => {
                    const dbMatch = String(u.phone || "").replace(/\D/g, "").slice(-9);
                    return dbMatch === myMatch;
                });
                
                if (!liveUser) {
                    alert(`同步失敗：找不到您的資料。\n您的末9碼：${myMatch}`);
                    logout();
                    return;
                }

                // 更新公告與參與數據
                document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";
                
                const todayStr = new Date().toISOString().split('T')[0];
                const validEvents = (data.calendar || []).filter(ev => {
                    const isPast = ev.dateText && ev.dateText <= todayStr;
                    // 只要標題或備註包含「需報到」就列入計算
                    const isRequired = (ev.title + (ev.description || "")).includes("需報到");
                    return isPast && isRequired;
                });

                const attendLogs = (liveUser.attendLog || []).map(log => log.split('T')[0]);
                
                // 計算報到次數
                let count = 0;
                validEvents.forEach(ev => {
                    if (attendLogs.includes(ev.dateText)) count++;
                });

                // 更新 UI 數據
                const percent = validEvents.length > 0 ? Math.round((count / validEvents.length) * 100) : 0;
                document.getElementById('attPercent').innerText = percent + "%";
                document.getElementById('attCountDisplay').innerText = `${count} / ${validEvents.length}`;

                // 渲染學習歷程清單
                renderHistory(validEvents, attendLogs);

            } catch (err) {
                console.error("Sync Error:", err);
                document.getElementById('historyList').innerHTML = `<p class="text-center py-10 text-red-400">連線失敗，請檢查網路</p>`;
            }
        }

        function renderHistory(events, logs) {
            const list = document.getElementById('historyList');
            if (events.length === 0) {
                list.innerHTML = `<p class="text-center py-10 text-gray-400">尚無相關學習紀錄</p>`;
                return;
            }

            list.innerHTML = events.reverse().map(ev => {
                const isAttended = logs.includes(ev.dateText);
                return `
                    <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50">
                        <div>
                            <div class="text-xs text-emerald-600 font-bold mb-1">${ev.dateText}</div>
                            <div class="text-emerald-900 font-bold">${ev.title}</div>
                        </div>
                        <div class="${isAttended ? 'text-emerald-600' : 'text-gray-300'} flex flex-col items-center">
                            <i class="fas ${isAttended ? 'fa-check-circle' : 'fa-times-circle'} text-2xl"></i>
                            <span class="text-[10px] mt-1 font-bold">${isAttended ? '已出席' : '未報到'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5QrCode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } }, 
                (text) => {
                    stopScanner();
                    // 掃描後直接跳轉報到網址
                    window.location.href = text;
                }
            ).catch(err => {
                console.error("Scanner Error:", err);
                alert("無法啟動相機");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop
