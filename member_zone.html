<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta。charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心會館</title>    
    
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; display: none; }
        /* 統一所有輸入框與選單的高度感 */
  input, select, textarea {
    height: 44px; /* 設定固定高度 */
    box-sizing: border-box;
  }

  /* 針對特定選單微調 */
   select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 1rem center;
    background-size: 1em;
   }        
    </style>
</head>
<body class="min-h-screen pb-20">

<main class="max-w-xl mx-auto p-6 space-y-8">

    <!-- 1. 公告欄 -->

    <!-- 3. 掃碼按鈕 -->

        <div class="flex items-center gap-3 px-2">
            <div class="h-5 w-1 bg-emerald-600 rounded-full"></div>

        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center justify-center space-y-2.5 active:bg-gray-50 transition-all text-center">
                <div class="bg-emerald-50 text-emerald-700 w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-book-open text-xl"></i></div>
                <span class="font-black text-emerald-900 text-sm tracking-wide">課程資料庫</span>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center justify-center space-y-2.5 active:bg-gray-50 transition-all text-center">

                <span class="font-black text-emerald-900 text-sm tracking-wide">活動剪影</span>
            </button>
            <button onclick="openEditModal()" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center justify-center space-y-2.5 active:bg-gray-50 transition-all text-center">

            </button>
            <button onclick="goToAI()" class="bg-emerald-50 p-6 rounded-[2rem] shadow-sm border border-emerald-100 flex flex-col items-center justify-center space-y-2.5 transition-all active:scale-95">
                <div class="bg-emerald-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md">
                    <i class="fas fa-comment-dots text-xl"></i>
                </div>
                <span class="font-black text-emerald-900 text-sm tracking-wide">智慧助理</span>
            </button>            
            <button id="calendarBtn" onclick="location.href='calendar.html'" class="bg-amber-50 p-6 rounded-[2rem] shadow-sm border border-amber-100 flex flex-col items-center justify-center space-y-2.5 transition-all active:scale-95">
                <div class="bg-amber-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-calendar-alt text-xl"></i>
            </div>
            <span class="font-black text-emerald-900 text-sm tracking-wide">行事曆</span>
            </button>            
            <button id="staffBtn" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center justify-center space-y-2.5 active:bg-gray-50 transition-all text-center border-l-4 border-l-emerald-600">
                <div class="bg-emerald-800 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-id-card-alt text-xl"></i></div>

</main>
<!-- 各種 Modal 略 (保持原樣) -->
<div id="historyModal" class="modal-overlay" onclick="closeHistoryModal(event)">
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-7 shadow-2xl relative" onclick="event.stopPropagation()">
        <button onclick="closeHistoryModal(event, true)" class="absolute top-5 right-6 text-gray-400 hover:text-gray-600 text-2xl transition-colors">&times;</button>
        <h3 class="text-xl font-black text-emerald-900 mb-5 text-center flex items-center justify-center gap-2"><i class="fas fa-history text-emerald-600"></i>學習歷程清單</h3>
        <div id="historyList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
    </div>
</div>

<div id="scannerModal" class="modal-overlay">
    <div class="bg-white w-[90%] max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
        <div id="reader" class="w-full"></div>
        <div class="p-6 text-center"><button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-black text-gray-500">取消返回</button></div>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay" onclick="closeEditModal(event)">
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative" onclick="event.stopPropagation()">
        <button onclick="closeEditModal(event, true)" class="absolute top-5 right-6 text-gray-400 hover:text-gray-600 text-2xl transition-colors">&times;</button>
        <h3 class="text-xl font-black text-emerald-900 mb-2 text-center">修改個人資料</h3>
        <p class="text-center text-gray-400 text-xs mb-6">僅供更新 Email 與登入密碼</p>
        <div class="space-y-4">
            <div><label class="block text-xs font-bold text-emerald-800 mb-1.5 ml-1">電子郵件 (Email)</label><input type="email" id="editEmail" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all"></div>
            <div class="pt-2 border-t border-gray-100"><label class="block text-xs font-bold text-red-800 mb-1.5 ml-1">驗證舊密碼 (必填)</label><input type="password" id="oldPass" placeholder="請輸入目前密碼" class="w-full px-5 py-3.5 bg-red-50/50 rounded-xl outline-none text-sm font-bold border-2 border-transparent focus:border-red-300 transition-all"></div>
            <div><label class="block text-xs font-bold text-emerald-800 mb-1.5 ml-1">設定新密碼 (選填)</label><input type="password" id="newPass" placeholder="若不修改請留空" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all"></div>
            <button onclick="handleUpdateProfile()" id="updateBtn" class="w-full mt-4 bg-emerald-800 text-white py-4 rounded-xl font-black tracking-widest active:scale-95 transition-all shadow-md">確認更新</button>
        </div>
    </div>
</div>
    
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    let currentUser = null;
    let remoteConfig = {};
    let html5QrCode = null;
    window.latestCalendarData = []; // 預設空陣列，防止按鈕點擊噴錯
    let tempRegTitle = "";  // 報名活動名稱也建議放這
    let currentNeedID = "N";// 確保全域變數 currentNeedID 存在
    
    function getDirectImageUrl(url) {
        if (!url) return "";
        if (!url.includes('drive.google.com')) return url;
        let id = "";
        if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
        else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
        return id ? `https://lh3.googleusercontent.com/u/0/d/${id}=w800` : url;
    }

function updateUI(user, calendar, events) {
    console.log("開始更新介面...", { user, calendar, events });
    
    // 1. 安全檢查
    if (!user) {
        console.error("更新失敗：找不到使用者資料");
        return;
    }

    // 2. 取得今天日期
    const today = new Date().toISOString().split('T')[0];

    // 3. 核心邏輯：計算出席率
    // 分母：過去已發生且「需要報到」的活動
    const requiredPastEvents = (calendar || []).filter(ev => {
        return ev && 
               ev.dateText && 
               ev.dateText <= today && 
               ev.needQR === true; 
    });

    const totalEvents = requiredPastEvents.length;
    // 分子：該會員實際有報到的紀錄總數
    const attendCount = (user.attendLog || []).length;
    
    // 計算百分比
    const attendanceRate = totalEvents > 0 ? Math.round((attendCount / totalEvents) * 100) : 0;

    // 4. 更新 UI 數字
    // 這裡要對齊您的 HTML ID (attPercent, attCountDisplay)
    const percentElem = document.getElementById('attPercent');
    const countDisplayElem = document.getElementById('attCountDisplay');

    if (percentElem) percentElem.innerText = attendanceRate + '%';
    if (countDisplayElem) countDisplayElem.innerText = `${attendCount} / ${totalEvents}`;

    // 更新圓環進度條 (如果有這個元素的話)
    const circle = document.getElementById('progressCircle');
    if (circle) {
        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (attendanceRate / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }

    // 5. 慶祝動畫 (大於 50% 且有活動時觸發)
    if (attendanceRate >= 50 && totalEvents > 0) {
        try { confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } }); } catch(e){}
    }

    // 儲存出席資料供 Modal 使用
    // 假設您有一個全域變數處理這個，這裡過濾出該用戶有參加的詳細資料
    window.currentAttendedData = (calendar || []).filter(ev => 
        (user.attendLog || []).some(log => String(log).includes(ev.title))
    );

    // 6. 渲染下方區塊
    try { renderCalendarActivity(calendar); } catch(e) { console.error("渲染活動預告出錯", e); }
    try { renderEventSection(events); } catch(e) { console.error("渲染報名區出錯", e); }
}
    
function renderCalendarActivity(calendar) {
    const container = document.getElementById('calendarActivitySection');
    if (!container) return;

    // 1. 安全檢查：確保 calendar 是陣列且有資料
    if (!calendar || !Array.isArray(calendar) || calendar.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm italic bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200">目前沒有安排活動</div>';
        return;
    }

    // 2. 取得今天日期 (格式 YYYY-MM-DD，與 GAS 的 formatDateToISO 匹配)
    const today = new Date().toISOString().split('T')[0];

    // 3. 核心過濾與排序邏輯
    const upcoming = calendar
        .filter(ev => {
            // 確保 dateText 存在，且日期大於等於今天
            return ev.dateText && ev.dateText >= today;
        })
        .sort((a, b) => a.dateText.localeCompare(b.dateText)) // 依日期升冪排序（最近的在前）
        .slice(0, 1); // 【關鍵】只取第一筆，避免畫面過長

    // 4. 若今天以後都沒有活動
    if (upcoming.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm italic bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200">近期無預定活動</div>';
        return;
    }

    // 5. 渲染該筆活動 (優化後的卡片 UI)
    const ev = upcoming[0];
    const displayUrl = typeof getDirectImageUrl === 'function' ? getDirectImageUrl(ev.poster_url) : ev.poster_url;

    if (displayUrl && displayUrl.startsWith('http')) {
        // 有海報時的圖卡模式
        container.innerHTML = `
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-emerald-50 hover:shadow-md transition-shadow">
                <img src="${displayUrl}" class="w-full h-auto object-cover max-h-[250px]" onerror="this.parentElement.innerHTML=renderTextOnlyCard('${ev.title}', '${ev.dateText}')">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <h4 class="font-black text-emerald-900 text-base line-clamp-1">${ev.title}</h4>
                        <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full uppercase tracking-tighter">Next</span>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-2 flex items-center">
                        <i class="far fa-calendar-check mr-2 text-emerald-500"></i>活動日期：${ev.dateText}
                    </p>
                </div>
            </div>`;
    } else {
        // 無海報時的精緻文字模式
        container.innerHTML = renderTextOnlyCard(ev.title, ev.dateText);
    }
}

// 輔助函數：渲染純文字卡片
function renderTextOnlyCard(title, date) {
    return `
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-l-8 border-emerald-800 emerald-gradient text-white relative overflow-hidden">
            <div class="absolute top-[-10px] right-[-10px] w-20 h-20 bg-white/10 rounded-full"></div>
            <div class="flex items-center space-x-2">
                <span class="text-[10px] text-emerald-200 font-bold tracking-[0.2em] uppercase">Upcoming</span>
                <div class="h-[1px] w-8 bg-emerald-400/50"></div>
            </div>
            <h4 class="font-black text-white text-lg mt-2 relative z-10 leading-tight">${title}</h4>
            <p class="text-xs text-emerald-100 relative z-10 mt-4 flex items-center">
                <i class="far fa-clock mr-2"></i> ${date}
            </p>
        </div>`;
} 

function renderEventSection(events) {
    var container = document.getElementById('eventSection');
    var today = new Date().toISOString().split('T')[0];
    var activeEvents = (events || []).filter(ev => today >= ev.start_date && today <= ev.display_until);
    if (activeEvents.length === 0) { container.innerHTML = ""; return; }

    container.innerHTML = `<div class="flex items-center gap-3 px-2 mb-4"><div class="h-5 w-1 bg-emerald-600 rounded-full"></div><h3 class="text-lg font-black text-emerald-950 tracking-wide">活動報名區</h3></div>` + 
    activeEvents.map(ev => {
        // 處理字串中的單引號，防止 HTML 破裂
        const safeTitle = ev.title.replace(/'/g, "\\'");
        const safeDate = (ev.date || "").replace(/'/g, "\\'");
        const needID = ev.needID || "N";
        const isBus = ev.isBus || "N";

        const isRegEnabled = ev.reg_url && ev.reg_url !== "NONE";
        const displayUrl = getDirectImageUrl(ev.poster_url);

        // 如果已報名，按鈕變灰色但「不鎖死」，維持使用者要求的穩定性
        const isRegistered = (window.currentAttendedData || []).some(reg => reg.title === ev.title);
        const btnText = isRegistered ? "已報名 (按此修改)" : "立即報名";
        const btnClass = isRegistered ? "bg-gray-400" : "emerald-gradient";

        const actionBtn = `<button onclick="handleReg('${safeTitle}', '${safeDate}', '${needID}', '${isBus}')" 
                            class="w-full py-4 ${btnClass} text-white rounded-2xl font-black tracking-widest active:scale-95 transition-all shadow-md">
                            ${btnText}
                           </button>`;

        if (displayUrl && displayUrl.includes('http')) {
            return `<div class="bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-emerald-50 mb-6">
                        <img src="${displayUrl}" class="w-full object-cover">
                        <div class="p-5 bg-white">${actionBtn}</div>
                    </div>`;
        } else {
            return `<div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-emerald-50 space-y-2.5 mb-4">
                        <h4 class="font-black text-emerald-900 text-lg">${ev.title}</h4>
                        <p class="text-xs text-gray-500">日期：${ev.date || '未定'}</p>
                        ${isRegEnabled ? actionBtn : ''}
                    </div>`;
        }
    }).join('');
}    
    // 其餘邏輯 (handleUpdateProfile, processCheckin, openHistoryModal, etc.) 略...
    // 確保 openHistoryModal 也調用 getDirectImageUrl
    function openHistoryModal() {
        var list = document.getElementById('historyList');
        var data = window.currentAttendedData || [];
        if (data.length === 0) { list.innerHTML = '<div class="text-center py-12 text-gray-400 text-sm italic bg-gray-50 rounded-2xl">尚無出席紀錄</div>'; } 
        else { 
            list.innerHTML = data.slice().reverse().map(ev => {
                const thumbUrl = getDirectImageUrl(ev.poster_url);
                return `
                <div class="bg-emerald-50/50 p-4 rounded-2xl flex justify-between items-center border border-emerald-100/50">
                    <div class="flex items-center gap-3">
                        ${thumbUrl ? `<img src="${thumbUrl}" class="w-10 h-10 rounded-lg object-cover shadow-sm">` : ''}
                        <div>
                            <div class="text-[10px] text-emerald-600 font-bold">${ev.date}</div>
                            <div class="text-emerald-900 font-bold text-sm">${ev.title}</div>
                        </div>
                    </div>
                    <div class="bg-emerald-600 text-white w-7 h-7 rounded-full flex items-center justify-center shrink-0 ml-3"><i class="fas fa-check text-xs"></i></div>
                </div>`;
            }).join(''); 
        }
        document.getElementById('historyModal').style.display = 'flex';
    }

    // 基礎 UI 控制
    function closeHistoryModal(e, force=false) { if (force || e.target === document.getElementById('historyModal')) { document.getElementById('historyModal').style.display = 'none'; } }
    
    function closeEditModal(e, force=false) { if (force || e.target === document.getElementById('editProfileModal')) { document.getElementById('editProfileModal').style.display = 'none'; } }

async function handleUpdateProfile() {
    const oldPass = document.getElementById('oldPass').value.trim();
    let email = document.getElementById('editEmail').value.trim();
    const newPass = document.getElementById('newPass').value.trim();
    
    if (!oldPass) {

    }

    }

    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';

    try {
        const payload = {
            type: 'updateProfile',
            phone: currentUser.phone,
            oldPassword: oldPass,
            newPassword: newPass,
            email: email
        };

        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        const result = await res.json();

        if (result.result === "SUCCESS") {
            showToast("個人資料更新成功！");

    } finally {

async function processCheckin(scanData) {
    // 1. 格式檢查
    if (!scanData.startsWith("CHECKIN:")) { showToast("無效格式", "error"); return; }
    
    // 2. 解析活動名稱 (例如從 CHECKIN:2026-03-26|金剛經導讀 解析出來)
    const parts = scanData.split(':');
    const eventID = "EVENT:" + parts[1] + "|" + parts.slice(2).join(':');
    const eventTitleOnly = parts.slice(2).join(':'); // 取得純活動名稱

    // 3. 【新增：防重檢查】檢查出席紀錄是否已有此活動名稱 (不論日期)
    // 檢查 currentUser.attendLog 裡面是否有人任何一筆包含這個活動名稱
    const isAlreadyAttended = (currentUser.attendLog || []).some(log => {
        return log && String(log).includes(eventTitleOnly);
    });

    if (isAlreadyAttended) {
        showToast("您已經報到過此項目，不需再次報到", "error");
        return;
    }

    // 4. 原有的報到流程
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const res = await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ 
                type: 'checkin', 
                phone: currentUser.phone, 
                name: currentUser.name, 
                eventTitle: eventID 
            }) 
        });
        const result = await res.json();
        if (result.result === "SUCCESS") { 
            showToast("報到成功！"); 
            confetti({ particleCount: 150 }); 
            syncData(); 
        } else { 
            showToast(result.message, "error"); 
        }
    } catch (e) { 
        showToast("報到失敗", "error"); 
    } finally { 
        document.getElementById('loadingOverlay').style.display = 'none'; 
    }
}

/**

async function submitRegistration() {
    // 防止重複點擊
    const btn = event ? (event.target.tagName === 'BUTTON' ? event.target : event.target.closest('button')) : null;
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>提交中...';
    }

    try {
        const eventTitle = document.getElementById('regEventTitle').innerText;
        
        const payload = {
            type: "complex_register",
            eventTitle: eventTitle,
            name: currentUser.name,
            phone: currentUser.phone,
            note: document.getElementById('regNote')?.value || "",
            registrants: [
                {
                  name: currentUser.name,
                  phone: currentUser.phone,
                  idNo: document.getElementById('regID')?.value || "",
                  diet: document.getElementById('regMeal').value,
                  transport: document.getElementById('regTransport').value,
                  // 只有本人開車才紀錄載人數
                  canDrive: document.getElementById('regTransport').value === '自行開車' ? 
                  parseInt(document.getElementById('carCapacity').value) : 0
                },
                ...getPartnerData().map(p => ({
                   ...p,
                   transport: "隨同代理人", // 同行人交通屬性
                   canDrive: 0             // 攜伴者強制設為 0，避免重複計算載量
                }))
            ]
        };

        console.log("送出的 Payload:", payload);

        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.result === "SUCCESS") {
            alert("報名成功！");
            document.getElementById('regOptionsModal').style.display = 'none';
            if (typeof syncData === 'function') syncData();
        } else {
            alert("報名失敗：" + result.message);
        }

    } catch (e) {
        console.error("提交出錯:", e);
        alert("系統連線失敗，請稍後再試");
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerText = "確認提交報名";
        }
    }
}

// 4. 資料同步邏輯
async function syncData() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        // 確保這兩行確實執行且資料存在
        window.latestCalendarData = data.calendar || []; 
       
        // --- 公告欄修改邏輯開始 ---
        const newsContent = data.news ? data.news.trim() : "";
        const newsContainer = document.getElementById('newsContainer');
        const newsText = document.getElementById('news');

        // 取得台灣本地今日日期 (格式: YYYY-MM-DD)
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        // 取得後端傳來的有效日期 (若後端沒傳，預設為空字串)
        const startDate = data.startDate || "";
        const endDate = data.endDate || "";

        // 判斷條件：
        // 1. 必須有文字內容
        // 2. 文字內容不是 "NONE"
        // 3. (關鍵) 今日日期必須 >= 起始日期 且 今日日期 <= 結束日期
        const isDateValid = (startDate === "" || todayStr >= startDate) && (endDate === "" || todayStr <= endDate);        
        
     if (newsContent && newsContent !== "NONE" && newsContent !== "" && isDateValid) {
       // 條件符合：顯示容器並填入文字
       if (newsContainer) newsContainer.classList.remove('hidden');
       if (newsText) newsText.innerText = newsContent;
     } else {
       // 條件不符（日期還沒到、已過期、或沒內容）：隱藏整個容器
       if (newsContainer) newsContainer.classList.add('hidden');
     }
        
        // --- 公告欄修改邏輯結束 ---   
        
        const liveUser = data.users.find(u => {
            const uPhone = String(u.phone || "").replace(/\D/g, "").slice(-9);
            const currPhone = String(currentUser.phone || "").replace(/\D/g, "").slice(-9);
            return uPhone === currPhone;
        });
        
        if (liveUser) {
            currentUser = liveUser;
            if (liveUser.role && liveUser.role !== "學員") {
                const staffBtn = document.getElementById('staffBtn');
                staffBtn.classList.remove('hidden');
                staffBtn.onclick = enterStaffMode;
            }
            updateUI(liveUser, data.calendar, data.events);
        }
    } catch (e) { 
        console.error("同步失敗:", e);
        showToast("同步失敗", "error"); 
    } finally { 
        overlay.style.display = 'none'; 
    }
}

            <button onclick="submitRegistration()" class="w-full mt-4 bg-emerald-800 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">確認提交報名</button>
