<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>築心智慧夥伴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        /* 隱藏卷軸 */
        ::-webkit-scrollbar { display: none; }
        .chat-container { height: calc(100vh - 4rem - 5rem); }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="emerald-gradient text-white px-4 h-16 shadow-md flex items-center justify-between shrink-0 z-10">
        <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center active:bg-white/20 rounded-full transition-colors">
           <i class="fas fa-chevron-left text-lg"></i>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                <i class="fas fa-leaf text-sm text-emerald-200"></i>
            </div>
            <h1 class="text-lg font-black tracking-widest">築心智慧夥伴</h1>
        </div>
        <div class="w-10"></div>
    </nav>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 pb-28">
    </main>

    <div class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 p-3 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20">
        <div class="max-w-xl mx-auto flex items-end gap-2">
            <button id="micBtn" onclick="toggleSpeech()" class="w-12 h-12 bg-emerald-50 text-emerald-700 rounded-full flex items-center justify-center shrink-0 active:scale-95 transition-all shadow-sm">
                <i class="fas fa-microphone text-lg"></i>
            </button>

            <div class="flex-1 bg-gray-50 rounded-2xl border border-emerald-100 px-4 py-2.5 flex items-center">
                <textarea id="userInput" rows="1" placeholder="請輸入或語音提問..." class="w-full bg-transparent outline-none resize-none text-base text-emerald-900 py-1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
            </div>

            <button onclick="sendMessage()" id="sendBtn" class="w-12 h-12 emerald-gradient text-white rounded-full flex items-center justify-center shrink-0 active:scale-95 transition-transform shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://hello-world-broad-cake-8477.swearlin.workers.dev/";

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const micBtn = document.getElementById('micBtn');
    let userName = "夥伴";
    let userPhone = "";
    let isListening = false;
    let recognition;

    function goBack() {
    // 優先嘗試直接跳轉
    // 使用 location.replace 不會留下紀錄，讓返回更乾淨
    window.location.replace('member_zone.html');
    
    // 如果 0.5 秒後還沒跳轉成功（保險機制）
    setTimeout(() => {
        window.location.href = './member_zone.html';
    }, 500);
    }
    
    // 🎯 1. 初始化資料與天氣開場邏輯
    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        userName = params.get('user_name') || "夥伴";
        userPhone = params.get('user_phone') || "未提供";

        // 去姓留名處理 (開場動畫用)
        let displayName = userName;
        if (userName.length >= 2) {
            displayName = userName.substring(userName.length - 2);
            if (userName.length === 2) displayName = userName.substring(1);
        }

        // --- 🌦️ 天氣獲取與權限處理 ---
        const getWeather = () => {
            return new Promise((resolve) => {
                // 若使用者 3 秒內沒按允許或拒絕，自動超時跳過
                const timeout = setTimeout(() => resolve("一般"), 3000);
                
                if (!navigator.geolocation) {
                    clearTimeout(timeout);
                    resolve("一般");
                }

                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        clearTimeout(timeout);
                        try {
                            const { latitude, longitude } = pos.coords;
                            // 使用免費 Open-Meteo API 查詢天氣
                            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                            const data = await res.json();
                            const code = data.current_weather.weathercode;
                            
                            // 判斷晴天、雨天
                            if (code === 0) resolve("晴天");
                            else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) resolve("雨天");
                            else resolve("一般");
                        } catch { resolve("一般"); }
                    },
                    () => { // 使用者按「拒絕」
                        clearTimeout(timeout);
                        resolve("一般");
                    }
                );
            });
        };

        // 等待天氣結果 (或超時)
        const weatherResult = await getWeather();
        
        // 根據結果構造給 AI 的隱藏指令
        const initialPrompt = weatherResult === "一般" 
            ? `嘿！我上線了，跟我打個招呼吧！` 
            : `系統通知：現在是${weatherResult}，請以此為背景跟我打招呼並給建議。`;

        // 啟動首句對話
        sendInitialMessage(initialPrompt);
        initSpeech();
    };

    // 🎯 發送首句訊息 (自動觸發 AI 回覆)
    async function sendInitialMessage(msg) {
        const typingId = showTyping();
        try {
            const fetchUrl = `${WORKER_URL}?user_name=${encodeURIComponent(userName)}&user_phone=${encodeURIComponent(userPhone)}`;
            const response = await fetch(fetchUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();
            document.getElementById(typingId).remove();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let aiReply = data.candidates[0].content.parts[0].text;
                aiReply = aiReply.replace(/\n/g, '<br>');
                appendMessage("system", aiReply);
            }
        } catch (error) {
            if (document.getElementById(typingId)) document.getElementById(typingId).remove();
            appendMessage("system", "嘿！好久不見，今天想聊點什麼嗎？");
        }
    }

    // 2. 語音辨識初始化
    function initSpeech() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript;
                userInput.value = result;
                autoResize(userInput);
                stopListening();
            };

            recognition.onerror = () => stopListening();
            recognition.onend = () => stopListening();
        } else {
            micBtn.classList.add('hidden');
        }
    }

    function toggleSpeech() {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            startListening();
        }
    }

    function startListening() {
        isListening = true;
        recognition.start();
        micBtn.classList.add('mic-active');
        micBtn.innerHTML = '<i class="fas fa-stop text-lg"></i>';
        userInput.placeholder = "聆聽中，請說話...";
    }

    function stopListening() {
        isListening = false;
        micBtn.classList.remove('mic-active');
        micBtn.innerHTML = '<i class="fas fa-microphone text-lg"></i>';
        userInput.placeholder = "請輸入或語音提問...";
    }

    // 3. UI 互動
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight > 120 ? 120 : textarea.scrollHeight) + 'px';
    }

    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = "flex w-full " + (sender === "user" ? "justify-end" : "justify-start");
        
        const innerHTML = sender === "user" 
            ? `<div class="max-w-[80%] bg-emerald-700 text-white px-5 py-3 rounded-2xl rounded-tr-none text-sm shadow-md break-words">${text}</div>`
            : `<div class="max-w-[85%] bg-white border border-emerald-50 text-emerald-950 px-5 py-3 rounded-2xl rounded-tl-none text-sm shadow-sm leading-relaxed break-words relative">
                 <div class="text-[10px] text-emerald-600 mb-1 font-bold uppercase tracking-tighter opacity-50">築心會館管家</div>
                 ${text}
               </div>`;
               
        msgDiv.innerHTML = innerHTML;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        const id = "typing-" + Date.now();
        const msgDiv = document.createElement('div');
        msgDiv.id = id;
        msgDiv.className = "flex w-full justify-start animate-fade-in";
        msgDiv.innerHTML = `
            <div class="bg-white border border-emerald-50 px-4 py-4 rounded-2xl shadow-sm flex gap-1">
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
            </div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    // 4. API 通訊 (使用者發送訊息)
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage("user", text);
        userInput.value = "";
        userInput.style.height = 'auto';
        userInput.disabled = true;

        const typingId = showTyping();

        try {
            const fetchUrl = `${WORKER_URL}?user_name=${encodeURIComponent(userName)}&user_phone=${encodeURIComponent(userPhone)}`;
            const response = await fetch(fetchUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            document.getElementById(typingId).remove();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let aiReply = data.candidates[0].content.parts[0].text;
                aiReply = aiReply.replace(/\n/g, '<br>');
                appendMessage("system", aiReply);
            } else {
                appendMessage("system", "抱歉，剛才開小差了，再跟我說一次好嗎？");
            }
        } catch (error) {
            if (document.getElementById(typingId)) document.getElementById(typingId).remove();
            appendMessage("system", "網路好像有點問題，待會再試試看吧！");
        } finally {
            userInput.disabled = false;
            userInput.focus();
        }
    }
</script>
</body>
</html>
