<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        
        .fixed-add-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 50; }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
        
        /* 1:1 複製名冊按鈕風格 */
        .btn-edit-green { background-color: #10b981; border: 1px solid #059669; color: white; }
        .btn-edit-orange { background-color: #f97316; border: 1px solid #ea580c; color: white; }
        .bg-header-dark { background-color: #064E3B; }
    </style>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="築心讀書會" />
    <link rel="manifest" href="/site.webmanifest" />
</head>
<body class="pb-40">

    <div id="loadingOverlay"><div class="bg-white p-8 rounded-3xl flex flex-col items-center shadow-2xl"><div class="spinner mb-4"></div><p class="font-bold text-emerald-900">同步資料中...</p></div></div>

    <nav class="sticky top-0 z-40 bg-header-dark text-white px-6 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="flex items-center gap-1 font-bold active:opacity-50">
            <i class="fas fa-chevron-left"></i> 返回
        </button>
        <h1 class="absolute inset-x-0 text-center text-lg font-black tracking-widest pointer-events-none">行事曆管理</h1>
        
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20">開啟編輯</button>
    
    </nav>

    <main class="p-6 max-w-md mx-auto">
        <div id="calendarList" class="space-y-4">
            </div>
    </main>

    <div id="addBtnContainer" class="fixed-add-btn hidden">
        <div class="bg-[#FDFBF7]/90 backdrop-blur-sm p-4 rounded-3xl">
            <button onclick="openAddModal()" class="w-full py-4 bg-header-dark text-white rounded-2xl font-black shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                <i class="fas fa-plus"></i> 新增活動項目
            </button>
        </div>
    </div>

    <div id="eventModal" class="modal-overlay" onclick="closeModal('eventModal')">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-2xl font-black text-emerald-900 mb-6 text-center">活動資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">活動日期</label>
                    <input type="date" id="eventDate" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">活動名稱</label>
                    <input type="text" id="eventTitle" placeholder="輸入活動名稱" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">海報網址</label>
                    <input type="text" id="eventPoster" placeholder="https://..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">活動描述 (對應 E 欄位)</label>
                    <textarea id="eventDesc" rows="3" placeholder="請輸入活動簡介內容..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold resize-none"></textarea>
                </div>
                <div class="flex items-center gap-3 p-2">
                    <input type="checkbox" id="needQR" class="w-5 h-5 accent-emerald-600">
                    <label for="needQR" class="text-sm font-bold text-gray-600">啟用簽到功能 (QR Code)</label>
                </div>
            </div>
            
            <div class="flex flex-col gap-3 mt-8">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeModal('eventModal')" class="py-4 text-gray-400 font-bold">取消</button>
                    <button onclick="submitData()" class="py-4 bg-header-dark text-white rounded-2xl font-black shadow-lg">儲存變更</button>
                </div>
                <button id="deleteBtn" onclick="confirmDelete()" class="w-full py-3 text-red-500 font-bold hidden">刪除此活動項目</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal-overlay" onclick="closeModal('qrModal')">
        <div class="bg-white w-full max-w-xs rounded-[3rem] p-8 text-center" onclick="event.stopPropagation()">
            <h3 id="qrName" class="text-xl font-black text-emerald-900 mb-6"></h3>
            <div class="bg-gray-50 p-4 rounded-3xl mb-6 flex justify-center items-center">
                <img id="qrImg" src="" class="w-full aspect-square">
            </div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">關閉</button>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";
    const STAFF_KEY = sessionStorage.getItem('staffKey');
    let allEvents = [];
    let isEditMode = false;
    let currentEditData = null;
    // 從 Session 抓取權限清單
    const userPermissions = JSON.parse(sessionStorage.getItem('userPermissions') || "[]");
    
    window.onload = () => {
        if (!STAFF_KEY) { location.href="index.html"; return; }
        // --- 修正後的權限檢查 ---
        const editToggleBtn = document.getElementById('editToggleBtn');
        if (!userPermissions.includes("all") && !userPermissions.includes("edit_calendar")) {
            if (editToggleBtn) {
                // 不要 remove()，改為隱藏但保留位置 (或是設為 invisible)
                editToggleBtn.style.visibility = 'hidden'; 
                // 這樣它雖然看不見，但依然會佔據右側空間，標題就能維持在中間
            }
        }
        loadCalendar();
    };

    function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

    function toggleEditMode() {
        // 安全檢查：防止有人透過 Console 強行執行此 function
        if (!userPermissions.includes("all") && !userPermissions.includes("edit_calendar")) {
            alert("您沒有權限進行編輯作業");
            return;
        }        
        isEditMode = !isEditMode;
        const btn = document.getElementById('editToggleBtn');
        const addBtn = document.getElementById('addBtnContainer');
        if (isEditMode) {
            btn.innerText = "結束編輯";
            btn.className = isEditMode ? "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md" : "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
            
            addBtn.classList.remove('hidden');
        } else {
            btn.innerText = "開啟編輯";
            btn.className = isEditMode ? "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md" : "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
            
            addBtn.classList.add('hidden');
        }
        renderList();
    }

    async function loadCalendar() {
        toggleLoading(true);
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            allEvents = data.calendar || [];
            allEvents.sort((a, b) => new Date(a.dateText) - new Date(b.dateText));
            renderList();
        } catch(e) { console.error(e); }
        toggleLoading(false);
    }

    function renderList() {
        const list = document.getElementById('calendarList');
        const todayStr = new Date().toLocaleDateString('en-CA');

        list.innerHTML = allEvents.map((ev, i) => {
            const isFuture = ev.dateText > todayStr;
            const hasPoster = ev.poster_url && ev.poster_url.trim() !== "";
            // 修正：必須 needQR 為 true 且 非未來日期 才顯示按鈕
            const canShowQR = (ev.needQR === true || ev.needQR === "TRUE") && !isFuture;

            return `
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="bg-emerald-50 text-emerald-800 px-3 py-2 rounded-2xl text-center min-w-[65px]">
                        <div class="text-[10px] font-black">${ev.dateText.split('-')[1]}月</div>
                        <div class="text-xl font-black">${ev.dateText.split('-')[2]}</div>
                    </div>
                    <div>
                        <h3 class="font-black text-emerald-900 leading-tight">${ev.title}</h3>
                        ${hasPoster ? '<p class="text-[10px] text-emerald-600 font-bold mt-1"><i class="fas fa-image"></i> 有海報</p>' : ''}
                    </div>
                </div>
                <div>
                    ${isEditMode ? 
                        `<button onclick="openEditModal(${i})" class="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center border border-blue-100"><i class="fas fa-pencil-alt"></i></button>` : 
                        (canShowQR ? 
                            `<button onclick="openQR(${i})" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center border border-emerald-100 shadow-sm"><i class="fas fa-qrcode"></i></button>` : 
                            `<div class="w-12 h-12 opacity-0 pointer-events-none"></div>`)
                    }
                </div>
            </div>`;
        }).join('');
    }

    function openAddModal() {
        currentEditData = null;
        document.getElementById('modalTitle').innerText = "新增活動項目";
        document.getElementById('eventDate').value = "";
        document.getElementById('eventTitle').value = "";
        document.getElementById('eventPoster').value = "";
        document.getElementById('eventDesc').value = "";
        document.getElementById('needQR').checked = true;
        document.getElementById('deleteBtn').classList.add('hidden');
        document.getElementById('eventModal').style.display = 'flex';
    }

    function openEditModal(i) {
        currentEditData = allEvents[i];
        document.getElementById('modalTitle').innerText = "維修活動資料";
        document.getElementById('eventDate').value = currentEditData.dateText;
        document.getElementById('eventTitle').value = currentEditData.title;
        document.getElementById('eventPoster').value = currentEditData.poster_url || "";
        document.getElementById('eventDesc').value = currentEditData.description || "";
        document.getElementById('needQR').checked = (currentEditData.needQR === true || currentEditData.needQR === "TRUE");
        document.getElementById('deleteBtn').classList.remove('hidden');
        document.getElementById('eventModal').style.display = 'flex';
    }

    async function submitData() {
        const date = document.getElementById('eventDate').value;
        const title = document.getElementById('eventTitle').value.trim();
        const poster = document.getElementById('eventPoster').value.trim();
        const desc = document.getElementById('eventDesc').value.trim();
        const qr = document.getElementById('needQR').checked;

        if(!date || !title) { alert("日期與名稱不能為空"); return; }

        closeModal('eventModal');
        toggleLoading(true);

        const payload = {
            key: STAFF_KEY,
            type: currentEditData ? 'update_calendar_event' : 'add_event',
            oldTitle: currentEditData ? currentEditData.title : null,
            dateText: date,
            title: title,
            poster_url: poster,
            description: desc, // 新增欄位參數
            needQR: qr
        };

        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            loadCalendar();
        } catch(e) { alert("儲存失敗"); toggleLoading(false); }
    }

    async function confirmDelete() {
        if(!confirm(`確定要徹底刪除「${currentEditData.title}」？`)) return;
        closeModal('eventModal');
        toggleLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_event_poster', key: STAFF_KEY, eventTitle: currentEditData.title }) });
            loadCalendar();
        } catch(e) { alert("刪除失敗"); toggleLoading(false); }
    }

    function openQR(i) {
        const ev = allEvents[i];
        document.getElementById('qrName').innerText = ev.title;
        document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("CHECKIN:"+ev.dateText+":"+ev.title)}`;
        document.getElementById('qrModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
