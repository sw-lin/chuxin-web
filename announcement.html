<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大聲公管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 28px; border-radius: 50px; font-size: 14px; z-index: 10000; transition: opacity 0.5s; pointer-events: none; }
        
        .action-card { background: white; border-radius: 2rem; border: 1px solid #f0f0f0; margin-bottom: 1.5rem; overflow: hidden; }
        .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid #f8f8f8; display: flex; align-items: center; gap: 10px; }
    </style>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="築心讀書會" />
    <link rel="manifest" href="site.webmanifest" />
</head>
<body class="min-h-screen pb-20">

    <div id="loadingOverlay"><div class="loading-card"><div class="spinner"></div><div id="loadingText" class="text-emerald-900 font-bold">同步中...</div></div></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="window.location.href='staff_menu.html'" class="text-sm font-bold flex items-center"><i class="fas fa-chevron-left mr-1"></i> 返回</button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2 whitespace-nowrap">大聲公管理</h1>
        <div class="w-12"></div>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        
        <!-- 區塊一：會員首頁公告欄 -->
        <div class="action-card shadow-sm">
            <div class="card-header bg-emerald-50/50">
                <i class="fas fa-scroll text-emerald-700"></i>
                <span class="font-bold text-emerald-900">1. 會員 App 公告欄</span>
            </div>

                <div class="p-5">
                <p class="text-[11px] text-gray-400 mb-3 font-bold uppercase tracking-wider">更新後，在預定期限內 全體會員登入後可見</p>
                <textarea id="newsContent" rows="4" placeholder="讀取目前公告中..." class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold text-gray-700 leading-relaxed resize-none transition-all"></textarea>

<div class="flex gap-4 mb-4">
    <div class="flex-1">
        <label class="block text-emerald-700 font-bold mb-1">起始日期</label>
        <input type="date" id="startDate" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-transparent focus:border-emerald-500 outline-none">
    </div>
    <div class="flex-1">
        <label class="block text-emerald-700 font-bold mb-1">結束日期</label>
        <input type="date" id="endDate" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-transparent focus:border-emerald-500 outline-none">
    </div>
</div>

                </div>                
                <button onclick="updateAppNews()" class="w-full mt-4 py-4 bg-[#064E3B] text-white rounded-xl font-black shadow-md flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i class="fas fa-save"></i> 儲存並更新公告
                </button>
            </div>
        </div>

        <!-- 區塊二：LINE 群組推播 -->
        <div class="action-card shadow-sm">
            <div class="card-header bg-green-50/50">
                <i class="fab fa-line text-green-600 text-lg"></i>
                <span class="font-bold text-emerald-900">2. LINE 群組即時廣播</span>
            </div>
            <div class="p-5">
                <p class="text-[11px] text-gray-400 mb-3 font-bold uppercase tracking-wider">訊息將直接推播至官方群組</p>
                <textarea id="lineMsg" rows="4" placeholder="請輸入欲推播的訊息內容..." class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-green-500 outline-none font-bold text-gray-700 leading-relaxed resize-none transition-all"></textarea>
                <button onclick="sendLineBroadcast()" class="w-full mt-4 py-4 bg-[#00B900] text-white rounded-xl font-black shadow-md flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i class="fab fa-line text-xl"></i> 立即發送 LINE 推播
                </button>
            </div>
        </div>

    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";
        
        // --- 大聲公管理頁面：金鑰讀取終極版 ---
var STAFF_KEY = (function() {
    try {
        // 1. 先嘗試從 userInfo 大箱子拿
        const infoStr = sessionStorage.getItem('userInfo');
        if (infoStr) {
            const userInfo = JSON.parse(infoStr);
            if (userInfo.staffKey) {
                console.log("✅ 金鑰來源：userInfo 物件");
                return userInfo.staffKey;
            }
        }

        // 2. 如果大箱子沒有，嘗試拿獨立的小盒子 (對應您 executeStaffVerify 的存法)
        const loneKey = sessionStorage.getItem('staffKey');
        if (loneKey) {
            console.log("✅ 金鑰來源：獨立 staffKey 欄位");
            return loneKey;
        }

        return ""; // 真的都沒有
    } catch (e) {
        console.error("❌ 金鑰讀取失敗:", e);
        return "";
    }
})();

// 頁面載入後的安全檢查
window.onload = function() {
    console.log("🔑 當前使用金鑰:", STAFF_KEY);

    if (!STAFF_KEY) {
        alert("管理權限無效，請重新進行幹部驗證");
        window.location.href = "member_zone.html"; // 踢回會員區重新驗證
        return;
    }
    fetchCurrentNews(); // 金鑰正常，開始抓資料
};

        function showLoading(show, text) {
            document.getElementById('loadingText').innerText = text || "同步中...";
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // 讀取目前資料庫裡的公告內容
function fetchCurrentNews() {
    fetch(GAS_URL)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            // 1. 填入公告內容
            document.getElementById('newsContent').value = data.news || "";
            
            // 2. 填入起始日期 (對應 GAS 修正後的 startDate)
            if (data.startDate) {
                document.getElementById('startDate').value = formatDateForInput(data.startDate);
            }
            
            // 3. 填入結束日期 (對應 GAS 修正後的 endDate)
            if (data.endDate) {
                document.getElementById('endDate').value = formatDateForInput(data.endDate);
            }
        })
        .catch(function(err) { console.error("讀取失敗：", err); });
}

        // 更新 App 內部的公告欄[cite: 4]
        function updateAppNews() {
         const content = document.getElementById('newsContent').value.trim();
         let startDate = document.getElementById('startDate').value; 
         let endDate = document.getElementById('endDate').value;

        // --- 自動計算日期邏輯 ---
        const today = new Date();
        const nextWeek = new Date();
        nextWeek.setDate(today.getDate() + 7);

        const isoToday = today.toISOString().split('T')[0];
        const isoNextWeek = nextWeek.toISOString().split('T')[0];

       // 如果沒填，就帶入預設值 (今日 ~ 一週後)
       if (!startDate) startDate = isoToday;
       if (!endDate) endDate = isoNextWeek;

       if (!content) return alert("公告內容不能為空");

      showLoading(true, "更新公告中...");
      const payload = {
        type: 'update_news',
        key: STAFF_KEY,
        content: content,
        startDate: startDate, // 這裡會傳給 GAS 的 params.startDate
        endDate: endDate      // 這裡會傳給 GAS 的 params.endDate
    };

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(result => {
            if (result.result === "SUCCESS") {
                showToast("✅ 公告與有效期限已更新");
            } else { alert("更新失敗"); }
        })
        .finally(() => showLoading(false));            
        }

        // 發送 LINE 訊息推播[cite: 4]
        function sendLineBroadcast() {
            var msg = document.getElementById('lineMsg').value.trim();
            if (!msg) return alert("請輸入 LINE 訊息內容");
            if (!confirm("確定要將此訊息推播至 LINE 群組嗎？")) return;

            showLoading(true, "LINE 發送中...");
            var payload = { type: 'send_line', key: STAFF_KEY, message: msg };

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.result === "SUCCESS") {
                        showToast("🚀 LINE 廣播已發送");
                        document.getElementById('lineMsg').value = '';
                    } else { alert("發送失敗"); }
                })
                .finally(function() { showLoading(false); });
        }
        // 將日期轉換為 HTML5 input 要求的 YYYY-MM-DD 格式
    function formatDateForInput(dateStr) {
    if (!dateStr) return "";
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return ""; // 處理無效日期
    var month = '' + (d.getMonth() + 1);
    var day = '' + d.getDate();
    var year = d.getFullYear();

    if (month.length < 2) month = '0' + month;
    if (day.length < 2) day = '0' + day;

    return [year, month, day].join('-');
    }
        function showToast(m) {
            var t = document.createElement('div');
            t.className = 'toast';
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 500);
            }, 2500);
        }
    </script>
</body>
</html>
