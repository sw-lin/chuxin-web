<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .input-group { @apply mb-4 bg-white p-4 rounded-2xl border border-emerald-50 shadow-sm; }
        .label-text { @apply block text-[10px] font-bold text-emerald-800 mb-1 ml-1; }
        .input-field { @apply w-full px-4 py-3 bg-gray-50 rounded-xl outline-none text-sm border-2 border-transparent focus:border-emerald-500 transition-all; }
    </style>
</head>
<body class="pb-32">

    <nav class="p-6 flex items-center gap-4">
        <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-emerald-800">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1 class="text-xl font-black text-emerald-900">活動預約報名</h1>
    </nav>

    <main class="px-6">
        <div class="bg-emerald-900 text-white p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <div class="text-[10px] opacity-80 mb-1 font-bold">您正在報名</div>
            <h2 id="displayEventTitle" class="text-2xl font-black mb-2">載入活動中...</h2>
            <div id="priceInfo" class="text-xs font-bold bg-emerald-800/50 inline-block px-3 py-1 rounded-full">
                會員 $0 / 非會員 $0
            </div>
        </div>

        <form id="regForm">
            <section class="mb-8">
                <div class="flex items-center gap-2 mb-3 px-2">
                    <div class="w-1.5 h-5 bg-emerald-600 rounded-full"></div>
                    <h3 class="font-black text-emerald-900">本人資料 (主要報名者)</h3>
                </div>
                
                <div class="input-group">
                    <label class="label-text">姓名</label>
                    <input type="text" id="mainName" class="input-field bg-gray-100" readonly>
                </div>

                <div class="input-group">
                    <label class="label-text">身分證字號 (保險使用)</label>
                    <input type="text" id="mainID" class="input-field" placeholder="請輸入身分證字號">
                </div>

                <div class="input-group">
                    <label class="label-text">餐食選擇</label>
                    <select id="mainDiet" class="input-field">
                        <option value="不拘">不拘</option>
                        <option value="葷食">葷食</option>
                        <option value="素食">素食</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="label-text">交通方式 (僅限本人填寫)</label>
                    <select id="mainTransport" onchange="toggleSeats()" class="input-field">
                        <option value="自行開車">自行開車</option>
                        <option value="搭乘遊覽車">搭乘遊覽車</option>
                        <option value="共乘不開車">共乘不開車</option>
                    </select>
                </div>

                <div id="seatsWrapper" class="input-group">
                    <label class="label-text">可載人數 (不含自己)</label>
                    <input type="number" id="mainSeats" class="input-field" value="0" min="0" max="4">
                </div>
            </section>

            <section class="mb-8">
                <div class="flex items-center justify-between mb-3 px-2">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-5 bg-orange-500 rounded-full"></div>
                        <h3 class="font-black text-emerald-900">攜伴參加</h3>
                    </div>
                    <button type="button" onclick="addPartner()" class="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg active:scale-95">
                        <i class="fas fa-plus mr-1"></i>新增攜伴
                    </button>
                </div>
                
                <div id="partnerContainer" class="space-y-4">
                    </div>
            </section>

            <section class="mb-8 px-2">
                <label class="label-text">特別需求備註</label>
                <textarea id="regNote" rows="3" class="w-full p-4 bg-white border border-emerald-50 rounded-2xl outline-none text-sm focus:border-emerald-500" placeholder="如有其他需求請說明"></textarea>
            </section>
        </form>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-gray-100 p-6 flex items-center justify-between z-50">
        <div>
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">應繳總金額</div>
            <div class="text-2xl font-black text-emerald-900">$ <span id="totalAmount">0</span></div>
        </div>
        <button onclick="submitForm()" class="bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-emerald-200 active:scale-95 transition-all">
            確認送出報名
        </button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec"; // 請替換您的 GAS 網址
        let currentUser = JSON.parse(sessionStorage.getItem('userInfo')) || {};
        let eventConfig = { title: "", memberFee: 0, guestFee: 0 };
        let partners = [];

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            eventConfig.title = params.get('event') || "未知活動";
            document.getElementById('displayEventTitle').innerText = eventConfig.title;
            
            // 模擬從同步資料中抓取費用 (實務上建議從 localStorage 的全體 events 抓)
            document.getElementById('mainName').value = currentUser.name || "未登入";
            updateTotal();
        };

        function toggleSeats() {
            const val = document.getElementById('mainTransport').value;
            document.getElementById('seatsWrapper').style.display = (val === '自行開車') ? 'block' : 'none';
        }

        function addPartner() {
            if (partners.length >= 3) return alert("最多只能攜伴 3 位喔！");
            const id = Date.now();
            partners.push(id);
            renderPartners();
            updateTotal();
        }

        function removePartner(id) {
            partners = partners.filter(p => p !== id);
            renderPartners();
            updateTotal();
        }

        function renderPartners() {
            const container = document.getElementById('partnerContainer');
            container.innerHTML = partners.map((id, index) => `
                <div class="bg-white p-5 rounded-3xl border border-orange-100 shadow-sm relative">
                    <button onclick="removePartner(${id})" class="absolute top-4 right-4 text-gray-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                    <div class="text-orange-500 font-black text-xs mb-3">攜伴訪客 ${index + 1}</div>
                    <div class="space-y-3">
                        <input type="text" placeholder="訪客姓名" class="partner-name input-field">
                        <input type="tel" placeholder="訪客電話" class="partner-phone input-field">
                        <select class="partner-diet input-field">
                            <option value="不拘">餐食：不拘</option>
                            <option value="葷食">餐食：葷食</option>
                            <option value="素食">餐食：素食</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function updateTotal() {
            // 這裡暫時 hardcode，之後應從 events 資料抓
            const mFee = 500; 
            const gFee = 600;
            const total = mFee + (partners.length * gFee);
            document.getElementById('totalAmount').innerText = total;
        }

        async function submitForm() {
            const payload = {
                type: 'submit_complex_reg',
                eventTitle: eventConfig.title,
                mainPhone: currentUser.phone,
                registrations: []
            };

            // 1. 本人
            payload.registrations.push({
                name: currentUser.name,
                phone: currentUser.phone,
                idNumber: document.getElementById('mainID').value,
                diet: document.getElementById('mainDiet').value,
                transport: document.getElementById('mainTransport').value,
                seats: document.getElementById('mainSeats').value,
                isMember: true,
                proxy: "本人",
                fee: 500, // 應從 config 抓
                note: document.getElementById('regNote').value
            });

            // 2. 攜伴
            const pNames = document.querySelectorAll('.partner-name');
            const pPhones = document.querySelectorAll('.partner-phone');
            const pDiets = document.querySelectorAll('.partner-diet');

            pNames.forEach((el, i) => {
                payload.registrations.push({
                    name: el.value,
                    phone: pPhones[i].value,
                    diet: pDiets[i].value,
                    isMember: false,
                    proxy: currentUser.name, // 代理人為本人
                    fee: 600, // 應從 config 抓
                    transport: "", seats: 0 // 攜伴通常不開車
                });
            });

            console.log("送出報名資料:", payload);
            alert("正在連線伺服器...");
            
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.result === "SUCCESS") {
                    alert("報名成功！");
                    location.href = "member_zone.html";
                } else {
                    alert(result.message);
                }
            } catch(e) {
                alert("網路錯誤，請稍後再試");
            }
        }
    </script>
</body>
</html>
