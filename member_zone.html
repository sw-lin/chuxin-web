<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

    window.latestCalendarData = []; // 預設空陣列，防止按鈕點擊噴錯
    let tempRegTitle = "";  // 報名活動名稱也建議放這
    let currentNeedID = "N";// 確保全域變數 currentNeedID 存在
    
    function getDirectImageUrl(url) {
        if (!url) return "";
        if (!url.includes('drive.google.com')) return url;
        let id = "";
        if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
        else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
        return id ? `https://lh3.googleusercontent.com/u/0/d/${id}=w800` : url;
    }

function updateUI(user, calendar, events) {
    console.log("開始更新介面...", { user, calendar, events });
    
    // 1. 安全檢查
    if (!user) {
        console.error("更新失敗：找不到使用者資料");
        return;
    }

    // 2. 取得今天日期
    const today = new Date().toISOString().split('T')[0];

    // 3. 核心邏輯：計算出席率
    // 分母：過去已發生且「需要報到」的活動
    const requiredPastEvents = (calendar || []).filter(ev => {
        return ev && 
               ev.dateText && 
               ev.dateText <= today && 
               ev.needQR === true; 
    });

    const totalEvents = requiredPastEvents.length;
    // 分子：該會員實際有報到的紀錄總數
    const attendCount = (user.attendLog || []).length;
    
    // 計算百分比
    const attendanceRate = totalEvents > 0 ? Math.round((attendCount / totalEvents) * 100) : 0;

    // 4. 更新 UI 數字
    // 這裡要對齊您的 HTML ID (attPercent, attCountDisplay)
    const percentElem = document.getElementById('attPercent');
    const countDisplayElem = document.getElementById('attCountDisplay');

    if (percentElem) percentElem.innerText = attendanceRate + '%';
    if (countDisplayElem) countDisplayElem.innerText = `${attendCount} / ${totalEvents}`;

    // 更新圓環進度條 (如果有這個元素的話)
    const circle = document.getElementById('progressCircle');
    if (circle) {
        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (attendanceRate / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }

    // 5. 慶祝動畫 (大於 50% 且有活動時觸發)
    if (attendanceRate >= 50 && totalEvents > 0) {
        try { confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } }); } catch(e){}
    }

    // 儲存出席資料供 Modal 使用
    // 假設您有一個全域變數處理這個，這裡過濾出該用戶有參加的詳細資料
    window.currentAttendedData = (calendar || []).filter(ev => 
        (user.attendLog || []).some(log => String(log).includes(ev.title))
    );

    // 6. 渲染下方區塊
    try { renderCalendarActivity(calendar); } catch(e) { console.error("渲染活動預告出錯", e); }
    try { renderEventSection(dashboardData); } catch(e) { console.error("渲染報名區出錯", e); }
}
    
function renderCalendarActivity(calendar) {
    const container = document.getElementById('calendarActivitySection');
    if (!container) return;

    // 1. 安全檢查：確保 calendar 是陣列且有資料
    if (!calendar || !Array.isArray(calendar) || calendar.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm italic bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200">目前沒有安排活動</div>';
        return;
    }

    // 2. 取得今天日期 (格式 YYYY-MM-DD，與 GAS 的 formatDateToISO 匹配)
    const today = new Date().toISOString().split('T')[0];

    // 3. 核心過濾與排序邏輯
    const upcoming = calendar
        .filter(ev => {
            // 確保 dateText 存在，且日期大於等於今天
            return ev.dateText && ev.dateText >= today;
        })
        .sort((a, b) => a.dateText.localeCompare(b.dateText)) // 依日期升冪排序（最近的在前）
        .slice(0, 1); // 【關鍵】只取第一筆，避免畫面過長

    // 4. 若今天以後都沒有活動
    if (upcoming.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm italic bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200">近期無預定活動</div>';
        return;
    }

    // 5. 渲染該筆活動 (優化後的卡片 UI)
    const ev = upcoming[0];
    const displayUrl = typeof getDirectImageUrl === 'function' ? getDirectImageUrl(ev.poster_url) : ev.poster_url;

    if (displayUrl && displayUrl.startsWith('http')) {
        // 有海報時的圖卡模式
        container.innerHTML = `
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-emerald-50 hover:shadow-md transition-shadow">
                <img src="${displayUrl}" class="w-full h-auto object-cover max-h-[250px]" onerror="this.parentElement.innerHTML=renderTextOnlyCard('${ev.title}', '${ev.dateText}')">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <h4 class="font-black text-emerald-900 text-base line-clamp-1">${ev.title}</h4>
                        <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full uppercase tracking-tighter">Next</span>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-2 flex items-center">
                        <i class="far fa-calendar-check mr-2 text-emerald-500"></i>活動日期：${ev.dateText}
                    </p>
                </div>
            </div>`;
    } else {
        // 無海報時的精緻文字模式
        container.innerHTML = renderTextOnlyCard(ev.title, ev.dateText);
    }
}

// 輔助函數：渲染純文字卡片
function renderTextOnlyCard(title, date) {
    return `
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-l-8 border-emerald-800 emerald-gradient text-white relative overflow-hidden">
            <div class="absolute top-[-10px] right-[-10px] w-20 h-20 bg-white/10 rounded-full"></div>
            <div class="flex items-center space-x-2">
                <span class="text-[10px] text-emerald-200 font-bold tracking-[0.2em] uppercase">Upcoming</span>
                <div class="h-[1px] w-8 bg-emerald-400/50"></div>
            </div>
            <h4 class="font-black text-white text-lg mt-2 relative z-10 leading-tight">${title}</h4>
            <p class="text-xs text-emerald-100 relative z-10 mt-4 flex items-center">
                <i class="far fa-clock mr-2"></i> ${date}
            </p>
        </div>`;
} 

/**
 * 修改後的渲染函式：與 initializeDashboard 對接
 * data 包含: { events: [...], myRegistrations: ["活動A", "活動B"] }
 */
function renderEventSection(data) {
    var container = document.getElementById('eventSection');
    if (!container) return;

    var events = data.events || [];
    var myRegs = data.myRegistrations || []; // 從後端拿到的已報名清單
    
    // 過濾出目前有效的活動 (沿用你原本的邏輯)
    var today = new Date().toISOString().split('T')[0];
    var activeEvents = events.filter(ev => today >= ev.start_date && today <= ev.display_until);

    if (activeEvents.length === 0) {
        container.innerHTML = "";
        return;
    }

    container.innerHTML = `<div class="flex items-center gap-3 px-2 mb-4"><div class="h-5 w-1 bg-emerald-600 rounded-full"></div><h3 class="text-lg font-black text-emerald-950 tracking-wide">活動報名區</h3></div>` + 
    activeEvents.map(ev => {
        const safeTitle = ev.title.replace(/'/g, "\\'");
        
        // 核心改變：判斷是否已在已報名清單中
        const isRegistered = myRegs.includes(ev.title);
        const btnText = isRegistered ? '<i class="fas fa-check-circle mr-2"></i>您已報名 (前往修改)' : "立即報名";
        const btnClass = isRegistered ? "bg-gray-400" : "emerald-gradient";

        // 跳轉邏輯：傳送至新的 registration.html 頁面
        const actionBtn = `<button onclick="goToRegistrationPage('${safeTitle}')" 
                            class="w-full py-4 ${btnClass} text-white rounded-2xl font-black tracking-widest active:scale-95 transition-all shadow-md">
                            ${btnText}
                           </button>`;

        const displayUrl = getDirectImageUrl(ev.poster_url);

        // 以下維持你原本的 UI 結構
        if (displayUrl && displayUrl.includes('http')) {
            return `<div class="bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-emerald-50 mb-6">
                        <img src="${displayUrl}" class="w-full object-cover">
                        <div class="p-5 bg-white">${actionBtn}</div>
                    </div>`;
        } else {
            return `<div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-emerald-50 space-y-2.5 mb-4">
                        <h4 class="font-black text-emerald-900 text-lg">${ev.title}</h4>
                        <p class="text-xs text-gray-500">日期：${ev.date || '未定'}</p>
                        ${actionBtn}
                    </div>`;
        }
    }).join('');
}

/**
 * 導向新報名頁面的入口
 */
function goToRegistrationPage(eventTitle) {
    const userPhone = document.getElementById('userPhone')?.innerText;
    const userName = document.getElementById('userName')?.innerText;

    // 取得當前 Web App 的 URL (自動抓取，不需寫死)

    // Toast & Scanner
    function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `${type === 'success' ? 'bg-emerald-800' : 'bg-red-800'} text-white px-6 py-3 rounded-full shadow-2xl text-xs font-bold transition-all duration-500 opacity-0 translate-y-2 flex items-center gap-2`;
        toast.innerHTML = (type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-triangle"></i>') + msg;
        container.appendChild(toast);
        setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-2'), 100);
        setTimeout(() => { toast.classList.add('opacity-0', '-translate-y-2'); setTimeout(() => toast.remove(), 500); }, 3500);
    }

    async function startScanner() {
    document.getElementById('scannerModal').style.display = 'flex';
    
    // 如果已有實例，先停止再重建
    if (html5QrCode) {
        try { await html5QrCode.stop(); } catch(e) {}
    }

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 15, qrbox: 250 }, 
        (text) => { stopScanner(); processCheckin(text); }, 
        () => {}
    ).catch(err => { 
        console.error(err);
        showToast("相機啟動失敗", "error"); 
        stopScanner(); 
    });
}
    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { html5QrCode = null; document.getElementById('scannerModal').style.display = 'none'; }).catch(() => document.getElementById('scannerModal').style.display = 'none');
        } else { document.getElementById('scannerModal').style.display = 'none'; }
    }

    // 交互邏輯 (與後端對接)
async function handleUpdateProfile() {
    const oldPass = document.getElementById('oldPass').value.trim();
    let email = document.getElementById('editEmail').value.trim();
    const newPass = document.getElementById('newPass').value.trim();
    
    if (!oldPass) { 
        showToast("請輸入目前密碼以供驗證", "error"); 
        return; 
    }
    
    // 若沒填新 Email，沿用舊的
    if (!email && currentUser.email) {
        email = currentUser.email;
    }

    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';

    try {
        const payload = {
            type: 'updateProfile',
            phone: currentUser.phone,
            oldPassword: oldPass,
            newPassword: newPass,
            email: email
        };

        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        const result = await res.json();

        if (result.result === "SUCCESS") {
            showToast("個人資料更新成功！");
            closeEditModal(null, true);
            // 立即同步最新資料
            await syncData();
        } else {
            showToast(result.message, "error");
        }
    } catch (e) {
        console.error("更新失敗:", e);
        showToast("網路連線異常，請稍後再試", "error");
    } finally {
        overlay.style.display = 'none';
    }
}    
async function processCheckin(scanData) {
    // 1. 格式檢查
    if (!scanData.startsWith("CHECKIN:")) { showToast("無效格式", "error"); return; }
    
    // 2. 解析活動名稱 (例如從 CHECKIN:2026-03-26|金剛經導讀 解析出來)
    const parts = scanData.split(':');
    const eventID = "EVENT:" + parts[1] + "|" + parts.slice(2).join(':');
    const eventTitleOnly = parts.slice(2).join(':'); // 取得純活動名稱

    // 3. 【新增：防重檢查】檢查出席紀錄是否已有此活動名稱 (不論日期)
    // 檢查 currentUser.attendLog 裡面是否有人任何一筆包含這個活動名稱
    const isAlreadyAttended = (currentUser.attendLog || []).some(log => {
        return log && String(log).includes(eventTitleOnly);
    });

    if (isAlreadyAttended) {
        showToast("您已經報到過此項目，不需再次報到", "error");
        return;
    }

    // 4. 原有的報到流程
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const res = await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ 
                type: 'checkin', 
                phone: currentUser.phone, 
                name: currentUser.name, 
                eventTitle: eventID 
            }) 
        });
        const result = await res.json();
        if (result.result === "SUCCESS") { 
            showToast("報到成功！"); 
            confetti({ particleCount: 150 }); 
            syncData(); 
        } else { 
            showToast(result.message, "error"); 
        }
    } catch (e) { 
        showToast("報到失敗", "error"); 
    } finally { 
        document.getElementById('loadingOverlay').style.display = 'none'; 
    }
}

// 4. 資料同步邏輯
async function syncData() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        // 確保這兩行確實執行且資料存在
        window.latestCalendarData = data.calendar || []; 
       
        // --- 公告欄修改邏輯開始 ---
        const newsContent = data.news ? data.news.trim() : "";
        const newsContainer = document.getElementById('newsContainer');
        const newsText = document.getElementById('news');

        // 取得台灣本地今日日期 (格式: YYYY-MM-DD)
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        // 取得後端傳來的有效日期 (若後端沒傳，預設為空字串)
        const startDate = data.startDate || "";
        const endDate = data.endDate || "";

        // 判斷條件：
        // 1. 必須有文字內容
        // 2. 文字內容不是 "NONE"
        // 3. (關鍵) 今日日期必須 >= 起始日期 且 今日日期 <= 結束日期
        const isDateValid = (startDate === "" || todayStr >= startDate) && (endDate === "" || todayStr <= endDate);        
        
     if (newsContent && newsContent !== "NONE" && newsContent !== "" && isDateValid) {
       // 條件符合：顯示容器並填入文字
       if (newsContainer) newsContainer.classList.remove('hidden');
       if (newsText) newsText.innerText = newsContent;
     } else {
       // 條件不符（日期還沒到、已過期、或沒內容）：隱藏整個容器
       if (newsContainer) newsContainer.classList.add('hidden');
     }
        
        // --- 公告欄修改邏輯結束 ---   
        
        const liveUser = data.users.find(u => {
            const uPhone = String(u.phone || "").replace(/\D/g, "").slice(-9);
            const currPhone = String(currentUser.phone || "").replace(/\D/g, "").slice(-9);
            return uPhone === currPhone;
        });
        
        if (liveUser) {
            currentUser = liveUser;
            if (liveUser.role && liveUser.role !== "學員") {
                const staffBtn = document.getElementById('staffBtn');
                staffBtn.classList.remove('hidden');
                staffBtn.onclick = enterStaffMode;
            }
            if (liveUser) {
            currentUser = liveUser;
            if (liveUser.role && liveUser.role !== "學員") {
                const staffBtn = document.getElementById('staffBtn');
                if (staffBtn) {
                    staffBtn.classList.remove('hidden');
                    staffBtn.onclick = enterStaffMode;
                }
            }           
            // --- 修改處：將完整的 data 傳給 updateUI ---
            // 這樣 updateUI 才能拿到 data.myRegistrations
            updateUI(liveUser, data.calendar, data); 
            }
            
            updateUI(liveUser, data.calendar, data.events);
        }
    } catch (e) { 
        console.error("同步失敗:", e);
        showToast("同步失敗", "error"); 
    } finally { 
        overlay.style.display = 'none'; 
    }
}
    
// 5. 統一入口：頁面載入後執行
window.addEventListener('load', () => {

    // 處理使用者權限與資料同步

        return; 
    }
    currentUser = JSON.parse(userStr);
    const userNameElem = document.getElementById('userName');
    if(userNameElem) userNameElem.innerText = currentUser.name;
    
    syncData();
});
    
// 全域處理電話欄位：只允許數字，並優化 PC 端輸入體驗
document.addEventListener('input', function(e) {
    if (e.target && e.target.classList.contains('p-phone')) {
        const originalValue = e.target.value;
        // 僅允許數字，不使用複雜的正則轉義以相容所有瀏覽器
        const cleanedValue = originalValue.split('').filter(char => char >= '0' && char <= '9').join('');
        
        if (originalValue !== cleanedValue) {
            e.target.value = cleanedValue;
        }
    }
});
