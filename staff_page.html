<div id="section-members" class="hidden space-y-6">
    <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
        <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-user-plus mr-2"></i> 加入新成員</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input id="add-name" type="text" placeholder="姓名" class="p-3 bg-gray-50 rounded-xl border">
            <input id="add-phone" type="text" placeholder="手機 (登入帳號)" class="p-3 bg-gray-50 rounded-xl border">
            <input id="add-pass" type="text" placeholder="初始密碼" class="p-3 bg-gray-50 rounded-xl border">
            <button onclick="addMember()" class="bg-emerald-700 text-white rounded-xl font-bold hover:bg-emerald-800 transition">新增成員</button>
        </div>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 text-gray-600 text-sm">
                <tr>
                    <th class="p-4">姓名/職稱</th>
                    <th class="p-4">手機/Email</th>
                    <th class="p-4">繳費狀態</th>
                    <th class="p-4">操作</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ... fetchData, switchTab 等保持不變 ...

    // 1. 修正：新增成員 (與登入頁面一致使用 btoa 加密密碼)
    async function addMember() {
        const name = document.getElementById('add-name').value.trim();
        const phone = document.getElementById('add-phone').value.trim();
        const pass = document.getElementById('add-pass').value.trim();
        if(!name || !phone || !pass) return alert("請填寫姓名、手機與密碼");
        await apiPost({ type: "add_member", name: name, phone: phone, password: btoa(pass) });
    }

    // 2. 修正：更新成員資料 (電子郵件或繳費)
    function updateMember(phone, field, value) {
        const newData = {}; newData[field] = value;
        apiPost({ type: "update_member", currentPhone: phone, newData: newData });
    }

    // 3. 修正：刪除成員 (補上 type)
    async function deleteMember(phone) {
        if(!confirm(`確定要刪除成員 ${phone} 嗎？此操作不可恢復。`)) return;
        await apiPost({ type: "delete_member", currentPhone: phone });
    }

    // 4. 修正：新增活動
    async function addEvent() {
        const date = document.getElementById('newDate').value;
        const title = document.getElementById('newTitle').value.trim();
        if(!date || !title) return alert("請選擇日期並輸入標題");
        await apiPost({ type: "add_event", date: date, title: title });
    }

    // 5. 修正：刪除活動
    async function deleteEvent(date) {
        if(!confirm(`確定要刪除 ${date} 的活動嗎？`)) return;
        await apiPost({ type: "delete_event", date: date });
    }

    // 統一 API 呼叫 (增加回應判斷)
    async function apiPost(payload) {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.text();
            if (result.includes("OK") || result.includes("DELETED")) {
                alert("操作成功！");
                location.reload();
            } else {
                alert("伺服器回應：" + result);
            }
        } catch (e) { alert("更新失敗，請檢查網路連接"); }
    }
</script>
