<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .btn-edit-active { background-color: #ef4444 !important; } 
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    </style>
</head>
<body class="pb-32">

    <div id="loadingOverlay"><div class="loading-card"><div class="spinner"></div><p class="font-bold text-emerald-900">處理中...</p></div></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="text-xl"><i class="fas fa-chevron-left"></i></button>
        <h1 class="text-xl font-black tracking-widest">行事曆管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-blue-600 px-4 py-1.5 rounded-full text-sm font-bold shadow-md">編輯</button>
    </nav>

    <main class="p-6 max-w-md mx-auto">
        <div id="calendarList" class="space-y-4"></div>

        <div id="addBtnContainer" class="hidden mt-8">
            <button onclick="openAddModal()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> 新增活動項目
            </button>
        </div>
    </main>

    <div id="eventModal" class="modal-overlay" onclick="closeModal('eventModal')">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-2xl font-black text-emerald-900 mb-6 text-center">活動資料卡</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">活動日期</label>
                    <input type="date" id="eventDate" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">活動名稱</label>
                    <input type="text" id="eventTitle" placeholder="輸入活動名稱" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-emerald-800 mb-1 ml-1">海報網址</label>
                    <input type="text" id="eventPoster" placeholder="貼上 Drive 或圖片連結" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div class="flex items-center gap-3 p-2">
                    <input type="checkbox" id="needQR" checked class="w-5 h-5 accent-emerald-600">
                    <label for="needQR" class="text-sm font-bold text-gray-600">產生簽到 QR Code</label>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('eventModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitData()" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-lg">確認送出</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal-overlay" onclick="closeModal('qrModal')">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center" onclick="event.stopPropagation()">
            <h3 id="qrName" class="text-xl font-black text-emerald-900 mb-6"></h3>
            <div class="bg-gray-50 p-4 rounded-3xl mb-6">
                <img id="qrImg" src="" class="w-full aspect-square">
            </div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">關閉</button>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    const STAFF_KEY = sessionStorage.getItem('staff_key');
    let allEvents = [];
    let isEditMode = false;
    let currentEditData = null;

    window.onload = () => {
        if (!STAFF_KEY) { alert("請從管理介面登入"); location.href="index.html"; return; }
        loadCalendar();
    };

    function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('editToggleBtn');
        const addBtn = document.getElementById('addBtnContainer');
        btn.innerText = isEditMode ? "結束編輯" : "編輯";
        btn.className = isEditMode ? "bg-red-500 px-4 py-1.5 rounded-full text-sm font-bold shadow-md" : "bg-blue-600 px-4 py-1.5 rounded-full text-sm font-bold shadow-md";
        addBtn.classList.toggle('hidden', !isEditMode);
        renderList();
    }

    async function loadCalendar() {
        toggleLoading(true);
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            allEvents = data.calendar || [];
            renderList();
        } catch(e) { alert("連線失敗"); }
        toggleLoading(false);
    }

    function renderList() {
        const list = document.getElementById('calendarList');
        list.innerHTML = allEvents.map((ev, i) => `
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-4" onclick="${isEditMode ? `openEditModal(${i})` : `openQR(${i})`}">
                    <div class="bg-emerald-50 text-emerald-800 px-3 py-2 rounded-2xl text-center min-w-[60px]">
                        <div class="text-[10px] font-black">${ev.dateText.split('-')[1] || ''}月</div>
                        <div class="text-xl font-black">${ev.dateText.split('-')[2] || ''}</div>
                    </div>
                    <div>
                        <h3 class="font-black text-emerald-900">${ev.title}</h3>
                        <p class="text-[10px] text-gray-400 font-bold">${ev.dateText}</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    ${isEditMode ? 
                        `<button onclick="doDelete(${i})" class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-trash-alt"></i></button>` : 
                        `<button onclick="openQR(${i})" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fas fa-qrcode"></i></button>`
                    }
                </div>
            </div>
        `).join('');
    }

    function openAddModal() {
        currentEditData = null;
        document.getElementById('modalTitle').innerText = "排定新活動";
        document.getElementById('eventDate').value = "";
        document.getElementById('eventTitle').value = "";
        document.getElementById('eventPoster').value = "";
        document.getElementById('eventModal').style.display = 'flex';
    }

    function openEditModal(i) {
        currentEditData = allEvents[i];
        document.getElementById('modalTitle').innerText = "編輯活動資料";
        document.getElementById('eventDate').value = currentEditData.dateText;
        document.getElementById('eventTitle').value = currentEditData.title;
        document.getElementById('eventPoster').value = currentEditData.poster_url || "";
        document.getElementById('eventModal').style.display = 'flex';
    }

    async function submitData() {
        const date = document.getElementById('eventDate').value;
        const title = document.getElementById('eventTitle').value.trim();
        const poster = document.getElementById('eventPoster').value.trim();
        const qr = document.getElementById('needQR').checked;

        if(!date || !title) return alert("必填未填");
        closeModal('eventModal'); toggleLoading(true);

        const payload = {
            key: STAFF_KEY, dateText: date, title: title, poster_url: poster, needQR: qr,
            type: currentEditData ? 'update_calendar_event' : 'add_event',
            oldTitle: currentEditData ? currentEditData.title : null,
            date: date 
        };

        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        loadCalendar();
    }

    async function doDelete(i) {
        if(!confirm("確定刪除？")) return;
        toggleLoading(true);
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_event_poster', key: STAFF_KEY, eventTitle: allEvents[i].title }) });
        loadCalendar();
    }

    function openQR(i) {
        const ev = allEvents[i];
        document.getElementById('qrName').innerText = ev.title;
        document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("CHECKIN:"+ev.dateText+":"+ev.title)}`;
        document.getElementById('qrModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
