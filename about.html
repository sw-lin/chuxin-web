<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於築心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        /* 讓長文章換行正確顯示 */
        #aboutContent { white-space: pre-wrap; line-height: 1.8; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="glass-nav border-b border-emerald-100 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-emerald-800 hover:text-emerald-600 font-bold flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> <span class="hidden md:inline">返回首頁</span>
            </a>
            <h1 class="text-xl font-bold text-emerald-900 tracking-widest">關於築心</h1>
            <button onclick="scrollToEnroll()" class="bg-emerald-800 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-emerald-700 transition shadow-md">
                立即報名
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto custom-scrollbar px-6 py-10">
        <div class="max-w-3xl mx-auto">
            
            <article class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-emerald-50 mb-12">
                <div id="aboutContent" class="text-gray-700 text-lg">
                    <div class="flex justify-center p-10"><i class="fas fa-spinner fa-spin text-emerald-800 text-2xl"></i></div>
                    </div>
            </article>

            <section id="enrollSection" class="bg-emerald-900 rounded-[2.5rem] shadow-2xl overflow-hidden mb-20">
                <div id="formContainer" class="p-8 md:p-12">
                    <div class="text-center mb-10 text-white">
                        <h2 class="text-3xl font-bold mb-2">加入築心</h2>
                        <p class="opacity-80">期待與您在書香中相遇</p>
                    </div>

                    <form id="enrollForm" action="https://formspree.io/f/xpqjvblg" method="POST" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" name="name" required placeholder="您的姓名" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-400">
                            <input type="tel" name="phone" required placeholder="聯絡電話" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-400">
                        </div>
                        <input type="email" name="email" required placeholder="電子郵件" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-400">
                        <button type="submit" class="w-full bg-white text-emerald-900 py-4 rounded-2xl font-bold text-xl hover:bg-emerald-50 transition">
                            送出報名
                        </button>
                    </form>
                </div>

                <div id="successMessage" class="hidden p-16 text-center text-white">
                    <i class="fas fa-check-circle text-6xl mb-6"></i>
                    <h3 class="text-2xl font-bold mb-4">報名資料已送出！</h3>
                    <p class="mb-8 opacity-90">我們會儘速與您聯絡，請留意您的信箱。</p>
                    <a href="index.html" class="inline-block border-2 border-white px-8 py-3 rounded-xl font-bold hover:bg-white hover:text-emerald-900 transition">回主頁</a>
                </div>
            </section>
        </div>
    </main>

    <script>
        // 1. 自動讀取 about.txt 內容 
        async function loadAboutText() {
            try {
                const response = await fetch('about.txt');
                if (!response.ok) throw new Error('無法讀取檔案');
                const text = await response.text();
                document.getElementById('aboutContent').textContent = text;
            } catch (err) {
                document.getElementById('aboutContent').innerHTML = 
                    `<p class="text-red-500 text-center">讀取關於我們內容失敗，請稍後再試。</p>`;
            }
        }

        // 2. 滾動到報名表
        function scrollToEnroll() {
            document.getElementById('enrollSection').scrollIntoView({ behavior: 'smooth' });
        }

        // 3. 表單提交處理
        const form = document.getElementById('enrollForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            btn.disabled = true; btn.innerText = "處理中...";

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (res.ok) {
                    document.getElementById('formContainer').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                }
            } catch (err) { alert('送出失敗'); btn.disabled = false; btn.innerText = "送出報名"; }
        };

        window.onload = loadAboutText;
    </script>
</body>
</html>
