        let allData = { events: [], registrations: [] };
        let isEditMode = false;
        let currentEventConfig = null; // 🌟 儲存目前選中活動的詳細規格（費用、日期等）

// 核心載入
// --- 修正後的 loadData ---
async function loadData() {
    showLoading(true);
    console.log("開始嘗試載入活動清單...");
    try {
        const res = await fetch(`${GAS_URL}?type=get_events_page&t=${Date.now()}`);
        const json = await res.json();
        
        console.log("從 GAS 接收到的原始資料:", json);

        // 容錯處理：如果 GAS 直接回傳陣列，或回傳包含 events 的物件
        if (Array.isArray(json)) {
            allData.events = json;
        } else if (json.events && Array.isArray(json.events)) {
            allData.events = json.events;
        } else {
            allData.events = [];
            console.error("資料格式不正確，預期為陣列但得到:", json);
        }

        if (allData.events.length === 0) {
            showToast("清單目前是空的，請先發布活動");
        } else {
            console.table(allData.events); // 在控制台顯示漂亮的表格
        }

        renderSelector();
    } catch (e) { 
        console.error("載入失敗，錯誤原因:", e);
        showToast("伺服器連線失敗，請檢查網路或 GAS 權限"); 
    }
    showLoading(false);
}
// 補上缺失的 API 呼叫工具
async function fetchAPI(type, params = {}) {
    const url = new URL(GAS_URL);
    url.searchParams.append('type', type);
    // 確保 staff_key 有帶入
    url.searchParams.append('key', sessionStorage.getItem('staff_key') || '');
    
    // 🌟 修正：確保每個參數都被正確編碼
    Object.keys(params).forEach(key => {
        if (params[key] !== undefined && params[key] !== null) {
            url.searchParams.set(key, params[key]); 
        }
    });

    console.log("發送請求至:", url.toString()); // 除錯用
    const res = await fetch(url);
    return await res.json();
}        
// --- 修正後的 renderSelector (增加屬性保護) ---
function renderSelector() {
    const selector = document.getElementById('eventSelector');
    const currentValue = selector.value;
    
    // 確保這裡抓取的屬性名稱 ev.title 與您 GAS 回傳的一致
    let optionsHtml = '<option value="">-- 請選擇活動項目 --</option>';
    optionsHtml += allData.events.map(ev => {
        const title = ev.title || ev["標題"] || "未命名活動";
        return `<option value="${title}">${title}</option>`;
    }).join('');
    
    selector.innerHTML = optionsHtml;
    if (currentValue) selector.value = currentValue;
}
        
// --- 核心函式：載入選中活動的詳細名單 ---
async function loadEventDetails() {
    const selector = document.getElementById('eventSelector');
    const title = selector.value;
    
    if (!title) {
        // 如果沒選活動，清空統計與列表

        document.getElementById('regList').innerHTML = "";
        return;
    }

    console.log("正在載入活動詳情:", title);

    // 1. 從先前 loadData 存好的資料中找出該活動的詳細規格
    // 這裡相容「標題」與「title」兩種 Key
    currentEventTitle = title;
    currentEventConfig = allData.events.find(e => (e["標題"] || e.title) === title);

    if (!currentEventConfig) {
        console.error("找不到該活動的配置資料");
        showToast("活動配置讀取失敗");
        return;
    }

    showLoading(true);
    try {
        // 2. 向 GAS 請求該活動的報名名單
        // 建議這裡也改用你寫好的 fetchAPI 或是維持目前的 fetch
        const res = await fetch(`${GAS_URL}?type=get_registrations_by_event&eventTitle=${encodeURIComponent(title)}&t=${Date.now()}`);
        const json = await res.json();
        
        if (Array.isArray(json)) {
            allData.registrations = json; // 存入全域變數
            renderRegList(json);          // 渲染畫面
        
            
            // 如果在編輯模式下，顯示管理按鈕
            if(isEditMode) {
                document.getElementById('manageEventBtn').classList.remove('hidden');
            }
        } else {
            allData.registrations = [];
            renderRegList([]);
            showToast("尚無報名資料");
        }
    } catch (e) { 
        console.error("名單載入出錯:", e);
        showToast("名單載入失敗"); 
    }
    showLoading(false);
}

function renderRegList(list) {
    const container = document.getElementById('regList');

    // --- 🌟 關鍵：在此處呼叫「行政看板」統計邏輯 ---
    // 確保每次名單更新時，上方的看板數字也會跟著變
    if (typeof updateAdminStats === "function") {
        updateAdminStats(list); 
    }
    
    if (!list || list.length === 0) {
        container.innerHTML = '<div class="text-center py-20 text-gray-400 italic text-[13px]">📭 目前尚無報名人員</div>' + (isEditMode ? renderManualAddBtn() : '');
        return;
    }

    const mFee = currentEventConfig?.["會員報名費"] || currentEventConfig?.memberFee || 0;
    const gFee = currentEventConfig?.["非會員報名費"] || currentEventConfig?.guestFee || 0;
    

    let html = list.map((r, i) => {
        // --- 資料抓取 ---
        const name = r["姓名"] || "未提供"; 
        const phone = r["電話"] || "無號碼";
        const diet = r["餐食"] || "未填";
        const note = r["備註"] || "無";
        
        // 繳費狀態處理
        const rawStatus = (r["狀態"] || r["繳費狀態"] || "未繳").trim();
        const isPaid = rawStatus.includes("已繳") ? "已繳" : "未繳"; 

        // 會員身分
        const isMember = String(r["是否為會員"] || r["會員身分"]).trim() === "是";
        
        // 🌟 修正：過濾「本人」顯示
        const rawAgent = String(r["報名代理人"] || "").trim();
        const agent = (rawAgent === "本人" || rawAgent === "") ? null : rawAgent;
        
        // 🌟 修正：精準對接 F 欄位「交通(僅本人)」與 G 欄位「可載人(僅本人)」
        const trans = r["交通"] || r["交通(僅本人)"] || ""; 
        const capacity = parseInt(r["可載人(僅本人)"] || r["可載人數"] || 0);

        const dueAmount = isMember ? mFee : gFee;

        // --- 介面構造 ---

        // A. 頭像區 (隱藏本人字樣)

// 將全形數字/字母轉換為半形
function toHalfWidth(str) {
    if (!str) return "";
    return str.replace(/[\uff01-\uff5e]/g, function(ch) {
        return String.fromCharCode(ch.charCodeAt(0) - 0xfee0);
    }).replace(/\u3000/g, " "); // 處理全形空格
}        
        // 輔助工具
function formatDateForInput(dVal) {
    if (!dVal) return "";
    try {
        let d = new Date(dVal);
        if (isNaN(d.getTime())) {
            // 如果是字串格式 YYYY/MM/DD 或 YYYY-MM-DD... 直接截取前10碼
            if (typeof dVal === 'string') return dVal.substring(0, 10).replace(/\//g, '-');
            return "";
        }
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    } catch (e) {
        return "";
    }
}

        if (result.result === "SUCCESS") {
            showToast("✅ 已成功刪除");
            
            // 手動從本地陣列移除，達成即時刷屏
            allData.registrations = allData.registrations.filter(r => 
                !(String(r["電話"] || "").trim() === String(phone).trim() && 
                  String(r["姓名"] || "").trim() === String(name).trim())
            );
            renderRegList(allData.registrations);
            

            if(countEl) countEl.innerText = allData.registrations.length;

        } else {
            showToast("❌ 刪除失敗：" + (result.message || "找不到匹配資料或權限不足"));
        }
    } catch (e) {
        console.error("刪除請求出錯:", e);
        showToast("連線失敗，請檢查 GAS 是否發佈為「所有人」");
    }
    showLoading(false);
}        
// 🌟 快速更新繳費狀態 (與原有的 updatePaymentStatus 區隔)
async function quickUpdatePayment(phone, name, newStatus, selectElement) {
    // 檢查是否有活動標題，這是後端搜尋紀錄的關鍵
    if (!currentEventTitle) {
        showToast("錯誤：未選定活動");
        return;
    }

    // 取得管理權限密鑰
    const staffKey = sessionStorage.getItem('staff_key') || "";

    // 顯示讀取中狀態（避免重複點擊）
    selectElement.disabled = true;
    const originalColor = selectElement.style.backgroundColor;
    selectElement.style.backgroundColor = "#f3f4f6"; 

    try {
        // 🌟 修正點：確保 URL 參數包含後端需要的資訊
        // 根據截圖報錯，後端可能在找 eventTitle 或 rowEvent
        const params = new URLSearchParams({
            type: 'update_reg_status',
            eventTitle: currentEventTitle, // 這是關鍵！
            phone: phone,
            name: name,
            status: newStatus,
            staff_key: staffKey
        });

        console.log("正在更新繳費狀態...", currentEventTitle, name);

        // 使用 fetchAPI 或原生 fetch 發送
        const res = await fetch(`${GAS_URL}?${params.toString()}`);
        const result = await res.json();

        if (result.result === "success") {
            showToast(`✅ ${name} 已更新為 ${newStatus}`);
            // 更新本地資料狀態，確保 UI 一致
            const reg = allData.registrations.find(r => r["電話"] === phone && r["姓名"] === name);
            if (reg) reg["狀態"] = newStatus;
        } else {
            throw new Error(result.message || "更新失敗");
        }
    } catch (e) {
        console.error("更新出錯:", e);
        // 🌟 處理截圖中的 ReferenceError: rowEvent is not defined
        if (e.message.includes("rowEvent")) {
            showToast("後端程式錯誤：請檢查 GAS 腳本中的變數定義");
        } else {
            showToast("更新失敗：" + e.message);
        }
        // 失敗時還原選單狀態
        loadEventDetails(); 
    } finally {
        selectElement.disabled = false;
        selectElement.style.backgroundColor = originalColor;
    }
}

[idInput, phoneInput, mFeeInput, gFeeInput].forEach(el => {

            // 1. 轉半形 2. 去空格 3. 轉大寫(身分證需要，數字不影響)
            this.value = toHalfWidth(this.value).replace(/\s/g, "").toUpperCase();
            
            // 針對費用欄位額外確保它是數字格式
            if (el === mFeeInput || el === gFeeInput) {

function generateLineStats() {
    // 🌟 修正：使用正確的全域資料變數
    const regs = allData.registrations || []; 
    if (regs.length === 0) {
        showToast("目前尚無報名資料");
        return;
    }

    let stats = {
        paid: 0, meat: 0, veg: 0, 
        bus: 0, selfDrive: 0, seatsAvailable: 0
    };

    regs.forEach(r => {
        // 🌟 修正：對接您在 renderRegList 用的中文 Key
        const rawStatus = (r["狀態"] || r["繳費狀態"] || "未繳").trim();
        if (rawStatus.includes("已繳")) stats.paid++;

        const meal = r["餐食"] || "";
        meal === '素食' ? stats.veg++ : stats.meat++;
        
        // 🌟 修正：對接交通方式與可載人數的正確 Key
        const trans = (r["交通"] || r["交通(僅本人)"] || "").trim();
        const cap = parseInt(r["可載人(僅本人)"] || r["可載人數"] || 0);

        if (trans === '搭乘遊覽車' || trans === '共乘') {
            stats.bus++;
        } else if (trans === '自駕' || trans === '開車' || trans === '自行開車') {
            stats.selfDrive++;
            stats.seatsAvailable += cap;
        }
    });

    const eventTitle = document.getElementById('eventSelector').value;
    const msg = `
【${eventTitle} 統計】
--------------------
總人數：${regs.length} 位 (${stats.paid} 已繳費)
🍱 餐食：葷 ${stats.meat} / 素 ${stats.veg}
🚌 交通：共乘/遊覽車 ${stats.bus} 人
🚗 自駕：${stats.selfDrive} 台 (可載 ${stats.seatsAvailable} 人)
--------------------
產出日期：${new Date().toLocaleString()}
    `.trim();

    navigator.clipboard.writeText(msg).then(() => {
        showToast("✅ 統計文字已複製");
    });
}
        
function exportInsuranceCSV() {
    const regs = allData.registrations || [];
    if (regs.length === 0) {
        showToast("❌ 沒有報名資料可匯出");
        return;
    }

    // 包含 UTF-8 BOM 以防 Excel 亂碼
    let csv = "\uFEFF姓名,身分證字號,生日,電話\n";
    
    regs.forEach(r => {
        // 抓取欄位並清理資料
        const name = (r["姓名"] || "").replace(/[\r\n,]/g, " ");
        const id = (r["身分證"] || r["身分證字號"] || "").replace(/[\r\n,]/g, " ");
        const bday = (r["生日"] || "").replace(/[\r\n,]/g, " ");
        const phone = (r["電話"] || "").replace(/[\r\n,]/g, " ");

        // 組合成一行
        csv += `${name},${id},${bday},${phone}\n`;
    });

    // 建立下載連結
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    
    // 檔名加上活動標題
    const eventName = document.getElementById('eventSelector')?.value || "活動";
    link.download = `保險名冊_${eventName}_${new Date().toLocaleDateString()}.csv`;
    
    document.body.appendChild(link); // 建議加入這一行以增加瀏覽器相容性
    link.click();
    document.body.removeChild(link); // 下載完移除
    
    showToast("📂 CSV 匯出完成");
}

function copyPaidListToLine() {
    // 1. 取得資料並過濾「已繳費」名單
    const regs = allData.registrations || [];
    const paidList = regs.filter(r => (r["狀態"] || r["繳費狀態"] || "").includes("已繳"));

    if (paidList.length === 0) {
        showToast("⚠️ 目前尚無已繳費人員");
        return;
    }

    // 2. 格式化訊息：僅包含姓名與人數
    const eventName = document.getElementById('eventSelector')?.value || "活動";
    let message = `【${eventName}】已繳費名單：\n`;
    message += `------------------\n`;
    
    paidList.forEach((r, index) => {
        const name = r["姓名"] || "未提供";
        message += `${index + 1}. ${name}\n`;
    });

    message += `------------------\n`;
    message += `✅ 確認完成繳費：共 ${paidList.length} 位\n`;
    message += `📅 統計日期：${new Date().toLocaleString()}`;

    // 3. 🌟 發送前預覽確認 (參考您提供的大聲公邏輯)
    const isConfirmed = confirm(`請確認發送內容：\n\n${message}\n\n確定要推播至 LINE 群組嗎？`);
    
    if (isConfirmed) {
        // 呼叫原本的 Loading 動畫
        if (typeof showLoading === "function") showLoading(true, "LINE 名單發送中...");
        
        const payload = {
            type: 'send_line', 
            key: STAFF_KEY,    // 確保您的全域變數中存有 STAFF_KEY
            message: message
        };

        fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify(payload) 
        })
        .then(res => res.json())
        .then(result => {
            if (result.result === "SUCCESS") {
                showToast("🚀 已繳費名單已成功送出");
            } else {
                alert("發送失敗：" + (result.message || "請檢查後端設定"));
            }
        })
        .catch(err => {
            console.error("LINE 發送錯誤:", err);
            alert("發送過程發生錯誤，請稍後再試。");
        })
        .finally(() => {
            if (typeof showLoading === "function") showLoading(false);
        });
    }
}
