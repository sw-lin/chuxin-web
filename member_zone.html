<script>
// ==========================================
// 1. 全域變數與基礎設定 (保留核心)
// ==========================================
let currentUser = {};

const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";

// =========================================
// 2. 資料同步核心：確保公告、權限、行事曆一個不漏
// ==========================================
async function syncData() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.display = 'flex';
    
    // 1. 從 Session 取得手機號碼 (修正變數名稱)
    const infoStr = sessionStorage.getItem('userInfo'); 
    const userInfo = infoStr ? JSON.parse(infoStr) : null;
    
    if (!userInfo || !userInfo.phone) {
        if (overlay) overlay.style.display = 'none';
        window.location.href = 'index.html'; 
        return;
    }

    try {
        // 2. 向 GAS 請求初始化資料
        const url = `${GAS_URL}?type=member_init&phone=${userInfo.phone}&t=${Date.now()}`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.result === "SUCCESS") {
            // 3. 同步資料到全域變數，供 Modal 使用
            currentUser = data.user;
            currentUser.phone = userInfo.phone;
            
            // 🌟 這一行最關鍵：把出席紀錄塞進全域變數
            window.currentAttendedData = data.user.attendedLogs || [];

            // 4. 更新 UI 畫面與其它配置
            globalConfig = data.config || {}; 
            if (data.events) {
                localStorage.setItem('allEvents', JSON.stringify(data.events));
            }
            updateUI(data.user, data.calendar, data.events, data.registrations);
        }
    } catch (e) {
        console.error("同步失敗:", e);
    } finally {
        if (overlay) overlay.style.display = 'none';
    }
}    
// 增加 registrations 作為第四個參數
function updateUI(user, calendar, events, registrations) {
    const today = new Date().toISOString().split('T')[0];
    
    // 🛑 除錯點 D：確認傳入 updateUI 的 user 物件長什麼樣
    console.log("updateUI 接收到的 user 物件:", user);
    
    // 🌟 修正 1：直接使用我們從登入端帶來的 attendedLogs
    const logs = user.attendedLogs || []; 
    const attendCount = logs.length;

    // 計算參與率 (維持原有邏輯，但使用新的 attendCount)
    const requiredPastEvents = (calendar || []).filter(ev => ev && ev.dateText && ev.dateText <= today && ev.needQR === true);
    const totalEvents = requiredPastEvents.length;
    const attendanceRate = totalEvents > 0 ? Math.round((attendCount / totalEvents) * 100) : 0;

    // 2. 填入 HTML (保持不變)
    const percentElem = document.getElementById('attPercent');
    const countDisplayElem = document.getElementById('attCountDisplay');
    if (percentElem) percentElem.innerText = attendanceRate + '%';
    if (countDisplayElem) countDisplayElem.innerText = `${attendCount} / ${totalEvents}`;

    // --- 煙火邏輯 ---
    if (attendanceRate >= 50 && typeof confetti === 'function') {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#064E3B', '#059669', '#10B981'] });
    }

    // 🌟 修正 3：【最關鍵】不要再用 filter 比對了，直接賦值
    // 這樣 showLearningHistory 點開時，看到的就會是後端傳來的那三筆
    window.currentAttendedData = logs; 

    renderCalendarActivity(calendar);
    renderEventSection(events || [], registrations || []);
}    
// 點擊卡片觸發的函式
function showLearningHistory() {
    const modal = document.getElementById('historyModal');
    const container = document.getElementById('historyList');
    
    // 🛑 修復關鍵：獲取正確的 user 資料來源
    const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || '{}');
    // 如果全域變數 currentUser 有資料就用它的，不然就用 Session 的
    const activeUser = (typeof currentUser !== 'undefined' && currentUser) ? currentUser : userInfo;

    if (!modal || !container) return;

    // 🌟 修正：從 activeUser 或是全域陣列抓取紀錄
    // 這樣就不會再發生 "user is not defined" 的錯誤
    let logs = [];
    if (window.currentAttendedData && window.currentAttendedData.length > 0) {
        logs = window.currentAttendedData;
    } else if (activeUser && (activeUser.attendedLogs || activeUser.attendLog)) {
        logs = activeUser.attendedLogs || activeUser.attendLog || [];
    }
    
    if (logs.length === 0) {
        // 診斷邏輯
        const debugMsg = (userInfo.attendedLogs && userInfo.attendedLogs.length > 0) 
            ? "資料未成功傳遞至全域變數" 
            : "登入時即無紀錄";
        
        container.innerHTML = `
            <div class="text-center py-10">
                <i class="fas fa-calendar-check text-gray-200 text-5xl mb-3"></i>
                <p class="text-gray-400">目前尚無出席紀錄</p>
                <p class="text-[10px] text-red-400 mt-4 px-4 break-all font-mono">診斷：${debugMsg}</p>
            </div>`; 
    } else {
        container.innerHTML = logs.map(log => `
            <div class="flex items-center justify-between p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100 mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-emerald-900 text-sm">${log.title}</h4>
                        <p class="text-[10px] text-emerald-600/70">${log.dateText || '已簽到'}</p>
                    </div>
                </div>
                <span class="text-[10px] font-bold px-2 py-1 bg-emerald-100 text-emerald-700 rounded-lg">已出席</span>
            </div>
        `).join('');
    }

    modal.classList.remove('hidden');
    modal.style.display = 'flex';
}    
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const title = params.get('event');
    
    // 1. 抓取剛剛存入的 allEvents
    const allEvents = JSON.parse(localStorage.getItem('allEvents')) || [];
    
    // 2. 尋找匹配標題的活動
    const target = allEvents.find(e => e.title === title);

    if (target) {
        eventConfig = {
            title: title,
            // 注意：這裡的屬性名必須對應你 GAS 回傳的 Json Key
            memberFee: parseInt(target.memberFee) || 0,
            guestFee: parseInt(target.guestFee) || 0,
            needID: (target.needID === "是" || target.needID === "Y"), 
            isTourBus: (target.isTourBus === "是" || target.isTourBus === "Y")
        };
    }
};   

// 關閉彈窗
function closeHistoryModal() {
    const modal = document.getElementById('historyModal');

        modal.style.display = 'none';

} 
// 掃碼成功處理
// 掃碼成功處理 (2026 修復版)
// 掃碼成功處理 - 格式對齊補登系統版本 (2026-04-07 修復)
async function onScanSuccess(decodedText) {
    let rawText = decodedText.trim();
    let finalEventString = ""; // 準備寫入資料庫的最終字串

    // 1. 解析與重組格式 (將 CHECKIN:YYYY-MM-DD:Title 轉為 EVENT:YYYY-MM-DD|Title)
    if (rawText.startsWith("CHECKIN:")) {
        const parts = rawText.split(':');
        if (parts.length >= 3) {
            const datePart = parts[1]; // 2026-03-13
            // 取得第二個冒號之後的所有內容，避免活動名稱內有冒號被切斷
            const titlePart = rawText.substring(rawText.indexOf(':', 8) + 1).trim(); 
            
            // 組合為您要求的格式：EVENT:日期|名稱
            finalEventString = `EVENT:${datePart}|${titlePart}`;
        } else {
            finalEventString = rawText; // 格式異常時退回原文字
        }
    } else {
        // 如果 QR Code 本身就已經是 EVENT: 開頭，直接使用
        finalEventString = rawText;
    }

    // 2. 檢查前端快取是否已報到 (比對轉換後的完整字串)
    const alreadyAttended = (currentUser.attendLog || []).some(log => String(log) === finalEventString);
    if (alreadyAttended) {
        showToast("此活動已完成報到", "info");
        closeScanner();
        return;
    }

    closeScanner();
    showToast("報到傳送中...", "info");

    try {
        // 3. 發送至 GAS 進行寫入
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'checkin',
                phone: currentUser.phone,
                name: currentUser.name,
                eventTitle: finalEventString // 傳送對齊後的格式：EVENT:2026-03-13|築心演講...
            })
        });
        
        const result = await response.json();
        
        if (result.result === "SUCCESS") {
            showToast("報到成功！", "success");
            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            syncData(); // 刷新畫面與出席紀錄
        } else if (result.result === "ALREADY_DONE") {
            showToast("您已經簽到過囉", "info");
        } else {
            showToast(result.message || "報到失敗", "error");
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        showToast("連線異常，請檢查網路", "error");
    }
}

function renderEventSection(events, registrations) {
    const wrapper = document.getElementById('registrationWrapper');
    const container = document.getElementById('eventSection');
    if (!container) return;
    
    container.innerHTML = '';

    const now = new Date();
    // 取得今天日期 (YYYY-MM-DD)
    const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

    // 過濾邏輯
    const activeEvents = (events || []).filter(ev => {
        // 🌟 參考後端成功邏輯，對齊 Key 名稱
        // 1. 抓取開始日 (對應 B 欄)
        const rawStart = ev["開始展示日 (start_date)"] || ev.startDate || ev.start_date || "";
        // 2. 抓取下架日 (對應 C 欄)
        const rawEnd = ev["下架日期 (display_until)"] || ev.deadline || ev.display_until || "";

        // 統一格式化 (將斜線換成橫線)
        const start = rawStart.replace(/\//g, '-');
        const end = rawEnd.replace(/\//g, '-');

        // 偵錯用 (若還是有問題，請看瀏覽器 F12 Console)
        console.log(`[日期檢查] 活動:${ev.title || ev["標題"]}, 今天:${todayStr}, 開始:${start}, 結束:${end}`);

        const isStarted = !start || todayStr >= start;
        const isNotExpired = !end || todayStr <= end;

        return isStarted && isNotExpired;
    });

    // 若無活動則隱藏
    if (activeEvents.length === 0) {
        if (wrapper) wrapper.classList.add('hidden');
        return;
    }
    if (wrapper) wrapper.classList.remove('hidden');

    // 渲染過濾後的活動
    activeEvents.forEach(ev => {
        const title = ev["標題"] || ev.title || "";
        
        // 報名資訊比對
        const regInfo = (registrations || []).find(reg => {
            const rTitle = reg.title || reg.eventTitle || "";
            return rTitle.toString().trim() === title.toString().trim();
        });
        
        const isRegistered = !!regInfo;
        const isCheckedIn = regInfo && (regInfo.status === "已報到" || regInfo.status === "是"); 
        
        const mFee = ev["會員報名費"] || ev.memberFee || ev.member_fee || 0;
        const gFee = ev["非會員報名費"] || ev.guestFee || ev.guest_fee || 0;
        
        const rawPoster = ev["海報連結 (poster_url)"] || ev.poster_url || ev.poster || "";
        const posterUrl = (rawPoster && rawPoster.includes('http')) ? getDirectImageUrl(rawPoster) : null;

        let actionBtn = isRegistered 
            ? `<button class="w-full py-3 rounded-xl font-bold bg-gray-100 text-gray-400 cursor-not-allowed" disabled>
                <i class="fas ${isCheckedIn ? 'fa-user-check' : 'fa-check-circle'} mr-2"></i>${isCheckedIn ? '已完成報到' : '已報名成功'}
               </button>`
            : `<button onclick="goToRegistration('${encodeURIComponent(title)}')" 
                class="w-full py-3 emerald-gradient text-white rounded-xl font-bold shadow-lg shadow-emerald-900/20 active:scale-95 transition-transform">
                立即報名
               </button>`;

        const cardHtml = posterUrl 
            ? `<div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-emerald-50 mb-6">
                <img src="${posterUrl}" class="w-full h-auto block">
                <div class="p-6"><h4 class="font-black text-emerald-900 text-lg mb-3">${title}</h4>${actionBtn}</div>
               </div>`
            : `<div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-50 mb-6">
                <div class="flex justify-between items-start mb-4">
                    <span class="px-3 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-black rounded-full">活動公告</span>
                    <span class="text-[10px] text-red-500 font-bold">截止：${ev.deadline || ev["下架日期 (display_until)"] || '額滿為止'}</span>
                </div>
                <h4 class="font-black text-emerald-900 text-xl mb-3">${title}</h4>
                <div class="space-y-3 mb-5 text-gray-600 text-xs">
                    <div><i class="far fa-calendar-alt text-emerald-600 mr-2"></i><b>日期：</b>${ev["活動日期 (date)"] || ev.eventDate || ev.date || '另行通知'}</div>
                    <div><i class="fas fa-tag text-emerald-600 mr-2"></i><b>費用：</b>會員 $${mFee} / 非會員 $${gFee}</div>
                    ${(ev["活動簡介 (desc)"] || ev.desc) ? `<p class="text-emerald-700/70 leading-relaxed bg-emerald-50/30 p-3 rounded-xl border-l-4 border-emerald-200">${(ev["活動簡介 (desc)"] || ev.desc).replace(/\n/g, '<br>')}</p>` : ''}

                ${actionBtn}
               </div>`;
        
        container.insertAdjacentHTML('beforeend', cardHtml);
    });
}

// 保留原本的圖片網址處理工具
function getDirectImageUrl(url) {
    if (!url || url === "NONE" || url === "" || typeof url !== 'string') return null;
    
    // 如果是普通圖片連結，直接回傳
    if (url.startsWith('http') && !url.includes('drive.google.com')) return url;

    // 1. 嘗試從各種 Google Drive 連結格式中提取 ID
    // 支援 /file/d/ID/view, id=ID, 以及您提供的 drive_link 格式
    let fileId = "";
    const segments = url.split('/');
    const dIndex = segments.indexOf('d');
    if (dIndex !== -1 && segments[dIndex + 1]) {
        fileId = segments[dIndex + 1].split('?')[0].split('&')[0];
    } else {
        const match = url.match(/id=([^&]+)/);
        if (match) fileId = match[1];
    }

    // 2. 如果上述方法失敗，使用最後的保險：正則比對長度 25-45 的 ID 字串
    if (!fileId) {
        const fallbackMatch = url.match(/[-\w]{25,45}/);
        if (fallbackMatch) fileId = fallbackMatch[0];
    }

    if (fileId) {
        // 使用最穩定且支援度最高的縮圖 API
        // sz=w1000 確保 Demo 用的大圖也能清晰顯示
        return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
    }    
    return url; // 若都失敗則回傳原始網址嘗試直接載入
}

                userTitle: currentTitle // 👈 把職稱傳給後端去查權限
            })
        });

        const result = await response.json();

        if (result.result === "SUCCESS") {
            // 🌟 關鍵修復：把遺漏的「職稱」與「權限清單」存回 Session 中！
            sessionStorage.setItem('staffKey', staffKey); 
            sessionStorage.setItem('userTitle', result.userTitle);
            sessionStorage.setItem('userPermissions', JSON.stringify(result.permissions || []));
            
            // 跳轉至後台
            window.location.href = 'staff_menu.html';
        } else {
            // 金鑰錯誤提示
            alert("❌ 金鑰錯誤：請重新輸入，或聯繫管理員確認。");
            keyInput.value = "";

    } catch (e) {
        console.error("驗證出錯：", e);
        alert("系統連線異常，請檢查網路後再試一次。");
    } finally {
        // 關閉轉圈圈
        if (loading) loading.style.display = 'none';
    }

    if (nextEvent.dateText && nextEvent.dateText.includes('-')) {
