<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家 - 會員專屬服務</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: sans-serif; overflow: hidden; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="chat-container"></div>

<script>
    function initCoze() {
        if (typeof CozeWebSDK === 'undefined') {
            console.error('SDK 仍未載入');
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('user_name') || '訪客';
        const userPhone = urlParams.get('user_phone') || '未提供';

        new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7620394792719499317', 
            },
            componentProps: {
                title: '築心智慧管家',
                layout: 'window', 
                initial_variables: {
                    user_name: userName,
                    user_phone: userPhone
                }
            },
            el: document.getElementById('chat-container'),
        });
    }

    // 確保文件與腳本都就緒後執行
    if (document.readyState === 'complete') {
        initCoze();
    } else {
        window.addEventListener('load', initCoze);
    }
</script>

</body>
</html>
