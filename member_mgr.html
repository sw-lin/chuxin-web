<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員名冊管理 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-emerald { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <div class="sticky top-0 z-50 p-4 flex items-center justify-between glass-card shadow-sm">
        <button onclick="location.href='staff_menu.html'" class="text-emerald-800"><i class="fas fa-chevron-left mr-2"></i></button>
        <h1 class="font-bold text-emerald-900 text-lg">會員名冊管理</h1>
        <button onclick="openAddModal()" class="bg-emerald-600 text-white w-8 h-8 rounded-full shadow-lg">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="memberList" class="p-4 space-y-3">
        <div class="text-center py-10 text-gray-400">載入中...</div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-4 text-center">新增新會員</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 ml-1">姓名</label>
                    <input id="newName" type="text" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="輸入姓名">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">手機號碼 (登入帳號)</label>
                    <input id="newPhone" type="tel" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="09xxxxxxxx">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">預設密碼</label>
                    <input id="newPass" type="text" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="預設 123">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">身分角色</label>
                    <select id="newRole" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                        <option value="學員">學員</option>
                        <option value="工程">工程</option>
                        <option value="管理員">管理員</option>
                    </select>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="closeAddModal()" class="flex-1 py-3 text-gray-400 font-medium">取消</button>
                <button onclick="submitAddMember()" class="flex-1 py-3 btn-emerald text-white rounded-xl font-bold shadow-lg">確認增加</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        const STAFF_KEY = sessionStorage.getItem('staff_key');

        window.onload = () => {
            if (!STAFF_KEY) { location.href = "index.html"; return; }
            loadMembers();
        };

        // 讀取會員列表
        async function loadMembers() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                const container = document.getElementById('memberList');
                
                container.innerHTML = data.users.map(u => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-emerald-50 flex justify-between items-center">
                        <div class="flex-1">
                            <div class="flex items-baseline space-x-3">
                                <span class="text-lg font-bold text-emerald-900 w-20 truncate">${u.name}</span>
                                <span class="text-md font-mono text-gray-600">${u.phone}</span>
                                <span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 rounded-full border border-emerald-100">${u.role}</span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1 pl-1">
                                <i class="far fa-envelope mr-1"></i> ${u.email || '尚未設定 Email'}
                            </div>
                        </div>
                        <button onclick="deleteMember('${u.phone}', '${u.name}')" class="text-red-200 hover:text-red-500 p-2 transition-colors">
                            <i class="fas fa-user-minus"></i>
                        </button>
                    </div>
                `).join('');
            } catch (e) {
                console.error("載入失敗", e);
            }
        }

        // 彈窗控制
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('addModal').style.display='flex'; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); document.getElementById('addModal').style.display='none'; }

        // 新增送出
        async function submitAddMember() {
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const password = document.getElementById('newPass').value;
            const role = document.getElementById('newRole').value;

            if (!name || !phone) return alert("姓名與電話為必填");

            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    type: 'add_member',
                    key: STAFF_KEY,
                    name, phone, password, role
                })
            });
            const result = await res.json();
            if (result.result === "SUCCESS") {
                alert("新增成功！");
                location.reload();
            }
        }

        // 刪除會員
        async function deleteMember(phone, name) {
            if (!confirm(`確定要刪除會員「${name}」嗎？此操作不可復原。`)) return;

            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    type: 'delete_member',
                    key: STAFF_KEY,
                    phone: phone
                })
            });
            const result = await res.json();
            if (result.result === "SUCCESS") {
                alert("已刪除");
                location.reload();
            }
        }
    </script>
</body>
</html>
