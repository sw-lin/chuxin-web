<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-loading { opacity: 0.6; pointer-events: none; }
        .unauthorized { display: none !important; }
    </style>
</head>
<body id="adminBody" class="pb-12 unauthorized">

    <script>
        // --- 1. 全域變數宣告 ---
        let ADMIN_KEY = "";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; 
        const CHECKIN_URL = "https://your-checkin-url.com"; // 請填入您的簽到頁網址
        let allData = null;

        // --- 2. 初始化函式 ---
        async function init() {
            const inputKey = prompt("請輸入管理員授權金鑰：");
            if (!inputKey) {
                alert("未輸入金鑰，將導回會員專區。");
                location.replace('member_zone.html');
                return;
            }
            ADMIN_KEY = inputKey; // 存入全域變數
            await fetchData();
        }

        // --- 3. 抓取資料 (必須帶 Key) ---
        async function fetchData() {
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        type: "get_all_data",
                        adminKey: ADMIN_KEY 
                    })
                });
                const result = await res.text();

                if (result === "WRONG_KEY") {
                    alert("❌ 金鑰錯誤！");
                    location.reload();
                    return;
                }

                allData = JSON.parse(result);
                renderAll();

                // 移除隱藏狀態
                document.getElementById('adminBody').classList.remove('unauthorized');
                document.querySelectorAll('.hidden').forEach(el => {
                    if(el.id !== 'qrModal') el.classList.remove('hidden');
                });

            } catch (e) {
                console.error(e);
                alert("讀取失敗，請確認金鑰或網路連線。");
            }
        }

        // --- 4. 統一的 POST 處理 (自動帶 Key) ---
        async function apiPost(data, btnId) {
            if (!ADMIN_KEY) return;
            
            const btn = btnId ? document.getElementById(btnId) : null;
            if (btn) { btn.disabled = true; btn.classList.add('btn-loading'); }

            try {
                data.adminKey = ADMIN_KEY; // 自動注入金鑰

                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                const result = await res.text();

                if (result === "WRONG_KEY") {
                    alert("❌ 金鑰驗證失敗，請重新輸入。");
                    location.reload();
                    return;
                }

                if (result === "SUCCESS" || result === "OK") {
                    alert("✅ 執行成功");
                    await fetchData(); // 重新整理資料
                } else {
                    alert("結果：" + result);
                }
            } catch (e) {
                alert("網路連線失敗");
            } finally {
                if (btn) { btn.disabled = false; btn.classList.remove('btn-loading'); }
            }
        }

        // --- 5. 業務邏輯函式 (維持原樣，但確保使用 apiPost) ---
        function updatePaidStatus(phone, current) {
            const next = current === '是' ? '否' : '是';
            if(confirm(`確認更改繳費狀態為【${next}】？`)) {
                apiPost({ type: "update_paid_status", phone: phone, newStatus: next });
            }
        }

        function saveConfig() { 
            apiPost({ 
                type: "update_config", 
                reading: document.getElementById('link-reading').value, 
                photo: document.getElementById('link-photo').value 
            }, "btn-saveConfig"); 
        }

        function publishNews() {
            apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }, "btn-publishNews");
        }

        function sendLinePush() {
            const msg = document.getElementById('pushMsg').value;
            apiPost({ type: "send_line_push", content: msg }, "btn-sendPush");
        }

        // ... 剩下的 renderAll, renderMembers, addMember 等函式請保留 ...
        
        window.onload = init;
    </script>
</body>
</html>
