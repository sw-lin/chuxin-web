<script>
// ==========================================
// 1. 全域變數與基礎設定 (保留核心)
// ==========================================
let currentUser = {};

const GAS_URL = "https://script.google.com/macros/s/AKfycbymlOJwVkQKdFMMVc9tmLgNxraaSaG3fOksPQk7hpYybGC8p6Auzk6NpJffiDDcYrlq/exec";

// =========================================
// 2. 資料同步核心：確保公告、權限、行事曆一個不漏
// ==========================================
async function syncData() {
    console.log("=== 1. syncData 開始執行 ===");
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.display = 'flex';

    // 從 Session 取得快取的用戶資訊
    const infoStr = sessionStorage.getItem('userInfo');
    const cachedUserInfo = infoStr ? JSON.parse(infoStr) : null;

    if (!cachedUserInfo || !cachedUserInfo.phone) {
        console.error("❌ 找不到用戶電話，導回登入頁");
        if (overlay) overlay.style.display = 'none';
        window.location.href = 'index.html';
        return;
    }

    try {
        const url = `${GAS_URL}?type=member_init&phone=${cachedUserInfo.phone}&t=${Date.now()}`;
        const res = await fetch(url);
        const data = await res.json();

        console.log("=== 2. 收到後端資料 ===", data);

        if (data.result === "SUCCESS") {
            // --- A. Config 設定 ---
            if (data.config) globalConfig = data.config;

            // --- B. 頂部跑馬燈公告 (終極防護 + 偵錯版) ---
const newsElem = document.getElementById('news');
const newsContainer = document.getElementById('newsContainer');

// 1. 先從 data 中提取資料，並印出來檢查 (請按 F12 看 Console)
console.log("公告原始資料:", {
  content: data.news,
  start: data.startDate,
  end: data.endDate
});

const newsContent = data.news ? data.news.trim() : "";

// 2. 建立精準比對數值 (YYYYMMDD)
function getNumericDate(input) {
    if (!input) return null;
    const d = new Date(input);
    if (isNaN(d.getTime())) return null;
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

const todayVal = getNumericDate(new Date()); // 今天是 20260424
const startVal = getNumericDate(data.startDate);
const endVal = getNumericDate(data.endDate);

// 3. 嚴謹的範圍判斷：如果有設定日期，就必須符合；沒設定則視為通過
const isStarted = !startVal || todayVal >= startVal;
const isNotEnded = !endVal || todayVal <= endVal;
const isWithinRange = isStarted && isNotEnded;

console.log("日期比對結果:", { todayVal, startVal, endVal, isWithinRange });

// 4. 執行渲染邏輯
if (newsContent && newsContent !== "NONE" && isWithinRange) {
    // 只有在「有內容」且「在時間內」才顯示
    if (newsContainer) newsContainer.classList.remove('hidden');
    if (newsElem) newsElem.innerText = newsContent;
} else {
    // 否則一律隱藏
    if (newsContainer) {
        newsContainer.classList.add('hidden');
        // 額外保險：強制設定 CSS display
        newsContainer.style.display = 'none'; 
    }
}            
            // --- C. 近期活動預告解析 (System!B5) ---
            const upcomingRaw = data.upcoming || "";
            if (upcomingRaw && upcomingRaw !== "目前暫無預定活動") {
                const dateMatch = upcomingRaw.match(/(\d{4}\/\d{2}\/\d{2})/);
                const posterMatch = upcomingRaw.match(/\[POSTER\](.*?)\[\/POSTER\]/);
                const descMatch = upcomingRaw.match(/\(簡介：(.*?)\)/);

                let upTitle = upcomingRaw.replace(/【近期預告】/, "")
                    .replace(/\d{4}\/\d{2}\/\d{2}/, "")
                    .replace(/\[POSTER\].*?\[\/POSTER\]/, "")
                    .replace(/\(簡介：.*?\)/, "")
                    .trim();

                const fakeCalendarArray = [{
                    dateText: dateMatch ? dateMatch[1].replace(/\//g, '-') : "",
                    title: upTitle || "近期活動",
                    poster: posterMatch ? posterMatch[1].trim() : "",
                    desc: (descMatch && descMatch[1].trim()) ? descMatch[1].trim() : "歡迎踴躍參加！"
                }];
                renderCalendarActivity(fakeCalendarArray);
            } else {
                renderCalendarActivity([]);
            }

            
            // 在 syncData 內部解析 B6 (registrations_promo) 的地方：
            // 修正：從 data.promo 讀取資料 (如果以後有改名，加上 data.registrations_promo 當備用)
            const promoRaw = data.promo || data.registrations_promo || "";
            console.log("=== B6 原始資料檢查 ===", promoRaw);

            if (promoRaw && promoRaw !== "目前尚無宣傳期內之報名活動") {
                // 修正：使用 [ITEM] 標記精準切割
                const itemStrings = promoRaw.split('[/ITEM]').filter(s => s.includes('[ITEM]'));
                
                window.currentActivePromos = itemStrings.map(itemStr => {
                    const pMatch = itemStr.match(/\[POSTER\](.*?)\[\/POSTER\]/);
                    const cleanText = itemStr.replace(/\[ITEM\]/g, "")
                                             .replace(/\[POSTER\].*?\[\/POSTER\]/g, "")
                                             .trim();
                    // 抓取截止日
                    const dMatch = cleanText.match(/日期：(\d{4}\/\d{2}\/\d{2})/);
                    
                    return {
                        fullText: cleanText,
                        poster: pMatch ? pMatch[1].trim() : "",
                        deadline: dMatch ? dMatch[1] : "額滿為止"
                    };
                });
            } else {
                window.currentActivePromos = [];
            }            
            // --- E. 用戶資料合併與保護 ---
            let displayUser = null;
            if (data.user && data.user.name) {
                displayUser = data.user;
                window.currentAttendedData = data.user.attendedLogs || data.user.attendLog || [];
            } else {
                displayUser = cachedUserInfo;
                window.currentAttendedData = cachedUserInfo.attendedLogs || [];
            }
            currentUser = displayUser;

            // --- F. 幹部模式按鈕 ---
            const staffBtn = document.getElementById('staffBtn');
            if (staffBtn) {
                const isStaff = (displayUser.role && displayUser.role !== "學員");
                staffBtn.classList.toggle('hidden', !isStaff);
                if (isStaff) staffBtn.onclick = enterStaffMode;
            }

            // --- G. 更新 UI (參與率與原本的活動報名邏輯備援) ---
            console.log("=== 3. 執行 updateUI ===");
            updateUI(
                displayUser,
                data.totalRequired,
                data.events || JSON.parse(localStorage.getItem('allEvents') || "[]"),
                data.registrations || []
            );
        }
    } catch (e) {
        console.error("❌ syncData 執行異常:", e);
        if (cachedUserInfo) {
            updateUI(cachedUserInfo, 0, JSON.parse(localStorage.getItem('allEvents') || "[]"), []);
        }
    } finally {
        if (overlay) overlay.style.display = 'none';
    }
}
    
function updateUI(user, totalRequiredFromGAS, events, registrations) {
    console.log("=== updateUI 開始更新 ===");

    // 1. 顯示姓名
    const nameElem = document.getElementById('userName');
    if (nameElem && user?.name) nameElem.innerText = user.name;

    // 2. 參與率計算 (分子/分母)
    const attendCount = user?.attendedCount ?? (user?.attendedLogs?.length || 0);
    const totalEvents = Number(totalRequiredFromGAS) || 0;
    const rate = totalEvents > 0 ? Math.round((attendCount / totalEvents) * 100) : 0;

    // 3. 更新介面數字
    const countDisplay = document.getElementById('attCountDisplay');
    const percentDisplay = document.getElementById('attPercent');
    if (countDisplay) countDisplay.innerText = `${attendCount} / ${totalEvents}`;
    if (percentDisplay) percentDisplay.innerText = rate + '%';

    // 4. 達標煙火 (50%)
    if (rate >= 50 && typeof confetti === 'function') {

// 掃碼成功處理 - 支援加密資料傳送版本
async function onScanSuccess(decodedText) {
    let rawText = decodedText.trim();
    let finalEventString = ""; 

    // 1. 解析與重組格式
    if (rawText.startsWith("CHECKIN:")) {
        const parts = rawText.split(':');
        if (parts.length >= 3) {
            const datePart = parts[1]; 
            const titlePart = rawText.substring(rawText.indexOf(':', 8) + 1).trim(); 
            finalEventString = `EVENT:${datePart}|${titlePart}`;
        } else {
            finalEventString = rawText; 
        }
    } else {
        finalEventString = rawText;
    }

    // 2. 檢查前端快取是否已報到
    const alreadyAttended = (currentUser.attendLog || []).some(log => String(log) === finalEventString);
    if (alreadyAttended) {
        showToast("此活動已完成報到", "info");
        closeScanner();
        return;
    }

    closeScanner();
    showToast("報到傳送中...", "info");

    try {
        // 3. 發送至 GAS 進行寫入 (修改此處)
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'checkin',
                // 使用加密的電話與姓名屬性
                phone: currentUser.encryptedPhone, 
                name: currentUser.encryptedName,   
                eventTitle: finalEventString 
            })
        });
        
        const result = await response.json();
        
        if (result.result === "SUCCESS") {
            showToast("報到成功！", "success");
            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            syncData(); // 刷新畫面與出席紀錄
        } else if (result.result === "ALREADY_DONE") {
            showToast("您已經簽到過囉", "info");
        } else {
            showToast(result.message || "報到失敗", "error");
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        showToast("連線異常，請檢查網路", "error");
    }
}

// 保留原本的圖片網址處理工具
function getDirectImageUrl(url) {
    if (!url || url === "NONE" || url === "" || typeof url !== 'string') return null;
    
    // 如果是普通圖片連結，直接回傳
    if (url.startsWith('http') && !url.includes('drive.google.com')) return url;

    // 1. 嘗試從各種 Google Drive 連結格式中提取 ID
    // 支援 /file/d/ID/view, id=ID, 以及您提供的 drive_link 格式
    let fileId = "";
    const segments = url.split('/');
    const dIndex = segments.indexOf('d');
    if (dIndex !== -1 && segments[dIndex + 1]) {
        fileId = segments[dIndex + 1].split('?')[0].split('&')[0];
    } else {
        const match = url.match(/id=([^&]+)/);
        if (match) fileId = match[1];
    }

    // 2. 如果上述方法失敗，使用最後的保險：正則比對長度 25-45 的 ID 字串
    if (!fileId) {
        const fallbackMatch = url.match(/[-\w]{25,45}/);
        if (fallbackMatch) fileId = fallbackMatch[0];
    }

    if (fileId) {
        // 使用最穩定且支援度最高的縮圖 API
        // sz=w1000 確保 Demo 用的大圖也能清晰顯示
        return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
    }    
    return url; // 若都失敗則回傳原始網址嘗試直接載入
}

function renderRegistrationCards(promoEvents, userRegistrations) {

        if (wrapper) wrapper.classList.add('hidden');

        // 2. 比對報名狀態 (從 userRegistrations 找)
        const regInfo = (userRegistrations || []).find(reg => {
            const rTitle = reg.title || reg.eventTitle || "";

                newPassword: newPassword,
                oldPassword: oldPassword 
            })
        });

        const result = await response.json();

        if (result.result === "SUCCESS") {
            // 🌟 優化：先同步本地快取，再提示重新整理
            if (currentUser) {
                currentUser.email = emailValue;
                sessionStorage.setItem('userInfo', JSON.stringify(currentUser));
            }
            
            showToast("資料修改成功！正在重新整理...", "success");
            closeProfileModal();
            
            // 延遲重整以顯示成功訊息
            setTimeout(() => {
                location.reload(); 
            }, 1500);
        } else {
            showToast(result.message || "更新失敗", "error");
        }
    } catch (e) {
        console.error("Update Error:", e);
        showToast("連線異常，請稍後再試", "error");
    }
}    
function goToAI() {
    try {
        // 1. 從 sessionStorage 抓取首頁存進去的 userInfo 字串
        const userInfoRaw = sessionStorage.getItem('userInfo');
        
        if (userInfoRaw) {
            // 2. 將字串轉回 JSON 物件
            const userInfo = JSON.parse(userInfoRaw);
            const phone = userInfo.phone; // 這裡就是您首頁存的 u (電話)
            const name = userInfo.name || "";   // 👈 新增：抓取姓名
            
            // 3. 偵錯斷點 (確認是否有從 Session 拿到資料)
       //     alert("✅ Session 偵錯：成功拿到資料 -> " + name + " / " + phone);

            // 4. 帶著電話跳轉到 AI 頁面
            // 使用 encodeURIComponent 確保特殊字元傳遞正確
            window.location.href = 'ai_chat.html?user_phone=' + encodeURIComponent(phone) + 
                                   '&user_name=' + encodeURIComponent(name);
            
        } else {
            // 如果連 Session 都沒資料，說明可能是直接開網頁沒登入
    //        alert("⚠️ 錯誤：找不到登入資訊 (Session)，將以訪客身分跳轉。");
            window.location.href = 'ai_chat.html';
        }
    } catch (e) {
    //    console.error("解析 Session 失敗:", e);
        window.location.href = 'ai_chat.html';
    }
}
