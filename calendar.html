<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

    function formatDisplayDate(dateStr) {
        if (!dateStr) return { month: '--', day: '--' };
        // 處理 yyyy-mm-dd 格式
        const parts = dateStr.split('-');
        if (parts.length < 3) return { month: '--', day: '--' };
        return {
            month: parts[1] + '月',
            day: parts[2]
        };
    }

    async function loadCalendar() {
        const listContainer = document.getElementById('calendarList');
        const loadingElem = document.getElementById('loading');
        
        try {
            // 抓取資料，強制不使用快取
            const res = await fetch(`${GAS_URL}?type=get_all&t=${Date.now()}`);
            const data = await res.json();
            
            // 重要：您的 GAS 回傳欄位是 dateText
            let events = data.calendar || [];
            
            // 排除掉沒有日期的髒資料，並依照 dateText 排序
            events = events.filter(ev => ev.dateText && ev.title);
            events.sort((a, b) => new Date(a.dateText) - new Date(b.dateText));
            
            if (events.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold bg-white rounded-[2rem]">目前尚無預定行程</div>`;
            } else {
                renderList(events);
            }
        } catch (e) {
            console.error("載入失敗:", e);
            listContainer.innerHTML = `<div class="text-center py-20 text-red-500 font-bold bg-white rounded-[2rem]">連線失敗，請檢查網路或 GAS 權限</div>`;
        } finally {
            loadingElem.style.display = 'none';
        }
    }

    function renderList(events) {
        const listContainer = document.getElementById('calendarList');
        listContainer.innerHTML = events.map(ev => {
            const dateObj = formatDisplayDate(ev.dateText);
            const dateClean = ev.dateText.replace(/-/g, '');
            const googleUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${dateClean}T013000Z/${dateClean}T040000Z&details=${encodeURIComponent(ev.description || '築心讀書會')}&location=${encodeURIComponent('築心會館')}`;
            
            return `
                <div class="bg-white p-5 rounded-[2rem] border border-emerald-50 shadow-sm flex items-center gap-5 transition-all active:scale-[0.98]">
                    <div class="flex flex-col items-center justify-center w-20 h-20 shrink-0 bg-emerald-50/50 rounded-2xl border border-emerald-100">
                        <div class="text-[10px] font-bold text-emerald-700">${dateObj.month}</div>
                        <div class="text-4xl font-black text-emerald-900">${dateObj.day}</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-emerald-950 text-base truncate">${ev.title}</h4>
                        <p class="text-[10px] text-emerald-700/60 truncate mt-0.5">${ev.description || '定期聚會'}</p>
                    </div>
                    <button onclick="window.open('${googleUrl}', '_blank')" class="bg-amber-50 text-amber-800 px-3 py-2.5 rounded-xl text-[10px] font-black border border-amber-100 shrink-0 flex items-center gap-1 hover:bg-amber-100">
                        <i class="fas fa-calendar-plus text-amber-500"></i>加日曆
                    </button>
                </div>`;
        }).join('');
    }

    window.onload = loadCalendar;
</script>
