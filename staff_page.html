<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-disabled { background-color: #E5E7EB !important; color: #9CA3AF !important; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-tools text-orange-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-widest">築心管理系統</span>
            </div>
            <a href="member_zone.html" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/20 text-sm transition">回個人專區</a>
        </div>
    </nav>

    <div class="bg-white border-b sticky top-[68px] z-40">
        <div class="max-w-6xl mx-auto flex space-x-8 px-6">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 font-bold tab-active text-emerald-900">公告與連結</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 font-bold text-gray-400">會員名單</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 font-bold text-gray-400">行事曆管理</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <div id="section-news" class="space-y-8">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 公佈欄發布</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500 mb-4" placeholder="輸入最新公告內容..."></textarea>
                <button onclick="publishNews()" class="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-900 transition shadow-md">更新公告</button>
            </div>
            
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-link mr-2"></i> 外部連結設定</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">導讀資料庫 URL</label>
                        <input id="link-reading" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">活動剪影 URL</label>
                        <input id="link-photo" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                </div>
                <button onclick="saveLinks()" class="mt-6 bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-700 transition shadow-md">儲存連結設定</button>
            </div>
        </div>

        <div id="section-members" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-user-plus mr-2"></i> 加入新成員</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="add-name" type="text" placeholder="姓名" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="add-phone" type="text" placeholder="手機 (帳號)" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="add-pass" type="text" placeholder="初始密碼" class="p-3 bg-gray-50 rounded-xl border">
                    <button onclick="addMember()" class="bg-emerald-700 text-white rounded-xl font-bold hover:bg-emerald-800 transition">確認新增</button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-sm">
                        <tr>
                            <th class="p-4">姓名 / 職稱 (幹部改選處)</th>
                            <th class="p-4">手機與電子郵件</th>
                            <th class="p-4">繳費</th>
                            <th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="section-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-calendar-plus mr-2"></i> 新增活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="newDate" type="date" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="newTitle" type="text" placeholder="活動名稱 (例如：導讀會)" class="p-3 bg-gray-50 rounded-xl border">
                    <button onclick="addEvent()" class="bg-orange-600 text-white rounded-xl font-bold hover:bg-orange-700 transition">加入行事曆</button>
                </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold mb-2">活動簽到</h3>
            <p id="qrDate" class="text-sm text-gray-500 mb-6"></p>
            <div id="qrcode" class="flex justify-center mb-8 border-4 border-emerald-50 p-2 rounded-2xl"></div>
            <button onclick="closeQR()" class="w-full bg-gray-100 py-3 rounded-xl font-bold hover:bg-gray-200 transition">關閉窗口</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html";
        let allData = {};

        window.onload = fetchData;

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                document.getElementById('newsContent').value = allData.news || '';
                document.getElementById('link-reading').value = allData.config.reading_folder_url || '';
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || '';
                renderMembers();
                renderCalendar();
            } catch (e) { console.error(e); alert("連線失敗，請檢查網路或確認 GAS 已經發布為「所有人」"); }
        }

        function switchTab(tab) {
            ['news', 'members', 'calendar'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.replace('text-emerald-900', 'text-gray-400');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.replace('text-gray-400', 'text-emerald-900');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function renderMembers() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allData.users.map(u => `
                <tr class="border-t hover:bg-stone-50 transition">
                    <td class="p-4">
                        <div class="font-bold text-emerald-900 mb-1">${u.name}</div>
                        <input type="text" placeholder="職稱 (留空為一般會員)" value="${u.title || ''}" 
                            onchange="updateMember('${u.phone}', 'title', this.value)" 
                            class="text-xs text-gray-400 bg-transparent border-b border-dashed border-gray-200 focus:border-emerald-400 outline-none w-full">
                    </td>
                    <td class="p-4 text-sm">
                        <div class="font-mono text-gray-600 mb-1"><i class="fas fa-phone mr-1"></i>${u.phone}</div>
                        <input type="text" value="${u.email || ''}" placeholder="點擊輸入 Email" 
                            onchange="updateMember('${u.phone}', 'email', this.value)" 
                            class="bg-transparent border-b border-transparent focus:border-emerald-300 outline-none w-full text-xs">
                    </td>
                    <td class="p-4">
                        <select onchange="updateMember('${u.phone}', 'paid', this.value)" 
                            class="text-xs border rounded p-1 font-bold ${u.paid==='是'?'text-emerald-600 border-emerald-200 bg-emerald-50':'text-orange-600 border-orange-200 bg-orange-50'}">
                            <option value="是" ${u.paid==='是'?'selected':''}>已繳費</option>
                            <option value="否" ${u.paid==='否'?'selected':''}>未繳費</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            grid.innerHTML = allData.calendar.map(c => {
                const eventDate = new Date(c.dateText);
                eventDate.setHours(0, 0, 0, 0);
                const isFuture = eventDate > today;

                return `
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex justify-between items-center hover:shadow-md transition">
                    <div>
                        <div class="text-xs font-bold text-orange-500 mb-1">${c.dateText}</div>
                        <div class="font-bold text-emerald-900">${c.title}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="${isFuture ? '' : `generateQR('${c.dateText}','${c.title}')`}" 
                            class="px-4 py-2 rounded-xl text-xs font-bold transition shadow-sm ${isFuture ? 'btn-disabled' : 'bg-emerald-600 text-white hover:bg-emerald-700'}"
                            ${isFuture ? 'title="未到活動日期，無法開啟簽到"' : ''}>
                            <i class="fas fa-qrcode mr-1"></i>${isFuture ? '未開啟' : '簽到碼'}
                        </button>
                        <button onclick="deleteEvent('${c.dateText}')" class="text-gray-300 hover:text-red-500 px-2 transition"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function apiPost(payload) {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const txt = await res.text();
                if(txt.includes("OK") || txt.includes("DELETED")) {
                    alert("操作成功！");
                    location.reload();
                } else { alert("系統回應: " + txt); }
            } catch (e) { alert("發布失敗，請確認 GAS 是否正確部署並開啟權限"); }
        }

        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }); }
        function saveLinks() { apiPost({ type: "update_config", reading: document.getElementById('link-reading').value, photo: document.getElementById('link-photo').value }); }
        function updateMember(phone, field, value) { const newData = {}; newData[field] = value; apiPost({ type: "update_member", currentPhone: phone, newData: newData }); }
        async function addMember() {
            const n = document.getElementById('add-name').value;
            const p = document.getElementById('add-phone').value;
            const s = document.getElementById('add-pass').value;
            if(!n || !p || !s) return alert("請填寫姓名、手機號碼與初始密碼");
            apiPost({ type: "add_member", name: n, phone: p, password: btoa(s) });
        }
        function deleteMember(phone) { if(confirm("警告：確定要刪除此成員嗎？其簽到紀錄將保留但帳號會消失。")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function addEvent() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newTitle').value;
            if(!d || !t) return alert("請選擇日期並輸入活動標題");
            apiPost({ type: "add_event", date: d, title: t });
        }
        function deleteEvent(date) { if(confirm(`確定刪除 ${date} 的活動？`)) apiPost({ type: "delete_event", date: date }); }
        
        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: `${CHECKIN_URL}?event=${date}`, 
                width: 200, 
                height: 200,
                colorDark : "#064E3B",
                colorLight : "#ffffff"
            });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    </script>
</body>
</html>
