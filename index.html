<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        @media (max-width: 640px) { .slide { height: 350px; } }
        
        #about-text-container p { margin-bottom: 1.2rem; line-height: 1.8; text-align: justify; }
        #about-text-container strong { color: #064E3B; display: block; margin-top: 1.5rem; font-size: 1.2rem; border-left: 4px solid #059669; padding-left: 0.8rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-4 md:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-700 text-xl"></i>
            <span class="text-lg md:text-xl font-bold text-emerald-900">築心讀書會</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="window.loadAndShowAbout()" class="text-gray-600 hover:text-emerald-700 flex flex-col items-center transition">
                <i class="fas fa-info-circle text-lg"></i>
                <span class="text-[10px] md:text-xs font-medium">關於我們</span>
            </button>
            <a href="#register-section" class="text-gray-600 hover:text-emerald-700 flex flex-col items-center transition">
                <i class="fas fa-edit text-lg"></i>
                <span class="text-[10px] md:text-xs font-medium">入會報名</span>
            </a>
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" 
                    class="bg-emerald-800 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-md hover:bg-emerald-900 transition">
                登入會館
            </button>
        </div>
    </nav>

    <div class="relative overflow-hidden bg-emerald-900">
        <div class="hero-gradient absolute inset-0 z-10"></div>
        <img class="slide" src="1.jpg" style="display:block;">
        <img class="slide" src="2.jpg">
        <img class="slide" src="3.jpg">
        <img class="slide" src="4.jpg">
        <img class="slide" src="5.jpg">
        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center text-white p-6 text-center">
            <h2 class="text-3xl md:text-5xl font-bold mb-4 tracking-widest">在共讀中築心</h2>
            <p class="text-lg md:text-xl opacity-90 italic">於陪伴中成長</p>
        </div>
    </div>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="flex items-center justify-center space-x-4 mb-12">
            <div class="h-px bg-emerald-200 w-12"></div>
            <h3 class="text-2xl font-bold text-emerald-900 tracking-widest uppercase">Coming Soon</h3>
            <div class="h-px bg-emerald-200 w-12"></div>
        </div>
        <div id="event-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="text-center text-gray-400 py-10 w-full col-span-full italic">正在更新活動資訊...</div>
        </div>
    </section>

    <section id="register-section" class="bg-emerald-50 py-16 px-6">
        <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-emerald-100">
            <h3 class="text-2xl font-bold text-emerald-900 mb-8 text-center">加入築心讀書會</h3>
            <form action="https://formspree.io/f/xpqjvblg" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">真實姓名</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-stone-50 focus:bg-white outline-none transition ring-offset-2 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">手機號碼</label>
                    <input type="tel" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-stone-50 focus:bg-white outline-none transition ring-offset-2 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">電子郵件 (以便接收通知)</label>
                    <input type="email" name="_replyto" required class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-stone-50 focus:bg-white outline-none transition ring-offset-2 focus:ring-2 focus:ring-emerald-500">
                </div>
                <button type="submit" class="w-full bg-emerald-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-emerald-900 transition shadow-lg">提交入會申請</button>
            </form>
        </div>
    </section>

    <div id="about-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-emerald-50">
                <h4 class="text-xl font-bold text-emerald-900">築心讀書會緣起</h4>
                <button onclick="window.toggleAbout(false)" class="text-gray-400 hover:text-emerald-700 text-2xl transition"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="about-text-container" class="flex-1 overflow-y-auto p-8 md:p-12 text-gray-600 text-lg no-scrollbar">
                載入中...
            </div>
            <div class="p-4 bg-gray-50 text-center">
                <button onclick="window.toggleAbout(false)" class="bg-emerald-800 text-white px-10 py-2 rounded-full font-bold shadow-md">關閉</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/60 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl relative">
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="absolute top-6 right-6 text-gray-300 hover:text-gray-500 text-xl"><i class="fas fa-times"></i></button>
            <h4 class="text-xl font-bold text-emerald-900 mb-8 text-center">會員登入</h4>
            <div class="space-y-4">
                <input id="userPhone" 
       type="tel" 
       inputmode="numeric" 
       pattern="[0-9]*"
       oninput="this.value = this.value.replace(/[^０-９0-9]/g, '')"
       placeholder="手機號碼 (支援全碼數字)" 
       class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none focus:bg-white shadow-inner">
                <input id="userPass" type="password" placeholder="登入密碼" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none focus:bg-white">
                <button id="loginBtn" onclick="window.handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-900 transition shadow-lg">進入會館</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
       function toHalfWidth(str) {
        if (!str) return "";
        return str.replace(/[０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/\s+/g, ""); // 同時移除空格
       }   
        window.toggleAbout = function(show) {
            document.getElementById('about-modal').classList.toggle('hidden', !show);
            document.body.style.overflow = show ? 'hidden' : 'auto';
        };

        window.loadAndShowAbout = async function() {
            window.toggleAbout(true);
            const container = document.getElementById('about-text-container');
            try {
                const res = await fetch('about.txt?t=' + Date.now());
                const text = await res.text();
                container.innerHTML = text.split('\n').map(l => {
                    let line = l.trim();
                    if(!line) return '';
                    return (line.length < 15 || line.includes(':') || line.includes('：')) ? `<strong>${line}</strong>` : `<p>${line}</p>`;
                }).join('');
            } catch (e) { container.innerHTML = "無法載入 about.txt，請檢查檔案是否存在。"; }
        };

        // 1. 修復登入邏輯：改為向後端「詢問」而不是在前端比對
window.handleLogin = async function() {
    const rawPhone = document.getElementById('userPhone').value;
    const p = document.getElementById('userPass').value.trim();
    const u = toHalfWidth(rawPhone);

    if(!u || !p) return alert('請填寫完整資訊');
    
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; 
    btn.innerText = '正在登入...';
    
    try {
        // 發送 POST 請求給 GAS 進行驗證
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'login',
                phone: u,
                password: p
            })
        });
        const result = await res.json();

        if (result.result === "SUCCESS") {
            // 存入 session 並跳轉
            sessionStorage.setItem('userInfo', JSON.stringify(result));
            window.location.href = 'member_zone.html';
        } else { 
            alert(result === "WRONG_PASSWORD" ? '密碼錯誤' : '手機或密碼有誤'); 
            btn.disabled = false; 
            btn.innerText = '進入會館'; 
        }
    } catch (e) { 
        console.error(e);
        alert('伺服器連線失敗，請檢查網路'); 
        btn.disabled = false; 
        btn.innerText = '進入會館'; 
    }
};

// 2. 修復首頁活動顯示：對齊 GAS 的輸出格式
async function init() {
    try {
        const res = await fetch(GAS_URL + "?t=" + Date.now());
        const data = await res.json();
        const grid = document.getElementById('event-grid');
        
        // 修正點：GAS 回傳的是 data.events
        if (data.events && data.events.length > 0) {
            grid.innerHTML = data.events.map(ev => `
                <div class="bg-white p-6 rounded-[2rem] border border-emerald-50 shadow-sm hover:shadow-md transition text-center group">
                    <div class="text-emerald-600 font-bold mb-2">${ev.date}</div>
                    <div class="text-emerald-900 font-bold text-lg mb-4 group-hover:text-emerald-700 transition">${ev.title}</div>
                    <div class="text-[10px] bg-emerald-50 text-emerald-600 inline-block px-3 py-1 rounded-full uppercase tracking-widest font-bold">Upcoming</div>
                </div>
            `).join('');
        } else {
            grid.innerHTML = '<div class="col-span-full text-center text-gray-400 italic">目前暫無近期活動</div>';
        }
    } catch (e) { 
        console.error("Init Error:", e);
        document.getElementById('event-grid').innerHTML = '<div class="col-span-full text-center text-gray-400">目前無法顯示活動</div>'; 
    }
}

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 4000);
        }

        window.onload = () => { showSlides(); init(); };
    </script>
</body>
</html>
