<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <nav class="bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i class="fas fa-robot text-emerald-400"></i>
            <h1 class="text-xl font-black tracking-widest">智慧助理</h1>
        </div>
        <button onclick="location.href='member_zone.html'" class="px-4 py-2 bg-white/20 rounded-full text-[12px] font-bold">返回中心</button>
    </nav>

    <div id="dify-chatbot-container" class="flex-1 w-full">
        </div>

    <script>
        // 獲取網址參數 (例如 ai_chat.html?name=王小明)
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name') || "訪客";
        const userPhone = urlParams.get('phone') || "GUEST";

        window.difyChatbotConfig = {
            token: 'ERNQLHGG3QKClfr7',
            baseUrl: 'https://udify.app',
            container: '#dify-chatbot-container', // 強制嵌入在頁面中，不是泡泡
            inputs: {
                "user_name": userName,
                "user_phone": userPhone
            }
        };
    </script>
    <script src="https://udify.app/embed.min.js" id="dify-chatbot-script" defer></script>
</body>
</html>
