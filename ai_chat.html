<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script type="module">
        import * as CozeModule from 'https://cdn.jsdelivr.net/npm/@coze/api/+esm';

        try {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 自動偵測正確的建構函式位置 (處理 ESM 的 default 封裝問題)
            const Client = CozeModule.WebChatClient || 
                           (CozeModule.default && CozeModule.default.WebChatClient);

            if (!Client) {
                throw new Error("無法在 SDK 中找到 WebChatClient 元件");
            }

            new Client({
                config: { 
                    bot_id: '7620394792719499317' 
                },
                componentProps: {
                    title: '築心智慧管家',
                    layout: 'window',
                    initial_variables: {
                        user_name: urlParams.get('user_name') || '訪客',
                        user_phone: urlParams.get('user_phone') || ''
                    }
                },
                el: document.getElementById('chat-container'),
            });
            console.log("築心智慧管家已成功啟動");
        } catch (error) {
            console.error("啟動失敗詳細原因:", error);
            document.body.innerHTML = `<h2 style='padding:20px;'>載入失敗：${error.message}</h2>`;
        }
    </script>
</body>
</html>
