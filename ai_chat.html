<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>築心智慧管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        /* 隱藏卷軸但保留滑動功能 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="emerald-gradient text-white px-4 h-16 shadow-md flex items-center justify-between shrink-0">
        <button onclick="window.location.href='member_zone.html'" class="w-10 h-10 flex items-center justify-center active:bg-white/20 rounded-full transition-colors">
            <i class="fas fa-chevron-left text-lg"></i>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                <i class="fas fa-robot text-sm"></i>
            </div>
            <h1 class="text-lg font-black tracking-widest">築心智慧管家</h1>
        </div>
        <div class="w-10"></div> </nav>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
        </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-3 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div class="max-w-xl mx-auto flex items-end gap-2">
            <div class="flex-1 bg-gray-50 rounded-3xl border border-emerald-100 px-4 py-2 flex items-center">
                <textarea id="userInput" rows="1" placeholder="請輸入您的問題..." class="w-full bg-transparent outline-none resize-none text-sm text-emerald-900 py-1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
            </div>
            <button onclick="sendMessage()" id="sendBtn" class="w-12 h-12 bg-emerald-600 text-white rounded-full flex items-center justify-center shrink-0 active:scale-95 transition-transform shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

<script>
    // 🎯 請將這裡換成您 Cloudflare Worker 的網址
    const WORKER_URL = "https://hello-world-broad-cake-8477.swearlin.workers.dev/";

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    let userName = "貴賓";
    let userPhone = "";

    // 1. 初始化：抓取網址參數並打招呼
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        userName = params.get('user_name') || "貴賓";
        userPhone = params.get('user_phone') || "未提供";

        appendMessage("system", `您好，${userName}！我是築心會館的專屬管家。<br>請問今天有什麼我可以協助您的嗎？`);
    };

    // 2. 自動調整輸入框高度
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        let newHeight = textarea.scrollHeight;
        textarea.style.height = (newHeight > 100 ? 100 : newHeight) + 'px';
    }

    // 3. 監聽 Enter 鍵發送 (Shift+Enter 換行)
    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // 4. 新增訊息到畫面
    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = "flex w-full " + (sender === "user" ? "justify-end" : "justify-start");
        
        const innerHTML = sender === "user" 
            ? `<div class="max-w-[80%] bg-emerald-600 text-white px-5 py-3 rounded-2xl rounded-tr-sm text-sm shadow-sm break-words">${text}</div>`
            : `<div class="max-w-[85%] bg-white border border-emerald-50 text-emerald-900 px-5 py-3 rounded-2xl rounded-tl-sm text-sm shadow-sm leading-relaxed break-words">
                 <i class="fas fa-leaf text-emerald-300 mr-1 text-xs"></i> ${text}
               </div>`;
               
        msgDiv.innerHTML = innerHTML;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 5. 顯示載入動畫
    function showTyping() {
        const typingId = "typing-" + Date.now();
        const msgDiv = document.createElement('div');
        msgDiv.id = typingId;
        msgDiv.className = "flex w-full justify-start";
        msgDiv.innerHTML = `
            <div class="bg-white border border-emerald-50 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 bg-emerald-300 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return typingId;
    }

    // 6. 發送訊息給 Google API
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 顯示使用者對話
        appendMessage("user", text);
        userInput.value = "";
        userInput.style.height = 'auto'; // 恢復高度
        userInput.disabled = true;

        // 顯示管家思考中...
        const typingId = showTyping();

        try {
            // 將姓名與電話附加在網址後方
            const fetchUrl = `${WORKER_URL}?user_name=${encodeURIComponent(userName)}&user_phone=${encodeURIComponent(userPhone)}`;
            
            const response = await fetch(fetchUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text }) // 傳送真實文字
            });

            const data = await response.json();
            
            // 移除思考中動畫
            document.getElementById(typingId).remove();

            // 解析並顯示 AI 回覆
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                // 將換行符號轉為 HTML 的 <br>
                const aiReply = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                appendMessage("system", aiReply);
            } else {
                appendMessage("system", "抱歉，管家目前有點分心，請再說一次好嗎？");
            }
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage("system", "連線似乎有點不穩，請檢查網路後再試試。");
            console.error(error);
        } finally {
            userInput.disabled = false;
            userInput.focus();
        }
    }
</script>
</body>
</html>
