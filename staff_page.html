// 3. 新增：發送名單至 LINE 函式
async function sendAttendanceToLine() {
    const select = document.getElementById('event-select');
    const eventTitle = select.options[select.selectedIndex].text;
    const selectedDate = select.value;

    // 取得排序後的姓名名單
    const attendees = cachedData.attendance
        .filter(a => a.eventId.includes(selectedDate) || a.timestamp.toString().includes(selectedDate))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        .map(a => a.name);

    if (attendees.length === 0) {
        alert("目前名單為空，無法發送");
        return;
    }

    const message = `📢 【${eventTitle}】出席名單確認\n` +
                    `━━━━━━━━━━━━\n` +
                    attendees.join('、') + `\n` +
                    `━━━━━━━━━━━━\n` +
                    `總計：${attendees.length} 位`;

    if (!confirm(`確定要將這 ${attendees.length} 位名單發送至 LINE 群組嗎？`)) return;

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'send_line',
                key: sessionStorage.getItem('adminKey'),
                message: message
            })
        });
        const result = await res.json();
        if (result.result === "SUCCESS") alert("✅ 名單已成功發送到 LINE 群組！");
        else alert("❌ 發送失敗，請檢查 LINE 設定");
    } catch (e) {
        alert("連線失敗");
    }
}


        // --- 針對特定分頁的編輯開關 ---
        function toggleSectionEdit(sectionId) {
            const sec = document.getElementById(sectionId);
            sec.classList.toggle('edit-mode-active');
            const btn = sec.querySelector('button');
            if (sec.classList.contains('edit-mode-active')) {
                btn.innerHTML = '<i class="fas fa-unlock"></i> 編輯開啟中';
                btn.classList.replace('bg-orange-50', 'bg-orange-500');
                btn.classList.replace('text-orange-600', 'text-white');
            } else {
                btn.innerHTML = '<i class="fas fa-lock"></i> 編輯開關';
                btn.classList.replace('bg-orange-500', 'bg-orange-50');
                btn.classList.replace('text-white', 'text-orange-600');
            }
            renderAll(); // 重新渲染以顯示/隱藏垃圾桶
        }

        // --- 系統設定專用解鎖 ---
        function unlockSystem() {
            document.getElementById('conf-reading').disabled = false;
            document.getElementById('conf-photo').disabled = false;
            document.getElementById('systemSaveBtn').disabled = false;
            document.getElementById('conf-reading').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('conf-photo').classList.remove('bg-gray-100', 'opacity-50');
            document.getElementById('systemSaveBtn').classList.replace('bg-gray-300', 'bg-emerald-800');
            document.getElementById('systemSaveBtn').classList.remove('cursor-not-allowed');
            document.getElementById('systemLockBtn').innerText = "⚠️ 編輯中";
        }

        // ... (renderMembers, renderEvents 逻辑需要加入是否顯示垃圾桶的判斷) ...
        function renderMembers(users) {
            const list = document.getElementById('memberList');
            const isEdit = document.getElementById('sec-members').classList.contains('edit-mode-active');
            list.innerHTML = users.map(u => {
                let p = String(u.phone).length === 9 ? '0'+u.phone : u.phone;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex items-center text-huge w-full">
                        <div class="font-bold text-emerald-900" style="min-width:100px">${u.name}</div>
                        <div class="text-gray-500 font-mono" style="min-width:160px">${p}</div>
                        <div class="text-lg text-blue-500 truncate">${u.email || ''}</div>
                    </div>
                    ${isEdit ? `<button onclick="deleteMember('${u.phone}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>`;
            }).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            const isEdit = document.getElementById('sec-calendar').classList.contains('edit-mode-active');
            const today = new Date(); today.setHours(0,0,0,0);
            const sorted = [...events].sort((a,b) => new Date(a.dateText) - new Date(b.dateText));
            
            list.innerHTML = sorted.map(ev => {
                const canQR = new Date(ev.dateText) <= today;
                return `
                <div class="list-card flex justify-between items-center mb-3">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-emerald-600 font-mono">${ev.dateText}</div>
                        <div class="text-huge font-bold text-emerald-900">${ev.title}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        ${canQR ? `<button onclick="showQR('${ev.dateText}','${ev.title}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">QR</button>` : ''}
                        ${isEdit ? `<button onclick="deleteEvent('${ev.dateText}')" class="text-red-400 p-2 text-2xl"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

async function apiPost(data) {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    
    data.key = adminKey;
    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
        const result = await res.json();
        
        if (result.result === "SUCCESS") {
            setTimeout(async () => {
                overlay.classList.add('hidden');
                await fetchData(); // 等待重新抓取並渲染完成
                
                // 如果是新增會員，自動捲動到底部
                if (data.type === "add_member") {
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 500);
        } else {
            overlay.classList.add('hidden');
            alert("❌ 失敗：" + result.message);
        }
    } catch (e) {
        setTimeout(() => {
            overlay.classList.add('hidden');
            fetchData(); 
        }, 1000);
    }
}
        async function fetchData() {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            cachedData = await res.json();
            renderAll();
        }
        
function renderAll() {
    if (!cachedData) return;
    
    // === 加入這行，然後按 F12 打開 Console 視窗看結果 ===
    console.log("從雲端抓到的完整資料：", cachedData);
    // ===============================================
    
    // 更新新聞與設定
    if(document.getElementById('input-news')) document.getElementById('input-news').value = cachedData.news || "";
    if(document.getElementById('conf-reading')) document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
    if(document.getElementById('conf-photo')) document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";

    // 渲染會員、活動、出席
    renderMembers(cachedData.users || []);
    renderEvents(cachedData.calendar || []);
    renderAttendanceOptions(); 

    // === 重點：呼叫繳費區更新 ===
    updatePaymentSelect();  // 讓下拉選單出現項目
    renderPaymentDetail();  // 讓清單畫出來
}
        
        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveLineMsg() { apiPost({ type: "send_line", message: document.getElementById('line-msg').value }); }
        
async function addMember() {
    // 1. 抓取剛才 HTML 裡設定的 ID (mName, mPhone, mEmail)
    const name = document.getElementById('mName').value.trim();
    const phone = document.getElementById('mPhone').value.trim();
    const email = document.getElementById('mEmail').value.trim();
    
    if (!name || !phone) {
        alert("請輸入姓名與手機");
        return;
    }

    // 防止重複點擊
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "處理中...";
    btn.disabled = true;

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'add_member',
                key: sessionStorage.getItem('adminKey'),
                name: name,
                phone: phone,
                email: email, // 送出 Email 資訊
                password: phone.slice(-4), // 預設密碼
                role: '學員'
            })
        });

        const result = await res.json();

        if (result.result === "SUCCESS") {
            alert("✅ 新增成功！");
            
            // --- 2. 關鍵：清空欄位 ---
            document.getElementById('mName').value = "";
            document.getElementById('mPhone').value = "";
            document.getElementById('mEmail').value = "";
            
            // 重新讀取資料以更新下方的清單
            if (typeof syncData === "function") syncData(); 
            else location.reload(); 
        } else {
            alert("❌ 失敗：" + (result.message || "未知錯誤"));
        }
    } catch (e) {
        alert("連線失敗，請檢查網路");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }
        
        
        function deleteMember(p) { if(confirm("刪除？")) apiPost({ type: "delete_member", currentPhone: p }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(d) { if(confirm("刪除？")) apiPost({ type: "delete_event", date: d }); }

let isSystemEditing = false;
function toggleSystemEdit() {
    isSystemEditing = !isSystemEditing; 
    const readingInput = document.getElementById('conf-reading');
    const photoInput = document.getElementById('conf-photo');
    const saveBtn = document.getElementById('systemSaveBtn'); // 確保您的 HTML ID 正確
    const lockBtn = document.getElementById('systemLockBtn');

    if (isSystemEditing) {
        // 解鎖：允許編輯
        readingInput.disabled = false;
        photoInput.disabled = false;
        if(saveBtn) saveBtn.disabled = false;
        readingInput.classList.remove('bg-gray-100', 'opacity-50');
        photoInput.classList.remove('bg-gray-100', 'opacity-50');
        lockBtn.innerHTML = '<i class="fas fa-check-circle"></i> 結束並鎖定';
        lockBtn.className = "text-sm bg-orange-500 text-white px-4 py-2 rounded-lg shadow-sm";
    } else {
        // 鎖定：禁止編輯
        readingInput.disabled = true;
        photoInput.disabled = true;
        if(saveBtn) saveBtn.disabled = true;
        readingInput.classList.add('bg-gray-100', 'opacity-50');
        photoInput.classList.add('bg-gray-100', 'opacity-50');
        lockBtn.innerHTML = '<i class="fas fa-lock"></i> 解除鎖定';
        lockBtn.className = "text-sm bg-gray-100 text-gray-600 px-4 py-2 rounded-lg border";
    }
} 
function renderAttendanceOptions() {
    const select = document.getElementById('event-select');
    if (!select) return;
    
    // 只取出行事曆中有舉辦過的活動 (按時間由新到舊排)
    const events = [...cachedData.calendar].sort((a,b) => new Date(b.dateText) - new Date(a.dateText));
    
    // 保留第一個預設選項，其餘清空
    select.innerHTML = '<option value="">-- 請選擇一場活動 --</option>';
    events.forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev.dateText; // 這裡暫時用日期當辨識，若有 ID 更好
        opt.innerText = `${ev.dateText} ${ev.title}`;
        select.appendChild(opt);
    });
}

function renderAttendanceDetail() {
    const selectedDate = document.getElementById('event-select').value;
    const listContainer = document.getElementById('attendance-detail-list');
    const summary = document.getElementById('attendance-summary');
    
    if (!selectedDate) {
        listContainer.innerHTML = "";
        summary.classList.add('hidden');
        return;
    }

    // 排序：時間正序 (最早簽到的在最前面)
    const filtered = cachedData.attendance
        .filter(a => a.eventId.includes(selectedDate) || a.timestamp.toString().includes(selectedDate))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

    // 顯示統計區塊與按鈕
    summary.classList.remove('hidden');
    document.getElementById('attend-count').innerText = filtered.length;
    document.getElementById('attend-date').innerText = selectedDate;

    // ... 下面是生成名單列表的 HTML ...
    if (filtered.length === 0) {
        listContainer.innerHTML = '<div class="text-center p-20 text-gray-400 text-2xl">目前尚無人簽到</div>';
    } else {
        listContainer.innerHTML = filtered.map(a => `
            <div class="list-card flex justify-between items-center bg-white p-6 rounded-2xl border shadow-sm mb-4">
                <div class="text-huge flex items-center">
                    <span class="font-bold text-emerald-900 w-32">${a.name}</span>
                    <span class="text-gray-400 font-mono text-lg italic">
                        ${new Date(a.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})} 簽到
                    </span>
                </div>
            </div>
        `).join('');
    }
}   

// 強化版：初始化繳費項目
window.initPayment = async function(defaultStatus) {
    const title = document.getElementById('payItemTitle').value.trim();
    if (!title) return alert("請輸入項目名稱");
    
    // 關鍵：確保抓得到會員名冊
    const users = window.cachedData ? window.cachedData.users : [];
    if (users.length === 0) return alert("❌ 錯誤：目前名冊中沒有會員，請先同步資料！");

    if (!confirm(`確定要為 ${users.length} 位會員建立「${title}」紀錄嗎？`)) return;

    const btn = event.target;
    btn.disabled = true;
    btn.innerText = "處理中...";

    try {
        // 使用序列化處理，避免同時對 GAS 發出過多請求
        for (const user of users) {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    type: 'update_payment',
                    key: sessionStorage.getItem('adminKey'),
                    itemTitle: title,
                    phone: user.phone,
                    name: user.name,
                    status: defaultStatus
                })
            });
        }
        alert("✅ 繳費項目建立完成！");
        syncData(); // 重新同步
    } catch (e) {
        alert("連線失敗");
    } finally {
        btn.disabled = false;
        btn.innerText = `預設：所有人${defaultStatus}`;
    }
};



// 發送 LINE 名單 (僅限已繳人員)
function sendPaidToLine() {
    const selectedItem = document.getElementById('pay-item-select').value;
    const paidList = cachedData.payments
        .filter(p => p.itemTitle === selectedItem && p.status === '已繳')
        .map(p => p.name);

    if (paidList.length === 0) return alert("目前尚無人繳費");

    const message = `💰 【${selectedItem}】繳費完成確認\n━━━━━━━━━━━━\n` +
                    paidList.join('、') + `\n━━━━━━━━━━━━\n總計：${paidList.length} 位`;

    if (confirm(`發送已繳費名單（${paidList.length}人）至 LINE？`)) {
        // 使用您現有的 send_line 功能
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'send_line',
                key: sessionStorage.getItem('adminKey'),
                message: message
            })
        }).then(() => alert("✅ 已成功送出"));
    }
}

    <script>
// --- 全域唯一正確邏輯區 ---

// 同步資料邏輯
window.syncData = function() {
    if (!GAS_URL) return alert("未設定 GAS_URL");
    console.log("強效同步中...");
    fetch(GAS_URL + "?type=all")
        .then(res => res.json())
        .then(data => {
            window.cachedData = data;
            console.log("✅ 同步成功");
            updatePaymentSelect(); // 立即更新選單
            renderAll();
            alert("✅ 同步完成！");
        })
        .catch(err => alert("同步失敗：" + err));
};

// 更新選單邏輯
window.updatePaymentSelect = function() {
    const select = document.getElementById('pay-item-select');
    if (!select) return;
    const payments = (window.cachedData && window.cachedData.payments) ? window.cachedData.payments : [];
    const items = [...new Set(payments.map(p => p.itemTitle))].filter(it => it);
    
    select.innerHTML = '<option value="">-- 請選擇繳費項目 --</option>';
    items.forEach(it => {
        const opt = document.createElement('option');
        opt.value = it;
        opt.text = it;
        select.appendChild(opt);
    });
    console.log("選單已更新：", items);
};
// 強化版：渲染繳費名單 (沒日期也能跑)
// 1. 渲染名單 (對應 HTML 的 payment-list-container)
window.renderPaymentDetail = function() {
    const select = document.getElementById('pay-item-select');
    const container = document.getElementById('payment-list-container');
    if (!select || !container) return;

    const title = select.value;
    if (!title) {
        container.innerHTML = '<div class="text-center p-20 text-gray-400 text-2xl">請選擇繳費項目</div>';
        return;
    }

    const payments = (window.cachedData && window.cachedData.payments) ? 
                     window.cachedData.payments.filter(p => p.itemTitle === title) : [];

    if (payments.length === 0) {
        container.innerHTML = '<div class="text-center p-20 text-gray-400 text-2xl">此項目尚無名單，請先執行初始化</div>';
        return;
    }

    let html = "";
    payments.forEach(p => {
        const isPaid = p.status === '已繳';
        const dateStr = p.date ? p.date.toString().split('T')[0] : "尚未更新";
        const statusClass = isPaid ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700';
        
        html += `
            <div class="list-card flex justify-between items-center p-6 bg-white rounded-2xl shadow-sm border mb-4">
                <div>
                    <div class="text-2xl font-bold text-emerald-900">${p.name}</div>
                    <div class="text-gray-400 text-sm">${dateStr}</div>
                </div>
                <button onclick="updateSinglePayment('${p.itemTitle}', '${p.phone}', '${p.name}', '${p.status}')" 
                        class="px-8 py-3 rounded-xl font-bold text-xl transition-all ${statusClass}">
                    ${p.status}
                </button>
            </div>`;
    });
    container.innerHTML = html;
};

// 2. 更新狀態 (增加編輯模式強制檢查)
window.updateSinglePayment = async function(itemTitle, phone, name, currentStatus) {
    // 檢查目前分頁是否處於編輯模式
    const sec = document.getElementById('sec-payments');
    if (!sec.classList.contains('edit-mode-active')) {
        return alert("請先開啟右上角的『編輯模式』！");
    }

    const newStatus = currentStatus === '已繳' ? '未繳' : '已繳';
    const key = sessionStorage.getItem('adminKey');

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'update_payment',
                key: key,
                itemTitle: itemTitle,
                phone: phone,
                name: name,
                status: newStatus
            })
        });
        const result = await res.json();
        if (result.result === "SUCCESS") {
            // 直接更新緩存資料，達成「秒跳狀態」
            const target = window.cachedData.payments.find(p => p.itemTitle === itemTitle && p.phone === phone);
            if (target) {
                target.status = newStatus;
                target.date = new Date().toISOString();
            }
            renderPaymentDetail();
        }
    } catch (e) {
        alert("網路連線失敗");
    }
};  
window.sendPaymentToLine = async function() {
    const select = document.getElementById('pay-item-select');
    const title = select.value;
    if (!title) return alert("請先選擇要發送的項目");

    // 過濾已繳費名單
    const paidUsers = (window.cachedData && window.cachedData.payments) ? 
                      window.cachedData.payments.filter(p => p.itemTitle === title && p.status === '已繳') : [];

    if (paidUsers.length === 0) return alert("目前尚無已繳費人員");

    // --- 訊息格式：標頭與人名均跳行 ---
    let message = `【${title}】\n✅ 已繳費名單更新：\n------------------\n`;
    paidUsers.forEach((p, index) => {
        message += `${index + 1}. ${p.name}\n`; // 每個人名後換行
    });
    message += `\n總計：${paidUsers.length} 位`;

    if (!confirm(`確定要透過 API 發送「${title}」已繳費名單至 LINE 群組嗎？`)) return;

    // 顯示讀取中 (如果有 loadingOverlay 的話)
    const overlay = document.getElementById('loadingOverlay');
    if(overlay) overlay.classList.remove('hidden');

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'send_line', // 對應你 GAS 的 case "send_line"
                key: sessionStorage.getItem('adminKey'),
                message: message
            })
        });
        
        const result = await res.json();
        if (result.result === "SUCCESS") {
            alert("🚀 訊息已成功發送至 LINE 群組！");
        } else {
            alert("❌ 發送失敗：" + (result.message || "請檢查 GAS 設定"));
        }
    } catch (e) {
        alert("連線失敗，請檢查網路或 GAS 網址");
    } finally {
        if(overlay) overlay.classList.add('hidden');
    }
};
