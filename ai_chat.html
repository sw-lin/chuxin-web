<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/oversea/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        async function fetchToken() {
            try {
                const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
                const data = await response.json();
                return data.token;
            } catch (error) {
                console.error("領取 Token 失敗:", error);
            }
        }

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            let ChatClient = null;
            if (window.CozeWebChat && window.CozeWebChat.Client) {
                ChatClient = window.CozeWebChat.Client;
            } else if (window.CozeWebSDK && window.CozeWebSDK.WebChatClient) {
                ChatClient = window.CozeWebSDK.WebChatClient;
            } else if (window.CozeWebChatClient) {
                ChatClient = window.CozeWebChatClient;
            }

            if (ChatClient) {
                const client = new ChatClient({
    config: { bot_id: '7620394792719499317' },
    auth: { type: "token", onRefreshToken: fetchToken },
    el: document.getElementById('chat-container'),
});

// 🎯 核心補丁：當 SDK 載入完成後，強制寫入變數
client.on('ready', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('user_name');
    const phone = urlParams.get('user_phone');

    if (name || phone) {
        // 使用 SDK 內建方法強制同步變數到 Bot 後台
        client.setVariable({
            user_name: name || '',
            user_phone: phone || ''
        });
        console.log("變數已物理注入:", { name, phone });
    }
});
            } else {
                document.body.innerHTML = "<h2 style='padding:20px;'>介面載入中，若持續無畫面請重新整理...</h2>";
            }
        });
    </script>
</body>
</html>
