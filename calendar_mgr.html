<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 28px; border-radius: 50px; font-size: 14px; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: opacity 0.5s; }
        .event-card { transition: transform 0.2s; border: 1px solid #f0f0f0; }
        .event-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="text-emerald-900 font-bold text-lg tracking-widest">同步中...</div>
        </div>
    </div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <div class="flex-1 flex items-center">
            <button onclick="location.href='staff_menu.html'" class="flex items-center gap-1 hover:text-emerald-300 transition-colors">
                <i class="fas fa-chevron-left"></i>
                <span class="text-sm font-bold">返回</span>
            </button>
        </div>
        <div class="absolute left-1/2 -translate-x-1/2">
            <h1 class="text-lg font-black tracking-widest whitespace-nowrap">行事曆管理</h1>
        </div>
        <div class="flex-1 flex justify-end">
            <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold active:bg-white/20 border border-white/20">
                開啟編輯
            </button>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-sm font-bold text-emerald-900/60 uppercase tracking-widest">Upcoming Events</h2>
            <span id="eventCount" class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">0 個活動</span>
        </div>
        <div id="eventList" class="space-y-4"></div>
    </main>

    <!-- 懸浮新增按鈕 (僅編輯模式顯示) -->
    <div id="bottomAddArea" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-6 hidden z-30">
        <button onclick="openModal('addEventModal')" class="w-full py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
            <i class="fas fa-calendar-plus text-xl"></i> 新增活動項目
        </button>
    </div>

    <!-- 新增彈窗與 QR 彈窗保持不變 ... -->
    <div id="addEventModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black text-emerald-900 mb-6 text-center">排定新活動</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 ml-2 mb-1 block">活動日期</label>
                    <input type="date" id="eventDate" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 ml-2 mb-1 block">活動名稱</label>
                    <input type="text" id="eventTitle" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold">
                </div>
                <div class="flex items-center gap-3 p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100">
                    <input type="checkbox" id="needQR" checked class="w-5 h-5 accent-emerald-600">
                    <label for="needQR" class="text-sm font-bold text-emerald-900">需要報到 QR Code</label>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('addEventModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="addEvent()" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-lg">確認新增</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full font-bold inline-block mb-2" id="qrDate"></div>
            <h3 class="text-xl font-black text-emerald-900 mb-6" id="qrTitle"></h3>
            <div class="bg-white p-4 rounded-3xl border-4 border-emerald-50 shadow-inner inline-block mb-6">
                <img id="qrImg" src="" alt="QR Code" class="w-56 h-56 mx-auto">
            </div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-emerald-50 text-emerald-700 rounded-2xl font-black">關閉</button>
        </div>
    </div>

    <script>
        // 修正後的 GAS URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        const STAFF_KEY = sessionStorage.getItem('staff_key');
        let isEditMode = false;

        window.onload = () => {
            if (!STAFF_KEY) { location.href="index.html"; return; }
            loadEvents();
        };

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

        async function loadEvents() {
            toggleLoading(true);
            try {
                const res = await fetch(GAS_URL); //
                const data = await res.json();
                const list = document.getElementById('eventList');
                const today = new Date().toISOString().split('T')[0];
                
                // 排序：日期越接近現在排在越上面
                const sorted = data.calendar.sort((a,b) => a.dateText.localeCompare(b.dateText));
                document.getElementById('eventCount').innerText = `${sorted.length} 個活動`;

                list.innerHTML = sorted.map(ev => {
                    const isPastOrToday = ev.dateText <= today;
                    return `
                    <div class="event-card bg-white p-5 rounded-[2rem] shadow-sm flex justify-between items-center">
                        <div class="flex-1">
                            <span class="text-[10px] font-black bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full mb-2 inline-block">${ev.dateText}</span>
                            <h3 class="text-lg font-black text-emerald-900 leading-tight">${ev.title}</h3>
                        </div>
                        <div class="flex items-center gap-2">
                            ${(ev.needQR === '是' && isPastOrToday) ? 
                                `<button onclick="showQRCode('${ev.dateText}', '${ev.title}')" class="w-10 h-10 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-full">
                                    <i class="fas fa-qrcode"></i>
                                </button>` : ''
                            }
                            ${isEditMode ? `
                            <button onclick="deleteEvent('${ev.dateText}', '${ev.title}')" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full">
                                <i class="fas fa-trash-alt text-sm"></i>
                            </button>` : ''}
                        </div>
                    </div>
                `}).join('');
            } catch(e) { showToast("載入失敗"); }
            toggleLoading(false);
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editToggleBtn');
            const addArea = document.getElementById('bottomAddArea');
            btn.innerText = isEditMode ? "結束編輯" : "開啟編輯";
            btn.className = isEditMode 
                ? "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md"
                : "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
            addArea.classList.toggle('hidden', !isEditMode);
            loadEvents();
        }

        async function addEvent() {
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value.trim();
            const needQR = document.getElementById('needQR').checked;
            if (!date || !title) return alert("資訊不完整");
            closeModal('addEventModal');
            toggleLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'add_event', key: STAFF_KEY, date, title, needQR })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") { showToast("✅ 活動建立成功"); loadEvents(); }
            } catch(e) { showToast("網路錯誤"); }
            toggleLoading(false);
        }

        async function deleteEvent(dateText, title) {
            if (!confirm(`確定刪除「${title}」？`)) return;
            toggleLoading(true);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'delete_event', key: STAFF_KEY, dateText, title })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") { showToast("🗑️ 已移除"); loadEvents(); }
            } catch(e) { showToast("連線失敗"); }
            toggleLoading(false);
        }

        function showQRCode(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            const qrPayload = `CHECKIN:${date}:${title}`; //
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrPayload)}`;
            openModal('qrModal');
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500);
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
    </script>
</body>
</html>
