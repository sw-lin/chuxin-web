<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <style>
        /* 讓對話框撐滿整個手機螢幕 */
        #dify-chatbot-bubble-window { 
            width: 100% !important; 
            height: 100% !important; 
            position: fixed !important; 
            bottom: 0 !important; 
            right: 0 !important; 
            z-index: 999999 !important;
        }
    </style>
</head>
<body>

<script>
  // 1. 取得網址列的電話參數 (例如 ?phone=0912345)
  const urlParams = new URLSearchParams(window.location.search);
  const phoneFromUrl = urlParams.get('phone') || "";
  const nameFromUrl = urlParams.get('name') || "訪客";

  window.difyChatbotConfig = {
    token: 'ERNQLHGG3QKClfr7', // 您的 App Token
    baseUrl: 'https://udify.app',
    container: 'body', // 直接嵌入在頁面主體
    draggable: false,
    inputs: {
      // 2. 這裏是關鍵！直接將網址參數傳給 Dify 變數
      "user_phone": phoneFromUrl,
      "user_name": nameFromUrl
    }
  }
</script>
<script
  src="https://udify.app/embed.min.js"
  id="ERNQLHGG3QKClfr7"
  defer>
</script>
</body>
</html>
