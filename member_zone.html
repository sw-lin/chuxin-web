<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員專區 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .glass-nav { background: rgba(6, 78, 59, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="emerald-gradient text-white px-6 py-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="hover:text-emerald-300 transition-all text-xl"><i class="fas fa-home"></i></a>
                <span class="text-xl font-bold tracking-widest border-l border-white/20 pl-4">會員專區</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="userNameDisplay" class="text-sm font-light">載入中...</span>
                <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-10">
        
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
            <h3 class="text-orange-600 font-bold text-sm mb-2"><i class="fas fa-bullhorn mr-2"></i> 最新消息</h3>
            <p id="newsContent" class="text-emerald-900 text-lg leading-relaxed italic">同步雲端資料中...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div onclick="openLink('reading_folder_url')" class="group bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 hover:border-emerald-200 transition cursor-pointer">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-700 mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-book-reader text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">導讀資料庫</h3>
                <p class="text-gray-400 text-sm">歷年導讀手冊、簡報與推薦書單。</p>
            </div>

            <div onclick="openLink('photo_gallery_url')" class="group bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 hover:border-emerald-200 transition cursor-pointer">
                <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-camera-retro text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">活動剪影</h3>
                <p class="text-gray-400 text-sm">紀錄聚會的精彩瞬間與美好回憶。</p>
            </div>

            <div class="emerald-gradient p-8 rounded-[2.5rem] shadow-lg text-white flex flex-col justify-between">
                <div>
                    <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mb-6">
                        <i class="fas fa-user-shield text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">個人資料管理</h3>
                    <button onclick="toggleModal('profileModal', true)" class="text-white/70 text-sm hover:text-white underline decoration-dotted">修改密碼或基本資料</button>
                </div>
                
                <div id="staffArea" class="mt-8 hidden">
                    <div class="h-px bg-white/20 mb-6"></div>
                    <button onclick="location.href='staff_page.html'" class="w-full py-3 bg-white text-emerald-900 rounded-xl font-bold shadow-lg hover:bg-emerald-50 transition">
                        <i class="fas fa-cog mr-2"></i> 進入幹部後台
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="profileModal" class="fixed inset-0 bg-black/70 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl relative">
            <button onclick="toggleModal('profileModal', false)" class="absolute top-6 right-8 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-6">修改基本資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">姓名</label>
                    <input id="editName" type="text" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">電子信箱</label>
                    <input id="editEmail" type="email" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">新密碼 (若不修改請留空)</label>
                    <input id="editPassword" type="password" placeholder="請輸入新密碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                </div>
                <button id="saveBtn" onclick="updateProfile()" class="w-full emerald-gradient text-white py-4 rounded-2xl font-bold text-lg hover:brightness-110 transition mt-4">儲存變更</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {};
        let currentUser = {};

        window.onload = async () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            currentUser = JSON.parse(userStr);

            // 顯示姓名
            document.getElementById('userNameDisplay').innerText = `歡迎回來，${currentUser.name || '夥伴'}`;
            
            // 預填修改表單
            document.getElementById('editName').value = currentUser.name || '';
            document.getElementById('editEmail').value = currentUser.email || '';

            // --- 關鍵：身分判斷 ---
            // 檢查 title 或 role 欄位，包含幹部、管理員、導讀人等字眼就顯示後台按鈕
            const role = String(currentUser.title || currentUser.role || "").trim();
            if (role === "幹部" || role === "管理員" || role === "導讀人") {
                document.getElementById('staffArea').classList.remove('hidden');
            }

            // 同步雲端資料
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('newsContent').innerText = data.news;
                remoteConfig = data.config;
            } catch (e) { console.error("同步失敗"); }
        };

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function openLink(key) {
            const url = remoteConfig[key];
            url ? window.open(url, '_blank') : alert("連結尚未設定");
        }

        async function updateProfile() {
            const btn = document.getElementById('saveBtn');
            const newName = document.getElementById('editName').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPwd = document.getElementById('editPassword').value.trim();

            btn.disabled = true;
            btn.innerText = "儲存中...";

            const payload = {
                currentPhone: currentUser.phone,
                newData: {
                    name: newName,
                    email: newEmail
                }
            };
            if(newPwd) payload.newData.password = newPwd;

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("資料已更新！請重新登入以套用變更。");
                logout();
            } catch (e) {
                alert("更新失敗，請稍後再試");
                btn.disabled = false;
                btn.innerText = "儲存變更";
            }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
