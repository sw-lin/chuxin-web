<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="pb-20">
    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="text-sm font-bold flex items-center"><i class="fas fa-chevron-left mr-1"></i> 返回</button>
        <h1 class="text-lg font-black tracking-widest">活動報名管理</h1>
        <button onclick="openAddModal()" class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></button>
    </nav>

    <main class="p-6 max-w-2xl mx-auto space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">進行中活動</p>
                <p id="activeCount" class="text-2xl font-black text-emerald-900">載入中</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">總報名人次</p>
                <p id="totalReg" class="text-2xl font-black text-emerald-900">載入中</p>
            </div>
        </div>

        <h3 class="text-sm font-black text-emerald-900 ml-2"><i class="fas fa-list-ul mr-2"></i>最新報名名單</h3>
        <div id="regList" class="space-y-3">
            </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4">
            <h3 class="text-xl font-black text-emerald-900 mb-2">發布新活動</h3>
            <input type="text" id="ev_title" placeholder="活動標題 (如: 春季演講)" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm">
            <div class="grid grid-cols-2 gap-3">
                <input type="date" id="ev_start" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-xs" title="展示開始日">
                <input type="date" id="ev_until" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-xs" title="下架日期">
            </div>
            <input type="text" id="ev_poster" placeholder="海報連結 (可留空)" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm">
            <input type="date" id="ev_date" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-xs" title="實際活動日期">
            
            <div class="flex gap-3 pt-2">
                <button onclick="closeAddModal()" class="flex-1 py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitNewEvent()" class="flex-[2] py-4 emerald-gradient text-white rounded-2xl font-black shadow-lg">確認上架</button>
            </div>
        </div>
    </div>

    <script>
        var GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        window.onload = function() {
            loadRegData();
        };

        async function loadRegData() {
            try {
                const res = await fetch(GAS_URL + "?t=" + Date.now());
                const data = await res.json();
                
                // 渲染名單 (對應您截圖中的 registrations 分頁)
                const list = document.getElementById('regList');
                const regs = data.registrations || [];
                
                document.getElementById('activeCount').innerText = data.events.length;
                document.getElementById('totalReg').innerText = regs.length;

                list.innerHTML = regs.slice().reverse().map(r => `
                    <div class="bg-white p-5 rounded-3xl border border-emerald-50 shadow-sm flex justify-between items-center">
                        <div>
                            <div class="text-[10px] font-bold text-emerald-600">${r.活動標題}</div>
                            <div class="font-black text-emerald-900">${r.會員姓名}</div>
                            <div class="text-[10px] text-gray-400">${r.手機號碼}</div>
                        </div>
                        <span class="bg-emerald-100 text-emerald-700 text-[10px] px-3 py-1 rounded-full font-bold">${r.狀態 || '已報名'}</span>
                    </div>
                `).join('');
            } catch (e) { alert("讀取失敗"); }
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }

        async function submitNewEvent() {
            const btn = event.target;
            btn.innerText = "處理中...";
            
            const payload = {
                type: 'add_new_event',
                title: document.getElementById('ev_title').value,
                start_date: document.getElementById('ev_start').value,
                display_until: document.getElementById('ev_until').value,
                poster_url: document.getElementById('ev_poster').value,
                date: document.getElementById('ev_date').value
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    alert("上架成功！");
                    location.reload();
                }
            } catch (e) { alert("發送失敗"); }
        }
    </script>
</body>
</html>
