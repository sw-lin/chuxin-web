<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.7), rgba(6,78,59,0.3)); }
        .slide { display: none; width: 100%; height: 600px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .6} to {opacity: 1} }
        @media (max-width: 640px) { .slide { height: 400px; } }
        
        /* 彈窗樣式保持不變 */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); 
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-[#FDFBF7]">

<nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
        <i class="fas fa-leaf text-emerald-700 text-2xl"></i>
        <span class="text-2xl md:text-3xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
    </div>
    <div class="flex items-center space-x-3">
        <button onclick="openAbout()" class="text-emerald-800 font-bold hover:bg-emerald-50 px-5 py-2.5 rounded-full transition text-sm border border-transparent">關於我</button>
        <button onclick="openLogin()" class="bg-emerald-800 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-emerald-700 transition shadow-lg border border-emerald-800">進入會館</button>
    </div>
</nav>
    
    <header class="relative pt-16">
        <div class="relative overflow-hidden bg-emerald-900">
            <img class="slide" src="1.jpg">
            <img class="slide" src="2.jpg">
            <img class="slide" src="3.jpg">
            <img class="slide" src="4.jpg">
            <img class="slide" src="5.jpg">
            <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center px-6 z-10">
                <div class="max-w-3xl">
                    <h1 class="text-4xl md:text-6xl text-white font-bold mb-6 leading-tight">在共讀中築心</h1>
                    <p class="text-emerald-50 text-lg md:text-xl font-light italic opacity-90">於相伴中成長</p>
                </div>
            </div>
        </div>
    </header>

    <section class="py-20 px-6 max-w-7xl mx-auto">
        <div class="flex items-center mb-12">
            <h2 class="text-3xl font-bold text-emerald-900 whitespace-nowrap">Coming Soon</h2>
            <div class="h-px w-full ml-6 bg-emerald-100"></div>
        </div>
        <div id="event-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="animate-pulse bg-emerald-50 h-40 rounded-3xl col-span-full flex items-center justify-center text-emerald-200 text-sm italic">正在探索未來活動...</div>
        </div>
    </section>

    <section id="register" class="py-24 px-6 bg-emerald-50/50">
        <div class="max-w-xl mx-auto text-center">
            <h2 class="text-3xl font-bold text-emerald-900 mb-4">加入我們</h2>
            <p class="text-gray-500 mb-10">歡迎填寫報名資料，與我們一同開啟閱讀之旅</p>
            <form action="https://formspree.io/f/xpqjvblg" method="POST" class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl text-left border border-emerald-100">
                <div class="space-y-6">
                    <div><label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">您的姓名</label><input type="text" name="姓名" required placeholder="您的姓名" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition"></div>
                    <div><label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">手機號碼</label><input type="tel" name="電話" required placeholder="0912345678" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition"></div>
                    <div><label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">電子郵件</label><input type="email" name="Email" required placeholder="yourname@email.com" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition"></div>
                    <button type="submit" class="w-full bg-emerald-800 text-white font-bold py-5 rounded-2xl hover:bg-emerald-700 shadow-lg transition-all active:scale-[0.98]">送出報名申請</button>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-400 text-xs tracking-widest uppercase">© 2026 Chuxin Book Club</footer>

    <div id="aboutModal" class="modal">
        <div class="bg-white max-w-2xl w-full rounded-[2.5rem] p-10 shadow-2xl relative max-h-[85vh] overflow-y-auto m-6 flex flex-col">
            <button onclick="closeModal('aboutModal')" class="absolute top-6 right-6 text-gray-300 hover:text-emerald-700 transition"><i class="fas fa-times-circle text-2xl"></i></button>
            <h2 class="text-2xl font-bold text-emerald-900 mb-6 flex items-center"><i class="fas fa-leaf mr-3 text-emerald-600"></i>關於築心</h2>
            <div id="aboutContent" class="text-gray-600 leading-relaxed whitespace-pre-line text-lg">正在讀取內容...</div>
        </div>
    </div>

    <div id="loginModal" class="modal">
    <div class="bg-white max-w-sm w-full rounded-[3rem] p-10 shadow-2xl relative m-6 flex flex-col">
        <button onclick="closeModal('loginModal')" class="absolute top-6 right-6 text-gray-300 hover:text-emerald-700 transition"><i class="fas fa-times-circle text-2xl"></i></button>
        <div class="text-center mb-8">
            <h3 class="text-2xl font-bold text-emerald-900">會員登入</h3>
            <p class="text-gray-400 text-xs mt-2">請驗證身分進入會館</p>
        </div>
        <div class="space-y-5">
            <input type="tel" id="userPhone" placeholder="手機號碼" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <input type="password" id="userPass" onkeyup="if(event.key==='Enter') handleLogin()" placeholder="登入密碼" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">確認進入</button>
        </div>
      </div>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        // 核心修正：將全形轉半形的工具
        function toHalfWidth(str) {
            return str.replace(/[０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            }).replace(/\s/g, ""); // 同時移除空格
        }

        // 輪播動畫
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 4500);
        }

// 修改點 1：關於我讀取邏輯 (讀取 allData 裡的 content)
function openAbout() {
    const modal = document.getElementById('aboutModal');
    const contentDiv = document.getElementById('aboutContent');
    modal.style.display = 'flex';

    // 檢查資料是否已經從 GAS 回傳
    if (window.allData && allData.config && allData.config.about_content) {
        // 資料已就緒，進行格式化後顯示
        let text = allData.config.about_content
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        contentDiv.innerHTML = text;
    } else {
        // 資料還在路上的時候顯示這個
        contentDiv.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <p>內容加載中，請稍候...</p>
            </div>
        `;
        
        // 可選：如果資料還沒來，我們可以設定一個小定時器，等資料一到自動更新視窗內容
        const checkData = setInterval(() => {
            if (window.allData && allData.config && allData.config.about_content) {
                openAbout(); // 資料到了，重新呼叫一次自己來更新介面
                clearInterval(checkData);
            }
        }, 500);
    }
}        
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// 更新載入活動的渲染方法
async function loadEvents() {
    try {
        const res = await fetch(GAS_URL + "?t=" + Date.now());
        allData = await res.json(); // 存入全域
        
        const today = new Date().toISOString().split('T')[0];
        const grid = document.getElementById('event-grid');
        
        if(allData.calendar) {
            const upcoming = allData.calendar
                .filter(ev => ev.dateText >= today)
                .sort((a,b) => a.dateText.localeCompare(b.dateText))
                .slice(0, 4);

            grid.innerHTML = upcoming.map(ev => `
                <div class="bg-white p-6 rounded-[2rem] border border-emerald-50 shadow-sm hover:shadow-md transition text-center flex flex-col justify-between h-full">
                    <div>
                        <div class="text-emerald-600 font-bold mb-1 text-sm">${ev.dateText}</div>
                        <div class="text-emerald-900 font-bold text-lg mb-4 leading-snug">${ev.title}</div>
                    </div>
                    <button onclick="addToCalendar('${ev.title}', '${ev.dateText}')" 
                        class="text-[10px] bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-4 py-2 rounded-full uppercase tracking-widest font-bold transition">
                        <i class="far fa-calendar-plus mr-1"></i> 加入行事曆
                    </button>
                </div>
            `).join('');
        }
    } catch (e) { console.error("資料載入失敗", e); }
}
        
        let allData = {}; // 全域存放資料

// 修改點 4：行事曆跳轉邏輯 (考慮 Android/iOS)
function addToCalendar(title, dateStr) {
    const start = dateStr.replace(/-/g, '') + "T093000";
    const end = dateStr.replace(/-/g, '') + "T120000";
    const details = "築心讀書會活動";
    
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

    if (isIOS) {
        // iOS 使用 .ics 格式 (這裡簡化導向 web 版或提醒用戶，網頁通常無法直接寫入 iOS 內建行事曆，最穩是 Google 日曆)
        window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${encodeURIComponent(details)}`, '_blank');
    } else {
        // Android/Desktop 直接開啟 Google 日曆
        window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${encodeURIComponent(details)}`, '_blank');
    }
}        
        // 核心修正：登入處理
        window.handleLogin = async function() {
            const rawPhone = document.getElementById('userPhone').value.trim();
            // 強制轉半形並移除所有非數字內容
            const u = toHalfWidth(rawPhone).replace(/\D/g, "");
            const p = document.getElementById('userPass').value.trim();

            if(!u || !p) return alert('請填寫完整手機與密碼');

            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = '正在登入...';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'login', phone: u, password: p })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    // 關鍵：將清洗後的 phone 存入，供 member_zone 使用
                    sessionStorage.setItem('userInfo', JSON.stringify({ ...result, phone: u }));
                    window.location.href = 'member_zone.html';
                } else {
                    alert("登入失敗：手機號碼或密碼錯誤");
                }
            } catch (e) {
                alert("網路連線失敗，請檢查網路狀態");
            } finally {
                btn.disabled = false; btn.innerText = '確認進入';
            }
        };

        window.onload = () => { showSlides(); loadEvents(); };
    </script>
</body>
</html>
