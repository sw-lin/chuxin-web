<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .progress-animation { transition: width 1.5s cubic-bezier(0.1, 0.5, 0.1, 1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="font-bold tracking-tight">築心會員館</span>
            </div>
            <button onclick="logout()" class="text-sm bg-white/10 px-4 py-1.5 rounded-full hover:bg-white/20 transition">退出登入</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 space-y-8">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-110 transition duration-700">
                <i class="fas fa-quote-right text-9xl"></i>
            </div>
            <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="space-y-2">
                    <div class="flex items-center space-x-3">
                        <span id="userTitle" class="bg-emerald-300/20 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase">載入中</span>
                        <span id="userName" class="text-3xl font-bold tracking-wider">會員名稱</span>
                    </div>
                    <p id="userEmail" class="opacity-80 font-light italic">email address</p>
                    <div class="flex items-center space-x-2 pt-4">
                        <i class="fas fa-calendar-alt opacity-60"></i>
                        <span id="news" class="text-sm font-medium">歡迎回到讀書會...</span>
                    </div>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button onclick="openEditModal()" class="bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl hover:bg-white/20 transition flex items-center shadow-lg border border-white/10">
                        <i class="fas fa-user-cog mr-2"></i> 修改資料
                    </button>
                    <button onclick="startScanner()" class="bg-white text-emerald-900 px-6 py-3 rounded-2xl font-bold hover:bg-emerald-50 transition flex items-center shadow-xl">
                        <i class="fas fa-qrcode mr-2"></i> 掃碼簽到
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-md transition text-center border border-emerald-50 group">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
                    <i class="fas fa-book-open text-xl"></i>
                </div>
                <div class="text-sm font-bold text-gray-700">共讀資料</div>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-md transition text-center border border-emerald-50 group">
                <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
                    <i class="fas fa-images text-xl"></i>
                </div>
                <div class="text-sm font-bold text-gray-700">活動剪影</div>
            </button>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div id="reader" class="w-full"></div>
            <div class="p-8 text-center">
                <h4 class="text-xl font-bold text-emerald-900 mb-2">準備掃描</h4>
                <p class="text-gray-400 text-sm mb-6">請對準活動現場的 QR Code</p>
                <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 hover:bg-gray-200 transition">取消掃描</button>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl relative">
            <h4 class="text-2xl font-bold text-emerald-900 mb-6">修改基本資料</h4>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 pl-1">電子郵件</label>
                    <input id="editEmail" type="email" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-transparent focus:border-emerald-500 outline-none">
                </div>
                <div class="pt-2 border-t border-dashed border-gray-100">
                    <label class="block text-sm font-bold text-emerald-800 mb-1 pl-1">設定新密碼</label>
                    <input id="newPassword" type="password" placeholder="若不修改請留空" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-transparent focus:border-emerald-500 outline-none">
                </div>
                <div class="pt-4">
                    <label class="block text-sm font-bold text-red-600 mb-1 pl-1 italic">驗證：輸入舊密碼</label>
                    <input id="oldPassword" type="password" placeholder="請輸入原密碼確認" class="w-full px-4 py-3 bg-red-50 rounded-xl border border-red-100 focus:bg-white outline-none">
                </div>
                <div class="flex space-x-3 pt-4">
                    <button onclick="closeEditModal()" class="flex-1 py-3 text-gray-400 font-bold">取消</button>
                    <button id="updateBtn" onclick="submitUpdate()" class="flex-[2] bg-emerald-800 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-900 transition">確認修改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {};
        let html5QrCode = null;

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { location.href = 'index.html'; return; }
            
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userEmail').innerText = user.email || '尚未設定電子郵件';
            document.getElementById('userTitle').innerText = user.title || '學員';
            loadData();
        };

        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                remoteConfig = data.config;
                document.getElementById('news').innerText = data.news || '歡迎回到讀書會';
            } catch (e) { console.error("資料載入失敗"); }
        }

        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('newPassword').value = ''; // 清空新密碼
            document.getElementById('oldPassword').value = ''; // 清空舊密碼驗證
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editProfileModal').classList.add('hidden');
        }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldPassInput = document.getElementById('oldPassword').value.trim();
            const newPassInput = document.getElementById('newPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();

            // 1. 驗證舊密碼 (Base64 比對)
            if (btoa(oldPassInput) !== String(user.password).trim()) {
                alert("❌ 驗證失敗：舊密碼輸入錯誤");
                return;
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = "正在處理...";

            // 2. 準備傳送給 GAS 的資料
            let updatePayload = { email: newEmail };
            if (newPassInput !== "") {
                updatePayload.password = btoa(newPassInput); // 加密後傳送
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        currentPhone: user.phone, 
                        newData: updatePayload 
                    })
                });

                if (response.ok) {
                    alert("✅ 修改成功！為確保安全，請使用新密碼重新登入。");
                    logout();
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("連線失敗，請檢查網路。");
                btn.disabled = false;
                btn.innerText = "確認修改";
            }
        }

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    stopScanner();
                    window.location.href = decodedText;
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("無法開啟鏡頭：" + err);
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').classList.add('hidden');
                }).catch(err => console.error(err));
            } else {
                document.getElementById('scannerModal').classList.add('hidden');
            }
        }

        function openRemoteLink(key) {
            const url = remoteConfig[key];
            if (url && url.startsWith('http')) window.open(url, '_blank');
            else alert("管理員尚未設定此連結。");
        }

        function logout() {
            sessionStorage.clear();
            location.href = 'index.html';
        }
    </script>
</body>
</html>
