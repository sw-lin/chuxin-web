<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-heart text-emerald-200"></i>
                <span class="text-xl font-bold tracking-widest">築心會館</span>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="userNameDisplay">載入中...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-8">
        <section class="bg-white rounded-[2rem] p-8 border border-emerald-100 shadow-sm mb-10">
            <h2 class="text-xl font-bold text-emerald-900 flex items-center mb-4">
                <span class="w-1 h-6 bg-emerald-800 mr-3 rounded-full"></span> 最新消息
            </h2>
            <div id="dynamicNews" class="text-gray-600 italic">正在同步公告...</div>
        </section>

        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-900">您好，<span id="welcomeName">會員</span></h1>
                <p id="userTitleTag" class="text-emerald-700 font-bold mt-2"></p>
            </div>
            <div id="adminEntry" class="hidden">
                <a href="staff_page.html" class="inline-flex items-center bg-orange-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-orange-700 transition shadow-lg">
                    <i class="fas fa-user-shield mr-2"></i> 進入幹部專區
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm">
                <div class="text-emerald-800 text-2xl mb-4"><i class="fas fa-book-open"></i></div>
                <h3 class="font-bold text-lg text-emerald-900">本月共讀</h3>
                <p class="text-gray-400 text-sm mt-2">導讀資料夾連結</p>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-sm">
                <div class="text-orange-600 text-2xl mb-4"><i class="fas fa-images"></i></div>
                <h3 class="font-bold text-lg text-emerald-900">活動剪影</h3>
                <p class="text-gray-400 text-sm mt-2">瀏覽精采照片</p>
            </div>
            <div onclick="openEditModal()" class="bg-emerald-900 p-8 rounded-[2rem] shadow-xl text-white hover:bg-emerald-800 transition cursor-pointer">
                <div class="text-emerald-200 text-2xl mb-4"><i class="fas fa-user-cog"></i></div>
                <h3 class="font-bold text-lg">帳號設定</h3>
                <p class="text-emerald-100/60 text-sm mt-2">修改密碼與聯絡信箱</p>
            </div>
        </div>
    </main>

    <div id="editProfileModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-bold text-emerald-900 mb-6 text-center">修改基本資料</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-emerald-800 ml-1">驗證舊密碼</label>
                    <input id="oldPassword" type="password" placeholder="請輸入目前使用的密碼" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">新電子郵件 (不改請留空)</label>
                    <input id="editEmail" type="email" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">新密碼 (不改請留空)</label>
                    <input id="editPassword" type="password" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                </div>
                <button id="updateBtn" onclick="submitUpdate()" class="w-full bg-emerald-900 text-white py-4 rounded-2xl font-bold text-lg mt-2">儲存變更</button>
                <button onclick="closeEditModal()" class="w-full text-gray-400 text-sm mt-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";

        window.onload = async () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);

            document.getElementById('userNameDisplay').innerText = `你好，${user.name}`;
            document.getElementById('welcomeName').innerText = user.name;

            // --- 職稱判定：只要 title 欄位不是空的，就顯示幹部專區 ---
            const titleStr = String(user.title || '').trim();
            if (titleStr !== "" && titleStr !== "undefined") {
                document.getElementById('userTitleTag').innerText = `職稱：${titleStr}`;
                document.getElementById('adminEntry').classList.remove('hidden');
            }
            
            fetchNews();
        };

        async function fetchNews() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('dynamicNews').innerText = data.news || "歡迎參加 觀霧行";
            } catch (e) { document.getElementById('dynamicNews').innerText = "公告同步失敗"; }
        }

        function openEditModal() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editProfileModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldPassInput = document.getElementById('oldPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPass = document.getElementById('editPassword').value.trim();
            const btn = document.getElementById('updateBtn');

            // 前端比對：舊密碼必須與目前登入的 session 密碼一致
            if (oldPassInput !== String(user.password).trim()) {
                alert("❌ 驗證失敗：舊密碼輸入錯誤");
                return;
            }

            btn.disabled = true;
            btn.innerText = "更新中...";

            const updateFields = { email: newEmail };
            if (newPass !== "") updateFields.password = newPass;

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 解決 CORS
                    body: JSON.stringify({
                        currentPhone: user.phone,
                        newData: updateFields
                    })
                });
                alert("✅ 資料修改成功！請重新登入。");
                logout();
            } catch (e) {
                alert("更新失敗");
                btn.disabled = false;
                btn.innerText = "儲存變更";
            }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
