<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        window.addEventListener('load', () => {
            // Coze SDK 在非模組化環境下會產生 CozeWebSDK 物件
            const SDK = window.CozeWebSDK;

            if (!SDK) {
                document.body.innerHTML = "<h2 style='padding:20px;'>核心組件載入失敗，請檢查網路連線或嘗試重新整理。</h2>";
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            
            new SDK.WebChatClient({
                config: { 
                    bot_id: '7620394792719499317' 
                },
                componentProps: {
                    title: '築心智慧管家',
                    layout: 'window',
                    initial_variables: {
                        user_name: urlParams.get('user_name') || '訪客',
                        user_phone: urlParams.get('user_phone') || ''
                    }
                },
                el: document.getElementById('chat-container'),
            });
        });
    </script>
</body>
</html>
