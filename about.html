<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; }
        .content-fade { line-height: 2; letter-spacing: 0.05em; }
        .content-fade p { margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-6 py-4 flex justify-between items-center border-b">
        <a href="index.html" class="text-2xl font-bold text-emerald-900 tracking-tighter italic">築心讀書會</a>
        <div class="space-x-4">
            <a href="index.html" class="text-sm text-gray-600 font-bold">返回首頁</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto py-20 px-8">
        <div id="textContent" class="content-fade text-gray-700 text-lg mb-20">
            </div>

        <section id="join" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-gray-100">
            <h3 class="text-2xl font-bold text-emerald-900 mb-6 text-center">入會報名表單</h3>
            <form action="https://formspree.io/f/https://formspree.io/f/xpqjvblg" method="POST" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="name" placeholder="姓名" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-emerald-500">
                    <input type="tel" name="phone" placeholder="電話" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-emerald-500">
                </div>
                <input type="email" name="email" placeholder="電子信箱" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-emerald-500">
                <textarea name="message" rows="4" placeholder="想對我們說的話..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-emerald-500"></textarea>
                <button type="submit" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition shadow-lg">提交報名資訊</button>
            </form>
        </section>
    </main>

    <script>
        async function loadAboutTxt() {
            try {
                const response = await fetch('about.txt?v=' + Date.now());
                const text = await response.text();
                const formatted = text.split('\n').filter(p => p.trim() !== "").map(p => `<p>${p}</p>`).join('');
                document.getElementById('textContent').innerHTML = formatted;
            } catch (err) {
                document.getElementById('textContent').innerHTML = "暫時無法讀取內容。";
            }
        }
        window.onload = loadAboutTxt;
    </script>
</body>
</html>
