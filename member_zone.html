<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: rgba(6, 78, 59, 0.95); backdrop-filter: blur(8px); }
        .card-animate { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-animate:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="min-h-screen bg-[#FDFBF7]">

    <nav class="glass-nav text-white sticky top-0 z-40 px-6 py-4 shadow-xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                    <i class="fas fa-heart text-emerald-900"></i>
                </div>
                <span class="text-xl font-bold tracking-widest">築心會館</span>
            </div>
            <div class="flex items-center space-x-6">
                <span id="userNameDisplay" class="hidden md:inline text-sm opacity-90 font-medium">載入中...</span>
                <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition border border-white/20">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-3xl font-bold text-emerald-900 mb-2">您好，<span id="welcomeName">會員</span></h1>
            <p class="text-gray-500 italic">「築夢踏實，從心開始。」歡迎回到您的專屬空間。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="bg-white p-8 rounded-[2rem] border border-emerald-50 card-animate cursor-pointer">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-800 rounded-2xl flex items-center justify-center mb-6 text-xl">
                    <i class="fas fa-book"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">本月共讀</h3>
                <p class="text-gray-500 text-sm leading-relaxed">查看最新的導讀手冊與討論重點，為聚會做準備。</p>
            </div>

            <div class="bg-white p-8 rounded-[2rem] border border-emerald-50 card-animate cursor-pointer">
                <div class="w-12 h-12 bg-orange-50 text-orange-700 rounded-2xl flex items-center justify-center mb-6 text-xl">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">活動預約</h3>
                <p class="text-gray-500 text-sm leading-relaxed">瀏覽本學期所有聚會行程，並確認您的出席狀況。</p>
            </div>

            <div onclick="openEditModal()" class="bg-emerald-800 p-8 rounded-[2rem] card-animate cursor-pointer shadow-lg shadow-emerald-900/20 text-white">
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center mb-6 text-xl">
                    <i class="fas fa-user-edit"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">帳號設定</h3>
                <p class="opacity-80 text-sm leading-relaxed">隨時更新您的電子郵件或變更登入密碼，維護資訊安全。</p>
            </div>
        </div>

        <section class="bg-white rounded-[2.5rem] p-8 md:p-12 border border-emerald-50 shadow-sm">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-emerald-900 flex items-center">
                    <span class="w-2 h-8 bg-emerald-800 rounded-full mr-3"></span> 最新消息
                </h2>
                <span class="text-sm text-gray-400">2026年3月</span>
            </div>
            <div class="space-y-6">
                <div class="flex space-x-4 p-4 hover:bg-gray-50 rounded-2xl transition">
                    <div class="flex-shrink-0 w-2 h-2 mt-2 rounded-full bg-emerald-500"></div>
                    <div>
                        <p class="font-bold text-emerald-900">網站更新公告</p>
                        <p class="text-gray-600 text-sm mt-1">會員資料修改功能已正式上線。現在系統將以加密方式儲存您的密碼，確保隱私安全。</p>
                    </div>
                </div>
            </div>
        </section>
    </main
