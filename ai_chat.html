<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script type="module">
        // 改用全量匯入 (*)，確保能抓到所有匯出的物件
        import * as CozeWebSDK from 'https://cdn.jsdelivr.net/npm/@coze/api/+esm';

        try {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 使用 CozeWebSDK.WebChatClient 啟動
            new CozeWebSDK.WebChatClient({
                config: { 
                    bot_id: '7620394792719499317' 
                },
                componentProps: {
                    title: '築心智慧管家',
                    layout: 'window',
                    initial_variables: {
                        user_name: urlParams.get('user_name') || '訪客',
                        user_phone: urlParams.get('user_phone') || ''
                    }
                },
                el: document.getElementById('chat-container'),
            });
            console.log("築心智慧管家 SDK 啟動完成！");
        } catch (error) {
            console.error("啟動失敗原因:", error);
            document.body.innerHTML = "<h2 style='padding:20px;'>載入失敗，請確認網址參數是否包含名稱與電話。</h2>";
        }
    </script>
</body>
</html>
