<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        /* 修正彈窗控制邏輯 */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-[#064E3B] text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="font-bold tracking-wider text-sm">築心會館</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="enterStaffMode()" class="text-[10px] bg-amber-500/20 text-amber-200 border border-amber-500/30 px-3 py-1 rounded-full active:scale-95 transition">幹部專區</button>
                <button onclick="openEditModal()" class="text-[10px] bg-white/10 px-3 py-1 rounded-full active:scale-95 transition">修改資料</button>
                <button onclick="logout()" class="text-[10px] bg-red-900/30 px-3 py-1 rounded-full active:scale-95 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <h2 id="userName" class="text-3xl font-bold mb-4 italic">...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/10 p-4 rounded-3xl text-center border border-white/5">
                    <div class="text-[10px] opacity-60 mb-1 tracking-widest uppercase">參與率</div>
                    <div id="attPercent" class="text-3xl font-bold text-orange-200">0%</div>
                </div>
                <div class="bg-black/10 p-4 rounded-3xl text-center border border-white/5">
                    <div class="text-[10px] opacity-60 mb-1 tracking-widest uppercase">出席數</div>
                    <div id="attCountDisplay" class="text-2xl font-bold">0 / 0</div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-all">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-bold tracking-widest">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50 flex items-center space-x-4">
            <div class="bg-emerald-100 text-emerald-700 w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
                <i class="fas fa-bullhorn text-sm"></i>
            </div>
            <p id="news" class="text-gray-500 text-[11px] truncate">同步中...</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-book-open text-emerald-700"></i>
                <span class="font-bold text-emerald-900 text-sm">課程資料庫</span>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 hover:bg-emerald-50 transition">
                <i class="fas fa-images text-emerald-700"></i>
                <span class="font-bold text-emerald-900 text-sm">活動剪影</span>
            </button>
        </div>

        <div class="px-2">
            <h3 class="font-bold text-emerald-900 text-lg mb-4">學習歷程</h3>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <div id="scannerModal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[3rem] overflow-hidden shadow-2xl relative">
            <div id="reader" class="w-full"></div>
            <div class="p-6">
                <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-400">取消返回</button>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-6 text-center">修改資料</h3>
            <div class="space-y-4">
                <input type="email" id="editEmail" placeholder="電子郵件" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm">
                <input type="password" id="oldPassVerify" placeholder="驗證舊密碼 (必填)" class="w-full px-5 py-4 bg-gray-100 rounded-2xl outline-none text-sm border border-red-100">
                <input type="password" id="newPassSet" placeholder="設定新密碼 (不改留空)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm">
                <div class="flex pt-4 space-x-3">
                    <button onclick="closeEditModal()" class="flex-1 text-gray-400 font-bold">取消</button>
                    <button onclick="handleUpdateProfile()" id="updateBtn" class="flex-[2] bg-emerald-800 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">確認更新</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let html5QrCode = null;
        let remoteConfig = {};
        let currentUser = null;

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').innerText = currentUser.name;
            syncData(currentUser);
        };

        // --- 幹部專區跳轉 ---
        function enterStaffMode() {
            const key = prompt("請輸入幹部授權碼：");
            if (key) {
                sessionStorage.setItem('adminKey', key);
                location.href = 'staff_page.html';
            }
        }

        // --- 修正後的掃描邏輯 ---
        function startScanner() {
            document.getElementById('scannerModal').classList.add('active');
            // 修正拼字：Html5QrCode (大小寫必須精確)
            html5QrCode = new Html5QrCode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 }, 
                (text) => {
                    stopScanner();
                    window.location.href = text; // 跳轉至 QR Code 內容
                }
            ).catch(err => {
                alert("相機開啟失敗，請確認已授權權限");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().finally(() => {
                    document.getElementById('scannerModal').classList.remove('active');
                    html5QrCode = null;
                });
            } else {
                document.getElementById('scannerModal').classList.remove('active');
            }
        }

        // --- 修正後的資料更新邏輯 ---
        async function handleUpdateProfile() {
            const oldP = document.getElementById('oldPassVerify').value;
            const newP = document.getElementById('newPassSet').value;
            const newEmail = document.getElementById('editEmail').value;
            
            if (!oldP) return alert("請輸入舊密碼進行身份驗證");
            
            const btn = document.getElementById('updateBtn');
            btn.disabled = true; btn.innerText = "處理中...";
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'updateProfile',
                        phone: currentUser.phone,
                        email: newEmail,
                        password: oldP,  // GAS 後端對接的是 password 欄位
                        newPassword: newP
                    })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    alert("資料更新成功！");
                    // 更新本地 Session 資料
                    currentUser.email = newEmail;
                    sessionStorage.setItem('userInfo', JSON.stringify(currentUser));
                    location.reload();
                } else {
                    alert("更新失敗：" + (result.message || "密碼錯誤"));
                }
            } catch (e) {
                alert("連線失敗，請檢查網路");
            }
            btn.disabled = false; btn.innerText = "確認更新";
        }

        async function syncData(user) {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                remoteConfig = data.config || {};
                document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";

                const myMatch = String(user.phone).replace(/\D/g, "").slice(-9);
                const liveUser = data.users.find(u => String(u.phone).slice(-9) === myMatch);
                
                if (liveUser) {
                    const today = new Date().toISOString().split('T')[0];
                    const events = data.calendar.filter(ev => ev.dateText <= today);
                    const logs = liveUser.attendLog.map(l => l.split('T')[0]);
                    let count = events.filter(ev => logs.includes(ev.dateText)).length;

                    document.getElementById('attPercent').innerText = (events.length ? Math.round(count/events.length*100) : 0) + "%";
                    document.getElementById('attCountDisplay').innerText = `${count} / ${events.length}`;
                    
                    const list = document.getElementById('historyList');
                    list.innerHTML = [...events].reverse().map(ev => `
                        <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50">
                            <div><div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div><div class="text-emerald-900 font-bold text-sm">${ev.title}</div></div>
                            <i class="fas ${logs.includes(ev.dateText) ? 'fa-check-circle text-emerald-600' : 'fa-times-circle text-gray-200'} text-2xl"></i>
                        </div>`).join('');
                }
            } catch (e) { console.error(e); }
        }

        function openRemoteLink(key) {
            if (remoteConfig[key]) window.open(remoteConfig[key], '_blank');
            else alert("連結尚未設定");
        }

        function openEditModal() {
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editProfileModal').classList.add('active');
        }
        function closeEditModal() { document.getElementById('editProfileModal').classList.remove('active'); }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
