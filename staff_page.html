<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高級管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F4F7F5; opacity: 0; transition: opacity 0.5s; }
        .tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: #064E3B; border-bottom-color: #064E3B; background: rgba(6, 78, 59, 0.05); }
        .hidden { display: none !important; }
        .edit-mode .show-on-edit { display: block !important; }
        .edit-mode .flex-on-edit { display: flex !important; }
        .edit-active-bg { background-color: #FFF7ED !important; border-color: #F97316 !important; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm overflow-x-auto">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2 shrink-0 mr-4">
                    <i class="fas fa-toolbox text-emerald-700"></i>
                    <span class="font-bold text-emerald-900">築心管理端</span>
                </div>
                <div class="flex space-x-1 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('news')" id="btn-news" class="tab-btn active">公告欄</button>
                    <button onclick="switchTab('line')" id="btn-line" class="tab-btn">Line訊息</button>
                    <button onclick="switchTab('members')" id="btn-members" class="tab-btn">名冊</button>
                    <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn">行事曆</button>
                    <button onclick="switchTab('payment')" id="btn-payment" class="tab-btn">繳費</button>
                    <button onclick="switchTab('stats')" id="btn-stats" class="tab-btn">統計</button>
                    <button onclick="switchTab('system')" id="btn-system" class="tab-btn">系統設定</button>
                </div>
                <div class="ml-4 flex items-center space-x-2 shrink-0">
                    <button id="editMasterBtn" onclick="toggleEditMode()" class="bg-white border border-gray-200 text-gray-600 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm">
                        <i class="fas fa-edit mr-1"></i> 編輯
                    </button>
                    <button onclick="location.href='member_zone.html'" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times-circle text-xl"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8" id="main-content">
        
        <section id="sec-news" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-bold text-emerald-900 mb-4">首頁跑馬燈公告</h3>
                <textarea id="input-news" rows="4" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-emerald-100" placeholder="輸入公告內容..."></textarea>
                <div class="mt-4 flex justify-end">
                    <button onclick="updateNews()" class="bg-emerald-800 text-white px-8 py-2 rounded-xl font-bold shadow-lg">更新公告</button>
                </div>
            </div>
        </section>

        <section id="sec-line" class="tab-content hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-bold text-emerald-900 mb-4">Line 通知訊息設定</h3>
                <input type="text" id="line-msg" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm mb-4" placeholder="輸入預設發送訊息...">
                <button onclick="saveLineMsg()" class="bg-emerald-800 text-white px-8 py-2 rounded-xl font-bold">儲存設定</button>
            </div>
        </section>

        <section id="sec-members" class="tab-content hidden space-y-6">
            <div id="add-member-bar" class="bg-white p-6 rounded-3xl border border-orange-100 hidden show-on-edit">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="mName" placeholder="姓名" class="bg-orange-50/50 p-3 rounded-xl outline-none text-sm">
                    <input type="tel" id="mPhone" placeholder="手機" class="bg-orange-50/50 p-3 rounded-xl outline-none text-sm">
                    <input type="email" id="mEmail" placeholder="Email" class="bg-orange-50/50 p-3 rounded-xl outline-none text-sm">
                    <button onclick="addMember()" class="bg-orange-600 text-white rounded-xl font-bold">新增會員</button>
                </div>
            </div>
            <div id="memberList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="sec-calendar" class="tab-content hidden space-y-6">
            <div id="add-event-bar" class="bg-white p-6 rounded-3xl border border-orange-100 hidden show-on-edit">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="date" id="calDate" class="bg-orange-50/50 p-3 rounded-xl outline-none text-sm">
                    <input type="text" id="calTitle" placeholder="活動名稱" class="bg-orange-50/50 p-3 rounded-xl outline-none text-sm">
                    <button onclick="addEvent()" class="bg-orange-600 text-white rounded-xl font-bold">發布</button>
                </div>
            </div>
            <div id="eventList" class="space-y-3"></div>
        </section>

        <section id="sec-payment" class="tab-content hidden">
            <div class="bg-white rounded-3xl overflow-hidden border shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-500">
                        <tr><th class="p-4">姓名</th><th class="p-4">繳費狀態</th><th class="p-4">操作</th></tr>
                    </thead>
                    <tbody id="paymentList"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-stats" class="tab-content hidden">
            <div id="statsContent" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-system" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <h3 class="font-bold text-emerald-900 mb-6 flex items-center">
                    <i class="fas fa-link mr-2 text-emerald-600"></i> 資料鏈結設定
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 block mb-1">課程資料夾 URL</label>
                        <input type="text" id="conf-reading" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-emerald-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 block mb-1">活動剪影 URL</label>
                        <input type="text" id="conf-photo" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-emerald-100">
                    </div>
                    <button onclick="saveSystemConfig()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold mt-4 shadow-lg hover:bg-emerald-700 transition">儲存所有設定</button>
                </div>
            </div>
        </section>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold mb-1"></h3>
            <p id="qrDate" class="text-xs text-gray-400 mb-8"></p>
            <div id="qrcode" class="flex justify-center mb-8"></div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 rounded-2xl font-bold">關閉</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        const CHECKIN_URL = "https://your-domain.com/checkin.html"; 
        let adminKey = "";
        let isEditMode = false;
        let cachedData = null;

        window.onload = async () => {
            adminKey = sessionStorage.getItem('adminKey');
            if (!adminKey) {
                adminKey = prompt("請輸入管理金鑰：");
                if (!adminKey) { location.href = 'member_zone.html'; return; }
                sessionStorage.setItem('adminKey', adminKey);
            }
            document.body.style.opacity = "1";
            fetchData();
        };

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editMasterBtn');
            const main = document.getElementById('main-content');
            if (isEditMode) {
                btn.innerHTML = '<i class="fas fa-check mr-1"></i> 完成';
                btn.className = "bg-orange-500 border border-orange-500 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-md";
                main.classList.add('edit-mode');
            } else {
                btn.innerHTML = '<i class="fas fa-edit mr-1"></i> 編輯';
                btn.className = "bg-white border border-gray-200 text-gray-600 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm";
                main.classList.remove('edit-mode');
            }
            renderAll(); // 重新渲染以顯示/隱藏刪除鈕
        }

        async function apiPost(data) {
            data.key = adminKey;
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.result === "SUCCESS") { alert("操作成功"); fetchData(); }
                else alert("錯誤: " + result.message);
            } catch (e) { alert("網路通訊錯誤"); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                cachedData = await res.json();
                renderAll();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            if (!cachedData) return;
            document.getElementById('input-news').value = cachedData.news || "";
            document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
            document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";
            
            renderMembers(cachedData.users || []);
            renderEvents(cachedData.calendar || []);
            renderPayment(cachedData.users || []);
            renderStats(cachedData.users || [], cachedData.calendar || []);
        }

        function renderMembers(users) {
            const list = document.getElementById('memberList');
            list.innerHTML = users.map(u => `
                <div class="bg-white p-5 rounded-3xl border flex justify-between items-center">
                    <div><div class="font-bold text-emerald-900">${u.name}</div><div class="text-[10px] text-gray-400 font-mono">${u.phone}</div></div>
                    <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 hidden show-on-edit"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            list.innerHTML = [...events].reverse().map(ev => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center border">
                    <div><div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div><div class="text-emerald-900 font-bold text-sm">${ev.title}</div></div>
                    <div class="flex items-center space-x-2">
                        <button onclick="showQR('${ev.dateText}', '${ev.title}')" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold">QR</button>
                        <button onclick="deleteEvent('${ev.dateText}')" class="text-gray-300 hover:text-red-500 hidden show-on-edit"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderPayment(users) {
            const list = document.getElementById('paymentList');
            list.innerHTML = users.map(u => `
                <tr class="border-b">
                    <td class="p-4 font-bold text-emerald-900">${u.name}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-[10px] font-bold ${u.isPaid==='是'?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-500'}">${u.isPaid==='是'?'已繳費':'未繳費'}</span></td>
                    <td class="p-4"><button onclick="togglePayment('${u.phone}', '${u.isPaid}')" class="text-xs text-blue-500 font-bold">切換狀態</button></td>
                </tr>
            `).join('');
        }

        function renderStats(users, events) {
            const list = document.getElementById('statsContent');
            const pastEvents = events.filter(e => e.dateText <= new Date().toISOString().split('T')[0]);
            list.innerHTML = users.map(u => {
                const logs = u.attendLog.map(l => l.split('T')[0]);
                const count = pastEvents.filter(e => logs.includes(e.dateText)).length;
                const percent = pastEvents.length ? Math.round(count/pastEvents.length*100) : 0;
                return `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                    <span class="font-bold text-emerald-900">${u.name}</span>
                    <span class="text-xs font-bold text-orange-600">${count} 次 (${percent}%)</span>
                </div>`;
            }).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // API 呼叫函式
        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveSystemConfig() { 
            apiPost({ type: "update_config", reading_folder_url: document.getElementById('conf-reading').value, photo_gallery_url: document.getElementById('conf-photo').value }); 
        }
        function addMember() { apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value, password: "123" }); }
        function deleteMember(phone) { if(confirm("確定刪除會員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function addEvent() { apiPost({ type: "add_event", date: document.getElementById('calDate').value, title: document.getElementById('calTitle').value }); }
        function deleteEvent(date) { if(confirm("確定刪除活動？")) apiPost({ type: "delete_event", date: date }); }
        function togglePayment(phone, current) { apiPost({ type: "update_paid_status", phone: phone, newStatus: current==='是'?'否':'是' }); }

        function showQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180 });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
