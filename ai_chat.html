<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家</title>
    <script src="https://cdn.jsdelivr.net/npm/@coze/api@1.0.21/dist/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        async function fetchToken() {
            try {
                // 您的 Worker 已經確認沒問題，這裡保持不變
                const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
                const data = await response.json();
                return data.token;
            } catch (error) {
                console.error("領取 Token 失敗:", error);
            }
        }

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // JSDelivr 版本的 SDK 名稱通常為 CozeWebChat
            const CozeSDK = window.CozeWebChat;

            if (CozeSDK) {
                new CozeSDK.Client({
                    config: { 
                        bot_id: '7620394792719499317' 
                    },
                    componentProps: {
                        title: '築心智慧管家',
                        layout: 'pc',
                        initial_variables: {
                            user_name: urlParams.get('user_name') || '訪客',
                            user_phone: urlParams.get('user_phone') || ''
                        }
                    },
                    auth: {
                        type: "token",
                        getAccessToken: fetchToken 
                    },
                    el: document.getElementById('chat-container'),
                });
            } else {
                document.body.innerHTML = "<h2 style='padding:20px;'>連線優化中，請稍候並重新整理...</h2>";
            }
        });
    </script>
</body>
</html>
