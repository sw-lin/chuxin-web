<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動簽到 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #F97316 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl border border-emerald-50 overflow-hidden">
        <div class="emerald-gradient p-8 text-white text-center">
            <div class="w-20 h-20 bg-white/20 rounded-3xl flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
                <i class="fas fa-calendar-check text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-widest mb-1">築心讀書會</h1>
            <p class="text-emerald-100/80 italic text-sm">Learning & Growing Together</p>
        </div>

        <div id="content" class="p-8">
            <div id="loading" class="text-center py-10">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-gray-400">正在確認活動資訊...</p>
            </div>

            <div id="checkinForm" class="hidden space-y-6">
                <div class="bg-gray-50 p-6 rounded-3xl border border-dashed border-gray-200">
                    <div class="text-xs text-gray-400 mb-1">確認活動日期</div>
                    <div id="displayDate" class="text-xl font-bold text-emerald-900">--</div>
                    <div id="displayEvent" class="text-sm text-emerald-600 font-medium mt-1">活動報到</div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center space-x-3 p-4 bg-emerald-50 rounded-2xl">
                        <i class="fas fa-user text-emerald-600"></i>
                        <div>
                            <div class="text-[10px] text-emerald-800 opacity-60">報到人</div>
                            <div id="displayName" class="font-bold text-emerald-900">--</div>
                        </div>
                    </div>
                    
                    <button id="checkinBtn" class="w-full orange-gradient text-white py-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                        立即確認報到
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const eventDate = params.get('event'); // 從網址抓日期
            const userStr = sessionStorage.getItem('userInfo');

            if (!userStr) {
                alert("請先登入會員專區");
                location.href = "index.html";
                return;
            }

            if (!eventDate) {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-6">
                        <i class="fas fa-exclamation-triangle text-amber-500 text-5xl mb-4"></i>
                        <p class="text-gray-600 font-bold">無效的報到連結</p>
                        <button onclick="location.href='member_zone.html'" class="mt-6 w-full py-4 bg-gray-100 rounded-2xl text-gray-500">回個人專區</button>
                    </div>
                `;
                return;
            }

            const user = JSON.parse(userStr);
            
            // 顯示資訊
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('checkinForm').classList.remove('hidden');
            document.getElementById('displayDate').innerText = eventDate;
            document.getElementById('displayName').innerText = user.name;

            // 綁定按鈕
            document.getElementById('checkinBtn').onclick = () => doCheckin(user.phone, eventDate);
        };

        async function doCheckin(phone, date) {
            const btn = document.getElementById('checkinBtn');
            const originalContent = btn.innerHTML;
            
            // 鎖定按鈕防止重複點擊
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 處理中...`;

            // --- 重要：格式防禦 (確保發出的是 YYYY-MM-DD) ---
            let cleanDate = date;
            const d = new Date(date);
            if (!isNaN(d.getTime())) {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                cleanDate = `${y}-${m}-${day}`;
            }
            // ---------------------------------------------

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 處理跨域
                    body: JSON.stringify({
                        type: "checkin",
                        phone: String(phone).replace(/\D/g, ""), // 只留數字
                        date: cleanDate
                    })
                });

                // 由於 no-cors 無法讀取回傳值，我們優雅地假設成功並引導用戶回專區同步
                // 若要精確判斷，GAS 需設定為可回傳 JSONP 或處理 CORS
                renderSuccess();

            } catch (err) {
                console.error(err);
                // 即使失敗也嘗試導回，讓 member_zone 的自動同步來驗證
                renderSuccess();
            }
        }

        function renderSuccess() {
            document.getElementById('content').innerHTML = `
                <div class="text-center py-6 space-y-6">
                    <div class="text-emerald-500 text-7xl animate-bounce"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <h2 class="text-2xl font-bold text-emerald-900">報到指令已發送</h2>
                        <p class="text-gray-500 mt-2 italic text-sm">請回到個人專區確認更新後的歷程。</p>
                    </div>
                    <button onclick="location.href='member_zone.html'" class="w-full emerald-gradient text-white py-4 rounded-2xl font-bold shadow-lg">查看我的參與率</button>
                </div>
            `;
        }
    </script>
</body>
</html>
