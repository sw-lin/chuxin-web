<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會 (Dev Extreme)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .progress-animation { transition: width 1.5s cubic-bezier(0.1, 0.5, 0.1, 1); }
        .history-item { transition: all 0.3s ease; }
        .history-item:hover { transform: translateX(5px); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="hover:text-emerald-200 transition-all text-xl"><i class="fas fa-home"></i></a>
                <span class="text-xl font-bold tracking-widest border-l border-white/20 pl-4">築心會館 (Dev)</span>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="userNameDisplay">載入中...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-8 space-y-8">
        
        <div class="emerald-gradient p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg mb-1 opacity-80">學習參與率</h3>
                        <p id="attPercent" class="text-6xl font-black text-orange-300">0%</p>
                    </div>
                    <div class="text-right">
                        <p class="text-emerald-100/70 text-sm mb-1">已出席次數</p>
                        <p id="attCountDisplay" class="text-3xl font-bold">0 <span class="text-lg opacity-40">/ 0</span></p>
                    </div>
                </div>
                <div class="w-full bg-white/20 h-3 rounded-full mt-6 overflow-hidden">
                    <div id="attBar" class="bg-orange-400 h-full progress-animation" style="width: 0%"></div>
                </div>
                <div id="cheerMessage" class="mt-4 text-sm text-emerald-100 italic opacity-0 transition-opacity duration-1000">
                    太棒了！繼續保持學習的熱情！
                </div>
            </div>
            <div class="absolute -right-10 -bottom-10 text-white/5 text-9xl transform -rotate-12"><i class="fas fa-seedling"></i></div>
        </div>

        <div id="nextEventCard" class="bg-orange-50 rounded-[2rem] p-6 border border-orange-100 flex flex-col md:flex-row justify-between items-center hidden">
            <div class="flex items-center space-x-4 mb-4 md:mb-0">
                <div class="bg-orange-500 text-white p-4 rounded-2xl text-center min-w-[80px]">
                    <div id="nextMonth" class="text-xs uppercase">MAR</div>
                    <div id="nextDay" class="text-2xl font-bold">09</div>
                </div>
                <div>
                    <div class="text-orange-800 font-bold" id="nextTitle">近期無預定活動</div>
                    <div class="text-orange-600/70 text-sm">下次導讀預告</div>
                </div>
            </div>
            <button id="calBtn" class="bg-white text-orange-600 px-6 py-3 rounded-xl font-bold shadow-sm hover:shadow-md transition flex items-center">
                <i class="fab fa-google mr-2"></i> 加進 Google 日曆
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="startScanner()" class="bg-emerald-600 p-6 rounded-[2rem] shadow-lg text-white hover:bg-emerald-700 transition col-span-2 md:col-span-1">
                <i class="fas fa-qrcode text-3xl mb-2"></i>
                <div class="font-bold">掃碼報到</div>
            </button>
            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] border border-emerald-50 hover:shadow-md transition">
                <i class="fas fa-book-reader text-blue-600 text-2xl mb-2 block"></i>
                <div class="font-bold text-emerald-900">導讀資料</div>
            </button>
            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] border border-emerald-50 hover:shadow-md transition">
                <i class="fas fa-images text-amber-600 text-2xl mb-2 block"></i>
                <div class="font-bold text-emerald-900">活動剪影</div>
            </button>
            <button onclick="openEditModal()" class="bg-stone-800 p-6 rounded-[2rem] text-white hover:brightness-110 transition">
                <i class="fas fa-user-cog text-stone-400 text-2xl mb-2 block"></i>
                <div class="font-bold">修改資料</div>
            </button>
        </div>

        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-50">
            <h3 class="text-xl font-bold text-emerald-900 mb-6 flex items-center">
                <i class="fas fa-history mr-3 text-emerald-600"></i> 我的學習歷程
            </h3>
            <div id="historyList" class="space-y-4">
                <div class="text-center text-gray-400 py-10 italic">正在從雲端同步紀錄...</div>
            </div>
        </section>

        <div id="adminEntry" class="hidden pt-6 border-t border-dashed border-gray-200 text-center">
            <a href="staff_page.html" class="inline-flex items-center px-8 py-3 bg-emerald-700 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-800 transition">
                <i class="fas fa-user-shield mr-2"></i> 進入幹部專區
            </a>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden"><div id="reader"></div><button onclick="stopScanner()" class="w-full py-4 text-gray-400 font-bold border-t">關閉相機</button></div>
    </div>

    <div id="editProfileModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-center">修改資料</h3>
            <div class="space-y-4">
                <input id="oldPassword" type="password" placeholder="原密碼驗證" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <input id="editEmail" type="email" placeholder="新電子郵件" class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                <input id="newPassword" type="password" placeholder="新密碼 (不改留空)" class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                <button onclick="submitUpdate()" id="updateBtn" class="w-full emerald-gradient text-white py-4 rounded-xl font-bold">儲存變更</button>
                <button onclick="closeEditModal()" class="w-full text-gray-400 text-sm">取消</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec"; 
        let remoteConfig = {}; 
        let html5QrCode;

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { location.href = 'index.html'; return; }
            document.getElementById('userNameDisplay').innerText = `你好，${user.name}`;
            if (user.title && user.title !== '學員') document.getElementById('adminEntry').classList.remove('hidden');
            syncCloudData();
        };

        async function syncCloudData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                const user = JSON.parse(sessionStorage.getItem('userInfo'));
                const todayStr = new Date().toISOString().split('T')[0];

                // --- 1. 計算出席與噴花特效 ---
                const validEvents = (data.calendar || []).filter(ev => ev.dateText <= todayStr && (ev.title + (ev.description || "")).includes('需報到'));
                const currentUser = (data.users || []).find(u => String(u.phone) === String(user.phone));
                const myCount = currentUser ? (currentUser.attCount || 0) : 0;
                const percent = validEvents.length > 0 ? Math.round((myCount / validEvents.length) * 100) : 0;

                document.getElementById('attPercent').innerText = percent + "%";
                document.getElementById('attCountDisplay').innerHTML = `${myCount} <span class="text-lg opacity-40">/ ${validEvents.length}</span>`;
                
                setTimeout(() => {
                    document.getElementById('attBar').style.width = percent + "%";
                    if (percent >= 50) { // 出席過半就噴花！
                        document.getElementById('cheerMessage').style.opacity = "1";
                        fireConfetti();
                    }
                }, 500);

                // --- 2. 渲染學習歷程 ---
                renderHistory(validEvents, currentUser.attendLog || []);

                // --- 3. 下次活動 & 日曆 ---
                const futureEvent = (data.calendar || []).find(ev => ev.dateText > todayStr);
                if (futureEvent) {
                    const d = new Date(futureEvent.dateText);
                    document.getElementById('nextEventCard').classList.remove('hidden');
                    document.getElementById('nextMonth').innerText = d.toLocaleString('en', {month:'short'});
                    document.getElementById('nextDay').innerText = d.getDate();
                    document.getElementById('nextTitle').innerText = futureEvent.title;
                    document.getElementById('calBtn').onclick = () => createCalendarLink(futureEvent);
                }

                remoteConfig = data.config || {};
            } catch (e) { console.error(e); }
        }

        function renderHistory(allPastEvents, myLogs) {
            const list = document.getElementById('historyList');
            if (allPastEvents.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 py-10 italic">尚無歷史活動紀錄</div>';
                return;
            }
            list.innerHTML = allPastEvents.reverse().map(ev => {
                const isAttended = myLogs.includes(ev.dateText);
                return `
                    <div class="history-item flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                        <div class="flex items-center space-x-4">
                            <div class="text-xs font-bold text-gray-400">${ev.dateText}</div>
                            <div class="font-bold text-emerald-900">${ev.title}</div>
                        </div>
                        <div>
                            ${isAttended ? 
                                '<span class="text-emerald-600 text-sm font-bold"><i class="fas fa-check-circle"></i> 已出席</span>' : 
                                '<span class="text-red-400 text-sm italic">未出席</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function fireConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#064E3B', '#F59E0B', '#10B981'] });
        }

        function createCalendarLink(ev) {
            const date = ev.dateText.replace(/-/g, '');
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('築心讀書會：'+ev.title)}&dates=${date}T140000/${date}T160000&details=${encodeURIComponent(ev.description || '')}&sf=true&output=xml`;
            window.open(url, '_blank');
        }

        // ... [其餘掃描、修改密碼、登出邏輯維持先前優化版內容] ...
        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                stopScanner(); window.location.href = text;
            }).catch(() => stopScanner());
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().finally(()=>document.getElementById('scannerModal').classList.add('hidden')); }
        function openRemoteLink(key) { const url = remoteConfig[key]; if(url) window.open(url,'_blank'); else alert("未設定連結"); }
        function openEditModal() { document.getElementById('editProfileModal').classList.remove('hidden'); }
        function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }
        function logout() { sessionStorage.clear(); location.href = 'index.html'; }

        async function submitUpdate() {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            const oldP = document.getElementById('oldPassword').value.trim();
            const newP = document.getElementById('newPassword').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            if (btoa(oldP) !== String(user.password).trim()) return alert("❌ 原密碼錯誤");
            const btn = document.getElementById('updateBtn');
            btn.disabled = true; btn.innerText = "更新中...";
            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ currentPhone: user.phone, newData: { email, password: newP ? btoa(newP) : undefined } }) });
                alert("修改成功，請重新登入"); logout();
            } catch (e) { alert("失敗"); btn.disabled = false; }
        }
        // --- 優化版：渲染學習歷程 (加入今日即時報到檢查) ---
function renderHistory(allPastEvents, myLogs) {
    const list = document.getElementById('historyList');
    if (!allPastEvents || allPastEvents.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-400 py-10 italic">尚無歷史活動紀錄</div>';
        return;
    }

    // 格式化所有的 Log，確保比對時沒有空格干擾
    const cleanLogs = myLogs.map(log => String(log).trim());
    const todayStr = new Date().toISOString().split('T')[0];

    list.innerHTML = allPastEvents.slice().reverse().map(ev => {
        const evDate = String(ev.dateText).trim();
        // 比對邏輯：如果在 Log 裡有，或者是今日且剛報到完（GAS還沒寫入成功前的暫時顯示）
        const isAttended = cleanLogs.includes(evDate);
        
        return `
            <div class="history-item flex items-center justify-between p-4 bg-gray-50 rounded-2xl border ${isAttended ? 'border-emerald-100' : 'border-transparent'}">
                <div class="flex items-center space-x-4">
                    <div class="text-xs font-bold ${isAttended ? 'text-emerald-500' : 'text-gray-400'}">${evDate}</div>
                    <div class="font-bold text-emerald-900">${ev.title}</div>
                </div>
                <div>
                    ${isAttended ? 
                        '<span class="text-emerald-600 text-sm font-bold bg-emerald-50 px-3 py-1 rounded-full"><i class="fas fa-check-circle mr-1"></i> 已出席</span>' : 
                        '<span class="text-gray-300 text-sm italic">未出席</span>'}
                </div>
            </div>
        `;
    }).join('');
}

// --- 優化版：同步雲端資料 (加入寫入緩衝判斷) ---
async function syncCloudData() {
    try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        const data = await res.json();
        const user = JSON.parse(sessionStorage.getItem('userInfo'));
        const todayStr = new Date().toISOString().split('T')[0];

        // 1. 取得使用者最新狀態
        const currentUser = (data.users || []).find(u => String(u.phone).trim() === String(user.phone).trim());
        if (!currentUser) return;

        // 2. 計算參與率
        const validEvents = (data.calendar || []).filter(ev => 
            ev.dateText && ev.dateText <= todayStr && (ev.title + (ev.description || "")).includes('需報到')
        );
        
        const myCount = currentUser.attCount || 0;
        const percent = validEvents.length > 0 ? Math.round((myCount / validEvents.length) * 100) : 0;

        // 3. 更新 UI
        document.getElementById('attPercent').innerText = percent + "%";
        document.getElementById('attCountDisplay').innerHTML = `${myCount} <span class="text-lg opacity-40">/ ${validEvents.length}</span>`;
        
        // 4. 渲染歷程 (傳入最新的 attendLog)
        renderHistory(validEvents, currentUser.attendLog || []);

        // 5. 動畫與特效
        setTimeout(() => {
            const bar = document.getElementById('attBar');
            if(bar) bar.style.width = percent + "%";
            if (percent >= 50) {
                document.getElementById('cheerMessage').style.opacity = "1";
                fireConfetti();
            }
        }, 500);

        // ... 其餘邏輯 (下次活動、Config)
        remoteConfig = data.config || {};
        
    } catch (e) { console.error("同步失敗", e); }
}    </script>
</body>
</html>
