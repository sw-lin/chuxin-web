<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家 - 會員專屬服務</title>
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.0.1-beta.0/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: sans-serif; overflow: hidden; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="chat-container"></div>

<script>
    function initCoze() {
        // 增加一個防護判斷，看看 SDK 到底掛在哪個名稱下
        const SDK = window.CozeWebSDK || (window.Coze && window.Coze.WebChatClient);
        
        if (!SDK) {
            console.error('Coze SDK 尚未就緒');
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('user_name') || '訪客';
        const userPhone = urlParams.get('user_phone') || '未提供';

        new SDK.WebChatClient({
            config: {
                bot_id: '7620394792719499317', 
            },
            componentProps: {
                title: '築心智慧管家',
                layout: 'window', 
                initial_variables: {
                    user_name: userName,
                    user_phone: userPhone
                }
            },
            el: document.getElementById('chat-container'),
        });
    }

    window.addEventListener('load', initCoze);
</script>

</body>
</html>
