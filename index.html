<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-4 md:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-700 text-xl"></i>
            <span class="text-lg md:text-xl font-bold text-emerald-900">築心讀書會</span>
        </div>
    </nav>

    <div class="relative overflow-hidden bg-emerald-900">
        <div class="hero-gradient absolute inset-0 z-10"></div>
        <div class="slideshow-container">
            <img class="slide" src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&q=80" style="display:block;">
        </div>
        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center text-white p-6 text-center">
            <h2 class="text-3xl md:text-5xl font-bold mb-4 tracking-widest">在共讀中築心</h2>
            <p class="text-lg md:text-xl opacity-90 italic">於陪伴中成長</p>
        </div>
    </div>

    <section id="login-section" class="py-20 px-6">
        <div class="max-w-md mx-auto bg-white rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-emerald-100">
            <h3 class="text-2xl font-bold text-emerald-900 mb-8 text-center">會員登入</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">手機號碼</label>
                    <input id="userPhone" type="tel" placeholder="0912345678" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">登入密碼</label>
                    <input id="userPass" type="password" placeholder="請輸入密碼" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
                </div>
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-900 transition shadow-lg">進入會館</button>
            </div>
        </div>
    </section>

    <script>
        // 確認此網址與您的 GAS 部署網址一致
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        function toHalfWidth(str) {
            if (!str) return "";
            return str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "");
        }

        async function handleLogin() {
            const rawPhone = document.getElementById('userPhone').value;
            const p = document.getElementById('userPass').value.trim();
            const u = toHalfWidth(rawPhone);

            if(!u || !p) return alert('請填寫完整資訊');
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; 
            btn.innerText = '正在登入...';
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'login', phone: u, password: p })
                });
                
                const result = await res.json();

                if (result.result === "SUCCESS") {
                    const userInfo = {
                        ...result,
                        phone: u  // 重要：存入手機號碼供 member_zone 比對
                    };
                    sessionStorage.setItem('userInfo', JSON.stringify(userInfo));
                    window.location.href = 'member_zone.html';
                } else {
                    alert(result === "WRONG_PASSWORD" ? "密碼錯誤" : "找不到帳號");
                }
            } catch (e) {
                console.error("Login Error:", e);
                alert("連線失敗，請檢查網路或確認 GAS 網址正確且已發布為「所有人」。");
            } finally {
                btn.disabled = false;
                btn.innerText = '進入會館';
            }
        }

        // 自動輪播簡單邏輯
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            if (slides.length === 0) return;
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 4000);
        }
        window.onload = showSlides;
    </script>
</body>
</html>
