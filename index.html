<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold text-emerald-900 tracking-tighter">築心讀書會</div>
        <div class="hidden md:flex space-x-6 items-center font-bold text-gray-600">
            <a href="about.html" class="hover:text-emerald-800 transition">關於我們</a>
            <a href="about.html#join" class="hover:text-emerald-800 transition border-x px-4 border-gray-200">入會報名</a>
            <button onclick="toggleModal('loginModal', true)" class="bg-emerald-800 text-white px-5 py-2 rounded-full text-sm shadow-md hover:bg-emerald-700 transition">會員登入</button>
        </div>
        <button onclick="toggleModal('loginModal', true)" class="md:hidden bg-emerald-800 text-white p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-user text-xs"></i></button>
    </nav>

    <div class="relative w-full h-[500px] overflow-hidden bg-emerald-900">
        <img class="slide" src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=1200">
        <img class="slide" src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200">
        <div class="absolute inset-0 hero-gradient flex flex-col items-center justify-center text-white text-center px-6">
            <h1 class="text-4xl md:text-6xl font-bold tracking-[0.3em] mb-4">在共讀中築心</h1>
            <p class="text-emerald-100 text-lg md:text-xl tracking-widest font-light italic">Building the heart through shared reading.</p>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative text-center">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 right-8 text-gray-300 hover:text-gray-500 text-2xl">&times;</button>
            <h3 class="text-2xl font-bold text-emerald-900 mb-6">會員專區登入</h3>
            <div class="space-y-4">
                <input id="u" type="tel" placeholder="手機號碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <input id="p" type="password" placeholder="登入密碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition shadow-lg">進入專區</button>
            </div>
            <p id="loginStatus" class="text-xs mt-4 text-gray-400 min-h-[1rem]"></p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        async function handleLogin() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('loginStatus');

            if(!u || !p) { alert("請輸入手機號碼與密碼"); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 驗證中...';
            status.innerText = "正在連線至築心資料庫...";

            try {
                const response = await fetch(GAS_URL + "?t=" + Date.now());
                const data = await response.json();
                
                // 【核心修正】：將輸入密碼轉為 Base64 與資料庫比對
                const encryptedInputP = btoa(p); 

                const foundUser = data.users.find(user => 
                    String(user.phone).trim() === u && 
                    String(user.password).trim() === encryptedInputP
                );

                if (foundUser) {
                    // 存入 Session 時，存入原始密碼 p 以利 member_zone 修改資料驗證
                    sessionStorage.setItem('userInfo', JSON.stringify({ ...foundUser, password: p }));
                    window.location.href = 'member_zone.html';
                } else {
                    alert('❌ 手機號碼或密碼錯誤');
                    btn.disabled = false;
                    btn.innerText = "進入專區";
                    status.innerText = "";
                }
            } catch (err) {
                alert('連線失敗，請檢查網路。');
                btn.disabled = false;
                btn.innerText = "進入專區";
            }
        }

        // 輪播圖邏輯
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 5000);
        }
        showSlides();
    </script>
</body>
</html>
