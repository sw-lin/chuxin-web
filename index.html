<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
    </style>
</head>
<body class="bg-[#FDFBF7]">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-leaf text-emerald-700 text-xl"></i>
                <span class="text-xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
            </div>
        </div>
    </nav>

    <header class="relative pt-16">
        <div class="slideshow-container relative overflow-hidden">
            <img class="slide" src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&q=80">
            <img class="slide" src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80">
            <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center">
                <h1 class="text-4xl text-white font-bold">在文字中漫步，在共讀中築心</h1>
            </div>
        </div>
    </header>

    <section id="login" class="py-20 px-6">
        <div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border border-emerald-50">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-emerald-900">會員登入</h2>
                <p class="text-gray-400 text-sm mt-2">請輸入您的手機與密碼</p>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-emerald-800 mb-2">手機號碼</label>
                    <input type="tel" id="login-phone" placeholder="0912345678" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-800 mb-2">登入密碼</label>
                    <input type="password" id="login-pwd" placeholder="預設為 123" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-emerald-800 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 transition-all">進入會館</button>
            </div>
        </div>
    </section>

    <script>
        // 確認與您的 GAS 部署網址一致
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        async function handleLogin() {
            const u = document.getElementById('login-phone').value.trim();
            const p = document.getElementById('login-pwd').value.trim();

            if(!u || !p) {
                alert('請輸入電話與密碼');
                return;
            }

            const btn = document.querySelector('button[onclick="handleLogin()"]');
            btn.innerText = "驗證中...";
            btn.disabled = true;

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'login', phone: u, password: p })
                });
                const result = await response.json();

                if (result.result === "SUCCESS") {
                    // 這裡我已經把括號和屬性對齊好了
                    const userInfo = {
                        result: "SUCCESS",
                        name: result.name,
                        role: result.role,
                        phone: u 
                    };
                    sessionStorage.setItem('userInfo', JSON.stringify(userInfo));
                    window.location.href = 'member_zone.html';
                } else {
                    alert(result === "WRONG_PASSWORD" ? "密碼錯誤" : "找不到此帳號");
                }
            } catch (e) {
                console.error(e);
                alert("連線失敗：請確保您的 GAS 已經完成「部署」並設為「所有人」皆可存取。");
            } finally {
                btn.innerText = "進入會館";
                btn.disabled = false;
            }
        }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 4000);
        }
        window.onload = showSlides;
    </script>
</body>
</html>
