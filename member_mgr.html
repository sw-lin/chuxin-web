<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員名冊管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 28px; border-radius: 50px; font-size: 14px; z-index: 10000; transition: opacity 0.5s; pointer-events: none; }
        
        /* 展開動畫樣式 */
        .detail-section { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; opacity: 0; }
        .card-active .detail-section { max-height: 200px; opacity: 1; padding-top: 1rem; margin-top: 1rem; border-top: 1px dashed #e5e7eb; }
        .card-active { border-color: #059669 !important; ring: 2px; ring-color: #059669; }
        .rotate-icon { transition: transform 0.3s; }
        .card-active .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="min-h-screen pb-32">

    <div id="loadingOverlay"><div class="loading-card"><div class="spinner"></div><div class="text-emerald-900 font-bold">同步中...</div></div></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="window.location.href='staff_menu.html'" class="text-sm font-bold"><i class="fas fa-chevron-left mr-1"></i>返回</button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2">會員名冊管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20">開啟編輯</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-xs font-bold text-emerald-900/60 uppercase tracking-widest">Member Directory</h2>
            <span id="memberCount" class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">0 位成員</span>
        </div>
        <div id="memberList" class="space-y-4"></div>
    </main>

    <div id="bottomAddArea" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-6 hidden z-30">
        <button onclick="openModal('addMemberModal')" class="w-full py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
            <i class="fas fa-user-plus text-xl"></i> 新增新會員
        </button>
    </div>

    <div id="addMemberModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6" onclick="closeModal('addMemberModal')">
        <div class="bg-white w-full max-sm:max-w-xs rounded-[2.5rem] p-8 shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black text-emerald-900 mb-6 text-center">新增新會員</h3>
            <div class="space-y-4">
                <input type="text" id="newName" placeholder="會員姓名" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500">
                <input type="tel" id="newPhone" placeholder="手機號碼 (帳號)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold font-mono">
                <input type="email" id="newEmail" placeholder="電子郵件 Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                
                <select id="newRole" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-gray-500 appearance-none">
                    <option value="">-- 選擇職位 (可不選) --</option>
                    <option value="會長">會長</option>
                    <option value="副會長">副會長</option>
                    <option value="班務">班務</option>
                    <option value="文書">文書</option>
                    <option value="財務">財務</option>
                    <option value="資訊圖書">資訊圖書</option>
                    <option value="企劃">企劃</option>
                    <option value="活動">活動</option>
                    
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('addMemberModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitAddMember()" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black">確認新增</button>
            </div>
        </div>
    </div>

    <script>
        var u1 = 'https://script.google.com';
        var u2 = '/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        var GAS_URL = u1 + u2;
        
        var STAFF_KEY = sessionStorage.getItem('staff_key');
        var isEditMode = false;

        window.onload = function() {
            if (!STAFF_KEY) { 
                alert("請重新從管理區登入以驗證權限");
                window.location.href = "index.html"; 
                return; 
            }
            loadMembers();
        };

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

        // 會員列表渲染：加入點擊展開詳細資訊功能
        function loadMembers() {
            toggleLoading(true);
            fetch(GAS_URL + "?t=" + Date.now())
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var list = document.getElementById('memberList');
                    var users = data.users || [];
                    document.getElementById('memberCount').innerText = users.length + ' 位成員';
                    
                    var html = '';
                    for (var i = 0; i < users.length; i++) {
                        var u = users[i];
                        var p = String(u.phone).startsWith('0') ? u.phone : '0' + u.phone;
                        
                        // 卡片主容器
                        html += '<div id="card-'+u.phone+'" onclick="toggleCard(this)" class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 transition-all cursor-pointer hover:border-emerald-200 active:scale-[0.98]">';
                        
                        // 頂部資訊列：改為 justify-between 確保姓名靠左、電話靠右
                        html += '  <div class="flex justify-between items-center w-full">';
                        
                        // 左側：姓名與職位 (設定固定最大寬度，避免推擠電話)
                        html += '    <div class="flex items-center gap-2 overflow-hidden mr-4">';
                        html += '      <span class="text-lg font-black text-emerald-900 truncate">' + u.name + '</span>';
                        if(u.role) {
                            html += '      <span class="text-[10px] font-black bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full shrink-0">' + u.role + '</span>';
                        }
                        html += '    </div>';
                        
                        // 右側：電話 (字體大小 text-lg，與姓名一致)
                        html += '    <div class="flex items-center gap-3 shrink-0">';
                        html += '      <div class="text-lg font-black text-emerald-800 font-mono">' + p + '</div>';
                        if (isEditMode) {
                            html += '      <button onclick="event.stopPropagation(); deleteMember(\''+u.phone+'\', \''+u.name+'\')" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full active:scale-90 transition-all"><i class="fas fa-trash-alt text-sm"></i></button>';
                        } else {
                            html += '      <i class="fas fa-chevron-down text-gray-300 rotate-icon"></i>';
                        }
                        html += '    </div>';
                        
                        html += '  </div>';

                        // 展開的詳細資訊區塊 (維持原樣)
                        html += '  <div class="detail-section">';
                        html += '    <div class="grid grid-cols-1 gap-3">';
                        html += '      <div class="flex items-center gap-2 text-xs">';
                        html += '        <span class="w-16 text-gray-400 font-bold shrink-0">電子郵件</span>';
                        html += '        <span class="text-emerald-900 font-medium truncate">' + (u.email || "未提供") + '</span>';
                        html += '      </div>';
                        html += '      <div class="flex items-center gap-2 text-xs">';
                        html += '        <span class="w-16 text-gray-400 font-bold shrink-0">入會日期</span>';
                        html += '        <span class="text-emerald-900 font-medium">' + (u.joinDate || "系統移轉前會員") + '</span>';
                        html += '      </div>';
                        html += '      <div class="flex items-start gap-2 text-xs">';
                        html += '        <span class="w-16 text-gray-400 font-bold shrink-0">備註事項</span>';
                        html += '        <span class="text-emerald-900 font-medium leading-relaxed">' + (u.note || "無") + '</span>';
                        html += '      </div>';
                        html += '    </div>';
                        html += '  </div>';

                        html += '</div>';
                    }
                    list.innerHTML = html;
                })
                .catch(function() { showToast("連線失敗"); })
                .finally(function() { toggleLoading(false); });
        }
        // 切換卡片展開狀態
        function toggleCard(el) {
            // 如果在編輯模式，不觸發展開（為了方便點擊刪除按鈕）
            if(isEditMode) return;
            
            // 檢查是否點擊到按鈕本身（雖然有 stopPropagation，但這是雙重保險）
            if (event.target.closest('button')) return;

            // 先把其他已經展開的縮回去 (選擇性功能，想要一次展開多個可以把這段刪掉)
            /*
            document.querySelectorAll('.card-active').forEach(c => {
                if(c !== el) c.classList.remove('card-active');
            });
            */

            el.classList.toggle('card-active');
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            var btn = document.getElementById('editToggleBtn');
            btn.innerText = isEditMode ? "結束編輯" : "開啟編輯";
            btn.className = isEditMode ? "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md" : "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
            document.getElementById('bottomAddArea').classList.toggle('hidden', !isEditMode);
            loadMembers();
        }

        function submitAddMember() {
            var n = document.getElementById('newName').value.trim();
            var p = document.getElementById('newPhone').value.trim();
            var e = document.getElementById('newEmail').value.trim();
            var r = document.getElementById('newRole').value; // 獲取職位
            
            if (!n || !p) return alert("姓名與手機為必填");

            closeModal('addMemberModal');
            toggleLoading(true);

            var payload = { 
                type: 'add_member', 
                key: STAFF_KEY, 
                name: n, 
                phone: p, 
                email: e, 
                password: '123', 
                role: r, 
                joinDate: new Date().toISOString().split('T')[0] // 自動代入今日日期
            };
            
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(function(res) { return res.json(); })
                .then(function(res) { 
                    if(res.result === "SUCCESS") {
                        showToast("✅ 會員 " + n + " 已新增"); 
                        // 清空欄位
                        document.getElementById('newName').value = '';
                        document.getElementById('newPhone').value = '';
                        document.getElementById('newEmail').value = '';
                        document.getElementById('newRole').value = '';
                        loadMembers(); 
                    } else {
                        showToast("❌ 新增失敗：" + res.message);
                    }
                })
                .catch(function() { showToast("網路異常"); })
                .finally(function() { toggleLoading(false); });
        }

        function deleteMember(phone, name) {
            if (!confirm("確定要刪除「" + name + "」嗎？此動作無法復原。")) return;
            toggleLoading(true);
            var payload = { type: 'delete_member', key: STAFF_KEY, phone: phone };
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(function() { showToast("🗑️ 已移除成員"); loadMembers(); })
                .catch(function() { showToast("網路錯誤"); })
                .finally(function() { toggleLoading(false); });
        }

        function showToast(m) {
            var t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.body.appendChild(t);
            setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 500); }, 2500);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
