<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>築心智慧管家 - 注入測試版</title>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/oversea/index.js"></script>
    <style>
        #chat-container { width: 100vw; height: 100vh; }
        /* 💡 可選：隱藏第一條系統發出的訊息（如果 SDK 支援 DOM 操作） */
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        async function fetchToken() {
            const response = await fetch("https://hello-world-broad-cake-8477.swearlin.workers.dev/get-token");
            const data = await response.json();
            return data.token;
        }

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const ChatClient = window.CozeWebChat?.Client || window.CozeWebSDK?.WebChatClient;

            if (ChatClient) {
                const client = new ChatClient({
                    config: { bot_id: '7620394792719499317' },
                    // 🎯 使用隨機 ID 徹底切斷「林士偉」的舊記憶存檔
                    user: 'visitor_' + Math.random().toString(36).substr(2, 9),
                    auth: { type: "token", onRefreshToken: fetchToken },
                    el: document.getElementById('chat-container'),
                });

                // 🚀 核心：SDK 準備好後立即「代客發言」
                client.on('ready', () => {
                    const name = urlParams.get('user_name');
                    const phone = urlParams.get('user_phone');

                    if (name || phone) {
                        // 這裡不使用 variables 欄位，直接發送文字訊息
                        client.send(`[系統注入] 我的姓名是：${name || '未知'}，電話是：${phone || '未知'}。請確認收到並以此開始對話。`);
                        console.log("已執行指令注入：", { name, phone });
                    }
                });
            }
        });
    </script>
</body>
</html>
