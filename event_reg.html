<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 10000; pointer-events: none; }
    </style>
</head>
<body class="pb-32">
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-emerald-500 mb-3"></div>
        <div class="text-white font-bold tracking-widest text-sm">載入中...</div>
    </div>
    
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none z-[200] font-bold shadow-xl text-sm whitespace-nowrap"></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="text-sm font-bold flex items-center">
            <i class="fas fa-chevron-left mr-1"></i> 返回
        </button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2">活動報名管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 transition-all">開啟編輯</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-4">
        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50">
            <label class="text-[10px] text-gray-400 font-black block mb-2 px-1 uppercase tracking-widest">Select Event</label>
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <select id="eventSelector" onchange="loadEventDetails()" class="w-full bg-emerald-50/50 p-4 pr-10 rounded-2xl text-base font-bold text-emerald-900 outline-none appearance-none border-2 border-transparent focus:border-emerald-600 transition-all">
                        <option value="">-- 請選擇活動項目 --</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-emerald-800/50">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <button id="manageEventBtn" onclick="openEditModal()" class="hidden bg-emerald-100 text-emerald-700 w-14 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
        </div>

        <div id="statsSection" class="hidden bg-white p-6 rounded-[2.5rem] shadow-md border border-emerald-100 flex items-center justify-between">
            <div class="space-y-1">
                <span class="text-xs font-bold text-gray-400 block ml-1">報名進度</span>
                <div class="flex items-baseline gap-2">
                    <span id="statCount" class="text-4xl font-black text-emerald-900">0</span>
                    <span class="text-xl font-bold text-gray-400">位成員報名</span>
                </div>
            </div>
            <button onclick="sendToLine()" class="bg-[#06C755] text-white w-20 h-20 rounded-2xl font-black shadow-lg flex flex-col items-center justify-center active:scale-95 transition-all">
                <i class="fab fa-line text-2xl mb-1"></i>
                <span class="text-[10px]">發送名單</span>
            </button>
        </div>

        <div class="space-y-3">
            <h3 class="text-sm font-black text-emerald-900 ml-2"><i class="fas fa-file-signature mr-2"></i>報名者名單</h3>
            <div id="regList" class="space-y-3">
                <div class="text-center py-20 text-gray-300 italic text-sm">請先選取活動項目</div>
            </div>
        </div>

        <div id="adminActions" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
            <button onclick="openAddModal()" class="bg-[#064E3B] text-white px-8 py-4 rounded-2xl font-black shadow-[0_10px_25px_rgba(6,78,59,0.3)] flex items-center gap-3 active:scale-95 border-2 border-emerald-400/30 transition-all whitespace-nowrap">
                <i class="fas fa-plus-circle text-xl"></i>
                <span>發佈全新活動表單</span>
            </button>
        </div>
    </main>

    <div id="eventModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-xl font-black text-emerald-900 mb-2">活動內容</h3>
            <input type="hidden" id="old_title">
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 block">活動標題</label>
                    <input type="text" id="ev_title" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 block">海報圖片連結</label>
                    <input type="text" id="ev_poster" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 block">活動簡介</label>
                    <textarea id="ev_desc" rows="2" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-orange-600 ml-2">需填身分證?</label>
                        <select id="ev_needId" class="w-full bg-orange-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                            <option value="N">不需要</option>
                            <option value="Y">需要</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-orange-600 ml-2">提供遊覽車?</label>
                        <select id="ev_bus" class="w-full bg-orange-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                            <option value="N">無</option>
                            <option value="Y">有</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-blue-600 ml-2">會員費用</label>
                        <input type="number" id="ev_mFee" class="w-full bg-blue-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-blue-600 ml-2">非會員費用</label>
                        <input type="number" id="ev_gFee" class="w-full bg-blue-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">開始展示</label>
                        <input type="date" id="ev_start" class="w-full bg-gray-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">截止下架</label>
                        <input type="date" id="ev_until" class="w-full bg-gray-50 rounded-2xl px-4 py-4 text-xs font-bold border-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">活動舉辦日期</label>
                    <input type="date" id="ev_date" class="w-full bg-gray-50 rounded-2xl px-5 py-4 text-xs font-bold border-none">
                </div>
            </div>
            <div id="deleteZone" class="hidden pt-2">
                <button onclick="deleteCurrentEvent()" class="w-full py-3 text-red-500 text-xs font-bold bg-red-50 rounded-xl border border-red-100 italic">
                    <i class="fas fa-trash-alt mr-1"></i> 永久刪除此活動
                </button>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-black">取消</button>
                <button onclick="saveEvent()" class="flex-[2] bg-[#064e3b] text-white rounded-2xl font-black shadow-lg">確認儲存</button>
            </div>
        </div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-black text-emerald-900 mb-2">報名者資訊</h3>
            <input type="hidden" id="reg_old_phone">
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">姓名</label>
                        <input type="text" id="reg_name" class="w-full bg-gray-50 rounded-2xl px-4 py-3 text-sm font-bold border-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">電話</label>
                        <input type="text" id="reg_phone" class="w-full bg-gray-50 rounded-2xl px-4 py-3 text-sm font-bold border-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">飲食</label>
                        <select id="reg_diet" class="w-full bg-gray-50 rounded-2xl px-4 py-3 text-sm font-bold border-none">
                            <option value="葷">葷</option>
                            <option value="蛋奶素">蛋奶素</option>
                            <option value="全素">全素</option>
                        </select>
                    </div>
                    <div id="reg_id_zone">
                        <label class="text-[10px] font-bold text-emerald-600 ml-2">身分證號</label>
                        <input type="text" id="reg_id" class="w-full bg-gray-50 rounded-2xl px-4 py-3 text-sm font-bold border-none">
                    </div>
                </div>
                <div id="reg_transport_zone" class="p-4 bg-blue-50 rounded-2xl space-y-3">
                    <label class="text-[10px] font-bold text-blue-600">交通安排 (非遊覽車)</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-xs font-bold"><input type="radio" name="trans" value="自駕"> 自駕</label>
                        <label class="flex items-center gap-2 text-xs font-bold"><input type="radio" name="trans" value="共乘"> 共乘</label>
                    </div>
                    <div id="seat_input_zone">
                        <label class="text-[10px] font-bold text-blue-400">可載人數</label>
                        <input type="number" id="reg_seats" class="w-full bg-white rounded-xl px-4 py-2 text-sm font-bold border-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">備註</label>
                    <textarea id="reg_note" rows="2" class="w-full bg-gray-50 rounded-2xl px-4 py-3 text-sm font-bold border-none"></textarea>
                </div>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeRegModal()" class="flex-1 py-4 text-gray-400 font-black">取消</button>
                <button onclick="saveSingleReg()" class="flex-[2] bg-[#064e3b] text-white rounded-2xl font-black shadow-lg">儲存變更</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec";
        let allData = { events: [], registrations: [] };
        let isEditMode = false;

        window.onload = loadData;

        // 核心載入
// 核心載入
        async function loadData() {
            showLoading(true);
            try {
                // ⚠️ 修正：原本沒有帶 type，GAS 不知道要做什麼。
                // 這裡假設您 GAS 端抓取活動列表的 type 是 'get_events_page' (請依照您 GAS 實際寫法調整)
                const res = await fetch(`${GAS_URL}?type=get_events_page&t=${Date.now()}`);
                const json = await res.json();
                allData.events = json.events || [];
                renderSelector();
            } catch (e) { 
                console.error("loadData 錯誤詳細資訊:", e); // ⚠️ 修正：把真實錯誤印在主控台
                showToast("載入活動清單失敗"); 
            }
            showLoading(false);
        }

        function renderSelector() {
            const selector = document.getElementById('eventSelector');
            const current = selector.value;
            selector.innerHTML = '<option value="">-- 請選擇活動項目 --</option>' + 
                allData.events.map(ev => `<option value="${ev.title}">${ev.title}</option>`).join('');
            if (current) selector.value = current;
        }

        async function loadEventDetails() {
            const title = document.getElementById('eventSelector').value;
            if (!title) return;
            showLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?type=get_registrations_by_event&eventTitle=${encodeURIComponent(title)}&t=${Date.now()}`);
                const json = await res.json();
                if (Array.isArray(json)) {
                    allData.registrations = json;
                    renderRegList(json);
                    document.getElementById('statCount').innerText = json.length;
                    document.getElementById('statsSection').classList.remove('hidden');
                }
            } catch (e) { 
                console.error("loadEventDetails 錯誤詳細資訊:", e);
                showToast("抓取報名名單失敗"); 
            }
            showLoading(false);
        }

        // 渲染列表
        function renderRegList(list) {
            const container = document.getElementById('regList');
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-300 italic text-sm">目前尚無資料</div>' + (isEditMode ? renderManualAddBtn() : '');
                return;
            }
            let html = list.map((r, i) => {
                const name = r["姓名"] || r["會員姓名"] || '未命名';
                const phone = r["手機號碼"] || r["電話"] || '';
                const isPaid = r["繳費狀態"] || 'N';
                const isMember = (r["是否會員"] === '是' || r["身份"] === '是');
                return `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-emerald-50 space-y-3">
                    <div class="flex items-center justify-between" onclick="toggleRegDetail(${i})">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600 font-bold text-xs">${name[0]}</div>
                            <div>
                                <div class="font-black text-emerald-900">${name}</div>
                                <div class="text-[10px] text-gray-400 font-bold">${phone}</div>
                            </div>
                        </div>
                        <span class="text-[10px] px-2 py-1 rounded-lg ${(isPaid === 'Y' || isPaid === '已繳') ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'} font-black">
                            ${(isPaid === 'Y' || isPaid === '已繳') ? '已繳費' : '未繳費'}
                        </span>
                    </div>
                    <div id="regDetail-${i}" class="hidden pt-3 border-t border-dashed border-gray-100 space-y-3">
                        <div class="grid grid-cols-2 gap-2 text-xs text-emerald-800 font-bold">
                            <div>飲食：${r["餐食"] || '未填'}</div>
                            <div>身份：${isMember ? '正式會員' : '非會員'}</div>
                            <div class="col-span-2">備註：${r["備註"] || '無'}</div>
                        </div>
                        ${isEditMode ? `<div class="flex gap-2"><button onclick="openRegModal('${phone}')" class="flex-1 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-[10px] font-black">編輯</button>
                        <button onclick="deleteSingleReg('${phone}')" class="px-4 py-2 bg-red-50 text-red-400 rounded-xl text-[10px]">刪除</button></div>` : ''}
                    </div>
                </div>`;
            }).join('');
            if (isEditMode) html += renderManualAddBtn();
            container.innerHTML = html;
        }

        // 彈窗邏輯
        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('editToggleBtn').innerText = isEditMode ? "完成編輯" : "開啟編輯";
            document.getElementById('editToggleBtn').classList.toggle('bg-red-500', isEditMode);
            document.getElementById('adminActions').classList.toggle('hidden', !isEditMode);
            const title = document.getElementById('eventSelector').value;
            document.getElementById('manageEventBtn').classList.toggle('hidden', !isEditMode || !title);
            loadEventDetails();
        }

        function openEditModal() {
            const title = document.getElementById('eventSelector').value;
            const ev = allData.events.find(e => e.title === title);
            if (!ev) return;
            document.getElementById('modalTitle').innerText = "修改活動";
            document.getElementById('old_title').value = ev.title;
            document.getElementById('ev_title').value = ev.title;
            document.getElementById('ev_poster').value = ev.poster_url || "";
            document.getElementById('ev_desc').value = ev.desc || "";
            document.getElementById('ev_needId').value = (ev.needId === 'Y' || ev.身分證 === '是') ? 'Y' : 'N';
            document.getElementById('ev_bus').value = (ev.isTourBus === 'Y' || ev.遊覽車 === '是') ? 'Y' : 'N';
            document.getElementById('ev_mFee').value = ev.memberFee || 0;
            document.getElementById('ev_gFee').value = ev.guestFee || 0;
            document.getElementById('ev_start').value = formatDateForInput(ev.startDate);
            document.getElementById('ev_until').value = formatDateForInput(ev.deadline);
            document.getElementById('ev_date').value = formatDateForInput(ev.eventDate);
            document.getElementById('deleteZone').classList.remove('hidden');
            document.getElementById('eventModal').classList.remove('hidden');
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "發布新活動";
            document.getElementById('old_title').value = "";
            document.querySelectorAll('#eventModal input, #eventModal textarea').forEach(i => i.value = "");
            document.getElementById('deleteZone').classList.add('hidden');
            document.getElementById('eventModal').classList.remove('hidden');
        }

        function openRegModal(phone) {
            const title = document.getElementById('eventSelector').value;
            const ev = allData.events.find(e => e.title === title);
            const isTourBus = (ev?.isTourBus === 'Y' || ev?.遊覽車 === '是');
            document.getElementById('reg_id_zone').style.display = (ev?.needId === 'Y' || ev?.身分證 === '是') ? 'block' : 'none';
            document.getElementById('reg_transport_zone').style.display = isTourBus ? 'none' : 'block';

            if (phone) {
                const r = allData.registrations.find(reg => (reg.手機號碼 || reg.電話) === phone);
                document.getElementById('reg_old_phone').value = phone;
                document.getElementById('reg_name').value = r["姓名"] || r["會員姓名"] || "";
                document.getElementById('reg_phone').value = phone;
                document.getElementById('reg_diet').value = r["餐食"] || "葷";
                document.getElementById('reg_id').value = r["身分證字號"] || "";
                document.getElementById('reg_note').value = r["備註"] || "";
                const trans = r["交通方式"] || "自駕";
                document.querySelector(`input[name="trans"][value="${trans}"]`).checked = true;
                document.getElementById('reg_seats').value = r["可載人數"] || 0;
                updateSeatInput(trans);
            } else {
                document.getElementById('reg_old_phone').value = "";
                document.querySelectorAll('#regModal input:not([type="radio"]), #regModal textarea').forEach(i => i.value = "");
                document.querySelector('input[name="trans"][value="自駕"]').checked = true;
                updateSeatInput("自駕");
            }
            document.getElementById('regModal').classList.remove('hidden');
        }

        // 輔助工具
        function formatDateForInput(dVal) {
            if (!dVal) return "";
            const d = new Date(dVal);
            return isNaN(d) ? "" : d.toISOString().split('T')[0];
        }
        function toggleRegDetail(i) { document.getElementById(`regDetail-${i}`).classList.toggle('hidden'); }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        function closeRegModal() { document.getElementById('regModal').classList.add('hidden'); }
        function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(()=>t.style.opacity='0', 2500); }
        function renderManualAddBtn() { return `<div onclick="openRegModal('')" class="border-2 border-dashed border-emerald-200 p-6 rounded-3xl flex flex-col items-center text-emerald-800 font-black text-sm cursor-pointer mt-4 hover:bg-emerald-50"><i class="fas fa-user-plus mb-2"></i>人工報名</div>`; }
        function updateSeatInput(val) { document.getElementById('seat_input_zone').style.display = (val === '自駕') ? 'block' : 'none'; }
        document.querySelectorAll('input[name="trans"]').forEach(r => r.onchange = (e) => updateSeatInput(e.target.value));

        // 儲存邏輯 (略，與原版 POST 邏輯相同但確保 Payload 完整)
        async function saveEvent() {
            const payload = {
                type: document.getElementById('old_title').value ? 'update_calendar_event' : 'add_new_event',
                key: sessionStorage.getItem('staff_key'),
                title: document.getElementById('ev_title').value,
                poster_url: document.getElementById('ev_poster').value,
                desc: document.getElementById('ev_desc').value,
                start_date: document.getElementById('ev_start').value,
                display_until: document.getElementById('ev_until').value,
                date: document.getElementById('ev_date').value,
                needId: document.getElementById('ev_needId').value,
                isTourBus: document.getElementById('ev_bus').value,
                memberFee: document.getElementById('ev_mFee').value,
                guestFee: document.getElementById('ev_gFee').value,
                oldTitle: document.getElementById('old_title').value
            };
            if(!payload.title || !payload.date) return alert("必填未填");
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                if ((await res.json()).result === "SUCCESS") { showToast("成功"); closeModal(); loadData(); }
            } catch (e) { showToast("失敗"); }
            showLoading(false);
        }

        async function saveSingleReg() {
            const payload = {
                type: 'save_single_registration',
                key: sessionStorage.getItem('staff_key'),
                eventTitle: document.getElementById('eventSelector').value,
                oldPhone: document.getElementById('reg_old_phone').value,
                name: document.getElementById('reg_name').value,
                phone: document.getElementById('reg_phone').value,
                diet: document.getElementById('reg_diet').value,
                idCard: document.getElementById('reg_id').value,
                note: document.getElementById('reg_note').value,
                transport: document.querySelector('input[name="trans"]:checked').value,
                seats: document.getElementById('reg_seats').value || 0
            };
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                if ((await res.json()).result === "SUCCESS") { showToast("成功"); closeRegModal(); loadEventDetails(); }
            } catch (e) { showToast("失敗"); }
            showLoading(false);
        }
