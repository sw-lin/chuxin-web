<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .input-group { @apply mb-4 bg-white p-4 rounded-2xl border border-emerald-50 shadow-sm; }
        .label-text { @apply block text-[10px] font-bold text-emerald-800 mb-1 ml-1; }
        .input-field { @apply w-full px-4 py-3 bg-gray-50 rounded-xl outline-none text-sm border-2 border-transparent focus:border-emerald-500 transition-all; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32">

<nav class="emerald-gradient p-6 rounded-b-[2.5rem] shadow-lg mb-6">
    <div class="flex items-center justify-between text-white mb-2">
        <button onclick="location.href='member_zone.html'" class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="text-center flex-1">
            <span class="text-[10px] font-bold opacity-70 block mb-1">你正在報名</span>
            <h1 id="displayEventTitle" class="text-xl font-black tracking-tight leading-none">載入活動中...</h1>
        </div>
        <div class="w-10"></div>
    </div>
    <div class="flex justify-center mt-2">
        <div id="priceBadge" class="text-[10px] font-bold bg-yellow-400 text-emerald-900 px-4 py-1 rounded-full shadow-inner">
            讀取費用中...
        </div>
    </div>
</nav>

<main class="px-6">
    <form id="regForm">
        <section class="mb-8">
            <div class="flex items-center gap-2 mb-3 px-2">
                <div class="w-1.5 h-5 bg-emerald-600 rounded-full"></div>
                <h3 class="font-black text-emerald-900 text-base">主要報名者</h3>
            </div>
            
            <div class="input-group">
                <label class="label-text">姓名</label>
                <input type="text" id="mainName" class="input-field bg-gray-100" readonly>
            </div>

            <div id="mainIDSection" class="input-group hidden">
                <label class="label-text">身分證字號 (保險使用)</label>
                <input type="text" id="mainID" class="input-field" placeholder="請輸入身分證字號">
            </div>

            <div class="input-group">
                <label class="label-text">餐食選擇</label>
                <select id="mainDiet" class="input-field">
                    <option value="不拘">不拘</option>
                    <option value="葷食">葷食</option>
                    <option value="素食">素食</option>
                </select>
            </div>

            <div class="input-group">
                <label class="label-text">交通方式</label>
                <select id="mainTransport" onchange="checkTransportLogic()" class="input-field"></select>
            </div>

            <div id="seatsWrapper" class="input-group hidden">
                <label class="label-text">可載人數 (不含自己)</label>
                <input type="number" id="mainSeats" class="input-field" value="0" min="0" max="4">
            </div>
        </section>

        <section class="mb-8">
            <div class="flex items-center justify-between mb-3 px-2">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-5 bg-orange-500 rounded-full"></div>
                    <h3 class="font-black text-emerald-900 text-base">攜伴參加</h3>
                </div>
                <button type="button" onclick="addPartner()" class="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg active:scale-95">
                    <i class="fas fa-plus mr-1"></i>新增攜伴
                </button>
            </div>
            <div id="partnerContainer" class="space-y-4"></div>
        </section>

        <div class="px-6 mb-8">
            <div class="flex items-center gap-2 mb-3 px-2">
                <div class="w-1.5 h-5 bg-gray-400 rounded-full"></div>
                <h3 class="font-black text-emerald-900 text-base">其他說明</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-emerald-50 shadow-sm">
                <label class="label-text">特別需求備註</label>
                <textarea id="regNote" rows="3" class="w-full px-4 py-3 bg-gray-50 rounded-xl outline-none text-sm border-2 border-transparent focus:border-emerald-500 transition-all" placeholder="例如：過敏原、共乘需求說明..."></textarea>
            </div>
        </div>            
    </form>
</main>

<div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 p-6 flex items-center justify-between z-50">
    <div>
        <div class="text-[10px] text-gray-400 font-bold uppercase">預計總金額</div>
        <div class="text-2xl font-black text-emerald-900">$ <span id="totalAmount">0</span></div>
    </div>
    <button onclick="submitForm(event)" class="bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">
        確認送出報名
    </button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec";
    
    // 統一從 sessionStorage 讀取資料
    let currentUser = JSON.parse(sessionStorage.getItem('userInfo')) || {};
    let eventConfig = { title: "", memberFee: 0, guestFee: 0, needId: false, isTourBus: false };
    let partners = [];

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const title = params.get('event');
    
    if (!currentUser.phone) {
        alert("請先登入");
        location.href = "index.html";
        return;
    }

    // --- 關鍵修正：統一使用 localStorage ---
    const allEvents = JSON.parse(localStorage.getItem('allEvents')) || [];
    console.log("從 localStorage 讀取的活動清單:", allEvents); 

    // 尋找匹配標題的活動 (增加 trim 避免空白干擾)
    const target = allEvents.find(e => String(e.title).trim() === String(title).trim());

    // 輔助函式：判斷 Y/N 或 TRUE/FALSE
    const isTrue = (val) => {
        if (!val) return false;
        const s = String(val).trim().toUpperCase();
        return s === 'Y' || s === '是' || s === 'TRUE';
    };
    
    // --- 統一欄位名稱與邏輯 ---
    if (target) {
        eventConfig = {
            title: title || "未知活動",
            // 這裡的屬性名必須與 member_zone 存入的一致
            memberFee: parseInt(target.memberFee) || 0,
            guestFee: parseInt(target.guestFee) || 0,
            needId: isTrue(target.needId),   // 統一使用小寫 d
            isTourBus: isTrue(target.isTourBus)
        };
    }

    // 更新 UI
    document.getElementById('mainName').value = currentUser.name || "";
    document.getElementById('displayEventTitle').innerText = eventConfig.title;
    document.getElementById('priceBadge').innerText = `會員 $${eventConfig.memberFee} / 訪客 $${eventConfig.guestFee}`;
    
    initDynamicUI();
    updateTotal();
};    
    
function initDynamicUI() {
    const idSection = document.getElementById('mainIDSection');
    // 關鍵：這裡要用 eventConfig.needId (小寫 d)
    if(eventConfig.needId) {
        idSection.classList.remove('hidden');
    } else {
        idSection.classList.add('hidden');
    }

    const transportSelect = document.getElementById('mainTransport');
    if(eventConfig.isTourBus) {
        transportSelect.innerHTML = `<option value="搭乘遊覽車">搭乘遊覽車 (統一由本會安排)</option>`;
        transportSelect.disabled = true;
    } else {
        transportSelect.innerHTML = `
            <option value="自行開車">自行開車</option>
            <option value="共乘不開車">共乘不開車</option>
        `;
        transportSelect.disabled = false;
    }
    checkTransportLogic();
}
    
    function checkTransportLogic() {
        const val = document.getElementById('mainTransport').value;
        const showSeats = (!eventConfig.isTourBus && val === '自行開車');
        document.getElementById('seatsWrapper').classList.toggle('hidden', !showSeats);
    }

    function addPartner() {
        if (partners.length >= 3) return alert("最多攜伴 3 位");
        const id = Date.now();
        partners.push(id);
        renderPartners();
        updateTotal();
    }

    function renderPartners() {
        const container = document.getElementById('partnerContainer');
        const idHtml = eventConfig.needId ? `
            <input type="text" placeholder="身分證字號 (保險用)" class="partner-id input-field">
        ` : "";

        container.innerHTML = partners.map((id, index) => `
            <div class="bg-white p-5 rounded-3xl border border-emerald-50 shadow-sm relative">
                <button type="button" onclick="removePartner(${id})" class="absolute top-4 right-4 text-gray-300"><i class="fas fa-times-circle"></i></button>
                <div class="text-emerald-600 font-black text-[10px] mb-3">訪客 ${index + 1}</div>
                <div class="space-y-3">
                    <input type="text" placeholder="姓名" class="partner-name input-field">
                    <input type="tel" placeholder="電話" class="partner-phone input-field">
                    ${idHtml}
                    <select class="partner-diet input-field">
                        <option value="不拘">不拘</option><option value="葷食">葷食</option><option value="素食">素食</option>
                    </select>
                </div>
            </div>
        `).join('');
    }

    function removePartner(id) {
        partners = partners.filter(p => p !== id);
        renderPartners();
        updateTotal();
    }

    function updateTotal() {
        const total = eventConfig.memberFee + (partners.length * eventConfig.guestFee);
        document.getElementById('totalAmount').innerText = total;
    }
    
async function submitForm(event) {
    // 1. 防止頁面重新整理
    if (event && event.preventDefault) event.preventDefault();

    console.log("--- 開始執行報名程序 ---");

    try {
        // 2. 獲取主要報名者身分證與備註 (請確保 HTML ID 為 mainID 與 regNote)
        const mainIDEl = document.getElementById('mainID');
        const mainID = mainIDEl ? mainIDEl.value.trim() : "";
        const regNoteEl = document.getElementById('regNote');
        const regNote = regNoteEl ? regNoteEl.value : "";

        if (eventConfig.needId && !mainID) {
            alert("請輸入身分證字號");
            return;
        }

        // 3. 檢查攜伴姓名是否填寫
        const pNames = document.querySelectorAll('.partner-name');
        for (let el of pNames) {
            if (!el.value.trim()) {
                alert("請填寫所有攜伴訪客的姓名");
                return;
            }
        }

        // 4. 包裝資料
        const payload = {
            type: 'register',
            eventTitle: eventConfig.title,
            mainPhone: currentUser.phone,
            registrations: []
        };

        // 加入本人
        payload.registrations.push({
            name: currentUser.name,
            phone: currentUser.phone,
            idNumber: mainID,
            diet: document.getElementById('mainDiet').value,
            transport: document.getElementById('mainTransport').value,
            seats: document.getElementById('mainSeats').value || 0,
            isMember: true,
            proxy: "本人",
            fee: eventConfig.memberFee,
            note: regNote
        });

        // 加入攜伴
        const pPhones = document.querySelectorAll('.partner-phone');
        const pIDs = document.querySelectorAll('.partner-id');
        const pDiets = document.querySelectorAll('.partner-diet');

        pNames.forEach((el, i) => {
            payload.registrations.push({
                name: el.value.trim(),
                phone: pPhones[i] ? pPhones[i].value.trim() : "",
                idNumber: pIDs[i] ? pIDs[i].value.trim() : "",
                diet: pDiets[i] ? pDiets[i].value : "不拘",
                transport: "",
                seats: 0,
                isMember: false,
                proxy: currentUser.name, // 代理人就是報名本人
                fee: eventConfig.guestFee,
                note: ""
            });
        });

        console.log("準備送出的 Payload:", payload);

        // 5. 正式發送給 GAS
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        console.log("GAS 回傳結果:", result);

        if (result.result === "SUCCESS" || result.result === "ALREADY_DONE") {
            alert(result.message || "報名成功！");
            location.href = "member_zone.html";
        } else {
            alert("系統回報錯誤：" + result.message);
        }

    } catch (e) {
        console.error("JavaScript 執行錯誤細節:", e);
        alert("程式執行出錯：" + e.message + "\n請再次檢查 Console。");
    }
}    
</script>
</body>
</html>
