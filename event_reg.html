<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 999; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .input-field { width: 100%; padding: 0.75rem 1rem; background-color: #F9FAFB; border-radius: 0.75rem; border: 1px solid #F3F4F6; outline: none; transition: all 0.2s; font-size: 0.875rem; }
        .input-field:focus { border-color: #10B981; }
    </style>
</head>
<body class="pb-20">

<div id="loadingOverlay">
    <div class="spinner mb-4"></div>
    <div class="text-emerald-900 font-bold">處理中...</div>
</div>

<nav class="emerald-gradient p-6 text-white shadow-lg mb-6">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">活動報名管理</h1>
            <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest mt-1">Event Management</p>
        </div>
        <button onclick="openEventModal()" class="bg-white/20 px-4 py-2 rounded-xl text-sm font-bold border border-white/30 active:scale-95 transition-all">
            <i class="fas fa-plus mr-2"></i>發布活動
        </button>
    </div>
</nav>

<main class="px-4 max-w-4xl mx-auto">
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-50 mb-6">
        <div class="flex flex-col gap-4">
            <select id="eventSelector" onchange="renderRegistrations()" class="input-field font-bold text-emerald-900 bg-emerald-50 border-emerald-100">
                <option value="">正在載入活動...</option>
            </select>
            <div class="flex justify-between items-end">
                <div>
                    <span class="text-[10px] font-black text-gray-400 uppercase">目前統計</span>
                    <div id="statInfo" class="text-2xl font-black text-emerald-900">0 / 0 <span class="text-sm font-medium">人已繳費</span></div>
                </div>
                <button onclick="sendToLine()" class="bg-green-500 text-white px-5 py-2.5 rounded-2xl font-black text-sm shadow-md active:scale-95">
                    <i class="fab fa-line mr-2"></i>送出繳費名單
                </button>
            </div>
        </div>
    </div>

    <div id="regList" class="space-y-3"></div>
</main>

<div id="eventModal" class="modal-overlay">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 max-h-[90vh] overflow-y-auto shadow-2xl">
        <h3 class="text-xl font-black text-emerald-900 mb-6">活動設定</h3>
        <div class="space-y-4">
            <input type="text" id="evTitle" placeholder="活動標題" class="input-field">
            <input type="text" id="evDate" placeholder="活動日期 (例如 2026-05-20)" class="input-field">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-emerald-800">需身分證</label>
                    <select id="evNeedId" class="input-field mt-1"><option value="N">否</option><option value="Y">是</option></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-emerald-800">搭遊覽車</label>
                    <select id="evIsTourBus" class="input-field mt-1"><option value="N">否</option><option value="Y">是</option></select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-emerald-800">會員費用</label>
                    <input type="number" id="evMemberFee" class="input-field mt-1" value="0">
                </div>
                <div>
                    <label class="text-[10px] font-black text-emerald-800">訪客費用</label>
                    <input type="number" id="evGuestFee" class="input-field mt-1" value="0">
                </div>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeEventModal()" class="flex-1 py-4 font-bold text-gray-400">取消</button>
                <button onclick="saveEvent()" class="flex-[2] emerald-gradient text-white py-4 rounded-2xl font-black shadow-lg">儲存設定</button>
            </div>
            <button onclick="deleteEntireEvent()" class="w-full text-red-500 font-bold text-xs py-2 bg-red-50 rounded-xl border border-red-100 mt-2">
                <i class="fas fa-trash-alt mr-2"></i>永久刪除此活動及其名單
            </button>
        </div>
    </div>
</div>

<div id="editRegModal" class="modal-overlay">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
        <h3 class="text-xl font-black text-emerald-900 mb-6">維修報名資料</h3>
        <div class="space-y-4">
            <input type="text" id="editPhone" class="input-field" placeholder="手機號碼">
            <input type="text" id="editIdNumber" class="input-field" placeholder="身分證字號">
            <div class="grid grid-cols-2 gap-4">
                <select id="editTransport" class="input-field" onchange="toggleEditSeats()">
                    <option value="自行開車">自行開車</option><option value="共乘不開車">共乘不開車</option>
                </select>
                <input type="number" id="editSeats" class="input-field" placeholder="可載人數">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <select id="editDiet" class="input-field">
                    <option value="葷食">葷食</option><option value="素食">素食</option><option value="不拘">不拘</option>
                </select>
                <select id="editIsPaid" class="input-field font-bold">
                    <option value="N">未繳費</option><option value="Y">已繳費</option>
                </select>
            </div>
            <div class="pt-4 flex gap-3">
                <button onclick="closeEditModal()" class="flex-1 py-4 font-bold text-gray-400">取消</button>
                <button onclick="saveEdit()" class="flex-[2] emerald-gradient text-white py-4 rounded-2xl font-black shadow-lg">確認修改</button>
            </div>
            <button onclick="deleteRegistration()" class="w-full text-red-500 font-bold text-sm py-2 bg-red-50 rounded-xl mt-2">直接刪除此人資料</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec";
    let allData = { events: [], registrations: [] };
    let currentEditingRow = null;

window.onload = function() {
    // 1. 檢查管理員權限 (從 sessionStorage 抓取 staff_key)
    const key = sessionStorage.getItem('staff_key');
    
    if (!key) {
        alert("管理權限已失效，請重新從主後端登入。");
        // 視情況決定是否跳回登入頁
        // window.location.href = "admin_login.html"; 
        return;
    }

    // 2. 直接執行載入資料流程
    // 這裡不再需要檢查 currentUser 或 initDynamicUI()
    loadData();
};

    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(`${GAS_URL}?type=admin_get_data&key=${sessionStorage.getItem('staff_key')}`);
            allData = await res.json();
            const selector = document.getElementById('eventSelector');
            selector.innerHTML = allData.events.map(e => `<option value="${e.title}">${e.title}</option>`).join('');
            renderRegistrations();
        } catch (e) { alert("讀取失敗，請確認網路或 GAS 權限"); }
        showLoading(false);
    }

    function renderRegistrations() {
        const title = document.getElementById('eventSelector').value;
        const config = allData.events.find(e => e.title === title) || {};
        const filtered = allData.registrations.filter(r => r.活動標題 === title);
        
        const paidCount = filtered.filter(r => r.是否繳費 === 'Y' || r.是否繳費 === '是').length;
        document.getElementById('statInfo').innerHTML = `${paidCount} / ${filtered.length} <span class="text-sm font-medium">人已繳費</span>`;

        const container = document.getElementById('regList');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="p-10 text-center text-gray-400 font-bold">目前暫無人報名</div>`;
            return;
        }

        container.innerHTML = filtered.map(r => `
            <div class="bg-white p-4 rounded-2xl border border-emerald-50 shadow-sm flex items-center justify-between">
                <div>
                    <div class="font-black text-emerald-900">${r.會員姓名} <span class="text-gray-400 text-xs">(${r.手機號碼.slice(-4)})</span></div>
                    <div class="text-[10px] font-bold text-gray-500">
                        ${r.交通方式} | ${r.餐食選擇} | 
                        <span class="${(r.是否繳費 === 'Y' || r.是否繳費 === '是') ? 'text-green-600' : 'text-red-500'}">
                            ${(r.是否繳費 === 'Y' || r.是否繳費 === '是') ? '已繳費' : '未繳費'}
                        </span>
                    </div>
                </div>
                <button onclick='openEditModal(${JSON.stringify(r)})' class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-tools"></i></button>
            </div>
        `).join('');
    }

    function openEditModal(reg) {
        currentEditingRow = reg;
        document.getElementById('editRegModal').style.display = 'flex';
        document.getElementById('editPhone').value = reg.手機號碼;
        document.getElementById('editIdNumber').value = reg.身分證字號 || "";
        document.getElementById('editTransport').value = reg.交通方式 || "自行開車";
        document.getElementById('editSeats').value = reg.可載人數 || 0;
        document.getElementById('editDiet').value = reg.餐食選擇 || "葷食";
        document.getElementById('editIsPaid').value = (reg.是否繳費 === 'Y' || reg.是否繳費 === '是') ? 'Y' : 'N';
        toggleEditSeats();
    }

    function toggleEditSeats() {
        const val = document.getElementById('editTransport').value;
        document.getElementById('editSeats').parentElement.style.visibility = (val === '自行開車') ? 'visible' : 'hidden';
    }

    function closeEditModal() { document.getElementById('editRegModal').style.display = 'none'; }
    function openEventModal() { document.getElementById('eventModal').style.display = 'flex'; }
    function closeEventModal() { document.getElementById('eventModal').style.display = 'none'; }

    async function saveEdit() {
        showLoading(true);
        const payload = {
            type: 'admin_edit_registration',
            key: sessionStorage.getItem('staff_key'),
            activityTitle: currentEditingRow.活動標題,
            memberName: currentEditingRow.會員姓名,
            phone: document.getElementById('editPhone').value,
            idNumber: document.getElementById('editIdNumber').value,
            transport: document.getElementById('editTransport').value,
            seats: document.getElementById('editSeats').value,
            diet: document.getElementById('editDiet').value,
            isPaid: document.getElementById('editIsPaid').value
        };
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            await loadData();
            closeEditModal();
        } catch (e) { alert("修改失敗"); }
        showLoading(false);
    }

    async function deleteRegistration() {
        if (!confirm("確定刪除此人報名？")) return;
        showLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
                type: 'admin_delete_registration',
                key: sessionStorage.getItem('staff_key'),
                activityTitle: currentEditingRow.活動標題,
                memberName: currentEditingRow.會員姓名
            })});
            await loadData();
            closeEditModal();
        } catch (e) { alert("刪除失敗"); }
        showLoading(false);
    }

    async function saveEvent() {
        const title = document.getElementById('evTitle').value;
        if(!title) return alert("請輸入標題");
        showLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
                type: 'admin_save_event',
                key: sessionStorage.getItem('staff_key'),
                title: title,
                date: document.getElementById('evDate').value,
                needId: document.getElementById('evNeedId').value,
                isTourBus: document.getElementById('evIsTourBus').value,
                memberFee: document.getElementById('evMemberFee').value,
                guestFee: document.getElementById('evGuestFee').value
            })});
            await loadData();
            closeEventModal();
        } catch (e) { alert("儲存失敗"); }
        showLoading(false);
    }

    async function deleteEntireEvent() {
        const title = document.getElementById('eventSelector').value;
        if(!confirm(`⚠️ 警告：將永久刪除「${title}」及所有報名資料！`)) return;
        showLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
                type: 'admin_delete_event_full',
                key: sessionStorage.getItem('staff_key'),
                title: title
            })});
            location.reload();
        } catch (e) { alert("刪除失敗"); }
        showLoading(false);
    }

    async function sendToLine() {
        const title = document.getElementById('eventSelector').value;
        const paidList = allData.registrations.filter(r => r.活動標題 === title && (r.是否繳費 === 'Y' || r.是否繳費 === '是'));
        if (paidList.length === 0) return alert("尚無繳費名單");
        let msg = `💰 【築心】已繳費名單\n活動：${title}\n人數：${paidList.length}\n`;
        paidList.forEach((r, i) => msg += `${i+1}. ${r.會員姓名}\n`);
        showLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'send_line', key: sessionStorage.getItem('staff_key'), message: msg })});
            alert("已發送至 LINE");
        } catch (e) { alert("發送失敗"); }
        showLoading(false);
    }
</script>
</body>
</html>
