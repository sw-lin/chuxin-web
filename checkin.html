<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動簽到 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #F97316 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl border border-emerald-50 overflow-hidden">
        <div class="emerald-gradient p-8 text-white text-center">
            <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
                <i class="fas fa-calendar-check text-3xl text-orange-300"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-widest">活動簽到中</h1>
        </div>

        <div id="content" class="p-8 space-y-6">
            <div class="text-center py-10">
                <i class="fas fa-spinner fa-spin text-emerald-600 text-3xl mb-4"></i>
                <p class="text-gray-500">正在確認您的報到資訊...</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventDate = urlParams.get('event'); 
            const userStr = sessionStorage.getItem('userInfo');

            const contentDiv = document.getElementById('content');

            if (!userStr) {
                contentDiv.innerHTML = `
                    <div class="text-center space-y-4">
                        <div class="text-orange-600 text-5xl"><i class="fas fa-exclamation-circle"></i></div>
                        <p class="text-emerald-900 font-bold">請先登入後再進行報到</p>
                        <button onclick="location.href='index.html'" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold shadow-lg">前往登入</button>
                    </div>
                `;
                return;
            }

            const user = JSON.parse(userStr);

            contentDiv.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-stone-50 p-6 rounded-2xl border border-stone-100">
                        <p class="text-xs text-gray-400 mb-1">簽到會員</p>
                        <p class="text-xl font-bold text-emerald-900">${user.name}</p>
                    </div>
                    <div class="bg-stone-50 p-6 rounded-2xl border border-stone-100">
                        <p class="text-xs text-gray-400 mb-1">活動日期</p>
                        <p class="text-xl font-bold text-emerald-800 font-mono">${eventDate || '未指定日期'}</p>
                    </div>
                    <button id="checkinBtn" onclick="doCheckin('${user.phone}', '${eventDate}')" 
                        class="w-full emerald-gradient text-white py-5 rounded-2xl font-bold text-xl shadow-lg hover:brightness-110 transition">
                        確認報到
                    </button>
                    <button onclick="location.href='member_zone.html'" class="w-full text-gray-400 text-sm py-2 hover:text-gray-600 transition">取消</button>
                </div>
            `;
        };

        async function doCheckin(phone, date) {
            const btn = document.getElementById('checkinBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 處理中...`;

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: "checkin",
                        phone: phone,
                        date: date
                    })
                });
                
                const result = await response.text();

                if (result === "ALREADY_DONE") {
                    // 1. 重複報到處理
                    document.getElementById('content').innerHTML = `
                        <div class="text-center py-6 space-y-6">
                            <div class="text-orange-500 text-7xl"><i class="fas fa-info-circle"></i></div>
                            <div>
                                <h2 class="text-2xl font-bold text-emerald-900">您已完成報到</h2>
                                <p class="text-gray-500 mt-2">不需重複操作囉！😊</p>
                            </div>
                            <button onclick="location.href='member_zone.html'" class="w-full bg-gray-100 text-emerald-800 py-4 rounded-2xl font-bold hover:bg-gray-200 transition">回個人專區</button>
                        </div>
                    `;
                } else if (result === "SUCCESS" || result === "OK") {
                    // 2. 簽到成功處理
                    document.getElementById('content').innerHTML = `
                        <div class="text-center py-6 space-y-6">
                            <div class="text-emerald-500 text-7xl"><i class="fas fa-check-circle"></i></div>
                            <div>
                                <h2 class="text-2xl font-bold text-emerald-900">報到成功！</h2>
                                <p class="text-gray-500 mt-2 italic">勤學如春起之苗，日有所長。</p>
                            </div>
                            <button onclick="location.href='member_zone.html'" class="w-full bg-emerald-100 text-emerald-800 py-4 rounded-2xl font-bold hover:bg-emerald-200 transition">回個人專區</button>
                        </div>
                    `;
                } else {
                    throw new Error(result);
                }
            } catch (err) {
                console.error(err);
                alert("通訊失敗，請檢查網路連線後再試。");
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }
    </script>
</body>
</html>
