<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        
        /* 加載動畫優化 */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 彈窗樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
        
        /* Toast 訊息樣式 */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 10000; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <!-- Toast 容器 -->
    <div id="toast"></div>

    <!-- 加載動畫 -->
    <div id="loadingOverlay"><div class="loading-card"><div class="spinner"></div><div class="text-emerald-900 font-bold">同步中...</div></div></div>

    <!-- 導覽列 -->
    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="window.location.href='staff_menu.html'" class="text-sm font-bold"><i class="fas fa-chevron-left mr-1"></i>返回</button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2">行事曆管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 transition-all">開啟編輯</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-xs font-bold text-emerald-900/60 uppercase tracking-widest">Activity Schedule</h2>
            <span id="eventCount" class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">0 個活動</span>
        </div>
        <div id="calendarList" class="space-y-4"></div>
    </main>

    <!-- 底部新增按鈕 -->
    <div id="bottomAddArea" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-6 hidden z-30">
        <button onclick="openAddModal()" class="w-full py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
            <i class="fas fa-calendar-plus text-xl"></i> 排定新活動
        </button>
    </div>

    <!-- QR Code 彈窗 -->
    <div id="qrModal" class="modal-overlay" onclick="closeModal('qrModal')">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl" onclick="event.stopPropagation()">
            <div class="mb-2 text-[10px] text-emerald-600 font-black uppercase tracking-widest" id="qrDate">DATE</div>
            <h3 id="qrTitle" class="text-xl font-black text-emerald-900 mb-6 leading-tight">活動標題</h3>
            <div class="bg-gray-50 p-4 rounded-3xl mb-6">
                <img id="qrImg" src="" class="w-full aspect-square object-contain" alt="QR Code">
            </div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">關閉視窗</button>
        </div>
    </div>

    <!-- 新增/編輯彈窗 -->
    <div id="eventModal" class="modal-overlay" onclick="closeModal('eventModal')">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-xl font-black text-emerald-900 mb-6 text-center">排定新活動</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-emerald-800 mb-1 ml-2">活動日期</label>
                    <input type="date" id="eventDate" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-600 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-emerald-800 mb-1 ml-2">活動名稱</label>
                    <input type="text" id="eventTitle" placeholder="請輸入名稱" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-600 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-emerald-800 mb-1 ml-2">海報網址 (選填)</label>
                    <input type="text" id="eventPoster" placeholder="貼上 Google Drive 連結" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-600 transition-all">
                </div>
            </div>
            <div id="addActions" class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('eventModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitEvent('add')" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black">確認排定</button>
            </div>
            <div id="editActions" class="space-y-3 mt-8 hidden">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeModal('eventModal')" class="py-4 text-gray-400 font-bold">取消</button>
                    <button onclick="submitEvent('update')" class="py-4 bg-emerald-700 text-white rounded-2xl font-black">儲存變動</button>
                </div>
                <button onclick="confirmDeleteEvent()" class="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-trash-alt"></i> 刪除活動
                </button>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    const STAFF_KEY = sessionStorage.getItem('staff_key');
    let isEditMode = false;
    let currentEditData = null;
    let rawCalendarData = [];

    window.onload = () => { 
        if (!STAFF_KEY) { window.location.href = "index.html"; return; }
        loadEvents(); 
    };

    function toggleLoading(s) { 
        document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; 
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; }, 3000);
    }

    async function loadEvents() {
        toggleLoading(true);
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            rawCalendarData = data.calendar || [];
            renderList(rawCalendarData);
        } catch(e) { showToast("❌ 資料載入失敗"); }
        toggleLoading(false);
    }

    function renderList(events) {
        const list = document.getElementById('calendarList');
        // 由遠到近排序
        events.sort((a, b) => new Date(a.dateText) - new Date(b.dateText));
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('eventCount').innerText = events.length + ' 個活動';
        
        list.innerHTML = events.map((ev) => {
            const isFuture = ev.dateText > todayStr;
            const evString = encodeURIComponent(JSON.stringify(ev));
            // 編輯模式下不套用淡出，方便修改
            const opacityClass = (isFuture && !isEditMode) ? 'opacity-40 grayscale' : 'opacity-100';
            
            return `
            <div class="bg-white p-5 rounded-[2rem] shadow-sm flex justify-between items-center border border-gray-100 transition-all ${opacityClass}">
                <div class="flex items-center gap-4">
                    <div class="text-center bg-emerald-50 px-3 py-2 rounded-2xl shrink-0 min-w-[70px]">
                        <div class="text-[10px] text-emerald-600 font-black uppercase">${ev.dateText.split('-')[1]}月</div>
                        <div class="text-xl font-black text-emerald-900">${ev.dateText.split('-')[2]}</div>
                    </div>
                    <div class="overflow-hidden">
                        <h3 class="font-black text-emerald-900 leading-tight truncate">${ev.title}</h3>
                        ${ev.poster_url ? `<div class="mt-1 text-[10px] text-emerald-500 font-bold"><i class="fas fa-image"></i> 已含海報</div>` : ''}
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    ${isEditMode ? 
                        `<button onclick="openEditModal('${evString}')" class="w-12 h-12 flex items-center justify-center bg-emerald-100 text-emerald-700 rounded-full shadow-sm"><i class="fas fa-pencil-alt"></i></button>` : 
                        (isFuture ? `<span class="text-[10px] text-gray-300 font-bold px-2">尚未開放</span>` : `<button onclick="showQRCode('${ev.dateText}', '${ev.title}')" class="w-12 h-12 flex items-center justify-center bg-white border border-gray-100 text-emerald-800 rounded-full shadow-sm"><i class="fas fa-qrcode"></i></button>`)
                    }
                </div>
            </div>`;
        }).join('');
    }
                  
function submitEvent() {
    if (!currentEditData) return;
    
    // 取得輸入框的值
    const date = document.getElementById('eventDate').value; 
    const title = document.getElementById('eventTitle').value.trim();
    const poster = document.getElementById('eventPoster').value.trim();

    if (!date || !title) return alert("日期與標題為必填");

    closeModal('eventModal');
    toggleLoading(true);

    // 關鍵修正：將 'date' 改為 'dateText'，以符合 loadCalendar 的解析邏輯
    const payload = {
        type: 'edit_event',
        key: STAFF_KEY,
        old_date: currentEditData.dateText, // 使用原始資料中的日期作為索引
        old_title: currentEditData.title,
        new_data: {
            dateText: date,  // 修正點：必須與資料庫/讀取時的欄位名一致
            title: title,
            poster_url: poster
        }
    };

    fetch(GAS_URL, { 
        method: 'POST', 
        body: JSON.stringify(payload) 
    })
    .then(res => res.json())
    .then(res => {
        if (res.result === "SUCCESS") {
            showToast("✅ 活動已更新");
            loadCalendar(); // 重新載入列表
        } else {
            showToast("❌ 更新失敗：" + res.message);
        }
    })
    .catch(() => showToast("連線異常"))
    .finally(() => toggleLoading(false));
}
    
    async function confirmDeleteEvent() {
        if (!confirm(`確定要刪除「${currentEditData.title}」嗎？`)) return;
        
        toggleLoading(true);
        try {
            const res = await fetch(GAS_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    type: 'deleteEvent', 
                    key: STAFF_KEY, 
                    dateText: currentEditData.dateText,
                    title: currentEditData.title
                }) 
            });
            const result = await res.json();
            
            if (result.result === "SUCCESS") {
                showToast("✅ 活動已移除");
                closeModal('eventModal');
                loadEvents();
            } else {
                showToast("❌ 刪除失敗: " + result.message);
            }
        } catch(e) { 
            showToast("⚠️ 網路連線發生錯誤"); 
        } finally { 
            toggleLoading(false); 
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.getElementById('editToggleBtn').innerText = isEditMode ? "關閉編輯" : "開啟編輯";
        document.getElementById('editToggleBtn').classList.toggle('bg-red-500');
        document.getElementById('bottomAddArea').style.display = isEditMode ? 'block' : 'none';
        renderList(rawCalendarData);
    }

    function showQRCode(date, title) {
        document.getElementById('qrTitle').innerText = title;
        document.getElementById('qrDate').innerText = date;
        document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("CHECKIN:"+date+":"+title)}`;
        document.getElementById('qrModal').style.display = 'flex';
    }

    function openAddModal() {
        currentEditData = null;
        document.getElementById('modalTitle').innerText = "排定新活動";
        document.getElementById('eventDate').value = ""; 
        document.getElementById('eventTitle').value = ""; 
        document.getElementById('eventPoster').value = "";
        document.getElementById('addActions').classList.remove('hidden'); 
        document.getElementById('editActions').classList.add('hidden');
        document.getElementById('eventModal').style.display = 'flex';
    }

    function openEditModal(evString) {
        const ev = JSON.parse(decodeURIComponent(evString));
        currentEditData = ev;
        document.getElementById('modalTitle').innerText = "編輯活動項目";
        document.getElementById('eventDate').value = ev.dateText; 
        document.getElementById('eventTitle').value = ev.title; 
        document.getElementById('eventPoster').value = ev.poster_url || "";
        document.getElementById('addActions').classList.add('hidden'); 
        document.getElementById('editActions').classList.remove('hidden');
        document.getElementById('eventModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
