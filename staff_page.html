<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none; }
        .btn-disabled { background-color: #E5E7EB !important; color: #9CA3AF !important; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-tools text-orange-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-widest">築心管理系統</span>
            </div>
            <a href="member_zone.html" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/20 text-sm transition">回個人專區</a>
        </div>
    </nav>

    <div class="bg-white border-b sticky top-[68px] z-40">
        <div class="max-w-6xl mx-auto flex space-x-8 px-6 overflow-x-auto whitespace-nowrap">
            <button onclick="switchTab('news')" id="tab-news" class="py-4 font-bold tab-active text-emerald-900">公告與連結</button>
            <button onclick="switchTab('members')" id="tab-members" class="py-4 font-bold text-gray-400">會員管理</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="py-4 font-bold text-gray-400">行事曆管理</button>
            <button onclick="switchTab('stats')" id="tab-stats" class="py-4 font-bold text-gray-400">數據與結算</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <div id="section-news" class="space-y-8">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-bullhorn mr-2"></i> 公佈欄發布</h3>
                <textarea id="newsContent" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-emerald-500 mb-4" placeholder="輸入公告內容..."></textarea>
                <button onclick="publishNews()" class="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-900 transition">更新公告</button>
            </div>
            
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-link mr-2"></i> 外部連結設定</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">導讀資料庫 URL</label>
                        <input id="link-reading" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">活動剪影 URL</label>
                        <input id="link-photo" type="text" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                </div>
                <button onclick="saveLinks()" class="mt-6 bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">儲存連結</button>
            </div>
        </div>

        <div id="section-members" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-4 text-emerald-900"><i class="fas fa-user-plus mr-2"></i> 加入新成員</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="add-name" type="text" placeholder="姓名" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="add-phone" type="text" placeholder="手機 (帳號)" class="p-3 bg-gray-50 rounded-xl border">
                    <input id="add-pass" type="text" placeholder="初始密碼" class="p-3 bg-gray-50 rounded-xl border">
                    <button onclick="addMember()" class="bg-emerald-700 text-white rounded-xl font-bold hover:bg-emerald-800 transition">新增</button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-sm">
                        <tr>
                            <th class="p-4">姓名 / 職稱</th>
                            <th class="p-4">手機 / Email</th>
                            <th class="p-4">繳費</th>
                            <th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="section-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border">
                <h3 class="text-xl font-bold mb-4 text-emerald-900">新增活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="newDate" type="date" class="p-3 bg-gray-50 rounded-xl border text-sm">
                    <input id="newTitle" type="text" placeholder="活動名稱" class="p-3 bg-gray-50 rounded-xl border text-sm">
                    <button onclick="addEvent()" class="bg-orange-600 text-white rounded-xl font-bold">加入行事曆</button>
                </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="section-stats" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 bg-white rounded-[2rem] p-8 shadow-sm border">
                    <h3 class="text-xl font-bold mb-6 text-emerald-900"><i class="fas fa-trophy mr-2 text-orange-400"></i> 學習參與排行榜 (Top 10)</h3>
                    <div id="leaderboard" class="space-y-3"></div>
                </div>
                <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-red-100">
                    <h3 class="text-xl font-bold mb-4 text-red-800"><i class="fas fa-trash-alt mr-2"></i> 期末結算</h3>
                    <p class="text-xs text-gray-500 mb-6 leading-relaxed">執行後將清空所有簽到紀錄，會員參與率將回歸 0。請確認已備份試算表。</p>
                    <button onclick="resetAttendance()" class="w-full bg-red-50 text-red-600 border border-red-200 py-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">重啟紀錄</button>
                </div>
            </div>
        </div>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold mb-4">活動簽到碼</h3>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="closeQR()" class="w-full bg-gray-100 py-3 rounded-xl">關閉</button>
        </div>
    </div>

    <script>
        const GAS_URL = "您的GAS部署網址/exec";
        const CHECKIN_URL = "https://sw-lin.github.io/chuxin-web/checkin.html";
        let allData = {};

        window.onload = fetchData;

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                document.getElementById('newsContent').value = allData.news || '';
                document.getElementById('link-reading').value = allData.config.reading_folder_url || '';
                document.getElementById('link-photo').value = allData.config.photo_gallery_url || '';
                renderMembers();
                renderCalendar();
                renderLeaderboard();
            } catch (e) { alert("讀取失敗，請確認 GAS 網址與部署狀態"); }
        }

        function switchTab(tab) {
            ['news', 'members', 'calendar', 'stats'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.replace('text-emerald-900', 'text-gray-400');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.replace('text-gray-400', 'text-emerald-900');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function renderMembers() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allData.users.map(u => `
                <tr class="border-t hover:bg-stone-50 transition">
                    <td class="p-4">
                        <div class="font-bold text-emerald-900">${u.name}</div>
                        <input type="text" placeholder="職稱 (留空為一般)" value="${u.title || ''}" 
                            onchange="updateMember('${u.phone}', 'title', this.value)" 
                            class="text-xs text-gray-400 bg-transparent border-b border-dashed border-gray-200 outline-none w-24">
                    </td>
                    <td class="p-4 text-sm">
                        <div class="font-mono text-gray-500">${u.phone}</div>
                        <input type="text" value="${u.email || ''}" onchange="updateMember('${u.phone}', 'email', this.value)" 
                            class="bg-transparent border-b border-transparent focus:border-emerald-300 outline-none w-full text-xs" placeholder="尚未填寫">
                    </td>
                    <td class="p-4">
                        <select onchange="updateMember('${u.phone}', 'paid', this.value)" class="text-xs border rounded p-1 ${u.paid==='是'?'text-emerald-600 font-bold':'text-orange-600'}">
                            <option value="是" ${u.paid==='是'?'selected':''}>已繳費</option>
                            <option value="否" ${u.paid==='否'?'selected':''}>未繳費</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            today.setHours(0,0,0,0);

            grid.innerHTML = allData.calendar.map(c => {
                const eventDate = new Date(c.dateText);
                eventDate.setHours(0,0,0,0);
                const isFuture = eventDate > today;

                return `
                <div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center">
                    <div>
                        <div class="text-[10px] font-bold text-orange-500">${c.dateText}</div>
                        <div class="font-bold text-emerald-900 text-sm">${c.title}</div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="${isFuture ? "alert('活動日期未到，QR Code 尚未開放')" : `generateQR('${c.dateText}','${c.title}')`}" 
                            class="px-3 py-1.5 rounded-lg text-[10px] font-bold transition ${isFuture ? 'btn-disabled' : 'bg-emerald-600 text-white hover:bg-emerald-700'}">
                            <i class="fas fa-qrcode mr-1"></i>${isFuture ? '未開放' : '簽到碼'}
                        </button>
                        <button onclick="deleteEvent('${c.dateText}')" class="text-gray-300 hover:text-red-500 px-1"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            const sorted = [...allData.users].sort((a,b) => b.attCount - a.attCount).slice(0, 10);
            container.innerHTML = sorted.map((u, i) => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                    <div class="flex items-center space-x-3 text-sm">
                        <span class="w-5 text-gray-400 font-bold">${i+1}</span>
                        <span class="font-bold text-emerald-900">${u.name}</span>
                    </div>
                    <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold">${u.attCount} 次參與</span>
                </div>
            `).join('');
        }

        async function apiPost(payload) {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const txt = await res.text();
                if(txt.includes("OK") || txt.includes("DELETED") || txt.includes("RESET")) {
                    alert("操作成功！");
                    location.reload();
                } else { alert("伺服器訊息: " + txt); }
            } catch (e) { alert("發布失敗，請檢查網路"); }
        }

        function publishNews() { apiPost({ type: "publish_news", content: document.getElementById('newsContent').value }); }
        function saveLinks() { apiPost({ type: "update_config", reading: document.getElementById('link-reading').value, photo: document.getElementById('link-photo').value }); }
        function updateMember(phone, field, value) { const newData = {}; newData[field] = value; apiPost({ type: "update_member", currentPhone: phone, newData: newData }); }
        function addMember() {
            const n = document.getElementById('add-name').value;
            const p = document.getElementById('add-phone').value;
            const s = document.getElementById('add-pass').value;
            if(!n || !p || !s) return alert("請完整填寫");
            apiPost({ type: "add_member", name: n, phone: p, password: btoa(s) });
        }
        function deleteMember(phone) { if(confirm("確定刪除此成員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function addEvent() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newTitle').value;
            if(!d || !t) return alert("請填寫日期與標題");
            apiPost({ type: "add_event", date: d, title: t });
        }
        function deleteEvent(date) { if(confirm("刪除活動？")) apiPost({ type: "delete_event", date: date }); }
        
        // 期末重置
        function resetAttendance() {
            const pass = prompt("此操作無法還原，請輸入「RESET」以確認執行：");
            if(pass === "RESET") apiPost({ type: "reset_attendance" });
        }

        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: `${CHECKIN_URL}?event=${date}`, 
                width: 180, height: 180,
                colorDark : "#064E3B",
                colorLight : "#ffffff"
            });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    </script>
</body>
</html>
