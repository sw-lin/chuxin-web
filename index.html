<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 會員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-emerald-50">
        <div class="emerald-gradient p-10 text-center text-white">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-full mb-4 border border-white/20">
                <i class="fas fa-heart text-2xl text-emerald-200"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-widest mb-2">築心會館</h1>
            <p class="text-emerald-100/70 text-sm">築夢踏實 · 從心開始</p>
        </div>

        <div class="p-10 space-y-6">
            <div class="space-y-4">
                <div class="relative">
                    <label class="text-xs font-bold text-emerald-900 ml-1 mb-1 block">手機號碼</label>
                    <div class="absolute left-4 top-[2.4rem] text-gray-400">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <input id="phone" type="tel" placeholder="請輸入註冊手機" 
                           class="w-full pl-12 pr-4 py-4 bg-gray-50 rounded-2xl border border-gray-100 focus:border-emerald-500 focus:bg-white outline-none transition-all">
                </div>

                <div class="relative">
                    <label class="text-xs font-bold text-emerald-900 ml-1 mb-1 block">會員密碼</label>
                    <div class="absolute left-4 top-[2.4rem] text-gray-400">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input id="password" type="password" placeholder="請輸入密碼" 
                           class="w-full pl-12 pr-4 py-4 bg-gray-50 rounded-2xl border border-gray-100 focus:border-emerald-500 focus:bg-white outline-none transition-all">
                </div>
            </div>

            <button id="loginBtn" onclick="login()" 
                    class="w-full emerald-gradient text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-emerald-900/20 transform hover:-translate-y-0.5 transition-all">
                登入會員專區
            </button>

            <div class="text-center">
                <p class="text-gray-400 text-sm italic italic">「書中自有黃金屋，心中自有一片天。」</p>
            </div>
        </div>
    </div>

    <script>
        // 更新為您最新的 GAS 部署網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyRUgtVGJ35KbidWjwFfFbt5AMHOenisHtXw-84k0RsPvonY3ASqsWGSE0eWLMAjLgJVw/exec";

        async function login() {
            const phoneInput = document.getElementById('phone').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!phoneInput || !passwordInput) {
                alert("請填寫完整手機與密碼");
                return;
            }

            // 鎖定按鈕防止重複點擊
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 驗證身分中...';

            try {
                // 向 GAS 請求資料
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                // --- 關鍵修正：從新版資料結構的 .users 屬性中尋找資料 ---
                const users = data.users;

                if (!users || !Array.isArray(users)) {
                    throw new Error("資料格式異常");
                }

                const user = users.find(u => 
                    String(u.phone).trim() === phoneInput && 
                    String(u.password).trim() === passwordInput
                );

                if (user) {
                    // 登入成功：將使用者資訊存入 Session (注意：這包含了解碼後的明文密碼)
                    sessionStorage.setItem('userInfo', JSON.stringify(user));
                    location.href = 'member_zone.html';
                } else {
                    alert("手機號碼或密碼錯誤，請重新確認。");
                    btn.disabled = false;
                    btn.innerText = "登入會員專區";
                }

            } catch (error) {
                console.error("Login Error:", error);
                alert("連線失敗，請檢查網路或確認 GAS 網址是否正確部署。");
                btn.disabled = false;
                btn.innerText = "登入會員專區";
            }
        }

        // 支援按下 Enter 鍵登入
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
