<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧管家 - 會員專屬服務</title>
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.0.1-beta.4/index.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: sans-serif; }
        #chat-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="chat-container"></div>

<script>
    // 1. 從目前的網址中抓取會員資料 (例如: ?user_name=王小明&user_phone=0928528517)
    const urlParams = new URLSearchParams(window.location.search);
    const userName = urlParams.get('user_name') || '訪客';
    const userPhone = urlParams.get('user_phone') || '未提供';

    // 2. 初始化 Coze Web SDK
    new CozeWebSDK.WebChatClient({
        config: {
            // 這是您的專屬 Bot ID
            bot_id: '7620394792719499317', 
        },
        componentProps: {
            title: '築心智慧管家',
            layout: 'window', // 使用視窗模式填充容器
            // 關鍵：這行會把網址參數直接塞進您在 Coze 建立的變數裡
            initial_variables: {
                user_name: userName,
                user_phone: userPhone
            }
        },
        el: document.getElementById('chat-container'),
    });
</script>

</body>
</html>
