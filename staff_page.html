<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幹部專區 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="admin-gradient text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-user-shield text-orange-400 text-xl"></i>
                <span class="text-xl font-bold tracking-widest">幹部管理中樞</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="member_zone.html" class="text-sm bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition border border-white/20">回會員頁</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="lg:col-span-2 space-y-10">
                
                <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-50">
                    <h2 class="text-2xl font-bold text-emerald-900 mb-6 flex items-center">
                        <i class="fas fa-edit mr-3 text-orange-500"></i> 發布最新公告
                    </h2>
                    <div class="space-y-6">
                        <textarea id="newsContent" rows="4" class="w-full p-6 bg-stone-50 rounded-[1.5rem] border border-stone-100 outline-none focus:border-emerald-500 transition text-lg" placeholder="請在此輸入公告內容..."></textarea>
                        <button onclick="publishNews()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-900 transition shadow-lg">發布公告</button>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-50">
                    <h2 class="text-2xl font-bold text-emerald-900 mb-6 flex items-center">
                        <i class="fas fa-calendar-alt mr-3 text-emerald-600"></i> 行事曆與簽到 QR Code
                    </h2>
                    <div id="calendarList" class="space-y-4">
                        <p class="text-gray-400 animate-pulse">正在讀取行事曆...</p>
                    </div>
                </div>
            </div>

            <div class="space-y-10">
                <div class="bg-emerald-900 text-white p-8 rounded-[2.5rem] shadow-xl">
                    <h3 class="font-bold text-xl mb-6 flex items-center">
                        <i class="fas fa-users mr-2 text-orange-400"></i> 勤學排行榜
                    </h3>
                    <div id="rankingList" class="space-y-4">
                        <p class="text-emerald-100/50 text-sm italic text-center">計算中...</p>
                    </div>
                </div>

                <div class="bg-stone-100 p-8 rounded-[2.5rem] border border-stone-200">
                    <h3 class="font-bold text-emerald-900 mb-4">使用說明</h3>
                    <ul class="text-sm text-stone-600 space-y-3">
                        <li>• <b>公告：</b> 會立即更新於會員首頁。</li>
                        <li>• <b>QR Code：</b> 點擊行事曆旁的按鈕即可下載該活動的報到碼。</li>
                        <li>• <b>報到碼網址：</b> 自動指向您的 checkin.html 頁面。</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold text-emerald-900 mb-4">活動簽到碼</h3>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <p id="qrDate" class="text-gray-500 mb-6 font-mono"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeQR()" class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold">關閉</button>
                <button onclick="downloadQR()" class="bg-orange-600 text-white py-3 rounded-xl font-bold">下載圖片</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        const CHECKIN_PAGE_URL = "https://sw-lin.github.io/chuxin-web/checkin.html"; // <--- 這裡請填入您的 checkin.html 完整網址

        let allData = {};

        window.onload = () => {
            fetchData();
        };

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                renderCalendar();
                renderRanking();
            } catch (e) { console.error("資料讀取失敗", e); }
        }

        // 渲染行事曆並提供 QR Code 按鈕
        function renderCalendar() {
            const container = document.getElementById('calendarList');
            if (!allData.calendar || allData.calendar.length === 0) {
                container.innerHTML = "<p class='text-gray-400'>目前無活動紀錄。</p>";
                return;
            }

            container.innerHTML = allData.calendar.map(item => `
                <div class="flex items-center justify-between p-5 bg-stone-50 rounded-2xl border border-stone-100 card-hover">
                    <div class="flex items-center space-x-4">
                        <div class="text-center bg-white px-3 py-1 rounded-lg border shadow-sm">
                            <div class="text-[10px] text-gray-400 font-bold uppercase">${item.dateText.split('-')[1]}月</div>
                            <div class="text-lg font-bold text-emerald-800">${item.dateText.split('-')[2]}</div>
                        </div>
                        <div>
                            <div class="font-bold text-emerald-900">${item.title}</div>
                            <div class="text-xs text-gray-400 font-mono">${item.dateText}</div>
                        </div>
                    </div>
                    <button onclick="generateQR('${item.dateText}', '${item.title}')" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-emerald-200 transition">
                        <i class="fas fa-qrcode mr-1"></i> 報到碼
                    </button>
                </div>
            `).join('');
        }

        // 渲染勤學排行榜 (出席次數前 5 名)
        function renderRanking() {
            const container = document.getElementById('rankingList');
            const sortedUsers = [...allData.users]
                .sort((a, b) => b.attCount - a.attCount)
                .slice(0, 5);

            container.innerHTML = sortedUsers.map((u, index) => `
                <div class="flex items-center justify-between bg-white/10 p-4 rounded-xl">
                    <div class="flex items-center space-x-3">
                        <span class="text-orange-400 font-bold w-5">#${index+1}</span>
                        <span class="font-bold">${u.name}</span>
                    </div>
                    <div class="text-xs bg-emerald-700 px-2 py-1 rounded-md">出席 ${u.attCount} 次</div>
                </div>
            `).join('');
        }

        // 產生 QR Code
        function generateQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = ""; // 清空舊的
            
            // 構建報到網址，例如: checkin.html?event=2026-03-20
            const fullUrl = `${CHECKIN_PAGE_URL}?event=${date}`;
            
            new QRCode(document.getElementById("qrcode"), {
                text: fullUrl,
                width: 200,
                height: 200,
                colorDark : "#064E3B",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (img) {
                const link = document.createElement('a');
                link.download = `簽到碼-${document.getElementById('qrDate').innerText}.png`;
                link.href = img.src;
                link.click();
            }
        }

        // 原有的發布公告功能
        async function publishNews() {
            const content = document.getElementById('newsContent').value.trim();
            if(!content) { alert("請輸入內容"); return; }
            
            const btn = document.querySelector('button[onclick="publishNews()"]');
            btn.disabled = true;
            btn.innerText = "發布中...";

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: "publish_news", content: content })
                });
                alert("公告已成功更新！");
                location.reload();
            } catch (e) {
                alert("發布失敗，請再試一次。");
                btn.disabled = false;
                btn.innerText = "立即發布公告";
            }
        }
    </script>
</body>
</html>
