<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員名冊管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .loading-card { background: white; padding: 40px; border-radius: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 28px; border-radius: 50px; font-size: 14px; z-index: 10000; transition: opacity 0.5s; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <div id="loadingOverlay"><div class="loading-card"><div class="spinner"></div><div class="text-emerald-900 font-bold">同步中...</div></div></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="window.location.href='staff_menu.html'" class="text-sm font-bold"><i class="fas fa-chevron-left mr-1"></i>返回</button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2">會員名冊管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20">開啟編輯</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-xs font-bold text-emerald-900/60 uppercase tracking-widest">Member Directory</h2>
            <span id="memberCount" class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">0 位成員</span>
        </div>
        <div id="memberList" class="space-y-4"></div>
    </main>

    <div id="bottomAddArea" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-6 hidden z-30">
        <button onclick="openModal('addMemberModal')" class="w-full py-4 bg-[#064E3B] text-white rounded-2xl font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
            <i class="fas fa-user-plus text-xl"></i> 新增新會員
        </button>
    </div>

    <div id="addMemberModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6" onclick="closeModal('addMemberModal')">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black text-emerald-900 mb-6 text-center">新增新會員</h3>
            <div class="space-y-4">
                <input type="text" id="newName" placeholder="會員姓名" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500">
                <input type="tel" id="newPhone" placeholder="手機號碼 (帳號)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold font-mono">
                <select id="newRole" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-gray-500"></select>
                <input type="email" id="newEmail" placeholder="電子郵件 Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">入會日期</label>
                    <input type="date" id="newJoinDate" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <textarea id="newNote" placeholder="備註資訊" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold" rows="2"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('addMemberModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitAddMember()" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black">確認新增</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6" onclick="closeModal('editModal')">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black text-emerald-900 mb-6 text-center">編輯會員資料</h3>
            <div class="space-y-4">
                <input type="hidden" id="oldPhone">
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">姓名</label>
                    <input type="text" id="editName" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">手機 (帳號)</label>
                    <input type="text" id="editPhone" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold font-mono">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">職位</label>
                    <select id="editRole" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">Email</label>
                    <input type="email" id="editEmail" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">入會日期</label>
                    <input type="date" id="editJoinDate" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-4 mb-1">備註</label>
                    <textarea id="editNote" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold" rows="2"></textarea>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal('editModal')" class="py-4 text-gray-400 font-bold">取消</button>
                <button onclick="submitEdit()" class="py-4 bg-[#064E3B] text-white rounded-2xl font-black">儲存修改</button>
            </div>
        </div>
    </div>

    <script>
        var GAS_URL = 'https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        var STAFF_KEY = sessionStorage.getItem('staff_key');
        var isEditMode = false;
        var CONFIG_ROLES = [];

        window.onload = function() {
            if (!STAFF_KEY) { 
                alert("請重新從管理區登入以驗證權限");
                window.location.href = "index.html"; 
                return; 
            }
            document.getElementById('newJoinDate').value = new Date().toISOString().split('T')[0];
            loadMembers();
        };

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

        function loadMembers() {
            toggleLoading(true);
            fetch(GAS_URL + "?t=" + Date.now())
                .then(r => r.json())
                .then(data => {
                    var list = document.getElementById('memberList');
                    var users = data.users || [];
                    CONFIG_ROLES = data.roleList || [];
                    
                    var newRoleSelect = document.getElementById('newRole');
                    newRoleSelect.innerHTML = '<option value="">選擇職位</option>' + CONFIG_ROLES.map(r => `<option value="${r}">${r}</option>`).join('');

                    document.getElementById('memberCount').innerText = users.length + ' 位成員';
                    
                    var html = '';
                    for (var i = 0; i < users.length; i++) {
                        var u = users[i];
                        var memberData = encodeURIComponent(JSON.stringify(u));
                        var displayPhone = String(u.phone).startsWith('0') ? u.phone : '0' + u.phone;

                        // 這裡就是您原本的卡片外框風格 rounded-[2rem]
                        html += `<div class="bg-white p-5 rounded-[2rem] shadow-sm flex flex-col border border-gray-100 transition-all">`;
                        html += `  <div class="flex justify-between items-center w-full">`;
                        html += `    <div class="flex-1 min-w-0 pr-4">`;
                        html += `      <div class="flex items-center gap-2 mb-0.5">`;
                        html += `        <span class="text-lg font-black text-emerald-900 truncate">${u.name}</span>`;
                        html += `        <span class="text-[10px] font-black bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full shrink-0">${u.role || ''}</span>`;
                        html += `      </div>`;
                        if(u.email) html += `      <div class="text-[11px] text-gray-400 truncate italic">${u.email}</div>`;
                        html += `    </div>`;
                        html += `    <div class="text-lg font-black text-emerald-800 font-mono text-right">${displayPhone}</div>`;
                        html += `  </div>`;

                        // 編輯模式下的按鈕配置
                        if (isEditMode) {
                            html += `  <div class="flex gap-2 mt-4 pt-4 border-t border-gray-50">`;
                            html += `    <button onclick="openEditModal('${memberData}')" class="flex-1 py-3 rounded-xl bg-emerald-50 text-emerald-700 text-xs font-bold active:scale-95 transition-all"><i class="fas fa-edit mr-1"></i>修改資料</button>`;
                            html += `    <button onclick="deleteMember('${u.phone}', '${u.name}')" class="w-12 py-3 rounded-xl bg-red-50 text-red-500 text-xs active:scale-95 transition-all"><i class="fas fa-trash-alt"></i></button>`;
                            html += `  </div>`;
                        }
                        html += `</div>`;
                    }
                    list.innerHTML = html;
                })
                .catch(() => showToast("連線失敗"))
                .finally(() => toggleLoading(false));
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            var btn = document.getElementById('editToggleBtn');
            btn.innerText = isEditMode ? "結束編輯" : "開啟編輯";
            btn.className = isEditMode ? "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md" : "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
            document.getElementById('bottomAddArea').classList.toggle('hidden', !isEditMode);
            loadMembers();
        }

        function openEditModal(memberJson) {
            var member = JSON.parse(decodeURIComponent(memberJson));
            document.getElementById('oldPhone').value = member.phone;
            document.getElementById('editName').value = member.name;
            document.getElementById('editPhone').value = member.phone;
            document.getElementById('editEmail').value = member.email || '';
            document.getElementById('editJoinDate').value = member.joinDate || '';
            document.getElementById('editNote').value = member.note || '';
            
            var roleSelect = document.getElementById('editRole');
            roleSelect.innerHTML = CONFIG_ROLES.map(r => `<option value="${r}" ${r === member.role ? 'selected' : ''}>${r}</option>`).join('');
            
            openModal('editModal');
        }

        function submitEdit() {
            var payload = {
                type: 'update_member',
                key: STAFF_KEY,
                oldPhone: document.getElementById('oldPhone').value,
                phone: document.getElementById('editPhone').value,
                name: document.getElementById('editName').value,
                role: document.getElementById('editRole').value,
                email: document.getElementById('editEmail').value,
                joinDate: document.getElementById('editJoinDate').value,
                note: document.getElementById('editNote').value
            };
            if(!payload.name || !payload.phone) return alert("姓名與手機為必填");
            
            toggleLoading(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(res => {
                    if (res.result === "SUCCESS") {
                        showToast("✅ 資料已更新");
                        closeModal('editModal');
                        loadMembers();
                    } else { alert("更新失敗：" + res.message); }
                })
                .finally(() => toggleLoading(false));
        }

        function submitAddMember() {
            var n = document.getElementById('newName').value.trim();
            var p = document.getElementById('newPhone').value.trim();
            if (!n || !p) return alert("姓名與手機為必填");

            toggleLoading(true);
            var payload = { 
                type: 'add_member', 
                key: STAFF_KEY, 
                name: n, 
                phone: p, 
                email: document.getElementById('newEmail').value, 
                role: document.getElementById('newRole').value,
                joinDate: document.getElementById('newJoinDate').value,
                note: document.getElementById('newNote').value,
                password: '123' 
            };
            
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(r => r.json())
                .then(res => { 
                    if(res.result === "SUCCESS") {
                        showToast("✅ 會員已新增"); 
                        closeModal('addMemberModal');
                        loadMembers(); 
                    } else { showToast("❌ 失敗：" + res.message); }
                })
                .finally(() => toggleLoading(false));
        }

        function deleteMember(phone, name) {
            if (!confirm("確定要刪除「" + name + "」嗎？")) return;
            toggleLoading(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_member', key: STAFF_KEY, phone: phone }) })
                .then(() => { showToast("🗑️ 已移除成員"); loadMembers(); })
                .finally(() => toggleLoading(false));
        }

        function showToast(m) {
            var t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
