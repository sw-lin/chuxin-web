<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-nav { background: #064E3B; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="font-bold text-lg tracking-wider">築心會員館</span>
            </div>
            <button onclick="logout()" class="text-sm bg-white/10 hover:bg-white/20 px-4 py-1.5 rounded-full transition">登出</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 space-y-8">
        <div class="bg-emerald-50 border border-emerald-100 rounded-3xl p-5 flex items-center space-x-4">
            <div class="bg-white w-10 h-10 rounded-2xl flex items-center justify-center text-emerald-600 shadow-sm shrink-0">
                <i class="fas fa-bullhorn"></i>
            </div>
            <div class="flex-1 overflow-hidden">
                <p id="news" class="text-emerald-900 font-medium truncate">正在同步最新公告...</p>
            </div>
        </div>

        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <span id="userTitle" class="bg-emerald-300/20 px-3 py-1 rounded-full text-xs font-bold tracking-widest">載入中</span>
                        <h2 id="userName" class="text-3xl font-bold tracking-wider">載入中...</h2>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div>
                        <p class="text-emerald-100/70 text-sm">學習參與率</p>
                        <p id="attPercent" class="text-4xl font-black text-orange-300">0%</p>
                    </div>
                    <div class="text-right">
                        <p class="text-emerald-100/70 text-sm">已出席次數</p>
                        <p id="attCountDisplay" class="text-4xl font-black text-white">0 <span class="text-lg text-emerald-100/50">/ 0</span></p>
                    </div>
                </div>
                <div class="mt-6 w-full bg-white/20 h-2.5 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-orange-400 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="startScanner()" class="bg-orange-500 p-6 rounded-[2rem] shadow-lg text-white hover:bg-orange-600 transition text-center col-span-2 md:col-span-1">
                <i class="fas fa-qrcode text-3xl mb-2"></i>
                <div class="font-bold">掃碼報到</div>
            </button>

            <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] border border-emerald-50 hover:shadow-md transition text-center">
                <i class="fas fa-book-reader text-blue-600 text-2xl mb-2"></i>
                <div class="font-bold text-emerald-900">導讀資料</div>
            </button>

            <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] border border-emerald-50 hover:shadow-md transition text-center">
                <i class="fas fa-images text-amber-600 text-2xl mb-2"></i>
                <div class="font-bold text-emerald-900">活動剪影</div>
            </button>

            <button onclick="openEditModal()" class="bg-stone-800 p-6 rounded-[2rem] hover:brightness-110 transition text-center">
                <i class="fas fa-user-cog text-stone-400 text-2xl mb-2"></i>
                <div class="font-bold text-white">修改資料</div>
            </button>
        </div>

        <div id="staffSection" class="hidden pt-10 border-t border-dashed border-gray-200 text-center">
            <a href="staff_page.html" class="inline-flex items-center px-8 py-3 bg-emerald-700 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-800 transition">
                <i class="fas fa-user-shield mr-2"></i> 進入幹部管理後台
            </a>
        </div>
    </main>

    <div
