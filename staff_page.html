<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; opacity: 0; transition: opacity 0.5s; }
        .admin-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .tab-active { border-bottom: 4px solid #F97316; color: #F97316 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 px-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center h-16">
            <div class="flex items-center space-x-2 text-[#064E3B]">
                <i class="fas fa-shield-alt"></i>
                <span class="font-bold">後台管理</span>
            </div>
            <div class="flex space-x-6 text-sm font-medium text-gray-500">
                <button id="tab-members" onclick="switchTab('members')" class="py-5 tab-active">會員</button>
                <button id="tab-calendar" onclick="switchTab('calendar')" class="py-5">行事曆</button>
                <button onclick="location.href='member_zone.html'" class="py-5 text-gray-400">返回</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        <section id="sec-members" class="space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-4 text-emerald-900">快速新增會員</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="mName" placeholder="姓名" class="bg-gray-50 p-3 rounded-xl outline-none text-sm">
                    <input type="tel" id="mPhone" placeholder="手機 (登入帳號)" class="bg-gray-50 p-3 rounded-xl outline-none text-sm">
                    <input type="email" id="mEmail" placeholder="Email" class="bg-gray-50 p-3 rounded-xl outline-none text-sm">
                    <button onclick="addMember()" class="bg-emerald-800 text-white rounded-xl font-bold hover:bg-emerald-700 transition">新增</button>
                </div>
            </div>
            <div id="memberList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section id="sec-calendar" class="hidden space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-4 text-emerald-900">排定新活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="date" id="calDate" class="bg-gray-50 p-3 rounded-xl outline-none text-sm">
                    <input type="text" id="calTitle" placeholder="活動名稱" class="bg-gray-50 p-3 rounded-xl outline-none text-sm">
                    <button onclick="addEvent()" class="bg-emerald-800 text-white rounded-xl font-bold">發布</button>
                </div>
            </div>
            <div id="eventList" class="space-y-3"></div>
        </section>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-filter blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center">
            <h3 id="qrTitle" class="text-xl font-bold text-emerald-900 mb-1"></h3>
            <p id="qrDate" class="text-xs text-emerald-600 mb-8 font-mono"></p>
            <div id="qrcode" class="flex justify-center mb-8 border-4 border-emerald-50 p-4 rounded-3xl"></div>
            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">關閉</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        const CHECKIN_URL = "https://your-domain.com/checkin.html"; // 請改為您的簽到頁網址
        let adminKey = "";

        // --- 核心修正：初始化邏輯 ---
        async function init() {
            // 從 Session 讀取在 member_zone 輸入的金鑰
            const savedKey = sessionStorage.getItem('adminKey');
            
            if (!savedKey) {
                alert("權限不足，請重新由會員中心進入");
                location.href = 'member_zone.html';
                return;
            }

            adminKey = savedKey; // 賦值給全域變數供 apiPost 使用
            document.body.style.opacity = "1"; // 顯示頁面內容
            fetchData();
        }

        async function apiPost(data) {
            // 自動帶入金鑰進行驗證
            data.key = adminKey;
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    alert("操作成功");
                    fetchData();
                } else {
                    alert("失敗：" + (result.message || "授權無效"));
                }
            } catch (e) {
                alert("系統連線失敗");
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                renderMembers(data.users || []);
                renderEvents(data.calendar || []);
            } catch (e) { console.error(e); }
        }

        function renderMembers(users) {
            const list = document.getElementById('memberList');
            list.innerHTML = users.map(u => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50 flex justify-between items-center">
                    <div>
                        <div class="font-bold text-emerald-900">${u.name}</div>
                        <div class="text-[10px] text-gray-400 font-mono">${u.phone}</div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderEvents(events) {
            const list = document.getElementById('eventList');
            list.innerHTML = events.reverse().map(ev => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div>
                        <div class="text-emerald-900 font-bold text-sm">${ev.title}</div>
                    </div>
                    <button onclick="showQR('${ev.dateText}', '${ev.title}')" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold">QR碼</button>
                </div>
            `).join('');
        }

        function addMember() {
            const name = document.getElementById('mName').value;
            const phone = document.getElementById('mPhone').value;
            if(!name || !phone) return alert("請填寫姓名與電話");
            apiPost({ type: "add_member", name, phone, email: document.getElementById('mEmail').value, password: "123" });
        }

        function addEvent() {
            const date = document.getElementById('calDate').value;
            const title = document.getElementById('calTitle').value;
            if(!date || !title) return alert("請填寫日期與名稱");
            apiPost({ type: "add_event", date, title });
        }

        function deleteMember(phone) { if(confirm("確定刪除會員？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function showQR(date, title) {
            document.getElementById('qrTitle').innerText = title;
            document.getElementById('qrDate').innerText = date;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${CHECKIN_URL}?event=${date}`, width: 180, height: 180 });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function switchTab(tab) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }
        window.onload = init;
    </script>
</body>
</html>
