<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名管理 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #065F46; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 10000; pointer-events: none; }
    </style>
</head>
<body class="pb-32">
    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div id="toast"></div>

    <nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-4 h-16 shadow-lg flex items-center justify-between">
        <button onclick="location.href='staff_menu.html'" class="text-sm font-bold flex items-center">
            <i class="fas fa-chevron-left mr-1"></i> 返回
        </button>
        <h1 class="text-lg font-black tracking-widest absolute left-1/2 -translate-x-1/2">活動報名管理</h1>
        <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 transition-all">開啟編輯</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-4">
        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-emerald-50">
            <label class="text-[10px] text-gray-400 font-black block mb-2 px-1 uppercase tracking-widest">Select Event</label>
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <select id="eventSelector" onchange="loadEventDetails()" class="w-full bg-emerald-50/50 p-4 pr-10 rounded-2xl text-base font-bold text-emerald-900 outline-none appearance-none border-2 border-transparent focus:border-emerald-600 transition-all">
                        <option value="">-- 請選擇活動項目 --</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-emerald-800/50">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <button id="manageEventBtn" onclick="openEditModal()" class="hidden bg-emerald-100 text-emerald-700 w-14 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
        </div>

        <div id="statsSection" class="hidden bg-white p-6 rounded-[2.5rem] shadow-md border border-emerald-100 flex items-center justify-between">
            <div class="space-y-1">
                <span class="text-xs font-bold text-gray-400 block ml-1">報名進度</span>
                <div class="flex items-baseline gap-2">
                    <span id="statCount" class="text-4xl font-black text-emerald-900">0</span>
                    <span class="text-xl font-bold text-gray-400">位成員報名</span>
                </div>
            </div>
            <button onclick="sendToLine()" class="bg-[#06C755] text-white w-20 h-20 rounded-2xl font-black shadow-lg flex flex-col items-center justify-center active:scale-95 transition-all">
                <i class="fab fa-line text-2xl mb-1"></i>
                <span class="text-[10px]">發送名單</span>
            </button>
        </div>

        <div id="adminActions" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
            <button onclick="openAddModal()" class="bg-[#064E3B] text-white px-8 py-4 rounded-2xl font-black shadow-[0_10px_25px_rgba(6,78,59,0.3)] flex items-center gap-3 active:scale-95 border-2 border-emerald-400/30 transition-all whitespace-nowrap">
                <i class="fas fa-plus-circle text-xl"></i>
                <span>發佈全新活動表單</span>
            </button>
        </div>

        <div class="space-y-3">
            <h3 class="text-sm font-black text-emerald-900 ml-2"><i class="fas fa-file-signature mr-2"></i>報名者名單</h3>
            <div id="regList" class="space-y-3">
                <div class="text-center py-20 text-gray-300 italic text-sm">請先選取活動項目</div>
            </div>
        </div>
    </main>

    <div id="eventModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-xl font-black text-emerald-900 mb-2">編輯活動內容</h3>
            <input type="hidden" id="old_title">
            
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">活動標題</label>
                    <input type="text" id="ev_title" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">海報圖片連結</label>
                    <input type="text" id="ev_poster" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">活動簡介</label>
                    <textarea id="ev_desc" rows="2" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 font-bold"></textarea>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-orange-600 ml-2 mb-1 block">需填身分證?</label>
                    <select id="ev_needId" class="w-full bg-orange-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                        <option value="N">不需要</option>
                        <option value="Y">需要</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-orange-600 ml-2 mb-1 block">提供遊覽車?</label>
                    <select id="ev_bus" class="w-full bg-orange-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                        <option value="N">無</option>
                        <option value="Y">有</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-600 ml-2 mb-1 block">會員費用</label>
                    <input type="number" id="ev_mFee" placeholder="0" class="w-full bg-blue-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-600 ml-2 mb-1 block">非會員費用</label>
                    <input type="number" id="ev_gFee" placeholder="0" class="w-full bg-blue-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">開始展示日期</label>
                    <input type="date" id="ev_start" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">截止下架日期</label>
                    <input type="date" id="ev_until" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-4 text-xs font-bold">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-emerald-600 ml-2 mb-1 block">活動舉辦日期</label>
                <input type="date" id="ev_date" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-xs font-bold">
            </div>
            
            <div id="deleteZone" class="hidden pt-2">
                <button onclick="deleteCurrentEvent()" class="w-full py-3 text-red-500 text-xs font-bold bg-red-50 rounded-xl border border-red-100 italic">
                    <i class="fas fa-trash-alt mr-1"></i> 永久刪除此活動
                </button>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-black">取消</button>
                <button id="submitBtn" onclick="saveEvent()" class="flex-[2] emerald-gradient text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyFMJ5BBSmK-joVE_BWMMCeqjXEISG-u3iyND1zBmGiA-QssM86Wo85BJBttzVIllw/exec";
        let allData = {};
        let isEditMode = false;

        window.onload = loadData;

        // 【修正核心】日期格式化函數，確保轉為 YYYY-MM-DD
        function formatDateForInput(isoString) {
  if (!isoString) return ''; // 如果沒有資料則回傳空字串
  
  const date = new Date(isoString);
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  
  return `${year}-${month}-${day}`;
}

        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                allData = await res.json();
                renderSelector();
                if (document.getElementById('eventSelector').value) loadEventDetails();
            } catch (e) { showToast("連線失敗"); }
            showLoading(false);
        }

        function renderSelector() {
            const selector = document.getElementById('eventSelector');
            const current = selector.value;
            if (allData.events && allData.events.length > 0) {
                selector.innerHTML = '<option value="">-- 請選擇活動項目 --</option>' + 
                    allData.events.map(ev => `<option value="${ev.title}">${formatDateForInput(ev.date)} | ${ev.title}</option>`).join('');
                if (current) selector.value = current;
            }
        }
function loadEventDetails() {
    const title = document.getElementById('eventSelector').value;
    const stats = document.getElementById('statsSection');
    const list = document.getElementById('regList');
    const manageBtn = document.getElementById('manageEventBtn');

    if (!title) {
        stats.classList.add('hidden'); manageBtn.classList.add('hidden');
        list.innerHTML = '<div class="text-center py-20 text-gray-300 italic text-sm">請先選取活動項目</div>';
        return;
    }

    if (isEditMode) manageBtn.classList.remove('hidden');
    stats.classList.remove('hidden');

    // --- 除錯用：在瀏覽器 F12 控制台查看資料到底長什麼樣子 ---
    console.log("當前選中活動:", title);
    console.log("原始報名資料清單:", allData.registrations);

    // 取得當前活動設定
    const currentEvent = allData.events.find(e => (e.title || e.活動標題 || e.標題) === title);
    const isBus = currentEvent?.isTourBus === 'Y' || currentEvent?.遊覽車 === 'Y';

    // 【修正核心】使用多種可能的 Key 來過濾
    const filtered = (allData.registrations || []).filter(r => {
        // 同時檢查「活動標題」、「eventTitle」、「activityTitle」等可能名稱
        const rTitle = r.活動標題 || r.eventTitle || r.activityTitle || r.title;
        return rTitle === title;
    });

    document.getElementById('statCount').innerText = filtered.length;

    if (filtered.length === 0) {
        list.innerHTML = `
            <div class="text-center py-10 text-gray-300 italic text-sm">目前尚無人報名 (或資料載入中)</div>
            ${isEditMode ? `<button onclick="openRegModal(null)" class="w-full py-4 border-2 border-dashed border-emerald-200 rounded-3xl text-emerald-600 font-bold"><i class="fas fa-plus mr-2"></i>手動新增報名</button>` : ''}
        `;
    } else {
        let html = filtered.map((r, index) => {
            // 【修正欄位讀取】確保能讀到姓名、繳費狀態等
            const name = r.會員姓名 || r.memberName || r.name;
            const phone = r.手機號碼 || r.phone || r.cellphone;
            const isPaid = r.是否繳費 === 'Y' || r.isPaid === 'Y' || r.paid === 'Y';
            const diet = r.飲食選項 || r.diet || "未填";
            const idNum = r.身分證號碼 || r.idCard || r.id || "無";
            const note = r.備註 || r.note || "無";
            const trans = r.交通方式 || r.transport || "自駕";

            let transInfo = '';
            if (!isBus) {
                transInfo = trans === '自駕' ? `🚗 自駕 (可載 ${r.可載人數 || 0} 人)` : `搭共乘`;
            }

            return `
                <div class="bg-white rounded-3xl border border-emerald-50 shadow-sm overflow-hidden mb-3">
                    <div onclick="toggleRegDetail(${index})" class="p-5 flex justify-between items-center cursor-pointer active:bg-gray-50">
                        <div class="flex items-center gap-3">
                            <span class="font-black text-emerald-900">${name}</span>
                            ${!isEditMode && transInfo ? `<span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded">${transInfo}</span>` : ''}
                        </div>
                        <div class="flex items-center gap-3">
                            ${isEditMode ? 
                                `<select onchange="updatePaidStatus('${phone}', this.value)" onclick="event.stopPropagation()" class="text-xs font-bold border rounded-lg px-2 py-1 ${isPaid ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}">
                                    <option value="Y" ${isPaid ? 'selected' : ''}>已繳費</option>
                                    <option value="N" ${!isPaid ? 'selected' : ''}>待繳費</option>
                                </select>
                                <button onclick="event.stopPropagation(); openRegModal('${phone}')" class="text-emerald-500 p-2"><i class="fas fa-tools"></i></button>` 
                                : 
                                `<div class="text-[10px] px-3 py-1 rounded-full font-bold ${isPaid ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}">${isPaid ? '已繳費' : '待繳費'}</div>`
                            }
                        </div>
                    </div>
                    <div id="regDetail-${index}" class="hidden px-5 pb-5 bg-emerald-50/30 border-t border-dashed border-emerald-100">
                        <div class="grid grid-cols-2 gap-2 mt-3 text-xs">
                            <div class="text-gray-500">飲食狀況：<span class="text-emerald-800 font-bold">${diet}</span></div>
                            <div class="text-gray-500">身分證：<span class="text-emerald-800 font-bold">${idNum}</span></div>
                            <div class="col-span-2 text-gray-500">備註訊息：<span class="text-emerald-800 font-bold">${note}</span></div>
                            ${!isBus ? `<div class="col-span-2 text-blue-600 font-bold italic">交通安排：${transInfo}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        if (isEditMode) {
            html += `<button onclick="openRegModal(null)" class="w-full py-4 bg-emerald-50 border-2 border-dashed border-emerald-200 rounded-3xl text-emerald-600 font-bold mt-2"><i class="fas fa-plus mr-2"></i>手動新增報名者</button>`;
        }
        list.innerHTML = html;
    }
}        
        // 切換展開
function toggleRegDetail(index) {
    const el = document.getElementById(`regDetail-${index}`);
    el.classList.toggle('hidden');
}
// 開啟報名者編輯彈窗
function openRegModal(phone) {
    const title = document.getElementById('eventSelector').value;
    const currentEvent = allData.events.find(e => e.title === title);
    const isBus = currentEvent?.isTourBus === 'Y' || currentEvent?.遊覽車 === 'Y';
    const needId = currentEvent?.needId === 'Y' || currentEvent?.身分證 === 'Y';

    // 顯示/隱藏條件欄位
    document.getElementById('reg_id_zone').style.display = needId ? 'block' : 'none';
    document.getElementById('reg_transport_zone').style.display = isBus ? 'none' : 'block';

    if (phone) {
        // 修改模式：填入現有資料
        const r = allData.registrations.find(reg => reg.手機號碼 === phone && reg.活動標題 === title);
        document.getElementById('reg_old_phone').value = r.手機號碼;
        document.getElementById('reg_name').value = r.會員姓名;
        document.getElementById('reg_phone').value = r.手機號碼;
        document.getElementById('reg_diet').value = r.飲食選項 || '葷';
        document.getElementById('reg_id').value = r.身分證號碼 || '';
        document.getElementById('reg_note').value = r.備註 || '';
        document.querySelector(`input[name="trans"][value="${r.交通方式 || '自駕'}"]`).checked = true;
        document.getElementById('reg_seats').value = r.可載人數 || 0;
    } else {
        // 新增模式：清空
        document.getElementById('reg_old_phone').value = "";
        document.querySelectorAll('#regModal input:not([type="radio"]), #regModal textarea').forEach(i => i.value = "");
        document.getElementById('reg_diet').value = "葷";
    }
    document.getElementById('regModal').classList.remove('hidden');
}

function closeRegModal() { document.getElementById('regModal').classList.add('hidden'); }

// 快速更新繳費狀態 (不需要開彈窗)
async function updatePaidStatus(phone, status) {
    const title = document.getElementById('eventSelector').value;
    showLoading(true);
    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: 'update_reg_paid', // 需在 GAS 端補上此 type
                key: sessionStorage.getItem('staff_key'),
                eventTitle: title,
                phone: phone,
                isPaid: status
            })
        });
        if ((await res.json()).result === 'SUCCESS') showToast('狀態已更新');
    } catch (e) { showToast('更新失敗'); }
    showLoading(false);
}        
        
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editToggleBtn');
            const adminActions = document.getElementById('adminActions');
            const manageBtn = document.getElementById('manageEventBtn');
            btn.innerText = isEditMode ? "完成編輯" : "開啟編輯";
            btn.classList.toggle('bg-red-500', isEditMode);
            adminActions.classList.toggle('hidden', !isEditMode);
            adminActions.classList.toggle('flex', isEditMode);
            if (isEditMode && document.getElementById('eventSelector').value) manageBtn.classList.remove('hidden');
            else manageBtn.classList.add('hidden');
            loadEventDetails();
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "發布新活動";
            document.getElementById('old_title').value = "";
            document.querySelectorAll('#eventModal input, #eventModal textarea').forEach(i => i.value = "");
            document.getElementById('ev_needId').value = "N";
            document.getElementById('ev_bus').value = "N";
            document.getElementById('deleteZone').classList.add('hidden');
            document.getElementById('eventModal').classList.remove('hidden');
        }

function openEditModal() {
    const title = document.getElementById('eventSelector').value;
    // 增加多種標題屬性的防呆匹配
    const ev = allData.events.find(e => e.title === title || e.標題 === title || e.活動標題 === title);
    if (!ev) return;

    console.log("=== 當前選中的活動資料 ===", ev);

    document.getElementById('modalTitle').innerText = "修改活動內容";
    document.getElementById('old_title').value = ev.title || ev.標題 || ev.活動標題 || "";
    document.getElementById('ev_title').value = ev.title || ev.標題 || ev.活動標題 || "";
    document.getElementById('ev_poster').value = ev.poster_url || ev.海報 || ev.海報圖片連結 || "";
    document.getElementById('ev_desc').value = ev.desc || ev.簡介 || ev.活動簡介 || "";

    // 下拉選單處理
    const needIdVal = ev.needId || ev.needIdCard || ev.身分證 || "N";
    document.getElementById('ev_needId').value = (needIdVal === 'Y' || needIdVal === '是' || needIdVal === true) ? 'Y' : 'N';

    const busVal = ev.isTourBus || ev.遊覽車 || "N";
    document.getElementById('ev_bus').value = (busVal === 'Y' || busVal === '是' || busVal === true) ? 'Y' : 'N';

    document.getElementById('ev_mFee').value = ev.memberFee || 0;
    document.getElementById('ev_gFee').value = ev.guestFee || 0;

    // 【修正：三個日期欄位】
    // 使用你寫的 formatDateForInput 函式是最保險的，它會自動處理 .split('T')[0]
    document.getElementById('ev_start').value = formatDateForInput(ev.startDate || ev.開始展示日期);
    document.getElementById('ev_until').value = formatDateForInput(ev.deadline || ev.截止下架日期);
    document.getElementById('ev_date').value = formatDateForInput(ev.eventDate || ev.活動舉辦日期);

    document.getElementById('deleteZone').classList.remove('hidden');
    document.getElementById('eventModal').classList.remove('hidden');
}        
// 【強化版】日期轉換函數：解決 GAS 各種奇怪日期格式 (包含帶有斜線或時區的字串)
function formatDateForInput(dateVal) {
    if (!dateVal) return "";
    
    try {
        let d;
        if (typeof dateVal === 'string') {
            // 如果已經是標準格式直接回傳
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateVal)) return dateVal;
            // 將可能的 2026/04/09 轉為 2026-04-09
            let cleanStr = dateVal.replace(/\//g, '-').split('T')[0];
            d = new Date(cleanStr);
        } else {
            d = new Date(dateVal);
        }

        if (isNaN(d.getTime())) return "";

        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch(e) {
        return "";
    }
}  
async function saveSingleReg() {
    const payload = {
        type: 'save_single_registration',
        key: sessionStorage.getItem('staff_key'),
        eventTitle: document.getElementById('eventSelector').value,
        oldPhone: document.getElementById('reg_old_phone').value, // 判斷是修改還是新增
        name: document.getElementById('reg_name').value,
        phone: document.getElementById('reg_phone').value,
        diet: document.getElementById('reg_diet').value,
        idCard: document.getElementById('reg_id').value,
        note: document.getElementById('reg_note').value,
        transport: document.querySelector('input[name="trans"]:checked')?.value || '自駕',
        seats: document.getElementById('reg_seats').value || 0,
        isMember: 'Y' // 這裡可以根據您的 UI 需求調整
    };

    showLoading(true);
    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        if ((await res.json()).result === 'SUCCESS') {
            showToast('資料已更新');
            closeRegModal();
            await loadData(); // 重新整理列表
        }
    } catch (e) { showToast('儲存失敗'); }
    showLoading(false);
}        
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }

        async function saveEvent() {
            const oldTitle = document.getElementById('old_title').value;
            const payload = {
                type: oldTitle ? 'update_calendar_event' : 'add_new_event',
                key: sessionStorage.getItem('staff_key'),
                title: document.getElementById('ev_title').value,
                poster_url: document.getElementById('ev_poster').value,
                desc: document.getElementById('ev_desc').value,
                start_date: document.getElementById('ev_start').value,
                display_until: document.getElementById('ev_until').value,
                date: document.getElementById('ev_date').value,
                // 新欄位 Payload
                needId: document.getElementById('ev_needId').value,
                isTourBus: document.getElementById('ev_bus').value,
                memberFee: document.getElementById('ev_mFee').value,
                guestFee: document.getElementById('ev_gFee').value,
                oldTitle: oldTitle,
                reg_url: "INTERNAL"
            };

            if(!payload.title || !payload.date) return alert("請填寫活動名稱與日期");
            
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    showToast("儲存成功");
                    closeModal();
                    await loadData();
                }
            } catch (e) { showToast("儲存失敗"); }
            showLoading(false);
        }

        // ...其餘 deleteCurrentEvent, deleteSingleReg, sendToLine 函數保持不變...
        async function deleteCurrentEvent() {
            const title = document.getElementById('old_title').value;
            if (!confirm(`⚠️ 確定要刪除「${title}」嗎？此操作不可還原。`)) return;
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_event_poster', key: sessionStorage.getItem('staff_key'), eventTitle: title }) });
                if ((await res.json()).result === "SUCCESS") {
                    showToast("活動已撤除"); closeModal();
                    document.getElementById('eventSelector').value = "";
                    await loadData();
                }
            } catch (e) { showToast("刪除失敗"); }
            showLoading(false);
        }

        async function deleteSingleReg(title, phone) {
            if (!confirm(`確定要刪除此位報名者嗎？`)) return;
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_registration', key: sessionStorage.getItem('staff_key'), eventTitle: title, phone: phone }) });
                if ((await res.json()).result === 'SUCCESS') { showToast('已移除該人員'); await loadData(); }
            } catch (e) { showToast('操作失敗'); }
            showLoading(false);
        }

        async function sendToLine() {
            const title = document.getElementById('eventSelector').value;
            const filtered = (allData.registrations || []).filter(r => r.活動標題 === title);
            if (filtered.length === 0) return showToast("目前無人報名");
            let message = `📊 【築心】活動報名清單\n活動：${title}\n總計：${filtered.length} 人\n\n`;
            filtered.forEach((r, i) => message += `${i+1}. ${r.會員姓名} (${r.手機號碼.slice(-4)})\n`);
            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'send_line', key: sessionStorage.getItem('staff_key'), message: message }) });
                if ((await res.json()).result === 'SUCCESS') showToast('已發送至 LINE');
            } catch (e) { showToast('發送失敗'); }
            showLoading(false);
        }

        function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(()=>t.style.opacity='0', 2500); }
    </script>
<div id="regModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
        <h3 class="text-xl font-black text-emerald-900 mb-2">報名者詳細資訊</h3>
        <input type="hidden" id="reg_old_phone">
        
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">姓名</label>
                    <input type="text" id="reg_name" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">電話</label>
                    <input type="text" id="reg_phone" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm font-bold">
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">飲食選項</label>
                    <select id="reg_diet" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm font-bold">
                        <option value="葷">葷</option>
                        <option value="蛋奶素">蛋奶素</option>
                        <option value="全素">全素</option>
                    </select>
                </div>
                <div id="reg_id_zone">
                    <label class="text-[10px] font-bold text-emerald-600 ml-2">身分證號</label>
                    <input type="text" id="reg_id" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm font-bold">
                </div>
            </div>

            <div id="reg_transport_zone" class="p-4 bg-blue-50 rounded-2xl space-y-3">
                <label class="text-[10px] font-bold text-blue-600">交通安排 (非遊覽車活動)</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 text-xs font-bold"><input type="radio" name="trans" value="自駕"> 自駕</label>
                    <label class="flex items-center gap-2 text-xs font-bold"><input type="radio" name="trans" value="共乘"> 共乘</label>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400">若自駕，可載人數</label>
                    <input type="number" id="reg_seats" class="w-full bg-white border-none rounded-xl px-4 py-2 text-sm font-bold">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-emerald-600 ml-2">備註</label>
                <textarea id="reg_note" rows="2" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 text-sm font-bold"></textarea>
            </div>
        </div>

        <div class="flex gap-3 pt-4">
            <button onclick="closeRegModal()" class="flex-1 py-4 text-gray-400 font-black">取消</button>
            <button onclick="saveSingleReg()" class="flex-[2] emerald-gradient text-white rounded-2xl font-black shadow-lg">儲存變更</button>
        </div>
    </div>
</div>    
</body>
</html>
