<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員專區 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F8FAF9; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="emerald-gradient text-white px-6 py-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="hover:text-emerald-300 transition-all"><i class="fas fa-home"></i></a>
                <span class="text-xl font-bold tracking-widest border-l border-white/20 pl-4">會員專區</span>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="userName">載入中...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-10">
        
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
            <h3 class="text-orange-600 font-bold text-sm mb-2"><i class="fas fa-bullhorn mr-2"></i> 最新消息</h3>
            <p id="newsContent" class="text-emerald-900 text-lg leading-relaxed">正在同步雲端公告...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div onclick="openLink('reading_folder_url')" class="group bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 hover:border-emerald-200 transition cursor-pointer relative overflow-hidden">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-700 mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-book-reader text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">導讀資料庫</h3>
                <p class="text-gray-400 text-sm">歷年導讀手冊、簡報與推薦書單。</p>
                <div class="mt-6 text-emerald-700 text-sm font-bold flex items-center">
                    進入查看 <i class="fas fa-chevron-right ml-2 text-xs"></i>
                </div>
            </div>

            <div onclick="openLink('photo_gallery_url')" class="group bg-white p-8 rounded-[2.5rem] shadow-sm border border-emerald-50 hover:border-emerald-200 transition cursor-pointer">
                <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-camera-retro text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-900 mb-2">活動剪影</h3>
                <p class="text-gray-400 text-sm">紀錄聚會的精彩瞬間與美好回憶。</p>
                <div class="mt-6 text-orange-600 text-sm font-bold flex items-center">
                    瀏覽相簿 <i class="fas fa-chevron-right ml-2 text-xs"></i>
                </div>
            </div>

            <div onclick="toggleSettings(true)" class="emerald-gradient p-8 rounded-[2.5rem] shadow-lg text-white group cursor-pointer hover:brightness-110 transition">
                <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mb-6 group-hover:rotate-12 transition">
                    <i class="fas fa-user-shield text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">帳號安全性</h3>
                <p class="text-white/70 text-sm">修改您的登入密碼與個人資料。</p>
                <div id="staffBtnPlaceholder"></div>
            </div>

        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";
        let remoteConfig = {};

        // 頁面初始化
        window.onload = async () => {
            const user = JSON.parse(sessionStorage.getItem('userInfo'));
            if (!user) { location.href = 'index.html'; return; }
            document.getElementById('userName').innerText = `您好，${user.name}`;

            // 判斷是否顯示幹部按鈕
            if (user.title === "幹部" || user.title === "導讀人") {
                document.getElementById('staffBtnPlaceholder').innerHTML = `
                    <button onclick="location.href='staff_page.html'" class="mt-6 w-full py-2 bg-white/20 rounded-xl text-xs font-bold hover:bg-white/30 transition">
                        進入管理後台
                    </button>`;
            }

            // 抓取雲端配置與公告
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('newsContent').innerText = data.news;
                remoteConfig = data.config; // 儲存雲端連結
            } catch (e) { console.error("同步失敗"); }
        };

        // 開啟動態連結
        function openLink(key) {
            const url = remoteConfig[key];
            if (url) {
                window.open(url, '_blank');
            } else {
                alert("幹部尚未設定此連結，請洽詢管理員。");
            }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
