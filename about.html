<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-3xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-emerald-800 hover:text-emerald-600 font-bold mb-8 transition">
            <i class="fas fa-arrow-left mr-2"></i> 返回首頁
        </a>

        <section class="mb-16 fade-in">
            <div class="flex items-center space-x-4 mb-6">
                <div class="h-8 w-2 bg-emerald-800"></div>
                <h1 class="text-3xl font-bold text-emerald-900 tracking-wider">關於築心</h1>
            </div>
            
            <div class="prose prose-emerald text-gray-700 leading-relaxed space-y-6 text-lg">
                <p>
                    「築心」的成立，源於一群熱愛閱讀的朋友，希望在繁忙的現代生活中，為心靈保留一片淨土。
                </p>
                <p>
                    我們相信，書籍不只是知識的載體，更是人與人深度連結的橋樑。在共讀中，我們分享觀點、築起理解，也溫暖了彼此的心。
                </p>
                <div class="bg-emerald-50 p-6 rounded-2xl border-l-4 border-emerald-800 italic">
                    "在這裡，每一本書都是一段旅程，每一個聲音都值得被傾聽。"
                </div>
            </div>
        </section>

        <section id="enrollSection" class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-emerald-50 fade-in">
            <div id="formContainer" class="p-8 md:p-12">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-emerald-900 mb-2">加入我們的行列</h2>
                    <p class="text-gray-500 italic">填寫下方資訊，我們將與您連繫</p>
                </div>

                <form id="enrollForm" action="https://formspree.io/f/xpqjvblg" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 ml-1">真實姓名</label>
                        <input type="text" name="name" required placeholder="您的姓名" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition shadow-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 ml-1">聯絡電話</label>
                        <input type="tel" name="phone" required placeholder="手機號碼" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition shadow-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 ml-1">電子郵件</label>
                        <input type="email" name="email" required placeholder="email@example.com" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-emerald-500 transition shadow-sm">
                    </div>
                    <div class="md:col-span-2">
                        <button type="submit" class="w-full bg-emerald-800 text-white py-5 rounded-2xl font-bold text-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-900/20">
                            送出報名資料
                        </button>
                    </div>
                </form>
            </div>

            <div id="successMessage" class="hidden p-16 text-center">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-check text-3xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-emerald-900 mb-4">報名資料已送出！</h3>
                <p class="text-gray-600 mb-8 leading-relaxed">
                    我們已收到您的申請，<br>
                    <span class="font-bold text-emerald-700 underline underline-offset-4">我們會儘速與您聯絡。</span>
                </p>
                <a href="index.html" class="inline-block bg-emerald-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-emerald-800 transition">
                    回首頁
                </a>
            </div>
        </section>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            &copy; 2026 築心讀書會. All Rights Reserved.
        </footer>
    </div>

    <script>
        const form = document.getElementById('enrollForm');
        const formContainer = document.getElementById('formContainer');
        const successMessage = document.getElementById('successMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    formContainer.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    // 自動滾動到成功訊息位置
                    document.getElementById('enrollSection').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('抱歉，送出失敗，請檢查網路或稍後再試。');
                    btn.disabled = false;
                    btn.innerText = "送出報名資料";
                }
            } catch (error) {
                alert('系統異常，請聯絡管理員。');
                btn.disabled = false;
                btn.innerText = "送出報名資料";
            }
        };
    </script>
</body>
</html>
