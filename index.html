<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.8), rgba(6,78,59,0.4)); }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        @media (max-width: 640px) { .slide { height: 350px; } }
        
        #about-text-container p { margin-bottom: 1.2rem; line-height: 1.8; text-align: justify; }
        #about-text-container strong { color: #064E3B; display: block; margin-top: 1.5rem; font-size: 1.2rem; border-left: 4px solid #059669; padding-left: 0.8rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm px-4 md:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-700 text-xl"></i>
            <span class="text-lg md:text-xl font-bold text-emerald-900">築心讀書會</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="window.loadAndShowAbout()" class="text-gray-600 hover:text-emerald-700 flex flex-col items-center">
                <i class="fas fa-info-circle text-lg"></i>
                <span class="text-[10px] md:text-base font-medium">關於我們</span>
            </button>
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" 
                    class="bg-emerald-800 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-md">
                登入會館
            </button>
        </div>
    </nav>

    <div class="relative overflow-hidden bg-emerald-900">
        <img class="slide" src="1.jpg" style="display:block;">
        <img class="slide" src="2.jpg">
        <img class="slide" src="3.jpg">
        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center text-white p-6 text-center">
            <h2 class="text-3xl md:text-5xl font-bold mb-4 tracking-widest">在共讀中築心</h2>
        </div>
    </div>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="flex items-center justify-center space-x-4 mb-12">
            <h3 class="text-2xl font-bold text-emerald-900 tracking-widest">COMING SOON</h3>
        </div>
        <div id="event-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="text-center text-gray-400 py-10 w-full col-span-full">正在連線至資料庫...</div>
        </div>
    </section>

    <div id="about-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-2xl max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-emerald-50">
                <h4 class="text-xl font-bold text-emerald-900">築心讀書會緣起</h4>
                <button onclick="window.toggleAbout(false)" class="text-gray-400 text-2xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="about-text-container" class="flex-1 overflow-y-auto p-8 text-gray-600 no-scrollbar">
                讀取中...
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/60 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl relative">
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="absolute top-6 right-6 text-gray-300"><i class="fas fa-times"></i></button>
            <h4 class="text-xl font-bold text-emerald-900 mb-6 text-center">會員登入</h4>
            <input id="userPhone" type="text" placeholder="手機號碼" class="w-full px-4 py-3 bg-gray-50 rounded-xl mb-4 outline-none">
            <input id="userPass" type="password" placeholder="登入密碼" class="w-full px-4 py-3 bg-gray-50 rounded-xl mb-6 outline-none">
            <button id="loginBtn" onclick="window.handleLogin()" class="w-full bg-emerald-800 text-white py-4 rounded-xl font-bold">進入會館</button>
        </div>
    </div>

    <script>
        // 設定全域變數與函數
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwO1injNbjrxM50Ff3LGdFuW9ZwqL_r5mosreiOotiB9DU1B8iZrhikDzCdq3H5V70Xyw/exec";

        window.toggleAbout = function(show) {
            document.getElementById('about-modal').classList.toggle('hidden', !show);
        };

        window.loadAndShowAbout = async function() {
            window.toggleAbout(true);
            const container = document.getElementById('about-text-container');
            try {
                const res = await fetch('about.txt?t=' + new Date().getTime());
                const text = await res.text();
                // 簡易排版轉換
                container.innerHTML = text.split('\n').map(l => {
                    let line = l.trim();
                    if(!line) return '';
                    return (line.length < 10 || line.includes(':')) ? `<strong>${line}</strong>` : `<p>${line}</p>`;
                }).join('');
            } catch (e) { container.innerText = "讀取失敗，請確認 about.txt 是否上傳。"; }
        };

        window.handleLogin = async function() {
            const u = document.getElementById('userPhone').value.trim();
            const p = document.getElementById('userPass').value.trim();
            if(!u || !p) return alert('請填寫完整資訊');
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = '驗證中...';
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                const found = data.users.find(user => user.phone == u && user.password == btoa(p));
                if (found) {
                    sessionStorage.setItem('userInfo', JSON.stringify(found));
                    window.location.href = 'member_zone.html';
                } else { alert('手機或密碼有誤'); btn.disabled = false; btn.innerText = '進入會館'; }
            } catch (e) { alert('連線失敗'); btn.disabled = false; btn.innerText = '進入會館'; }
        };

        // 頁面初始化
        async function init() {
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                const grid = document.getElementById('event-grid');
                if (data.calendar && data.calendar.length > 0) {
                    grid.innerHTML = data.calendar.slice(0, 4).map(ev => `
                        <div class="bg-white p-6 rounded-3xl border border-emerald-50 shadow-sm text-center">
                            <div class="text-emerald-600 font-bold mb-1">${ev.dateText}</div>
                            <div class="text-emerald-900 font-bold">${ev.title}</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('event-grid').innerHTML = '<div class="col-span-full text-center text-gray-400">目前沒有進行中的活動</div>';
                }
            } catch (e) { 
                document.getElementById('event-grid').innerHTML = '<div class="col-span-full text-center text-gray-400">暫時無法連線至活動列表</div>';
            }
        }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 3000);
        }

        window.onload = () => { showSlides(); init(); };
    </script>
</body>
</html>
