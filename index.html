<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; margin: 0; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.5), rgba(6,78,59,0.2)); }
        .slide { display: none; width: 100%; height: 100%; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: 0.8} to {opacity: 1} }
        .modal { display: none; position: fixed; z-index: 100; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 nav-glass px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-800 text-2xl"></i>
            <span class="text-2xl md:text-3xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
        </div>
        <button onclick="openLogin()" class="bg-emerald-800 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-emerald-700 transition active:scale-95">
            進入會館
        </button>
    </nav>

    <header class="relative w-full h-[600px] md:h-[800px] overflow-hidden bg-emerald-900">
        <div id="slideContainer" class="w-full h-full">
            <div class="slide flex items-center justify-center text-white h-full">載入中...</div>
        </div>
        <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center z-10">
            <h1 class="text-4xl md:text-7xl text-white font-bold tracking-widest drop-shadow-lg">在共讀中築心</h1>
        </div>
    </header>

    <section id="about" class="py-24 px-6 bg-white">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-bold text-emerald-900 mb-4 italic flex items-center justify-center">
                    <i class="fas fa-leaf mr-3 text-emerald-600"></i>關於築心
                </h2>
                <div class="h-1 w-20 bg-amber-400 mx-auto rounded-full"></div>
            </div>
            <div id="aboutContent" class="text-gray-600 leading-relaxed text-lg text-justify">
                </div>
        </div>
    </section>

    <section id="register" class="py-24 px-6 bg-[#F9F6F0]">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-emerald-900 mb-2">加入我們</h2>
                <p class="text-gray-500">期待與您在書香中相遇</p>
            </div>
            <form action="https://formspree.io/f/xpqjvblg" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-emerald-100 space-y-6">
                <input type="text" name="姓名" required placeholder="您的姓名" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <input type="email" name="Email" required placeholder="您的電子郵件 (Email)" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <input type="tel" name="電話" required placeholder="手機號碼" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <button type="submit" class="w-full bg-emerald-800 text-white font-bold py-5 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">
                    提交報名資料
                </button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-xs tracking-widest uppercase">© 2026 Chuxin Book Club</footer>

    <div id="loginModal" class="modal">
        <div class="bg-white max-w-sm w-full rounded-[3rem] p-10 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-300 hover:text-emerald-700 transition"><i class="fas fa-times-circle text-2xl"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-2xl font-bold text-emerald-900">會館登入</h3>
                <div class="mt-4 p-3 bg-amber-50 rounded-2xl border border-amber-100">
                    <p class="text-amber-800 text-xs font-bold italic">歡迎訪客！輸入 <b>guest</b> 即可免密碼進入。</p>
                </div>
            </div>
            <div class="space-y-4">
                <input type="text" id="userPhone" placeholder="手機號碼 或 guest" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none font-bold">
                <input type="password" id="userPass" onkeyup="if(event.key==='Enter') handleLogin()" placeholder="登入密碼" class="w-full px-6 py-4 bg-gray-50 rounded-2xl outline-none">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-emerald-800 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">確認進入</button>
            </div>
        </div>
    </div>

    <script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
let slideIndex = 0;

// 強化後的網址轉換邏輯
function transformDriveUrl(url) {
    if (!url || typeof url !== 'string') return '';
    
    // 如果已經是轉好的直接連結或是本地圖檔，直接回傳
    if (url.includes('drive.google.com/uc')) return url;
    
    // 處理標準的 Google Drive 分享連結
    if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/(.+?)\/([a-z0-9]+)?/i);
        if (match && match[1]) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
    }
    
    // 如果不符合以上條件，原樣回傳（可能是 1.jpg 或其他完整網址）
    return url;
}

function toHalfWidth(str) {
    if (!str) return "";
    return str.replace(/[０-９Ａ-Ｚａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s/g, "");
}

async function initData() {
    const contentDiv = document.getElementById('aboutContent');
    const container = document.getElementById('slideContainer');

    try {
        const res = await fetch(GAS_URL + "?t=" + Date.now());
        const data = await res.json();
        const config = data.config || {};
        
        // 抓取 5 張圖
        const rawSlides = [
            config.slide_img1, 
            config.slide_img2, 
            config.slide_img3, 
            config.slide_img4, 
            config.slide_img5
        ];

        // 轉換並過濾：如果有填網址就轉換，沒填（或是轉換後為空）就用本地 1~5.jpg
        const slides = rawSlides.map((url, index) => {
            const transformed = transformDriveUrl(url);
            return (transformed && transformed.startsWith('http')) ? transformed : `${index + 1}.jpg`;
        });

        container.innerHTML = slides.map(url => `<img class="slide" src="${url}" onerror="this.src='${slides.indexOf(url)+1}.jpg'">`).join('');
        startSlides();

        if(config.about_content) {
            contentDiv.innerHTML = config.about_content.replace(/\n/g, '<br>');
        }
    } catch (e) {
        console.error("載入失敗:", e);
        container.innerHTML = ['1.jpg','2.jpg','3.jpg','4.jpg','5.jpg'].map(url => `<img class="slide" src="${url}">`).join('');
        startSlides();
    }
}

function startSlides() {
    let slides = document.getElementsByClassName("slide");
    if (slides.length === 0) return;
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(startSlides, 5000);
}

async function handleLogin() {
    const rawU = document.getElementById('userPhone').value.trim();
    const u = toHalfWidth(rawU).toLowerCase();
    const p = toHalfWidth(document.getElementById('userPass').value.trim());

    if (u === 'guest') {
        sessionStorage.setItem('userInfo', JSON.stringify({ result: "SUCCESS", name: "訪客", phone: "guest", isGuest: true }));
        window.location.href = 'member_zone.html';
        return;
    }

    if(!u || !p) return alert("請輸入帳號密碼");
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerText = "驗證中...";
    
    try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'login', phone: u, password: p }) });
        const result = await res.json();
        if (result.result === "SUCCESS") {
            sessionStorage.setItem('userInfo', JSON.stringify({ ...result, phone: u }));
            window.location.href = 'member_zone.html';
        } else { alert("登入失敗：帳號或密碼錯誤"); }
    } catch (e) { alert("網路異常"); }
    finally { btn.disabled = false; btn.innerText = "確認進入"; }
}

function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
window.onload = initData;        
    </script>
</body>
</html>
