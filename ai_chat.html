<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心智慧助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Serif TC', serif; 
            background-color: #FDFBF7; 
            margin: 0;
            overflow: hidden; /* 防止全頁出現雙捲軸 */
        }
        
        /* 讓容器填滿剩餘空間，且不遮擋導覽列 */
        #dify-chatbot-container {
            width: 100%;
            height: calc(100vh - 64px); /* 總高減去導覽列的 16 (4rem = 64px) */
            display: block;
        }

        /* 針對 Dify 嵌入後的 iframe 進行微調 */
        iframe {
            border: none !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <nav class="bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between relative z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-robot text-emerald-400"></i>
            <h1 class="text-xl font-black tracking-widest">智慧助理</h1>
        </div>
        <button onclick="location.href='member_zone.html'" class="px-4 py-2 bg-white/20 rounded-full text-[12px] font-bold hover:bg-white/30 transition-all">返回會員中心</button>
    </nav>

    <div id="dify-chatbot-container"></div>

    <script>
        // 獲取參數
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name') || "訪客";
        const userPhone = urlParams.get('phone') || "GUEST";

        // 設定 Dify 為嵌入模式
        window.difyChatbotConfig = {
            token: 'ERNQLHGG3QKClfr7',
            baseUrl: 'https://udify.app',
            container: '#dify-chatbot-container', // 這裡指定容器
            isDev: false,
            inputs: {
                "user_name": userName,
                "user_phone": userPhone
            }
        };
    </script>
    
    <script 
        src="https://udify.app/embed.min.js" 
        id="ERNQLHGG3QKClfr7" 
        defer>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js" defer></script>
</body>
</html>
