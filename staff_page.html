<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中樞 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #F4F7F5; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .menu-item.active { background-color: #064E3B; color: white; border-radius: 12px; }
        .edit-mode .show-on-edit { display: block !important; }
        /* 增加字體大小 */
        .text-huge { font-size: 1.2rem; }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl z-[60] sidebar -translate-x-full">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-emerald-900 mb-10">管理導覽</h2>
            <nav class="space-y-4">
                <button onclick="switchTab('news')" class="menu-item active w-full text-left p-5 flex items-center text-xl border border-transparent"><i class="fas fa-bullhorn mr-4"></i>公告欄</button>
                <button onclick="switchTab('line')" class="menu-item w-full text-left p-5 flex items-center text-xl border border-transparent"><i class="fab fa-line mr-4"></i>Line 訊息</button>
                <button onclick="switchTab('members')" class="menu-item w-full text-left p-5 flex items-center text-xl border border-transparent"><i class="fas fa-users mr-4"></i>會員名冊</button>
                <button onclick="switchTab('calendar')" class="menu-item w-full text-left p-5 flex items-center text-xl border border-transparent"><i class="fas fa-calendar-alt mr-4"></i>行事曆</button>
                <button onclick="switchTab('system')" class="menu-item w-full text-left p-5 flex items-center text-xl border border-transparent"><i class="fas fa-cog mr-4"></i>系統設定</button>
            </nav>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-[50] hidden"></div>

    <header class="bg-white border-b sticky top-0 z-40 px-6 h-20 flex items-center justify-between">
        <div class="flex items-center">
            <button onclick="toggleMenu()" class="text-emerald-900 text-3xl mr-4"><i class="fas fa-bars"></i></button>
            <span id="current-title" class="font-bold text-2xl text-emerald-900">公告欄管理</span>
        </div>
        <button id="editMasterBtn" onclick="toggleEditMode()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold shadow-inner">
            <i class="fas fa-edit"></i> 編輯模式
        </button>
    </header>

    <main class="max-w-4xl mx-auto p-6 md:p-10">
        
        <section id="sec-news" class="tab-content active">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                <textarea id="input-news" rows="6" class="w-full bg-gray-50 p-6 rounded-3xl text-xl outline-none border-2 border-transparent focus:border-emerald-200" placeholder="輸入公告內容..."></textarea>
                <button onclick="updateNews()" class="w-full mt-6 bg-emerald-800 text-white py-5 rounded-2xl font-bold text-2xl">更新所有手機公告</button>
            </div>
        </section>

        <section id="sec-line" class="tab-content">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                <textarea id="line-msg" rows="12" class="w-full bg-blue-50/50 p-6 rounded-3xl text-xl outline-none border-2 border-transparent focus:border-blue-400" placeholder="輸入要發送的 Line 訊息內容..."></textarea>
                <button onclick="saveLineMsg()" class="w-full mt-6 bg-[#06C755] text-white py-5 rounded-2xl font-bold text-2xl shadow-lg">發送 Line 訊息</button>
            </div>
        </section>

        <section id="sec-members" class="tab-content">
            <div id="add-member-bar" class="bg-orange-50 p-8 rounded-[2rem] border-2 border-orange-200 hidden show-on-edit mb-6">
                <div class="space-y-4">
                    <input type="text" id="mName" placeholder="姓名" class="w-full p-4 rounded-xl text-xl border">
                    <input type="tel" id="mPhone" placeholder="手機" class="w-full p-4 rounded-xl text-xl border">
                    <input type="email" id="mEmail" placeholder="Email (可留空)" class="w-full p-4 rounded-xl text-xl border">
                    <button onclick="addMember()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold text-xl">確認新增會員</button>
                </div>
            </div>
            <div id="memberList" class="space-y-3 text-huge"></div>
        </section>

        <section id="sec-calendar" class="tab-content"><div id="eventList" class="space-y-3"></div></section>
        <section id="sec-system" class="tab-content">
             <div class="bg-white p-8 rounded-[2rem] border space-y-4">
                <input type="text" id="conf-reading" placeholder="課程連結" class="w-full p-4 border rounded-xl">
                <input type="text" id="conf-photo" placeholder="剪影連結" class="w-full p-4 border rounded-xl">
                <button onclick="saveSystemConfig()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold">更新系統連結</button>
             </div>
        </section>

    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let adminKey = "";
        let isEditMode = false;
        let cachedData = null;

        window.onload = async () => {
            adminKey = sessionStorage.getItem('adminKey') || prompt("請輸入金鑰：");
            if (adminKey) sessionStorage.setItem('adminKey', adminKey);
            else location.href = 'member_zone.html';
            fetchData();
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
            toggleMenu();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editMasterBtn');
            btn.innerHTML = isEditMode ? '<i class="fas fa-check"></i> 完成' : '<i class="fas fa-edit"></i> 編輯模式';
            btn.className = isEditMode ? "bg-orange-500 text-white px-6 py-2 rounded-full font-bold shadow-lg" : "bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold shadow-inner";
            document.getElementById('main-content').classList.toggle('edit-mode');
            renderAll();
        }

        async function apiPost(data) {
            data.key = adminKey; // 對接修正後的 GAS params.key
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    alert("✅ 成功同步至雲端資料庫");
                    fetchData();
                } else { alert("❌ 失敗：" + result.message); }
            } catch (e) { alert("連線異常，請檢查 GAS 權限設定"); }
        }

        async function fetchData() {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            cachedData = await res.json();
            renderAll();
        }

        function renderAll() {
            if (!cachedData) return;
            document.getElementById('input-news').value = cachedData.news || "";
            document.getElementById('conf-reading').value = cachedData.config?.reading_folder_url || "";
            document.getElementById('conf-photo').value = cachedData.config?.photo_gallery_url || "";
            
            // 名冊渲染：姓名 | 電話 | Email
            const list = document.getElementById('memberList');
            list.innerHTML = (cachedData.users || []).map(u => `
                <div class="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div class="flex flex-wrap items-center">
                        <span class="font-bold text-emerald-900 mr-4">${u.name}</span>
                        <span class="text-gray-500 font-mono mr-4">${u.phone}</span>
                        <span class="text-base text-blue-400 font-mono">${u.email || ''}</span>
                    </div>
                    <button onclick="deleteMember('${u.phone}')" class="text-gray-300 hover:text-red-500 hidden show-on-edit p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function updateNews() { apiPost({ type: "update_news", content: document.getElementById('input-news').value }); }
        function saveLineMsg() { apiPost({ type: "send_line", message: document.getElementById('line-msg').value }); }
        function addMember() { apiPost({ type: "add_member", name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value, email: document.getElementById('mEmail').value, password: "1234" }); }
        function deleteMember(phone) { if(confirm("確定刪除？")) apiPost({ type: "delete_member", currentPhone: phone }); }
        function saveSystemConfig() { 
            apiPost({ type: "update_config", reading_folder_url: document.getElementById('conf-reading').value, photo_gallery_url: document.getElementById('conf-photo').value }); 
        }
    </script>
</body>
</html>
