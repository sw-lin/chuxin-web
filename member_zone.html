<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心會館</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' *; connect-src *;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

<div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-sm flex items-center justify-center">
    <div class="flex flex-col items-center">
        <div class="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-emerald-900 font-bold">核心資料同步中...</p>
    </div>
</div>

<div id="toastContainer" class="fixed top-20 left-1/2 -translate-x-1/2 z-[200] space-y-2"></div>

<nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between">
    <div class="flex items-center gap-2">
        <i class="fas fa-leaf text-emerald-400"></i>
        <h1 class="text-xl font-black tracking-widest">築心會館</h1>
    </div>
    <button onclick="logout()" class="px-4 py-2 bg-red-900/40 rounded-full text-[12px] font-bold">登出</button>
</nav> 

<main class="max-w-xl mx-auto p-6 space-y-8">
    <div class="bg-white rounded-[2rem] p-5 shadow-sm border flex items-center space-x-4">
        <div class="bg-emerald-100 text-emerald-700 w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fas fa-bullhorn"></i></div>
        <div class="flex-1">
            <p class="text-xs font-bold text-emerald-900 mb-0.5">最新公告</p>
            <p id="news" class="text-gray-600 text-xs">同步中...</p>
        </div>
    </div>

    <div onclick="openHistoryModal()" class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden cursor-pointer">
        <div class="relative z-10 text-center">
            <span class="text-emerald-200 text-xs font-bold tracking-[0.3em]">MEMBER PROFILE</span>
            <h2 id="userName" class="text-3xl font-black mt-2 mb-6 tracking-widest">載入中...</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/20 rounded-3xl py-4"><p class="text-xs mb-1">出席次數</p><p id="attCountDisplay" class="text-2xl font-black">0 / 0</p></div>
                <div class="bg-black/20 rounded-3xl py-4"><p class="text-xs mb-1">參與率</p><p id="attPercent" class="text-2xl font-black">0%</p></div>
            </div>
        </div>
    </div>

    <div id="calendarActivitySection" class="space-y-4"></div>

    <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-[2.5rem] shadow-xl text-white flex items-center justify-center space-x-3">
        <i class="fas fa-qrcode text-2xl"></i>
        <span class="text-xl font-black">掃碼報到</span>
    </button>

    <div id="eventSection" class="space-y-4"></div>

    <div class="grid grid-cols-2 gap-4 pt-6">
        <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border flex flex-col items-center gap-2">
            <div class="bg-emerald-50 text-emerald-700 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-book-open"></i></div>
            <span class="font-black text-xs">課程資料庫</span>
        </button>
        <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border flex flex-col items-center gap-2">
            <div class="bg-emerald-50 text-emerald-700 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-images"></i></div>
            <span class="font-black text-xs">活動剪影</span>
        </button>
        <button onclick="openEditModal()" class="bg-white p-6 rounded-[2rem] shadow-sm border flex flex-col items-center gap-2">
            <div class="bg-amber-50 text-amber-700 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-user-cog"></i></div>
            <span class="font-black text-xs">個人資料</span>
        </button>
        <button id="aiLauncherBtn" onclick="activateAI()" class="bg-blue-50 p-6 rounded-[2rem] shadow-sm border border-blue-100 flex flex-col items-center gap-2 transition-all active:bg-blue-100">
            <div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center animate-bounce"><i class="fas fa-robot"></i></div>
            <span class="font-black text-xs text-blue-900">啟動 AI 助手</span>
        </button>
        <button id="staffBtn" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border-l-4 border-emerald-600 flex flex-col items-center gap-2">
            <div class="bg-emerald-800 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-id-card-alt"></i></div>
            <span class="font-black text-xs">幹部管理</span>
        </button>
    </div>
</main>

<div id="historyModal" class="modal-overlay" onclick="closeHistoryModal(event)">
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-7" onclick="event.stopPropagation()">
        <h3 class="font-black text-center mb-4">出席歷史</h3>
        <div id="historyList" class="space-y-2 max-h-60 overflow-y-auto"></div>
    </div>
</div>

<div id="scannerModal" class="modal-overlay">
    <div class="bg-white w-[90%] max-w-sm rounded-3xl overflow-hidden">
        <div id="reader"></div>
        <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 font-bold">關閉</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    let currentUser = null;
    let remoteConfig = {};
    let html5QrCode = null;

    window.onload = () => {
        const userStr = sessionStorage.getItem('userInfo');
        if (!userStr) { location.href = 'index.html'; return; }
        currentUser = JSON.parse(userStr);
        document.getElementById('userName').innerText = currentUser.name;
        syncData();
    };

    // 1. 同步雲端資料
    async function syncData() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            remoteConfig = data.config || {};
            document.getElementById('news').innerText = data.news || "歡迎回來！";
            
            const liveUser = data.users.find(u => String(u.phone).slice(-9) === String(currentUser.phone).slice(-9));
            if (liveUser) {
                currentUser = liveUser;
                if (liveUser.role && liveUser.role !== "學員") {
                    document.getElementById('staffBtn').classList.remove('hidden');
                    document.getElementById('staffBtn').onclick = enterStaffMode;
                }
                updateUI(liveUser, data.calendar, data.events);
            }
        } catch (e) { showToast("同步失敗", "error"); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    }

    // 2. 更新 UI
    function updateUI(user, calendar, events) {
        const logs = (user.attendLog || []).map(l => String(l).trim());
        const today = new Date().toISOString().split('T')[0];
        const past = (calendar || []).filter(ev => ev.dateText <= today);
        const attended = past.filter(ev => logs.some(l => l.includes(ev.dateText)));
        
        document.getElementById('attCountDisplay').innerText = `${attended.length} / ${past.length}`;
        document.getElementById('attPercent').innerText = `${past.length ? Math.round(attended.length/past.length*100) : 0}%`;
        window.currentAttendedData = attended;
        
        renderEvents(events);
    }

    // 3. 手動啟動 AI (這是關鍵修正)
    function activateAI() {
        const btn = document.getElementById('aiLauncherBtn');
        btn.innerHTML = '<div class="w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div><span class="text-xs">啟動中...</span>';
        
        window.difyChatbotConfig = { token: 'XN6K6P69Z8S6XN6K', baseUrl: 'https://udify.app' };
        const s = document.createElement('script');
        s.src = "https://udify.app/embed.min.js";
        s.id = "XN6K6P69Z8S6XN6K";
        s.defer = true;
        s.onload = () => { 
            showToast("AI 助理已上線");
            btn.classList.add('opacity-50');
            btn.innerHTML = '<div class="text-blue-600 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-check"></i></div><span class="font-black text-xs text-blue-900">AI 已啟動</span>';
        };
        document.body.appendChild(s);
    }

    // --- 以下為補齊的所有 Function，確保不再報 ReferenceError ---
    function showToast(msg, type='success') {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white text-xs font-bold z-[300] shadow-xl ${type==='success'?'bg-emerald-600':'bg-red-600'}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function openHistoryModal() { document.getElementById('historyModal').style.display = 'flex'; }
    function closeHistoryModal(e) { if(e.target.id === 'historyModal') e.target.style.display = 'none'; }
    function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    function openRemoteLink(key) { if(remoteConfig[key]) window.open(remoteConfig[key], '_blank'); }
    
    async function enterStaffMode() {
        const key = prompt("輸入管理金鑰：");
        if(!key) return;
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'verify_staff_key', key }) });
        const result = await res.json();
        if(result.result === "SUCCESS") location.href = "staff_menu.html";
        else alert("金鑰錯誤");
    }

    function renderEvents(events) {
        const container = document.getElementById('eventSection');
        const today = new Date().toISOString().split('T')[0];
        const active = (events || []).filter(ev => today >= ev.start_date && today <= ev.display_until);
        container.innerHTML = active.map(ev => `
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border">
                <h4 class="font-black text-emerald-900">${ev.title}</h4>
                <button onclick="handleReg('${ev.title}')" class="mt-4 w-full py-3 emerald-gradient text-white rounded-xl font-bold">立即報名</button>
            </div>
        `).join('');
    }

    function startScanner() {
        document.getElementById('scannerModal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            stopScanner();
            processCheckin(text);
        }, () => {});
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => {
            html5QrCode = null;
            document.getElementById('scannerModal').style.display = 'none';
        });
    }

    function openEditModal() { alert("功能維護中"); }
</script>
</body>
</html>
