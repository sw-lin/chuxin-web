<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .hidden { display: none; }
        .modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

<!-- 導覽列：標題在左，按鈕在右 -->
<nav class="sticky top-0 z-40 bg-[#064e3b] text-white px-6 h-16 shadow-lg flex items-center justify-between">
    <div class="flex items-center gap-2">
        <i class="fas fa-leaf text-emerald-400 text-xl"></i>
        <h1 class="text-xl font-black tracking-widest">築心會館</h1>
    </div>

    <div class="flex items-center gap-2">
        <button id="staffBtn" class="hidden px-3 py-1.5 bg-emerald-700/50 hover:bg-emerald-600 rounded-lg border border-emerald-500/30 text-[12px] font-bold transition-all">
            幹部區
        </button>
        <button onclick="openEditModal()" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-[12px] font-bold transition-all">
            修改資料
        </button>
        <button onclick="logout()" class="px-3 py-1.5 bg-red-900/40 hover:bg-red-800/60 rounded-lg text-[12px] font-bold transition-all text-red-100">
            登出
        </button>
    </div>
</nav> 

<main class="max-w-xl mx-auto p-6 space-y-6">
    <!-- 個人狀態卡片 -->
    <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
        <h2 id="userName" class="text-3xl font-black mb-6 italic tracking-tight">...</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-black/10 p-5 rounded-[2rem] text-center border border-white/10">
                <div class="text-[10px] opacity-60 mb-1 uppercase tracking-widest font-bold">參與率</div>
                <div id="attPercent" class="text-3xl font-black text-orange-200">0%</div>
            </div>
            <div class="bg-black/10 p-5 rounded-[2rem] text-center border border-white/10">
                <div class="text-[10px] opacity-60 mb-1 uppercase tracking-widest font-bold">出席數</div>
                <div id="attCountDisplay" class="text-2xl font-black">0 / 0</div>
            </div>
        </div>
    </div>

    <!-- 掃碼按鈕 -->
    <button onclick="startScanner()" class="w-full bg-[#F97316] py-5 rounded-[2rem] shadow-xl text-white flex items-center justify-center space-x-3 active:scale-95 transition-all">
        <i class="fas fa-qrcode text-2xl"></i>
        <span class="text-xl font-black tracking-widest">掃碼報到</span>
    </button>

    <!-- 公告欄[cite: 4] -->
    <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-emerald-50 flex items-center space-x-4">
        <div class="bg-emerald-100 text-emerald-700 w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
            <i class="fas fa-bullhorn text-sm"></i>
        </div>
        <p id="news" class="text-gray-500 text-xs font-bold truncate">同步最新公告中...</p>
    </div>

    <!-- 快速連結[cite: 4] -->
    <div class="grid grid-cols-2 gap-4">
        <button onclick="openRemoteLink('reading_folder_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 active:bg-gray-50 transition-all">
            <i class="fas fa-book-open text-emerald-700 text-xl"></i>
            <span class="font-black text-emerald-900 text-sm">課程資料庫</span>
        </button>
        <button onclick="openRemoteLink('photo_gallery_url')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center space-y-2 active:bg-gray-50 transition-all">
            <i class="fas fa-images text-emerald-700 text-xl"></i>
            <span class="font-black text-emerald-900 text-sm">活動剪影</span>
        </button>
    </div>

    <!-- 學習歷程[cite: 4] -->
    <div class="px-2">
        <h3 class="font-black text-emerald-900 text-lg mb-4 tracking-widest">學習歷程</h3>
        <div id="historyList" class="space-y-3">
            <div class="text-center py-10 text-gray-300 text-sm italic">載入紀錄中...</div>
        </div>
    </div>
</main>

<!-- 掃描與修改資料彈窗[cite: 4] -->
<div id="scannerModal" class="modal">
    <div class="bg-white w-[90%] max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
        <div id="reader" class="w-full"></div>
        <div class="p-6">
            <button onclick="stopScanner()" class="w-full py-4 bg-gray-100 rounded-2xl font-black text-gray-500">取消返回</button>
        </div>
    </div>
</div>

<div id="editProfileModal" class="modal">
    <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
        <h3 class="text-xl font-black text-emerald-900 mb-6 text-center tracking-widest">修改個人資料</h3>
        <div class="space-y-4">
            <input type="email" id="editEmail" placeholder="電子郵件" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
            <input type="password" id="oldPass" placeholder="驗證舊密碼 (必填)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-red-200 transition-all">
            <input type="password" id="newPass" placeholder="設定新密碼 (不改留空)" class="w-full px-5 py-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
            <div class="flex pt-4 space-x-3">
                <button onclick="closeEditModal()" class="flex-1 text-gray-400 font-bold py-4">取消</button>
                <button onclick="handleUpdateProfile()" id="updateBtn" class="flex-[2] bg-emerald-800 text-white py-4 rounded-2xl font-black shadow-lg">確認更新</button>
            </div>
        </div>
    </div>
</div>

<script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
    var html5QrCode = null;
    var remoteConfig = {};
    var currentUser = null;

    window.onload = function() {
        var userStr = sessionStorage.getItem('userInfo');
        if (!userStr) { location.href = 'index.html'; return; }
        currentUser = JSON.parse(userStr);
        document.getElementById('userName').innerText = currentUser.name;
        syncData(currentUser);
    };

    function syncData(user) {
        fetch(GAS_URL + "?t=" + Date.now())
            .then(function(res) { return res.json(); })
            .then(function(data) {
                remoteConfig = data.config || {};
                document.getElementById('news').innerText = data.news || "歡迎來到築心會館。";
                
                var myMatch = String(user.phone).replace(/\D/g, "").slice(-9);
                var liveUser = data.users.find(function(u) {
                    return u.phone && String(u.phone).replace(/\D/g, "").slice(-9) === myMatch;
                });
                
                if (liveUser) {
                    currentUser = liveUser;
                    // 幹部按鈕邏輯[cite: 4]
                    if (liveUser.role && liveUser.role !== "學員") {
                        var staffBtn = document.getElementById('staffBtn');
                        staffBtn.classList.remove('hidden');
                        staffBtn.style.display = "inline-block";
                        staffBtn.onclick = enterStaffMode;
                    }
                    updateStatsAndHistory(liveUser, data.calendar);
                }
            });
    }

    function updateStatsAndHistory(user, calendar) {
        var logs = user.attendLog || [];
        var today = new Date().toISOString().split('T')[0];
        var pastEvents = calendar.filter(function(ev) { return ev.dateText <= today; });
        
        var attended = pastEvents.filter(function(ev) {
            var key = "EVENT:" + ev.dateText + "|" + ev.title;
            return logs.indexOf(key) !== -1;
        });

        document.getElementById('attPercent').innerText = (pastEvents.length ? Math.round((attended.length / pastEvents.length) * 100) : 0) + "%";
        document.getElementById('attCountDisplay').innerText = attended.length + " / " + pastEvents.length;

        var historyList = document.getElementById('historyList');
        if (attended.length === 0) {
            historyList.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm italic">尚無出席紀錄</div>';
        } else {
            historyList.innerHTML = attended.slice().reverse().map(function(ev) {
                return '<div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-50 mb-3">' +
                       '<div><div class="text-[10px] text-emerald-600 font-bold">' + ev.dateText + '</div>' +
                       '<div class="text-emerald-900 font-bold text-sm">' + ev.title + '</div></div>' +
                       '<i class="fas fa-check-circle text-emerald-600 text-2xl"></i></div>';
            }).join('');
        }
    }

    async function enterStaffMode() {
        var key = prompt("請輸入幹部管理金鑰：");
        if (!key) return;
        try {
            var res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'verify_staff_key', key: key })
            });
            var result = await res.json();
            if (result.result === "SUCCESS") {
                sessionStorage.setItem('staff_key', key);
                location.href = "staff_menu.html"; 
            } else { alert("金鑰錯誤！"); }
        } catch (e) { alert("連線失敗"); }
    }

    function startScanner() {
        var modal = document.getElementById('scannerModal');
        modal.style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, function(text) {
            stopScanner();
            processCheckin(text);
        }).catch(function() { stopScanner(); });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().finally(function() {
                document.getElementById('scannerModal').style.display = 'none';
                html5QrCode = null;
            });
        } else { document.getElementById('scannerModal').style.display = 'none'; }
    }

    async function processCheckin(scanData) {
        if (!scanData.startsWith("CHECKIN:")) return alert("無效條碼");
        var parts = scanData.split(':');
        var eventID = "EVENT:" + parts[1] + "|" + parts.slice(2).join(':');
        try {
            var res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'checkin', phone: currentUser.phone, name: currentUser.name, eventTitle: eventID })
            });
            var result = await res.json();
            if (result.result === "SUCCESS") {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                alert("報到成功！");
                syncData(currentUser);
            } else { alert(result.message || "報到失敗"); }
        } catch (e) { alert("網路失敗"); }
    }

    function openEditModal() {
        document.getElementById('editEmail').placeholder = currentUser.email || '電子郵件';
        document.getElementById('editProfileModal').style.display = 'flex';
    }
    function closeEditModal() { document.getElementById('editProfileModal').style.display = 'none'; }
    function openRemoteLink(key) { if (remoteConfig[key]) window.open(remoteConfig[key], '_blank'); else alert("尚未設定"); }
    function logout() { sessionStorage.clear(); location.href = 'index.html'; }
</script>
</body>
</html>
