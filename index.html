<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>築心讀書會 | 在共讀中築心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; color: #2C3E50; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(6,78,59,0.7), rgba(6,78,59,0.3)); }
        .slide { display: none; width: 100%; height: 600px; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .8} to {opacity: 1} }
        @media (max-width: 640px) { .slide { height: 400px; } }
        
        /* 模態彈窗基礎樣式 */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 100; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); 
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 優化關於我內容排版 */
        #aboutContent {
            line-height: 1.8;
            letter-spacing: 0.05em;
        }
        #aboutContent strong {
            color: #065f46;
            font-weight: 700;
        }

        /* 案頭白底半透明風格 */
        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-[#FDFBF7]">

    <nav class="fixed w-full z-50 nav-glass px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <i class="fas fa-leaf text-emerald-700 text-2xl"></i>
            <span class="text-2xl md:text-3xl font-bold tracking-tighter text-emerald-900">築心讀書會</span>
        </div>
        <button onclick="openLogin()" class="bg-emerald-800 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-emerald-700 transition shadow-lg border border-emerald-800 active:scale-95">
            進入會館
        </button>
    </nav>
    
    <header class="relative pt-16 h-[600px] md:h-[700px] overflow-hidden bg-emerald-900">
        <div id="slideContainer">
            <div class="slide flex items-center justify-center text-white h-full text-lg italic opacity-50">載入中...</div>
        </div>
        <div class="absolute inset-0 hero-gradient flex items-center justify-center text-center px-6 z-10">
            <div class="max-w-3xl">
                <h1 class="text-4xl md:text-6xl text-white font-bold leading-tight tracking-tight">在共讀中築心</h1>
            </div>
        </div>
    </header>

    <section id="about" class="py-24 px-6 bg-white">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="text-3xl font-bold text-emerald-900 mb-4 italic flex items-center justify-center">
                    <i class="fas fa-leaf mr-3 text-emerald-600"></i>關於築心
                </h2>
                <div class="h-px w-24 bg-amber-400 mx-auto"></div>
            </div>
            <div id="aboutContent" class="text-gray-600 leading-relaxed whitespace-pre-line text-lg">
                <p><strong>「築心」</strong>，源於一個簡單而溫暖的願望：建立一個可以安頓心靈、彼此相伴的閱讀空間。在這個喧囂的世界裡，我們相信閱讀不只是獲取知識的工具，更是一場關於生命的探索與對話。</p>
                <p>我們在共讀中築心，分享的不只是文字，更是彼此靈魂的共鳴。</p>
            </div>
        </div>
    </section>

    <section id="register" class="py-24 px-6 bg-emerald-50/50">
        <div class="max-w-xl mx-auto text-center">
            <h2 class="text-3xl font-bold text-emerald-900 mb-4 tracking-tighter">加入我們</h2>
            <p class="text-gray-500 mb-10">歡迎填寫報名資料，與我們一同開啟閱讀之旅</p>
            <form action="https://formspree.io/f/xpqjvblg" method="POST" class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl text-left border border-emerald-100">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">您的姓名</label>
                        <input type="text" name="姓名" required placeholder="您的姓名" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">手機號碼</label>
                        <input type="tel" name="電話" required placeholder="0912345678" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-emerald-800 mb-2 uppercase tracking-widest">電子郵件</label>
                        <input type="email" name="Email" required placeholder="yourname@email.com" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition font-bold">
                    </div>
                    <button type="submit" class="w-full bg-emerald-800 text-white font-bold py-5 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-[0.98]">
                        送出報名申請
                    </button>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-400 text-xs tracking-widest uppercase">© 2026 Chuxin Book Club</footer>

    <div id="loginModal" class="modal">
        <div class="bg-white max-w-sm w-full rounded-[3rem] p-10 shadow-2xl relative m-6 flex flex-col">
            <button onclick="closeModal('loginModal')" class="absolute top-6 right-6 text-gray-300 hover:text-emerald-700 transition"><i class="fas fa-times-circle text-2xl"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-2xl font-bold text-emerald-900 tracking-tighter">會館登入</h3>
                <div class="mt-4 p-3 bg-amber-50 rounded-2xl border border-amber-100">
                    <p class="text-amber-800 text-xs font-bold italic">
                        <i class="fas fa-info-circle mr-1 opacity-70"></i> 
                        歡迎訪客！輸入 <b>guest</b> 即可免密碼進入。
                    </p>
                </div>
            </div>
            <div class="space-y-5">
                <input type="text" id="userPhone" placeholder="手機號碼 或 guest" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none font-bold">
                <input type="password" id="userPass" onkeyup="if(event.key==='Enter') handleLogin()" placeholder="登入密碼" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-emerald-800 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 shadow-xl transition-all active:scale-95">確認進入</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";

        // 1. 初始化照片輪播邏輯
        let slideIndex = 0;
        let slideImages = []; // 存儲照片 URL

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            if (slides.length === 0) return;
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 5000); // 5秒換一張
        }

        // 2. 關於我內容樣式優化
        function processAboutText(text) {
            return text
                .replace(/\n/g, '<br>') // 將換行改為 HTML 換行
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // 將 **文字** 改為粗體
        }

        // 3. 登入處理 (支援 Guest)
        window.handleLogin = async function() {
            const rawPhone = document.getElementById('userPhone').value.trim();
            // 轉半形並轉小寫比對
            const u = toHalfWidth(rawPhone).toLowerCase(); 
            const p = document.getElementById('userPass').value.trim();

            if(!u) return alert('請輸入登入帳號或 guest');

            // [核心修正] Guest 登入判斷
            if (u === 'guest') {
                // 模擬登入成功，不需要呼叫後端驗證，手機欄位標記為 guest
                sessionStorage.setItem('userInfo', JSON.stringify({ 
                    result: "SUCCESS", 
                    name: "訪客 (Guest)", 
                    phone: "guest" 
                }));
                // 直接跳轉
                window.location.href = 'member_zone.html'; 
                return;
            }

            // 一般會員登入
            if(!p) return alert('請輸入登入密碼');
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = '正在登入...';

            try {
                // 統一去除電話符號（僅針對非 guest 字串）
                const phoneClean = u.replace(/\D/g, "");
                
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'login', phone: phoneClean, password: p })
                });
                const result = await res.json();
                if (result.result === "SUCCESS") {
                    // 將電話存入 sessionStorage
                    sessionStorage.setItem('userInfo', JSON.stringify({ ...result, phone: phoneClean }));
                    window.location.href = 'member_zone.html';
                } else {
                    alert("登入失敗：帳號或密碼錯誤");
                }
            } catch (e) {
                alert("網路連線失敗，請稍後再試。");
            } finally {
                btn.disabled = false; btn.innerText = '確認進入';
            }
        };

        // 4. 初始化資料抓取 (照片與關於我)
        async function initData() {
            const contentDiv = document.getElementById('aboutContent');
            const container = document.getElementById('slideContainer');

            try {
                // 發送 GET 請求
                const res = await fetch(GAS_URL + "?t=" + Date.now());
                const allData = await res.json();
                
                // [A] 更新輪播照片
                const config = allData.config || {};
                const slides = [
                    config.slide_img1 || '1.jpg',
                    config.slide_img2 || '2.jpg',
                    config.slide_img3 || '3.jpg',
                    config.slide_img4 || '4.jpg',
                    config.slide_img5 || '5.jpg'
                ];
                
                container.innerHTML = slides.map(url => `<img class="slide" src="${url}">`).join('');
                showSlides(); // 圖片載入完成後啟動輪播

                // [B] 更新「關於我們」內容
                if (config.about_content) {
                    contentDiv.innerHTML = processAboutText(config.about_content);
                }
            } catch (e) {
                console.error("資料初始化失敗:", e);
                // 失敗時使用預設圖片兜底並保留原本預設文字
                container.innerHTML = [
                    '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg'
                ].map(url => `<img class="slide" src="${url}">`).join('');
                showSlides();
            }
        }

        // 工具函式
        function toHalfWidth(str) {
            return str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s/g, "");
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }

        // 啟動
        window.onload = initData;
    </script>
</body>
</html>
