<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .scan-orange { background: #F97316; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-[#064E3B] text-white px-6 py-4 shadow-xl sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-leaf text-emerald-300"></i>
                <span class="text-xl font-bold tracking-wider">築心會館</span>
            </div>
            <button onclick="logout()" class="text-emerald-200 hover:text-white transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-5">
        
        <div class="emerald-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="userName" class="text-3xl font-bold mb-2">載入中...</h2>
                        <span id="userTitle" class="bg-white/20 px-4 py-1 rounded-full text-xs border border-white/10">載入中...</span>
                    </div>
                    <button onclick="openEditModal()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition">
                        <i class="fas fa-cog text-emerald-100"></i>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/10 p-4 rounded-3xl backdrop-blur-sm border border-white/5">
                        <div class="text-white/60 text-xs mb-1">學習參與率</div>
                        <div id="attPercent" class="text-2xl font-bold italic text-orange-200">0%</div>
                    </div>
                    <div class="bg-white/10 p-4 rounded-3xl backdrop-blur-sm border border-white/5">
                        <div class="text-white/60 text-xs mb-1">總出席次數</div>
                        <div id="attCountDisplay" class="text-2xl font-bold">0</div>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="startScanner()" class="w-full scan-orange py-5 rounded-3xl shadow-lg text-white flex items-center justify-center space-x-3 active:scale-95 transition-all">
            <i class="fas fa-qrcode text-2xl"></i>
            <span class="text-xl font-black tracking-widest">掃碼報到</span>
        </button>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <div class="flex items-center space-x-2 mb-3 text-emerald-800">
                <i class="fas fa-bullhorn text-emerald-500"></i>
                <h3 class="font-bold">最新公告</h3>
            </div>
            <p id="news" class="text-gray-600 leading-relaxed font-medium font-serif italic">正在同步資訊...</p>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="font-bold text-emerald-900 mb-4">近期活動</h3>
            <div id="upcomingList" class="space-y-4">
                <p class="text-gray-400 text-sm italic">載入活動中...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openRemoteLink('reading')" class="p-6 bg-white rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center group transition">
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center mb-2 text-emerald-600">
                    <i class="fas fa-book-reader text-xl"></i>
                </div>
                <span class="font-bold text-emerald-900">雲端書箱</span>
            </button>
            <button onclick="openRemoteLink('photo')" class="p-6 bg-white rounded-[2rem] shadow-sm border border-emerald-50 flex flex-col items-center group transition">
                <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center mb-2 text-amber-600">
                    <i class="fas fa-images text-xl"></i>
                </div>
                <span class="font-bold text-emerald-900">精彩相簿</span>
            </button>
        </div>

        <div>
            <h3 class="font-bold text-emerald-900 mb-4 px-2 text-lg">學習歷程</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center text-gray-400 py-10 italic text-sm">正在對照出席紀錄...</p>
            </div>
        </div>

        <div id="adminEntry" class="hidden pt-4">
            <button onclick="location.href='staff_page.html'" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center justify-center space-x-2">
                <i class="fas fa-user-shield"></i>
                <span>進入幹部管理後台</span>
            </button>
        </div>
    </main>

    <div id="scannerModal" class="fixed inset-0 bg-black/95 hidden z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div id="reader" class="w-full"></div>
            <div class="p-4"><button onclick="stopScanner()" class="w-full py-3 bg-gray-100 rounded-xl font-bold text-gray-500">關閉相機</button></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let remoteConfig = {};
        let html5QrCode = null;

        window.onload = () => {
            const userStr = sessionStorage.getItem('userInfo');
            if (!userStr) { location.href = 'index.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userTitle').innerText = user.role || '學員';
            if (user.role && user.role !== "學員") document.getElementById('adminEntry').classList.remove('hidden');
            syncData();
        };

        async function syncData() {
            try {
                const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
                const data = await res.json();
                const user = JSON.parse(sessionStorage.getItem('userInfo'));

                document.getElementById('news').innerText = data.news || "歡迎參加讀書會";
                remoteConfig = data.config || {}; // 修正：抓取 GAS 的 config

                const today = new Date().toISOString().split('T')[0];
                const allEvents = data.events || [];

                // 1. 渲染近期活動 (2則)
                const upcoming = allEvents.filter(e => e.date >= today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,2);
                document.getElementById('upcomingList').innerHTML = upcoming.map(ev => `
                    <div class="flex items-center justify-between border-b border-emerald-50 pb-3 last:border-0 last:pb-0">
                        <div class="flex items-center space-x-3">
                            <div class="text-center bg-emerald-50 text-emerald-700 px-3 py-1 rounded-xl font-bold text-sm">
                                ${new Date(ev.date).getDate()} <span class="text-[10px] block opacity-50">${new Date(ev.date).toLocaleString('en',{month:'short'})}</span>
                            </div>
                            <div class="font-bold text-emerald-900">${ev.title}</div>
                        </div>
                        <button onclick='createCalendarLink(${JSON.stringify(ev)})' class="text-emerald-500 text-xs font-bold bg-emerald-100 px-3 py-1.5 rounded-full">加日曆</button>
                    </div>`).join('');

                // 2. 學習歷程對照 (修正：確保對比欄位正確)
                const pastEvents = allEvents.filter(e => e.date < today).sort((a,b)=>b.date.localeCompare(a.date));
                // 這裡要注意：GAS 回傳的 userInfo 裡面的出席紀錄欄位可能是 attendLog 或 attendanceLog
                const myLogs = (user.attendLog || user.attendanceLog || []).map(d => String(d).trim());
                
                document.getElementById('historyList').innerHTML = pastEvents.map(ev => {
                    const isAttended = myLogs.includes(ev.date);
                    return `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border ${isAttended ? 'border-emerald-100 bg-emerald-50/50' : 'border-transparent'}">
                        <div class="flex items-center space-x-4">
                            <div class="text-[10px] font-bold ${isAttended ? 'text-emerald-500' : 'text-gray-400'}">${ev.date}</div>
                            <div class="font-bold text-emerald-900 text-sm">${ev.title}</div>
                        </div>
                        <div>${isAttended ? '<span class="text-emerald-600 text-[10px] font-bold bg-emerald-100 px-2 py-1 rounded-full">已出席</span>' : '<span class="text-gray-300 text-[10px] italic">未出席</span>'}</div>
                    </div>`;
                }).join('');

                // 3. 出席率與彩花
                const myCount = myLogs.length;
                const percent = pastEvents.length > 0 ? Math.round((myCount / pastEvents.length) * 100) : 0;
                document.getElementById('attPercent').innerText = percent + "%";
                document.getElementById('attCountDisplay').innerHTML = `${myCount} <span class="text-xs opacity-40">/ ${pastEvents.length}</span>`;
                if (percent >= 50) setTimeout(() => confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }), 1000);

            } catch (e) { console.error(e); }
        }

        function openRemoteLink(key) {
            // 修正：從 GAS 傳回的 config 欄位名稱對齊
            const mapping = { 'reading': 'reading_folder_url', 'photo': 'photo_gallery_url' };
            const url = remoteConfig[mapping[key]];
            if (url) window.open(url, '_blank');
            else alert("後端尚未設定連結，請洽管理員");
        }

        function createCalendarLink(ev) {
            const dateStr = ev.date.replace(/-/g, '');
            const title = "築心讀書會：" + ev.title;
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS) {
                const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${dateStr}T093000\nDTEND:${dateStr}T120000\nSUMMARY:${title}\nEND:VEVENT\nEND:VCALENDAR`;
                window.location.href = URL.createObjectURL(new Blob([ics], {type:'text/calendar'}));
            } else {
                window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dateStr}T093000/${dateStr}T120000`, '_blank');
            }
        }

        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                stopScanner(); window.location.href = text;
            }).catch(() => stopScanner());
        }

        function stopScanner() {
            if (html5QrCode) html5QrCode.stop().finally(() => {
                document.getElementById('scannerModal').classList.add('hidden');
                html5QrCode = null;
            });
            else document.getElementById('scannerModal').classList.add('hidden');
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    </script>
</body>
</html>
