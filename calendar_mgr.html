<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆管理 | 築心讀書會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-emerald { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .loader { border-top-color: #064E3B; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #064E3B; color: white; padding: 12px 24px; border-radius: 99px; font-size: 14px; z-index: 300; transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div class="sticky top-0 z-50 p-4 flex items-center justify-between glass-card shadow-sm">
        <button onclick="location.href='staff_menu.html'" class="text-emerald-800 flex items-center">
            <i class="fas fa-chevron-left mr-1"></i>返回
        </button>
        <h1 class="font-bold text-emerald-900 text-lg">行事曆管理</h1>
        <button id="editModeBtn" onclick="toggleEditMode()" class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-200 shadow-sm active:scale-95 transition-all">
            編輯模式
        </button>
    </div>

    <div id="eventList" class="p-4 space-y-3">
        <div class="text-center py-10 text-gray-400">讀取中...</div>
    </div>

    <div id="bottomAddArea" class="fixed bottom-6 left-0 w-full px-6 hidden">
        <button onclick="openAddModal()" class="w-full py-4 btn-emerald text-white rounded-2xl font-bold shadow-xl flex items-center justify-center">
            <i class="fas fa-calendar-plus mr-2"></i> 新增活動項目
        </button>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-900 mb-4 text-center">建置新活動</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 ml-1">活動日期</label>
                    <input id="evDate" type="date" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">活動名稱</label>
                    <input id="evTitle" type="text" class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 outline-none" placeholder="例如：讀書分享會">
                </div>
                <div class="flex items-center p-3 bg-emerald-50 rounded-xl">
                    <input id="evQR" type="checkbox" class="w-5 h-5 accent-emerald-600 mr-3">
                    <label for="evQR" class="text-emerald-800 font-bold">生成報到 QR Code</label>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="closeAddModal()" class="flex-1 py-3 text-gray-400">取消</button>
                <button onclick="submitAddEvent()" class="flex-1 py-3 btn-emerald text-white rounded-xl font-bold">確認建立</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[300] items-center justify-center p-6" onclick="closeQRModal()">
    <div class="bg-white rounded-3xl p-8 flex flex-col items-center max-w-sm w-full" onclick="event.stopPropagation()">
        <h3 id="qrTitle" class="text-xl font-bold text-emerald-900 mb-2">活動報到</h3>
        <p id="qrDate" class="text-sm text-gray-400 mb-6"></p>
        
        <div class="bg-white p-4 border-4 border-emerald-50 rounded-2xl shadow-inner mb-6">
            <img id="qrImg" src="" alt="QR Code" class="w-64 h-64">
        </div>

        <button onclick="closeQRModal()" class="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">關閉</button>
    </div>
   </div>
    <div id="loadingOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden z-[200] items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4"></div>
            <p class="text-emerald-900 font-bold">同步資料中...</p>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec';
        const STAFF_KEY = sessionStorage.getItem('staff_key');
        let isEditMode = false;

        window.onload = () => { if (!STAFF_KEY) location.href = "index.html"; loadEvents(); };

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const addArea = document.getElementById('bottomAddArea');
            btn.innerText = isEditMode ? "退出編輯" : "編輯模式";
            btn.className = isEditMode ? "bg-red-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-sm transition-all" : "bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-200 shadow-sm transition-all";
            addArea.classList.toggle('hidden', !isEditMode);
            loadEvents();
        }
        
async function loadEvents() {
    try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        const container = document.getElementById('eventList');
        const today = new Date().toISOString().split('T')[0];

        // 排序：越早發生的排在越前面
        const sortedEvents = data.calendar.sort((a, b) => a.dateText.localeCompare(b.dateText));

        container.innerHTML = sortedEvents.map(ev => {
            const isPastOrToday = ev.dateText <= today;
            const showQRBtn = ev.needQR === "是" && isPastOrToday;

            return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-emerald-50 flex justify-between items-center mb-3">
                    <div class="flex-1">
                        <div class="text-[10px] text-emerald-600 font-bold">${ev.dateText}</div>
                        <div class="text-emerald-900 font-bold text-base">${ev.title}</div>
                    </div>
                    <div class="flex items-center space-x-2">
                        ${showQRBtn ? `
                            <button onclick="showQRCode('${ev.dateText}', '${ev.title}')" class="bg-emerald-50 text-emerald-600 p-2 rounded-lg text-sm active:scale-95 transition-transform">
                                <i class="fas fa-qrcode"></i>
                            </button>
                        ` : ''}
                        
                        ${isEditMode ? `
                            <button onclick="deleteEvent('${ev.dateText}', '${ev.title}')" class="text-red-400 p-2 hover:bg-red-50 rounded-full transition-colors active:scale-90">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) { 
        console.error("載入失敗", e); 
        showToast("❌ 資料載入失敗");
    }
}

        
        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 2000);
        }

        function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function openAddModal() { document.getElementById('addModal').style.display='flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display='none'; }

        async function submitAddEvent() {
            const date = document.getElementById('evDate').value;
            const title = document.getElementById('evTitle').value;
            const needQR = document.getElementById('evQR').checked;
            if (!date || !title) return alert("請填寫完整資訊");

            closeAddModal();
            showLoading(true);
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'add_event', key: STAFF_KEY, date, title, needQR })
            });
            const result = await res.json();
            showLoading(false);
            if (result.result === "SUCCESS") { showToast("✅ 活動建立成功"); loadEvents(); }
        }

       async function deleteEvent(dateText, title) {
       // 診斷 1：確認有沒有抓到資料
        console.log("按下刪除鍵，收到參數：", {dateText, title});
    
    if (!confirm(`確定要刪除「${title}」嗎？`)) return;

    showLoading(true);
    try {
        const payload = {
            type: 'delete_event',
            key: STAFF_KEY,
            dateText: dateText,
            title: title
        };
        console.log("傳送給 GAS 的資料：", payload);

        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        const result = await res.json();
        console.log("GAS 回傳結果：", result);

        if (result.result === "SUCCESS") {
            showToast("🗑️ 活動已移除");
            loadEvents();
        } else {
            alert("刪除失敗回報：" + result.message);
        }
    } catch (e) {
        console.error("Fetch 過程出錯：", e);
        alert("網路連線或伺服器錯誤");
    }
    showLoading(false);
}
        
 function showQRCode(date, title) {
    document.getElementById('qrTitle').innerText = title;
    document.getElementById('qrDate').innerText = date;
    
    // 1. 內容編碼
    const qrPayload = `CHECKIN:${date}:${title}`;
    const encodedData = encodeURIComponent(qrPayload);
    
    // 2. 更換為 QRServer 的 API (這個保證能跑！)
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodedData}`;
    
    document.getElementById('qrImg').src = qrUrl;
    document.getElementById('qrModal').style.display = 'flex';
}
        
function closeQRModal() {
    document.getElementById('qrModal').style.display = 'none';
}
    
    </script>
</body>
</html>
