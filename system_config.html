<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統參數設定 | 築心會館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFBF7; }
        .emerald-gradient { background: linear-gradient(135deg, #064E3B 0%, #065F46 100%); }
        .input-disabled { background-color: #f9fafb; color: #9ca3af; cursor: not-allowed; border: 1px solid #e5e7eb !important; }
        .input-enabled { background-color: #ffffff; color: #064E3B; border: 2px solid #059669 !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body class="pb-20">

    <nav class="emerald-gradient text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-cog text-sm"></i>
                </div>
                <h1 class="font-black tracking-widest text-sm">系統參數設定</h1>
            </div>
            <button onclick="toggleEditMode()" id="navEditBtn" class="bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 transition-all hover:bg-white/20">
                <i class="fas fa-edit mr-1"></i>編輯模式
            </button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6 space-y-8">
        
        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-100">
            <h2 class="text-emerald-900 font-black mb-6 flex items-center gap-2">
                <i class="fas fa-calendar-alt text-orange-500"></i>活動期程
            </h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-emerald-700 mb-2 ml-1">宣傳開始日期</label>
                    <input type="date" id="promo_start" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-700 mb-2 ml-1">宣傳結束日期</label>
                    <input type="date" id="promo_end" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-100">
            <h2 class="text-emerald-900 font-black mb-6 flex items-center gap-2">
                <i class="fas fa-images text-orange-500"></i>首頁輪播圖管理
            </h2>
            <div id="img_container" class="space-y-4">
                </div>
        </section>

        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-emerald-100">
            <h2 class="text-emerald-900 font-black mb-6 flex items-center gap-2">
                <i class="fas fa-link text-orange-500"></i>外部資源連結
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-emerald-700 mb-2 ml-1">導讀資料夾網址 (Google Drive)</label>
                    <input type="text" id="reading_folder_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-700 mb-2 ml-1">活動剪影網址 (Google Photos)</label>
                    <input type="text" id="photo_gallery_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-emerald-700 mb-2 ml-1">關於我們文件網址 (Google Doc)</label>
                    <input type="text" id="about_us_url" class="config-input w-full p-4 rounded-2xl outline-none transition input-disabled" readonly>
                </div>
            </div>
        </section>
    </div>

    <div id="saveActions" class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-md border-t border-emerald-100 p-4 hidden">
        <div class="max-w-4xl mx-auto flex gap-4">
            <button onclick="toggleEditMode()" class="flex-1 py-4 rounded-2xl font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 transition-all">取消</button>
            <button onclick="saveConfigs()" class="flex-[2] py-4 rounded-2xl font-bold text-white emerald-gradient shadow-lg shadow-emerald-900/20 active:scale-95 transition-all">儲存變更</button>
        </div>
    </div>

    <div id="loadingOverlay"><div class="flex flex-col items-center gap-4"><div class="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div><p class="text-emerald-900 font-bold">同步雲端資料中...</p></div></div>
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-all pointer-events-none z-[2000]"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuf7v9-LhWnkT2jM5RV-K-NXMvrbROK1FtSjK9WW_8V7WjbncWCh8l5OIiLxzZMfY/exec";
        let isEditMode = false;

        // 初始化圖片輸入框
        function initImageInputs() {
            const container = document.getElementById('img_container');
            container.innerHTML = Array.from({length: 5}, (_, i) => `
                <div class="p-5 bg-emerald-50/30 rounded-[2rem] border border-emerald-100/50">
                    <span class="text-xs font-black text-emerald-800 mb-3 block italic">IMAGE SLIDE #${i+1}</span>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div><span class="sub-label text-orange-600 text-[10px] font-bold">宣傳圖 (B欄)</span><input type="text" id="slide_img${i+1}_promo" class="config-input w-full p-3 rounded-xl outline-none transition input-disabled" readonly></div>
                        <div><span class="sub-label text-gray-400 text-[10px] font-bold">常態圖 (C欄)</span><input type="text" id="slide_img${i+1}_normal" class="config-input w-full p-3 rounded-xl outline-none transition input-disabled" readonly></div>
                    </div>
                </div>
            `).join('');
        }

        // 讀取設定
        async function loadCurrentConfigs() {
            showLoading(true);
            try {
                const res = await fetch(GAS_URL + "?t=" + Date.now());
                const data = await res.json();
                const config = data.config || {};

                // 1. 填入日期
                const startDate = config.promo_start;
                const endDate = config.promo_end;
                document.getElementById('promo_start').value = (typeof startDate === 'object' ? startDate.promo : startDate) || '';
                document.getElementById('promo_end').value = (typeof endDate === 'object' ? endDate.promo : endDate) || '';

                // 2. 填入輪播圖
                for(let i=1; i<=5; i++) {
                    const item = config[`slide_img${i}`];
                    const promoEl = document.getElementById(`slide_img${i}_promo`);
                    const normalEl = document.getElementById(`slide_img${i}_normal`);
                    if(typeof item === 'object' && item !== null) {
                        promoEl.value = item.promo || '';
                        normalEl.value = item.normal || '';
                    } else {
                        normalEl.value = item || '';
                        promoEl.value = '';
                    }
                }

                // 3. 填入其他網址
                const setVal = (id, key) => {
                    const val = config[key];
                    const target = document.getElementById(id);
                    if (target) {
                        target.value = (typeof val === 'object' && val !== null) ? (val.promo || val.normal || '') : (val || '');
                    }
                };
                setVal('reading_folder_url', 'reading_folder_url');
                setVal('photo_gallery_url', 'photo_gallery_url');
                setVal('about_us_url', 'about_us_url');

            } catch (e) {
                console.error("Load Error:", e);
                showToast("❌ 無法獲取資料");
            }
            showLoading(false);
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const inputs = document.querySelectorAll('.config-input');
            const navEditBtn = document.getElementById('navEditBtn');
            const saveActions = document.getElementById('saveActions');

            inputs.forEach(input => {
                input.readOnly = !isEditMode;
                const isSlide = input.id.includes('slide_img');
                input.className = `config-input w-full ${isSlide ? 'p-3 rounded-xl' : 'p-4 rounded-2xl'} outline-none transition ` + 
                                 (isEditMode ? 'input-enabled' : 'input-disabled');
            });

            if (isEditMode) {
                navEditBtn.innerHTML = '<i class="fas fa-times mr-1"></i>結束編輯';
                navEditBtn.className = "bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md";
                saveActions.classList.remove('hidden');
            } else {
                navEditBtn.innerHTML = '<i class="fas fa-edit mr-1"></i>編輯模式';
                navEditBtn.className = "bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20";
                saveActions.classList.add('hidden');
            }
        }

        async function saveConfigs() {
            const staffKey = sessionStorage.getItem('staff_key');
            if(!staffKey) return showToast("❌ 權限錯誤，請重新登入");

            const payload = {
                type: 'update_config',
                key: staffKey,
                configs: {
                    promo_start: document.getElementById('promo_start').value,
                    promo_end: document.getElementById('promo_end').value,
                    reading_folder_url: document.getElementById('reading_folder_url').value,
                    photo_gallery_url: document.getElementById('photo_gallery_url').value,
                    about_us_url: document.getElementById('about_us_url').value,
                    slide_img1: { promo: document.getElementById('slide_img1_promo').value, normal: document.getElementById('slide_img1_normal').value },
                    slide_img2: { promo: document.getElementById('slide_img2_promo').value, normal: document.getElementById('slide_img2_normal').value },
                    slide_img3: { promo: document.getElementById('slide_img3_promo').value, normal: document.getElementById('slide_img3_normal').value },
                    slide_img4: { promo: document.getElementById('slide_img4_promo').value, normal: document.getElementById('slide_img4_normal').value },
                    slide_img5: { promo: document.getElementById('slide_img5_promo').value, normal: document.getElementById('slide_img5_normal').value }
                }
            };

            showLoading(true);
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.result === "SUCCESS") {
                    showToast("✅ 設定已成功同步至雲端");
                    isEditMode = true; toggleEditMode();
                    await loadCurrentConfigs();
                } else {
                    showToast("❌ 儲存失敗：" + result.message);
                }
            } catch (e) {
                showToast("❌ 連線異常");
            }
            showLoading(false);
        }

        function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        window.onload = () => {
            initImageInputs();
            loadCurrentConfigs();
        };
    </script>
</body>
</html>
